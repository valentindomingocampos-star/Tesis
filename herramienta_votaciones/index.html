// Envuelve líneas en text-spans manuales (SVG no tiene word-wrap automático).
function wrapSvgText(text, maxCharsPerLine){
  const words = String(text).split(/\s+/);
  const lines = [];
  let current = '';
  for(const w of words){
    if((current + ' ' + w).trim().length > maxCharsPerLine){
      lines.push(current.trim());
      current = w;
    } else {
      current = (current + ' ' + w).trim();
    }
  }
  if(current) lines.push(current);
  return lines;
}

function exportSvgAsPng(svgElement, filename, context){
  if(!svgElement){ console.warn('exportSvgAsPng: SVG no encontrado'); return; }
  const serializer = new XMLSerializer();
  const NS = 'http://www.w3.org/2000/svg';

  // Clonar el SVG original
  const inner = svgElement.cloneNode(true);
  inner.setAttribute('xmlns', NS);
  inner.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
  const innerVB = (inner.getAttribute('viewBox') || '0 0 1000 600').split(/\s+/).map(Number);
  const innerW = innerVB[2];
  const innerH = innerVB[3];

  let svgStr, totalW, totalH;

  if(!context){
    // Export simple: sólo el SVG con estilos inyectados (igual que antes)
    const styleEl = document.createElementNS(NS, 'style');
    styleEl.setAttribute('type', 'text/css');
    styleEl.textContent = SVG_EXPORT_STYLES;
    inner.insertBefore(styleEl, inner.firstChild);
    if(!inner.getAttribute('width')) inner.setAttribute('width', innerW);
    if(!inner.getAttribute('height')) inner.setAttribute('height', innerH);
    svgStr = serializer.serializeToString(inner);
    totalW = innerW;
    totalH = innerH;
  } else {
    // Export con contexto académico: envolvemos el SVG en un wrapper más alto
    // que incluye título, metadatos, nota de lectura y fuente.
    const PAD_X = 50;
    const FOOTER_H_BASE = 70;

    // Marco con ancho mínimo. Figuras retrato (mapa ~600px) se centran dentro
    // de un canvas más ancho para que título, franja de metadatos y footer
    // tengan siempre el mismo aire académico que en figuras landscape.
    const MIN_TOTAL_W = 1100;
    totalW = Math.max(innerW, MIN_TOTAL_W);
    const innerXOffset = (totalW - innerW) / 2;
    const availW = totalW - 2 * PAD_X;

    // Header dinámico: eyebrow institucional opcional, título y subtítulo
    // hacen wrap según el ancho disponible. Cuando hay eyebrow, el título
    // baja para hacerle espacio.
    const RULE_Y = 30;
    const EYEBROW_Y = 50;
    const hasEyebrow = !!context.eyebrow;
    const TITLE_FIRST_BASELINE = hasEyebrow ? 82 : 64;
    const TITLE_LINE_H = 28;        // 22px font + interlínea
    const SUB_GAP = 28;             // distancia entre última línea del título y primera del subtítulo
    const SUB_LINE_H = 17;
    const HEADER_BOTTOM_PAD = 21;
    const CREDIT_H = context.credit ? 26 : 0;
    // ~12 px por carácter a 22px serif weight 700; ~6.8 px a 13px Helvetica.
    const maxTitleChars = Math.max(20, Math.floor(availW / 12));
    const maxSubChars   = Math.max(30, Math.floor(availW / 6.8));
    const titleLines    = context.title    ? wrapSvgText(context.title,    maxTitleChars) : [];
    const subtitleLines = context.subtitle ? wrapSvgText(context.subtitle, maxSubChars)   : [];

    const lastTitleBaseline = titleLines.length
      ? TITLE_FIRST_BASELINE + (titleLines.length - 1) * TITLE_LINE_H
      : TITLE_FIRST_BASELINE;
    const subFirstBaseline = lastTitleBaseline + SUB_GAP;
    const lastSubBaseline  = subtitleLines.length
      ? subFirstBaseline + (subtitleLines.length - 1) * SUB_LINE_H
      : lastTitleBaseline;
    const HEADER_H = lastSubBaseline + HEADER_BOTTOM_PAD;

    // Pre-cálculo de la franja de metadatos: grilla adaptable al ancho.
    // En figuras anchas (hemiciclo, ~1400px) entran 6 columnas en una fila;
    // en figuras angostas (mapa, ~600px) se reorganiza a 2-3 columnas en
    // varias filas para que claves y valores no se monten.
    const META_KEY_OFFSET = 18;
    const META_VAL_OFFSET = 36;
    const META_LINE_H = 14;
    const META_BOTTOM_PAD = 16;
    const META_MIN_COL_W = 220; // ancho mínimo para que "Sesión" entre en 2 líneas, no 3
    let metaLines = [];
    let metaItemW = 0;
    let metaCols = 1;
    let metaRows = 0;
    let metaRowH = META_VAL_OFFSET + META_BOTTOM_PAD;
    if(context.meta && context.meta.length){
      // Preferimos factores de 6 (6, 3, 2, 1) para que las filas queden
      // siempre completas con 6 ítems de metadata.
      const candidateCols = [6, 3, 2, 1];
      metaCols = candidateCols.find(c => c * META_MIN_COL_W <= availW) || 1;
      metaCols = Math.min(metaCols, context.meta.length);
      metaItemW = availW / metaCols;
      // Cota empírica: ~6.2 px por carácter a 11px/600 en Helvetica, con margen interno.
      const maxCharsPerCell = Math.max(10, Math.floor((metaItemW - 12) / 6.2));
      metaLines = context.meta.map(m => wrapSvgText(m.v, maxCharsPerCell));
      metaRows = Math.ceil(context.meta.length / metaCols);
      const maxLinesPerCell = Math.max(1, ...metaLines.map(arr => arr.length));
      metaRowH = META_VAL_OFFSET + (maxLinesPerCell - 1) * META_LINE_H + META_BOTTOM_PAD;
    }
    const META_BAR_H = metaRows * metaRowH;

    // Pre-cálculo del bloque de leyenda cromática (chips con dot + label).
    // Se ubica entre el chart y el footer, envuelve a varias filas si no entra
    // todo en una. Cada chip lleva un dot 5px + label en Helvetica 11px.
    const LEGEND_DOT_R = 5;
    const LEGEND_ITEM_GAP_X = 14;
    const LEGEND_DOT_GAP = 7;
    const LEGEND_ROW_H = 22;
    const LEGEND_TOP_PAD = 28;
    const LEGEND_BOTTOM_PAD = 20;
    const LEGEND_EYEBROW_H = 16;
    let legendRowsLayout = [];
    if(context.legend && context.legend.length){
      let row = [];
      let rowW = 0;
      context.legend.forEach(item => {
        const textW = _measureTextW(item.label, 11, '600', TBL_PNG_FONTS.sans, 0); // ancho real (11px Helvetica/600)
        const itemW = LEGEND_DOT_R * 2 + LEGEND_DOT_GAP + textW + LEGEND_ITEM_GAP_X;
        if(rowW + itemW > availW && row.length){
          legendRowsLayout.push(row);
          row = [];
          rowW = 0;
        }
        row.push({ item, w: itemW });
        rowW += itemW;
      });
      if(row.length) legendRowsLayout.push(row);
    }
    const LEGEND_H = legendRowsLayout.length
      ? (LEGEND_TOP_PAD + LEGEND_EYEBROW_H + legendRowsLayout.length * LEGEND_ROW_H + LEGEND_BOTTOM_PAD)
      : 0;

    // Calcular líneas necesarias del footer (lectura + fuente + nota opcional).
    // ~6.8 px por carácter a 11.5px Helvetica weight 400, con margen interno.
    const maxFootChars = Math.max(40, Math.floor(availW / 6.8));
    const footLines = [];
    if(context.reading) footLines.push(...wrapSvgText('LECTURA  ' + context.reading, maxFootChars));
    if(context.source)  footLines.push(...wrapSvgText('FUENTE  ' + context.source,   maxFootChars));
    if(context.note)    footLines.push(...wrapSvgText('NOTA  '    + context.note,    maxFootChars));
    const FOOTER_H = FOOTER_H_BASE + footLines.length * 16 + CREDIT_H;

    totalH = HEADER_H + META_BAR_H + innerH + LEGEND_H + FOOTER_H;

    // Construir SVG wrapper
    const wrapper = document.createElementNS(NS, 'svg');
    wrapper.setAttribute('xmlns', NS);
    wrapper.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
    wrapper.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
    wrapper.setAttribute('width', totalW);
    wrapper.setAttribute('height', totalH);

    // Estilos
    const styleEl = document.createElementNS(NS, 'style');
    styleEl.setAttribute('type', 'text/css');
    styleEl.textContent = SVG_EXPORT_STYLES + '\n' + SVG_FIGURE_STYLES;
    wrapper.appendChild(styleEl);

    // Fondo
    const bg = document.createElementNS(NS, 'rect');
    bg.setAttribute('class', 'fig-bg');
    bg.setAttribute('x', 0); bg.setAttribute('y', 0);
    bg.setAttribute('width', totalW); bg.setAttribute('height', totalH);
    wrapper.appendChild(bg);

    // Header — barra de marca (ink + tick dorado) + eyebrow + título + subtítulo
    const rule = document.createElementNS(NS, 'line');
    rule.setAttribute('class', 'fig-rule');
    rule.setAttribute('x1', PAD_X); rule.setAttribute('y1', RULE_Y);
    rule.setAttribute('x2', PAD_X + 56); rule.setAttribute('y2', RULE_Y);
    wrapper.appendChild(rule);
    const ruleGold = document.createElementNS(NS, 'line');
    ruleGold.setAttribute('class', 'fig-rule-gold');
    ruleGold.setAttribute('x1', PAD_X + 60); ruleGold.setAttribute('y1', RULE_Y);
    ruleGold.setAttribute('x2', PAD_X + 76); ruleGold.setAttribute('y2', RULE_Y);
    wrapper.appendChild(ruleGold);

    if(hasEyebrow){
      const e = document.createElementNS(NS, 'text');
      e.setAttribute('class', 'fig-eyebrow');
      e.setAttribute('x', PAD_X);
      e.setAttribute('y', EYEBROW_Y);
      e.textContent = context.eyebrow;
      wrapper.appendChild(e);
    }

    titleLines.forEach((line, i) => {
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('class', 'fig-title-txt');
      t.setAttribute('x', PAD_X);
      t.setAttribute('y', TITLE_FIRST_BASELINE + i * TITLE_LINE_H);
      t.textContent = line;
      wrapper.appendChild(t);
    });
    subtitleLines.forEach((line, i) => {
      const s = document.createElementNS(NS, 'text');
      s.setAttribute('class', 'fig-sub-txt');
      s.setAttribute('x', PAD_X);
      s.setAttribute('y', subFirstBaseline + i * SUB_LINE_H);
      s.textContent = line;
      wrapper.appendChild(s);
    });

    // Meta-bar: grilla adaptable. Cada celda envuelve su valor dentro del
    // ancho de columna; si no entran 6 columnas se rearma en varias filas.
    if(context.meta && context.meta.length){
      const sep = document.createElementNS(NS, 'line');
      sep.setAttribute('class', 'fig-rule-soft');
      sep.setAttribute('x1', PAD_X); sep.setAttribute('y1', HEADER_H);
      sep.setAttribute('x2', totalW - PAD_X); sep.setAttribute('y2', HEADER_H);
      wrapper.appendChild(sep);

      context.meta.forEach((m, i) => {
        const col = i % metaCols;
        const row = Math.floor(i / metaCols);
        const kx = PAD_X + col * metaItemW;
        const ky = HEADER_H + row * metaRowH;

        const kEl = document.createElementNS(NS, 'text');
        kEl.setAttribute('class', 'fig-meta-key');
        kEl.setAttribute('x', kx); kEl.setAttribute('y', ky + META_KEY_OFFSET);
        kEl.textContent = m.k;
        wrapper.appendChild(kEl);

        const lines = (metaLines[i] && metaLines[i].length) ? metaLines[i] : [m.v];
        lines.forEach((line, li) => {
          const vEl = document.createElementNS(NS, 'text');
          vEl.setAttribute('class', 'fig-meta-txt');
          vEl.setAttribute('x', kx);
          vEl.setAttribute('y', ky + META_VAL_OFFSET + li * META_LINE_H);
          if(m.klass === 'fig-meta-yes') vEl.setAttribute('fill', '#3f6e44');
          if(m.klass === 'fig-meta-no')  vEl.setAttribute('fill', '#a32a2a');
          vEl.textContent = line;
          wrapper.appendChild(vEl);
        });
      });
    }

    // SVG interno — centrado horizontalmente cuando el marco es más ancho.
    const innerGroup = document.createElementNS(NS, 'g');
    innerGroup.setAttribute('transform', `translate(${innerXOffset}, ${HEADER_H + META_BAR_H})`);
    // Embebemos el inner como `<svg>` nested, manteniendo su viewBox
    inner.setAttribute('width', innerW);
    inner.setAttribute('height', innerH);
    innerGroup.appendChild(inner);
    wrapper.appendChild(innerGroup);

    // Leyenda cromática — chips con dot circular + label.
    // Sólo se muestra cuando hay items (modo voto presentes ó familias presentes).
    const chartBottom = HEADER_H + META_BAR_H + innerH;
    if(legendRowsLayout.length){
      const legendTop = chartBottom + LEGEND_TOP_PAD;
      const eyebrow = document.createElementNS(NS, 'text');
      eyebrow.setAttribute('class', 'fig-legend-eyebrow');
      eyebrow.setAttribute('x', PAD_X);
      eyebrow.setAttribute('y', legendTop);
      eyebrow.textContent = state.colorMode === 'family' ? 'Familias políticas' : 'Sentido del voto';
      wrapper.appendChild(eyebrow);

      legendRowsLayout.forEach((row, ri) => {
        let cursorX = PAD_X;
        const baselineY = legendTop + LEGEND_EYEBROW_H + ri * LEGEND_ROW_H + 12;
        row.forEach(({ item, w }) => {
          const dot = document.createElementNS(NS, 'circle');
          dot.setAttribute('cx', cursorX + LEGEND_DOT_R);
          dot.setAttribute('cy', baselineY - 4);
          dot.setAttribute('r', LEGEND_DOT_R);
          dot.setAttribute('fill', item.color);
          wrapper.appendChild(dot);
          const txt = document.createElementNS(NS, 'text');
          txt.setAttribute('class', 'fig-legend-txt');
          txt.setAttribute('x', cursorX + LEGEND_DOT_R * 2 + LEGEND_DOT_GAP);
          txt.setAttribute('y', baselineY);
          txt.textContent = item.label;
          wrapper.appendChild(txt);
          cursorX += w;
        });
      });
    }

    // Footer
    const footY = chartBottom + LEGEND_H;
    const sepFoot = document.createElementNS(NS, 'line');
    sepFoot.setAttribute('class', 'fig-rule-soft');
    sepFoot.setAttribute('x1', PAD_X); sepFoot.setAttribute('y1', footY + 16);
    sepFoot.setAttribute('x2', totalW - PAD_X); sepFoot.setAttribute('y2', footY + 16);
    wrapper.appendChild(sepFoot);

    footLines.forEach((line, i) => {
      const fEl = document.createElementNS(NS, 'text');
      fEl.setAttribute('class', 'fig-foot-txt');
      fEl.setAttribute('x', PAD_X);
      fEl.setAttribute('y', footY + 38 + i * 16);
      // Resaltar la etiqueta inicial (LECTURA / FUENTE / NOTA)
      const m = line.match(/^(LECTURA|FUENTE|NOTA)\s+(.*)$/);
      if(m){
        const k = document.createElementNS(NS, 'tspan');
        k.setAttribute('class', 'fig-foot-k');
        k.textContent = m[1] + ' ';
        fEl.appendChild(k);
        fEl.appendChild(document.createTextNode(m[2]));
      } else {
        fEl.textContent = line;
      }
      wrapper.appendChild(fEl);
    });

    // Credit line al pie — atribución institucional sobria.
    if(context.credit){
      const creditY = footY + 38 + footLines.length * 16 + 16;
      const cEl = document.createElementNS(NS, 'text');
      cEl.setAttribute('class', 'fig-credit');
      cEl.setAttribute('x', PAD_X);
      cEl.setAttribute('y', creditY);
      cEl.textContent = context.credit;
      wrapper.appendChild(cEl);
    }

    svgStr = serializer.serializeToString(wrapper);
  }

  rasterizeSvgToPng(svgStr, totalW, totalH, filename);
}

// Espera a que el browser termine el próximo paint antes de invocar el callback.
// Más robusto que setTimeout(60): no asume que el render tarda un tiempo fijo,
// usa el ciclo de animación nativo. Doble rAF para garantizar que el DOM
// inyectado por renderVizCard() esté layout-eado antes de hacer querySelector
// sobre svg.hemicycle / svg.map-svg.
function afterRender(fn){
  requestAnimationFrame(() => requestAnimationFrame(fn));
}

// Rasteriza un string SVG a PNG y dispara la descarga.
// Compartido por export de hemiciclo/mapa y export de tablas.
function rasterizeSvgToPng(svgStr, totalW, totalH, filename){
  const scale = 2.5;
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(totalW * scale);
  canvas.height = Math.round(totalH * scale);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fffdf8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
  img.onerror = (e) => console.error('Error al rasterizar SVG:', e);
  img.src = 'data:image/svg+xml;charset=utf-8;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
}

// Construye el objeto context para la exportación con contexto académico.
function buildFigureContext(scenario, figureType){
  // Estructura editorial completa para los PNG con contexto académico.
  // Cada campo lo arma un helper específico para evitar texto hardcodeado.
  return {
    eyebrow:  getExportFigureEyebrow(scenario, figureType),
    title:    getFigureTitle(scenario, figureType),
    subtitle: getExportFigureSubtitle(scenario, figureType),
    meta:     getFigureMetaCompact(scenario),
    legend:   getExportLegendItems(scenario, state.colorMode),
    reading:  getExportFigureReadingNote(scenario, figureType, state.colorMode),
    source:   getFigureSource(scenario),
    note:     getExportMapNote(scenario, figureType),
    credit:   getExportFigureCredit(scenario)
  };
}

// =====================================================================
// EXPORTACIÓN PNG DE TABLAS (SVG nativo, sin dependencias)
// =====================================================================
// Cada tabla se renderiza como SVG independiente con la misma estética
// que las figuras de hemiciclo/mapa: eyebrow + título + bajada + meta-chips
// + tabla con badges/chips/mini-bars + fuente + credit. Reusa el rasterizador
// común (rasterizeSvgToPng) para terminar en canvas y disparar la descarga.

const TBL_PNG_FONTS = {
  serifTitle: "'Iowan Old Style', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif",
  sans:       "'Helvetica Neue', Helvetica, Arial, sans-serif"
};

// Filenames PNG de tablas en español (consistente con los CSV académicos).
// kind interno: 'legislators' | 'provinces' | 'families' | 'summary'
const TABLE_PNG_FILENAME_SLUG = {
  legislators: 'tabla_legisladores',
  provinces:   'tabla_provincias',
  families:    'tabla_familias',
  summary:     'resumen_institucional'
};

function exportTableAsPng(scenario, kind){
  const slug = TABLE_PNG_FILENAME_SLUG[kind] || ('tabla_' + kind);
  const filename = slugifyFilename([scenario.id, slug]) + '.png';

  if(kind === 'summary') {
    const { svgStr, totalW, totalH } = buildSummaryFichaSvg(scenario);
    rasterizeSvgToPng(svgStr, totalW, totalH, filename);
    return;
  }

  let rows;
  if(kind === 'legislators'){
    // Tabla nominal: SIEMPRE respeta filtros activos (criterio definido).
    // Misma fuente de verdad que la tabla en pantalla y que exportLegislatorsCsv.
    rows = getFilteredLegislators(scenario);
    if(!rows.length){
      alert('No hay legisladores que coincidan con los filtros activos. Limpiá filtros antes de exportar.');
      return;
    }
    // Salvaguarda para evitar PNG ilegible cuando se exporta el universo completo
    const isFiltered = state.voteFilter !== 'TODOS' || state.provinceFilter || state.search || state.tableSearch;
    if(!isFiltered && rows.length > 100){
      const ok = confirm(
        `Estás por exportar ${rows.length} legisladores como una sola figura PNG. ` +
        `El resultado tendrá aproximadamente ${Math.round(rows.length * 22 / 100) * 100} px de alto y puede quedar denso para tesis.\n\n` +
        `¿Continuar igual?\n\n` +
        `Recomendado: filtrar previamente por voto, provincia o búsqueda; o usar el CSV.`
      );
      if(!ok) return;
    }
  } else if(kind === 'provinces'){
    // Agregada territorial: escenario completo, no afectada por filtros.
    rows = computeProvinceSummary(scenario);
  } else if(kind === 'families'){
    // Agregada partidaria: escenario completo, no afectada por filtros.
    rows = computeFamilySummary(scenario);
  } else {
    console.error('exportTableAsPng: kind desconocido →', kind);
    return;
  }

  const { svgStr, totalW, totalH } = buildTablePngSvg(scenario, kind, rows);
  rasterizeSvgToPng(svgStr, totalW, totalH, filename);
}

// Medición real del ancho de texto para los PNG (canvas measureText). Reemplaza
// los cálculos por conteo de caracteres que provocaban textos encimados. El
// letter-spacing no lo aplica el canvas, así que se suma aparte.
let _measCtx = null;
function _measureTextW(text, px, weight, family, letterSpacing){
  if(!_measCtx) _measCtx = document.createElement('canvas').getContext('2d');
  _measCtx.font = (weight || '400') + ' ' + px + 'px ' + (family || TBL_PNG_FONTS.sans);
  const s = String(text);
  let w = _measCtx.measureText(s).width;
  if(letterSpacing) w += letterSpacing * Math.max(0, s.length);
  return w;
}

// ---------------------------------------------------------------------
// Header común para PNG de tablas (eyebrow + título + bajada + meta-chips)
// ---------------------------------------------------------------------
function buildTablePngHeader(NS, scenario, title, bajada, totalW, PAD_X, opts){
  // Devuelve {elements: [...], headerBottomY: number}
  const ctx = csvScenarioContext(scenario);
  const eyebrowTxt = 'Figura exportada · Herramienta de visualización legislativa';
  const elements = [];

  const rule = document.createElementNS(NS, 'line');
  rule.setAttribute('x1', PAD_X); rule.setAttribute('y1', 30);
  rule.setAttribute('x2', PAD_X + 56); rule.setAttribute('y2', 30);
  rule.setAttribute('stroke', '#14181f'); rule.setAttribute('stroke-width', '2');
  elements.push(rule);

  const ruleGold = document.createElementNS(NS, 'line');
  ruleGold.setAttribute('x1', PAD_X + 60); ruleGold.setAttribute('y1', 30);
  ruleGold.setAttribute('x2', PAD_X + 76); ruleGold.setAttribute('y2', 30);
  ruleGold.setAttribute('stroke', '#9c7a2c'); ruleGold.setAttribute('stroke-width', '1.2');
  elements.push(ruleGold);

  const eyebrow = document.createElementNS(NS, 'text');
  eyebrow.setAttribute('x', PAD_X); eyebrow.setAttribute('y', 52);
  eyebrow.setAttribute('font-family', TBL_PNG_FONTS.sans);
  eyebrow.setAttribute('font-size', '9.5'); eyebrow.setAttribute('font-weight', '700');
  eyebrow.setAttribute('fill', '#9c7a2c');
  eyebrow.setAttribute('letter-spacing', '2.2');
  eyebrow.textContent = eyebrowTxt.toUpperCase();
  elements.push(eyebrow);

  const t = document.createElementNS(NS, 'text');
  t.setAttribute('x', PAD_X); t.setAttribute('y', 86);
  t.setAttribute('font-family', TBL_PNG_FONTS.serifTitle);
  t.setAttribute('font-size', '22'); t.setAttribute('font-weight', '700');
  t.setAttribute('fill', '#14181f'); t.setAttribute('letter-spacing', '-0.5');
  t.textContent = title;
  elements.push(t);

  // Bajada (puede envolver)
  const availW = totalW - 2 * PAD_X;
  const subLines = wrapSvgText(bajada, Math.max(40, Math.floor(availW / 6.8)));
  subLines.slice(0, 2).forEach((line, i) => {
    const sb = document.createElementNS(NS, 'text');
    sb.setAttribute('x', PAD_X); sb.setAttribute('y', 110 + i * 17);
    sb.setAttribute('font-family', TBL_PNG_FONTS.sans);
    sb.setAttribute('font-size', '13'); sb.setAttribute('font-weight', '400');
    sb.setAttribute('fill', '#2c3543'); sb.setAttribute('letter-spacing', '-0.05');
    sb.textContent = line;
    elements.push(sb);
  });
  const subBlockBottom = 110 + Math.min(2, subLines.length) * 17;

  // Meta-chips: Caso · Cámara · Fecha · Ley. Se OMITEN en figuras comparadas
  // (multi-escenario), donde la metadata de un solo escenario sería engañosa:
  // el caso/cámara/fecha de cada escenario ya va en los encabezados de columna.
  let headerBottomY;
  if(opts && opts.noMetaChips){
    headerBottomY = subBlockBottom + 14;
  } else {
    const metaY = subBlockBottom + 14;
    const chips = [
      { k: 'CASO',   v: ctx.case },
      { k: 'CÁMARA', v: ctx.chamber },
      { k: 'FECHA',  v: ctx.date },
      { k: 'LEY',    v: ctx.law }
    ];
    let cursorX = PAD_X;
    chips.forEach((c, i) => {
      if(i > 0){
        const sep = document.createElementNS(NS, 'text');
        sep.setAttribute('x', cursorX); sep.setAttribute('y', metaY);
        sep.setAttribute('font-family', TBL_PNG_FONTS.sans);
        sep.setAttribute('font-size', '11'); sep.setAttribute('fill', '#9a9588');
        sep.textContent = '·';
        elements.push(sep);
        cursorX += 10;
      }
      const k = document.createElementNS(NS, 'text');
      k.setAttribute('x', cursorX); k.setAttribute('y', metaY);
      k.setAttribute('font-family', TBL_PNG_FONTS.sans);
      k.setAttribute('font-size', '9.5'); k.setAttribute('font-weight', '700');
      k.setAttribute('fill', '#6a6a64'); k.setAttribute('letter-spacing', '1.3');
      k.textContent = c.k;
      elements.push(k);
      cursorX += _measureTextW(c.k, 9.5, '700', TBL_PNG_FONTS.sans, 1.3) + 8;
      const v = document.createElementNS(NS, 'text');
      v.setAttribute('x', cursorX); v.setAttribute('y', metaY);
      v.setAttribute('font-family', TBL_PNG_FONTS.sans);
      v.setAttribute('font-size', '11'); v.setAttribute('font-weight', '600');
      v.setAttribute('fill', '#2c3543');
      v.textContent = c.v;
      elements.push(v);
      cursorX += _measureTextW(c.v, 11, '600', TBL_PNG_FONTS.sans, 0) + 14;
    });
    headerBottomY = metaY + 14;
  }
  const sep = document.createElementNS(NS, 'line');
  sep.setAttribute('x1', PAD_X); sep.setAttribute('y1', headerBottomY);
  sep.setAttribute('x2', totalW - PAD_X); sep.setAttribute('y2', headerBottomY);
  sep.setAttribute('stroke', '#d9d3c4'); sep.setAttribute('stroke-width', '1');
  elements.push(sep);

  return { elements, headerBottomY };
}

// ---------------------------------------------------------------------
// Footer común (fuente + credit)
// ---------------------------------------------------------------------
// Fuente general para figuras comparadas (las que abarcan los 4 escenarios): no
// corresponde la fuente de un solo escenario.
const PNG_COMPARISON_SOURCE = 'Elaboración propia sobre los cuatro datasets validados de votaciones nominales HCDN/HSN — leyes 26.466 y 26.741.';
function buildTablePngFooter(NS, scenario, y, totalW, PAD_X, extraNote, opts){
  const elements = [];
  const sep = document.createElementNS(NS, 'line');
  sep.setAttribute('x1', PAD_X); sep.setAttribute('y1', y);
  sep.setAttribute('x2', totalW - PAD_X); sep.setAttribute('y2', y);
  sep.setAttribute('stroke', '#d9d3c4'); sep.setAttribute('stroke-width', '1');
  elements.push(sep);

  const availW = totalW - 2 * PAD_X;
  const maxChars = Math.max(40, Math.floor(availW / 6.8));
  const lines = [];
  if(opts && opts.generalSource){
    // Figura comparada: una sola FUENTE general, sin fuente territorial de un
    // solo escenario.
    lines.push(...wrapSvgText('FUENTE  ' + opts.generalSource, maxChars));
  } else {
    lines.push(...wrapSvgText('FUENTE  ' + csvSource(scenario, 'vote'), maxChars));
    lines.push(...wrapSvgText('FUENTE TERRITORIAL  ' + csvSource(scenario, 'district'), maxChars));
  }
  if(extraNote) lines.push(...wrapSvgText('NOTA  ' + extraNote, maxChars));

  lines.forEach((line, i) => {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('x', PAD_X); t.setAttribute('y', y + 22 + i * 16);
    t.setAttribute('font-family', TBL_PNG_FONTS.sans);
    t.setAttribute('font-size', '11.5'); t.setAttribute('fill', '#2c3543');
    const m = line.match(/^(FUENTE TERRITORIAL|FUENTE|NOTA)\s+(.*)$/);
    if(m){
      const k = document.createElementNS(NS, 'tspan');
      k.setAttribute('font-size', '9.5'); k.setAttribute('font-weight', '700');
      k.setAttribute('fill', '#6a6a64'); k.setAttribute('letter-spacing', '1.3');
      k.textContent = m[1] + '  ';
      t.appendChild(k);
      t.appendChild(document.createTextNode(m[2]));
    } else {
      t.textContent = line;
    }
    elements.push(t);
  });

  const creditY = y + 22 + lines.length * 16 + 14;
  const credit = document.createElementNS(NS, 'text');
  credit.setAttribute('x', PAD_X); credit.setAttribute('y', creditY);
  credit.setAttribute('font-family', TBL_PNG_FONTS.sans);
  credit.setAttribute('font-size', '9'); credit.setAttribute('font-weight', '600');
  credit.setAttribute('fill', '#9a9588'); credit.setAttribute('letter-spacing', '1.2');
  credit.textContent = 'ELABORACIÓN PROPIA A PARTIR DE FUENTES LEGISLATIVAS OFICIALES.';
  elements.push(credit);

  return { elements, footerBottomY: creditY + 16 };
}

// ---------------------------------------------------------------------
// Builder de SVG para tablas de legisladores, provincias, familias
// ---------------------------------------------------------------------
function buildTablePngSvg(scenario, kind, rows){
  const NS = 'http://www.w3.org/2000/svg';
  const PAD_X = 50;

  const spec = TABLE_PNG_SPECS[kind];
  const headerH = 28;          // alto del header de la tabla
  const rowH = spec.rowH;
  const tableTopGap = 24;      // espacio entre header de figura y tabla

  // Anchos de columna: parten de la fracción de diseño pero se garantiza que
  // cada columna entre a su ENCABEZADO medido (+ margen), de modo que ningún
  // texto se encime. El lienzo se ensancha lo necesario (las tablas son anchas
  // por naturaleza). Los renderers de celda ya truncan al ancho de su columna.
  const baseAvail = 1000;
  const HEAD_PAD = 26;
  const colWs = spec.columns.map(c => {
    const fracW = Math.round(baseAvail * c.width);
    const headW = Math.ceil(_measureTextW(c.label.toUpperCase(), 10, '700', TBL_PNG_FONTS.sans, 1.4)) + HEAD_PAD;
    // Columnas de badge de voto: garantizar que el pill más ancho entre completo
    // (no se desborde a la columna siguiente).
    let badgeW = 0;
    if(c.renderer === 'voteBadge' || c.renderer === 'voteBadgeOrMixed'){
      rows.forEach(r => {
        const lbl = (c.renderer === 'voteBadgeOrMixed' && r.isMixed)
          ? 'Composición mixta'
          : (VOTE_LABELS[r[c.key]] || r[c.key] || '—');
        badgeW = Math.max(badgeW, Math.ceil(_measureTextW(lbl, 10.5, '600', TBL_PNG_FONTS.sans, 0)) + 16 + 24);
      });
    }
    return Math.max(fracW, headW, badgeW);
  });
  const availW = colWs.reduce((a, b) => a + b, 0);
  const totalW = availW + 2 * PAD_X;
  const colXs = [];
  let cx = PAD_X;
  for(let i = 0; i < colWs.length; i++){ colXs.push(cx); cx += colWs[i]; }

  // Construir wrapper
  const wrapper = document.createElementNS(NS, 'svg');
  wrapper.setAttribute('xmlns', NS);

  // Header de figura
  const headerOut = buildTablePngHeader(NS, scenario, spec.title, spec.bajada, totalW, PAD_X);
  const tableStartY = headerOut.headerBottomY + tableTopGap;

  // Header row de la tabla
  const headRow = document.createElementNS(NS, 'g');
  const headBg = document.createElementNS(NS, 'rect');
  headBg.setAttribute('x', PAD_X); headBg.setAttribute('y', tableStartY);
  headBg.setAttribute('width', availW); headBg.setAttribute('height', headerH);
  headBg.setAttribute('fill', '#f8f5ec');
  headBg.setAttribute('stroke', '#d9d3c4'); headBg.setAttribute('stroke-width', '1');
  headRow.appendChild(headBg);

  spec.columns.forEach((c, i) => {
    const t = document.createElementNS(NS, 'text');
    const align = c.align || 'left';
    const tx = align === 'right' ? colXs[i] + colWs[i] - 10
             : align === 'center' ? colXs[i] + colWs[i]/2
             : colXs[i] + 12;
    t.setAttribute('x', tx); t.setAttribute('y', tableStartY + 18);
    t.setAttribute('font-family', TBL_PNG_FONTS.sans);
    t.setAttribute('font-size', '10'); t.setAttribute('font-weight', '700');
    t.setAttribute('fill', '#6a6a64'); t.setAttribute('letter-spacing', '1.4');
    if(align === 'right') t.setAttribute('text-anchor', 'end');
    if(align === 'center') t.setAttribute('text-anchor', 'middle');
    t.textContent = c.label.toUpperCase();
    headRow.appendChild(t);
  });

  // Data rows
  const bodyG = document.createElementNS(NS, 'g');
  rows.forEach((row, ri) => {
    const ry = tableStartY + headerH + ri * rowH;
    // Zebra background
    if(ri % 2 === 0){
      const zebra = document.createElementNS(NS, 'rect');
      zebra.setAttribute('x', PAD_X); zebra.setAttribute('y', ry);
      zebra.setAttribute('width', availW); zebra.setAttribute('height', rowH);
      zebra.setAttribute('fill', '#fbf9f1');
      bodyG.appendChild(zebra);
    }
    spec.columns.forEach((c, i) => {
      const cellX = colXs[i];
      const cellW = colWs[i];
      const cellY = ry + rowH * 0.6;  // baseline aprox
      const helpers = { NS, x: cellX, y: cellY, w: cellW, rowH, ry };
      const frag = (spec.renderers[c.renderer] || spec.renderers.text)(row, c, helpers);
      if(Array.isArray(frag)) frag.forEach(el => bodyG.appendChild(el));
      else if(frag) bodyG.appendChild(frag);
    });
    // Separador horizontal entre filas
    if(ri < rows.length - 1){
      const sep = document.createElementNS(NS, 'line');
      sep.setAttribute('x1', PAD_X); sep.setAttribute('y1', ry + rowH);
      sep.setAttribute('x2', PAD_X + availW); sep.setAttribute('y2', ry + rowH);
      sep.setAttribute('stroke', '#ece6d5'); sep.setAttribute('stroke-width', '0.6');
      bodyG.appendChild(sep);
    }
  });

  // Border bottom de la tabla
  const tableBottomY = tableStartY + headerH + rows.length * rowH;
  const tableBorder = document.createElementNS(NS, 'rect');
  tableBorder.setAttribute('x', PAD_X); tableBorder.setAttribute('y', tableStartY);
  tableBorder.setAttribute('width', availW); tableBorder.setAttribute('height', headerH + rows.length * rowH);
  tableBorder.setAttribute('fill', 'none');
  tableBorder.setAttribute('stroke', '#d9d3c4'); tableBorder.setAttribute('stroke-width', '1');

  // Nota de filtros si aplica
  let extraNote = null;
  if(kind === 'legislators'){
    const isFiltered = state.voteFilter !== 'TODOS' || state.provinceFilter || state.search || state.tableSearch;
    extraNote = isFiltered
      ? `${rows.length} legisladores visibles tras filtros sobre un total de ${scenario.legislators.length}.`
      : `${rows.length} legisladores · sin filtros activos.`;
  } else if(kind === 'provinces'){
    extraNote = 'Esta tabla representa el escenario completo: no se reduce por filtros activos en la nominal. Los porcentajes se calculan sobre el total de representantes del distrito.';
  } else if(kind === 'families'){
    extraNote = 'Esta tabla representa el escenario completo: no se reduce por filtros activos en la nominal. Los porcentajes se calculan sobre el total de cada familia.';
  }

  // Footer
  const footerStartY = tableBottomY + 18;
  const footerOut = buildTablePngFooter(NS, scenario, footerStartY, totalW, PAD_X, extraNote);
  const totalH = footerOut.footerBottomY + 12;

  // BG
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('x', 0); bg.setAttribute('y', 0);
  bg.setAttribute('width', totalW); bg.setAttribute('height', totalH);
  bg.setAttribute('fill', '#fffdf8');

  // Compose
  wrapper.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  wrapper.setAttribute('width', totalW); wrapper.setAttribute('height', totalH);
  wrapper.appendChild(bg);
  headerOut.elements.forEach(el => wrapper.appendChild(el));
  wrapper.appendChild(headRow);
  wrapper.appendChild(bodyG);
  wrapper.appendChild(tableBorder);
  footerOut.elements.forEach(el => wrapper.appendChild(el));

  const serializer = new XMLSerializer();
  return { svgStr: serializer.serializeToString(wrapper), totalW, totalH };
}

// Renderers de celda compartidos entre specs (cierran sobre helpers)
const TABLE_CELL_RENDERERS = {
  text: (row, c, h) => {
    const t = document.createElementNS(h.NS, 'text');
    const align = c.align || 'left';
    const tx = align === 'right' ? h.x + h.w - 10
             : align === 'center' ? h.x + h.w/2
             : h.x + 12;
    t.setAttribute('x', tx); t.setAttribute('y', h.y);
    t.setAttribute('font-family', TBL_PNG_FONTS.sans);
    t.setAttribute('font-size', c.size || '11'); t.setAttribute('font-weight', c.weight || '400');
    t.setAttribute('fill', c.fill || '#2c3543');
    if(align === 'right') t.setAttribute('text-anchor', 'end');
    if(align === 'center') t.setAttribute('text-anchor', 'middle');
    const raw = String(row[c.key] != null ? row[c.key] : '');
    const maxChars = Math.floor((h.w - 24) / 5.8);
    t.textContent = raw.length > maxChars ? (raw.slice(0, maxChars - 1) + '…') : raw;
    if(raw.length > maxChars){
      const title = document.createElementNS(h.NS, 'title');
      title.textContent = raw;
      t.appendChild(title);
    }
    return t;
  },
  textBold: (row, c, h) => {
    return TABLE_CELL_RENDERERS.text(row, { ...c, weight: '600', fill: '#14181f', size: '11.5' }, h);
  },
  textMutedItalic: (row, c, h) => {
    const t = TABLE_CELL_RENDERERS.text(row, { ...c, fill: '#6a6a64', size: '10' }, h);
    t.setAttribute('font-style', 'italic');
    return t;
  },
  number: (row, c, h) => {
    return TABLE_CELL_RENDERERS.text(row, { ...c, align: 'right' }, h);
  },
  voteBadge: (row, c, h) => {
    const out = [];
    const v = row[c.key];
    const label = VOTE_LABELS[v] || v || '—';
    const color = VOTE_COLORS[v] || '#a09b8c';
    const txtW = Math.ceil(_measureTextW(label, 10.5, '600', TBL_PNG_FONTS.sans, 0)) + 16;
    const bx = h.x + 12;
    const by = h.y - 12;
    const rect = document.createElementNS(h.NS, 'rect');
    rect.setAttribute('x', bx); rect.setAttribute('y', by);
    rect.setAttribute('width', txtW); rect.setAttribute('height', 18);
    rect.setAttribute('rx', 3);
    rect.setAttribute('fill', hexToSoftBg(color));
    out.push(rect);
    const t = document.createElementNS(h.NS, 'text');
    t.setAttribute('x', bx + txtW/2); t.setAttribute('y', by + 13);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-family', TBL_PNG_FONTS.sans);
    t.setAttribute('font-size', '10.5'); t.setAttribute('font-weight', '600');
    t.setAttribute('fill', color);
    t.textContent = label;
    out.push(t);
    return out;
  },
  voteBadgeOrMixed: (row, c, h) => {
    if(row.isMixed){
      const out = [];
      const label = 'Composición mixta';
      const color = '#a87523';
      const txtW = Math.ceil(_measureTextW(label, 10.5, '600', TBL_PNG_FONTS.sans, 0)) + 16;
      const bx = h.x + 12;
      const by = h.y - 12;
      const rect = document.createElementNS(h.NS, 'rect');
      rect.setAttribute('x', bx); rect.setAttribute('y', by);
      rect.setAttribute('width', txtW); rect.setAttribute('height', 18);
      rect.setAttribute('rx', 3);
      rect.setAttribute('fill', '#f3e8c9');
      out.push(rect);
      const t = document.createElementNS(h.NS, 'text');
      t.setAttribute('x', bx + txtW/2); t.setAttribute('y', by + 13);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('font-family', TBL_PNG_FONTS.sans);
      t.setAttribute('font-size', '10.5'); t.setAttribute('font-weight', '600');
      t.setAttribute('fill', color);
      t.textContent = label;
      out.push(t);
      return out;
    }
    return TABLE_CELL_RENDERERS.voteBadge(row, { ...c, key: 'dominantVote' }, h);
  },
  familyChip: (row, c, h) => {
    const out = [];
    const fam = row[c.key];
    if(!fam){
      const t = document.createElementNS(h.NS, 'text');
      t.setAttribute('x', h.x + 12); t.setAttribute('y', h.y);
      t.setAttribute('font-family', TBL_PNG_FONTS.sans);
      t.setAttribute('font-size', '10.5'); t.setAttribute('fill', '#9a9588');
      t.setAttribute('font-style', 'italic');
      t.textContent = 'No consignado';
      out.push(t);
      return out;
    }
    const color = FAMILY_COLORS[fam] || '#a09b8c';
    const dot = document.createElementNS(h.NS, 'circle');
    dot.setAttribute('cx', h.x + 18); dot.setAttribute('cy', h.y - 4);
    dot.setAttribute('r', 5);
    dot.setAttribute('fill', color);
    out.push(dot);
    const t = document.createElementNS(h.NS, 'text');
    t.setAttribute('x', h.x + 30); t.setAttribute('y', h.y);
    t.setAttribute('font-family', TBL_PNG_FONTS.sans);
    t.setAttribute('font-size', '11'); t.setAttribute('font-weight', '600');
    t.setAttribute('fill', '#14181f');
    const maxChars = Math.floor((h.w - 42) / 6.2);
    t.textContent = fam.length > maxChars ? (fam.slice(0, maxChars - 1) + '…') : fam;
    out.push(t);
    return out;
  },
  familyChipWithSub: (row, c, h) => {
    // Familia arriba + sub-línea con bloques
    const out = TABLE_CELL_RENDERERS.familyChip(row, c, h);
    const blocks = row.blocks ? [...row.blocks].sort((a,b) => a.localeCompare(b, 'es')).join(' · ') : '';
    if(blocks){
      const sub = document.createElementNS(h.NS, 'text');
      sub.setAttribute('x', h.x + 12); sub.setAttribute('y', h.y + 12);
      sub.setAttribute('font-family', TBL_PNG_FONTS.sans);
      sub.setAttribute('font-size', '9'); sub.setAttribute('fill', '#9a9588');
      sub.setAttribute('font-style', 'italic');
      const maxChars = Math.floor((h.w - 24) / 4.8);
      sub.textContent = blocks.length > maxChars ? (blocks.slice(0, maxChars - 1) + '…') : blocks;
      if(blocks.length > maxChars){
        const title = document.createElementNS(h.NS, 'title');
        title.textContent = blocks;
        sub.appendChild(title);
      }
      out.push(sub);
    }
    return out;
  },
  miniBar: (row, c, h) => {
    const out = [];
    const total = row.total || 1;
    const yes  = row.AFIRMATIVO || 0;
    const no   = row.NEGATIVO || 0;
    const abst = row.ABSTENCION || 0;
    const aus  = (row.AUSENTE || 0) + (row.PRESIDENCIA || 0);
    const w = h.w - 24;
    const bx = h.x + 12;
    const by = h.y - 10;
    const segH = 7;
    // Bg
    const bg = document.createElementNS(h.NS, 'rect');
    bg.setAttribute('x', bx); bg.setAttribute('y', by);
    bg.setAttribute('width', w); bg.setAttribute('height', segH);
    bg.setAttribute('rx', 3.5); bg.setAttribute('fill', '#d9d3c4');
    out.push(bg);
    let cursorX = bx;
    const segs = [
      { val: yes,  color: '#3f6e44' },
      { val: no,   color: '#a32a2a' },
      { val: abst, color: '#a87523' },
      { val: aus,  color: '#a09b8c' }
    ];
    segs.forEach(seg => {
      if(seg.val <= 0) return;
      const sw = w * seg.val / total;
      const r = document.createElementNS(h.NS, 'rect');
      r.setAttribute('x', cursorX); r.setAttribute('y', by);
      r.setAttribute('width', sw); r.setAttribute('height', segH);
      r.setAttribute('fill', seg.color);
      out.push(r);
      cursorX += sw;
    });
    return out;
  }
};

// hex → soft bg approximate (suma blanco)
function hexToSoftBg(hex){
  const m = /^#([0-9a-f]{6})$/i.exec(hex);
  if(!m) return '#eee';
  const n = parseInt(m[1], 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  // mix con #fffdf8 al 80%
  const mix = (c) => Math.round(c * 0.18 + 250 * 0.82);
  const r2 = mix(r), g2 = mix(g), b2 = mix(b);
  return `rgb(${r2}, ${g2}, ${b2})`;
}

// Inyecta campos derivados a las filas antes de pasarlas al renderer.
function decorateTableRows(rows, kind){
  return rows.map(r => {
    const out = { ...r };
    const tot = r.total || 0;
    out._pctY = tot ? (r.AFIRMATIVO / tot * 100).toFixed(1) : '0.0';
    out._minibar = '';
    if(kind === 'families'){
      out._provCount = r.provinces ? r.provinces.size : 0;
    }
    return out;
  });
}

// Override del builder para inyectar decoraciones derivadas
(function patchBuildTablePngSvg(){
  const orig = buildTablePngSvg;
  buildTablePngSvg = function(scenario, kind, rows){
    const decorated = decorateTableRows(rows, kind);
    return orig(scenario, kind, decorated);
  };
})();

    const goldTick = document.createElementNS(NS, 'line');
    goldTick.setAttribute('x1', PAD_X); goldTick.setAttribute('y1', cursorY);
    goldTick.setAttribute('x2', PAD_X + 16); goldTick.setAttribute('y2', cursorY);
    goldTick.setAttribute('stroke', '#9c7a2c'); goldTick.setAttribute('stroke-width', '2');
    elements.push(goldTick);
    const stitle = document.createElementNS(NS, 'text');
    stitle.setAttribute('x', PAD_X + 24); stitle.setAttribute('y', cursorY + 4);
    stitle.setAttribute('font-family', TBL_PNG_FONTS.sans);
    stitle.setAttribute('font-size', '10.5'); stitle.setAttribute('font-weight', '700');
    stitle.setAttribute('fill', '#6a6a64'); stitle.setAttribute('letter-spacing', '1.8');
    stitle.textContent = section.title;
    elements.push(stitle);
    cursorY += 22;

    section.items.forEach((it, idx) => {
      const col = idx % 2;
      const row = Math.floor(idx / 2);
      const cellX = PAD_X + col * (colW + 24);
      const cellY = cursorY + row * 44;

      // Key
      const k = document.createElementNS(NS, 'text');
      k.setAttribute('x', cellX); k.setAttribute('y', cellY + 12);
      k.setAttribute('font-family', TBL_PNG_FONTS.sans);
      k.setAttribute('font-size', '9.5'); k.setAttribute('font-weight', '700');
      k.setAttribute('fill', '#6a6a64'); k.setAttribute('letter-spacing', '1.4');
      k.textContent = it[0].toUpperCase();
      elements.push(k);

      // Value
      const v_text = String(it[1] != null ? it[1] : '—');
      const vEl = document.createElementNS(NS, 'text');
      vEl.setAttribute('x', cellX); vEl.setAttribute('y', cellY + 30);
      vEl.setAttribute('font-family', TBL_PNG_FONTS.sans);
      vEl.setAttribute('font-size', '12.5'); vEl.setAttribute('font-weight', '600');
      let fill = '#14181f';
      const flag = it[2];
      if(flag === 'AFIRMATIVO') fill = '#3f6e44';
      else if(flag === 'NEGATIVO') fill = '#a32a2a';
      else if(flag === 'warn') fill = '#a87523';
      else if(flag === 'ok') fill = '#3f6e44';
      // Missing italic
      const looksMissing = /^No\s+(consignado|corresponde)|^Sin\s+dato/i.test(v_text);
      if(looksMissing){ fill = '#9a9588'; vEl.setAttribute('font-style', 'italic'); vEl.setAttribute('font-weight', '500'); }
      vEl.setAttribute('fill', fill);
      const maxChars = Math.floor((colW - 12) / 6.2);
      vEl.textContent = v_text.length > maxChars ? (v_text.slice(0, maxChars - 1) + '…') : v_text;
      if(v_text.length > maxChars){
        const title = document.createElementNS(NS, 'title');
        title.textContent = v_text;
        vEl.appendChild(title);
      }
      elements.push(vEl);

      // Línea separadora dashed
      const sep = document.createElementNS(NS, 'line');
      sep.setAttribute('x1', cellX); sep.setAttribute('y1', cellY + 38);
      sep.setAttribute('x2', cellX + colW); sep.setAttribute('y2', cellY + 38);
      sep.setAttribute('stroke', '#d9d3c4'); sep.setAttribute('stroke-width', '0.6');
      sep.setAttribute('stroke-dasharray', '2,2');
      elements.push(sep);
    });
    const rowsInSection = Math.ceil(section.items.length / 2);
    cursorY += rowsInSection * 44 + 10;
  });

  const footerStartY = cursorY + 6;
  const footerOut = buildTablePngFooter(NS, scenario, footerStartY, totalW, PAD_X, null);
  const totalH = footerOut.footerBottomY + 12;

  // BG
  const wrapper = document.createElementNS(NS, 'svg');
  wrapper.setAttribute('xmlns', NS);
  wrapper.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  wrapper.setAttribute('width', totalW); wrapper.setAttribute('height', totalH);
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('x', 0); bg.setAttribute('y', 0);
  bg.setAttribute('width', totalW); bg.setAttribute('height', totalH);
  bg.setAttribute('fill', '#fffdf8');
  wrapper.appendChild(bg);
  headerOut.elements.forEach(el => wrapper.appendChild(el));
  elements.forEach(el => wrapper.appendChild(el));
  footerOut.elements.forEach(el => wrapper.appendChild(el));

  const serializer = new XMLSerializer();
  return { svgStr: serializer.serializeToString(wrapper), totalW, totalH };
}

// =====================================================================
// EXPORTACIÓN DE LAS FICHAS DEL SIDEBAR — legislador y resumen prov./nacional.
// CSV + PNG. Reutiliza la maquinaria de figuras (buildTablePngHeader/Footer,
// rasterizeSvgToPng) y de CSV (exportCsv + csv* helpers). No toca datos ni
// cálculos: lee state.selectedIndex / state.provinceFilter y los agregados ya
// calculados (_provinceData, computeVoteSummary).
// =====================================================================
function _selectedLegislator(s){
  return state.selectedIndex !== null ? s._sortedLegislators[state.selectedIndex] : null;
}
function _summaryProvinceName(s){
  const leg = _selectedLegislator(s);
  const p = state.provinceFilter || (leg ? leg.province : '');
  return (p && s._provinceData[p]) ? p : '';
}
function _familiesWithVotes(members){
  const m = {};
  for(const l of members){
    if(!m[l.family]) m[l.family] = { AFIRMATIVO:0, NEGATIVO:0, ABSTENCION:0, AUSENTE:0, PRESIDENCIA:0, total:0 };
    m[l.family][l.vote] = (m[l.family][l.vote] || 0) + 1;
    m[l.family].total++;
  }
  return Object.keys(m).map(f => ({ name: f, ...m[f] })).sort((a,b) => b.total - a.total);
}
function _summaryExportData(s){
  const provName = _summaryProvinceName(s);
  if(provName){
    const p = s._provinceData[provName];
    return { scope:'province', name: provName, total: p.total,
      votes: { AFIRMATIVO:p.AFIRMATIVO||0, NEGATIVO:p.NEGATIVO||0, ABSTENCION:p.ABSTENCION||0, AUSENTE:p.AUSENTE||0, PRESIDENCIA:p.PRESIDENCIA||0 },
      families: _familiesWithVotes(p.members) };
  }
  const sum = computeVoteSummary(s);
  return { scope:'national', name:'Total cuerpo', total: s.totalSeats,
    votes: { AFIRMATIVO:sum.AFIRMATIVO, NEGATIVO:sum.NEGATIVO, ABSTENCION:sum.ABSTENCION, AUSENTE:sum.AUSENTE, PRESIDENCIA:sum.PRESIDENCIA },
    families: _familiesWithVotes(s._sortedLegislators) };
}

function _svgText(NS, x, y, str, o){

function _svgSectionTitle(NS, x, y, label, els){

function _wrapSvg(NS, totalW, totalH, groups){

// Barra horizontal apilada por voto. Colores de voto (verde/rojo/ocre/piedra),
// nunca color de familia. Contorno sutil para definición editorial.
function _svgBar(NS, x, y, w, h, segs, els, scaleTotal){
  // scaleTotal: si se pasa, la barra escala a ese total (deja remanente vacío
  // para las bancas no representadas, p. ej. la presidencia, que no es un voto).
  const total = scaleTotal || segs.reduce((a, s) => a + (s.value > 0 ? s.value : 0), 0) || 1;
  let cx = x;
  segs.forEach(seg => {
    if(!seg.value || seg.value <= 0) return;
    const sw = w * seg.value / total;
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', cx.toFixed(2)); r.setAttribute('y', y);
    r.setAttribute('width', Math.max(0.8, sw).toFixed(2)); r.setAttribute('height', h);
    r.setAttribute('fill', seg.color);
    els.push(r);
    cx += sw;
  });
  const out = document.createElementNS(NS, 'rect');
  out.setAttribute('x', x); out.setAttribute('y', y); out.setAttribute('width', w); out.setAttribute('height', h);
  out.setAttribute('rx', '2'); out.setAttribute('fill', 'none');
  out.setAttribute('stroke', '#d9d3c4'); out.setAttribute('stroke-width', '0.75');
  els.push(out);
}

  // ---- Bloque 1: composición del voto ----

  _svgBar(NS, PAD_X, y, availW, 16, [
    { value: d.votes.AFIRMATIVO, color: _VOTE_HEX.AFIRMATIVO },
    { value: d.votes.NEGATIVO,   color: _VOTE_HEX.NEGATIVO },
    { value: d.votes.ABSTENCION, color: _VOTE_HEX.ABSTENCION },
    { value: d.votes.AUSENTE,    color: _VOTE_HEX.AUSENTE }
  ], els, d.total);
  y += 16 + 22;
  // números grandes con label
  const numParts = [
    { n: d.votes.AFIRMATIVO, label: 'a favor',   color: _VOTE_HEX.AFIRMATIVO },
    { n: d.votes.NEGATIVO,   label: 'en contra', color: _VOTE_HEX.NEGATIVO }
  ];
  if(d.votes.ABSTENCION > 0) numParts.push({ n: d.votes.ABSTENCION, label: 'abstenciones', color: _VOTE_HEX.ABSTENCION });
  numParts.push({ n: d.votes.AUSENTE, label: 'ausentes', color: _VOTE_HEX.AUSENTE });
  const numText = document.createElementNS(NS, 'text');

  numText.setAttribute('font-family', TBL_PNG_FONTS.sans);
  numParts.forEach((p, i) => {
    if(i > 0){

      numText.appendChild(sep);
    }
    const num = document.createElementNS(NS, 'tspan');
    num.setAttribute('fill', p.color); num.setAttribute('font-size', '20'); num.setAttribute('font-weight', '700');
    num.textContent = String(p.n);
    numText.appendChild(num);
    const lab = document.createElementNS(NS, 'tspan');
    lab.setAttribute('fill', '#6a6a64'); lab.setAttribute('font-size', '11.5'); lab.setAttribute('font-weight', '500');
    lab.textContent = ' ' + p.label;
    numText.appendChild(lab);
  });
  els.push(numText);
  y += 26;

  // ---- Bloque 2: comportamiento por familia ----
  _svgSectionTitle(NS, PAD_X, y, 'COMPORTAMIENTO POR FAMILIA', els);
  y += 24;
  const CARD_H = 56;
  d.families.forEach(f => {
    const top = y;
    // tarjeta sutil
    const card = document.createElementNS(NS, 'rect');
    card.setAttribute('x', PAD_X); card.setAttribute('y', top); card.setAttribute('width', availW); card.setAttribute('height', CARD_H);
    card.setAttribute('rx', '6'); card.setAttribute('fill', '#fdfbf4');
    card.setAttribute('stroke', '#e4ddcd'); card.setAttribute('stroke-width', '0.75');
    els.push(card);
    // dot de familia (único uso del color de familia)
    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('cx', PAD_X + 18); dot.setAttribute('cy', top + 18); dot.setAttribute('r', '5');
    dot.setAttribute('fill', FAMILY_COLORS[f.name] || '#57534e');
    els.push(dot);
    els.push(_svgText(NS, PAD_X + 32, top + 22, f.name, { size: '12.5', weight: '600' }));
    els.push(_svgText(NS, PAD_X + availW - 16, top + 22, String(f.total), { font: TBL_PNG_FONTS.serifTitle, size: '14', weight: '700', anchor: 'end' }));
    // barra de voto de la familia
    _svgBar(NS, PAD_X + 16, top + 30, availW - 32, 7, [
      { value: f.AFIRMATIVO, color: _VOTE_HEX.AFIRMATIVO },
      { value: f.NEGATIVO,   color: _VOTE_HEX.NEGATIVO },
      { value: f.ABSTENCION, color: _VOTE_HEX.ABSTENCION },
      { value: f.AUSENTE,    color: _VOTE_HEX.AUSENTE }
    ], els, f.total);
    // mini-conteo (solo no-cero; presidencia no se cuenta como voto)
    const mini = [];
    if(f.AFIRMATIVO > 0) mini.push(f.AFIRMATIVO + ' a favor');
    if(f.NEGATIVO > 0) mini.push(f.NEGATIVO + ' en contra');
    if(f.ABSTENCION > 0) mini.push(f.ABSTENCION + ' abst.');
    if(f.AUSENTE > 0) mini.push(f.AUSENTE + ' ausentes');
    els.push(_svgText(NS, PAD_X + 16, top + 48, mini.join('   ·   '), { size: '9.5', weight: '500', fill: '#6a6a64' }));

  });

  const footerOut = buildTablePngFooter(NS, s, y + 8, totalW, PAD_X, null);
  return _wrapSvg(NS, totalW, footerOut.footerBottomY + 12, [headerOut.elements, els, footerOut.elements]);
}

function exportCsv(rows, columns, filename){
  // columns: [{key, label}]
  const escapeCell = v => {
    if(v === null || v === undefined) return '';
    if(v instanceof Set) v = [...v].join('; ');
    const s = String(v);
    return '"' + s.replace(/"/g, '""') + '"';
  };
  const header = columns.map(c => escapeCell(c.label)).join(',');
  const body = rows.map(r => columns.map(c => escapeCell(r[c.key])).join(','));
  const csv = [header, ...body].join('\r\n');
  // BOM UTF-8 para que Excel reconozca acentos
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.download = filename;
  a.href = URL.createObjectURL(blob);
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1500);
}

// =====================================================================
// HELPERS DE EXPORTACIÓN CSV — formato académico para tesis/anexo
// =====================================================================
// Cada CSV trae contexto institucional (Caso · Cámara · Fecha · Ley) en las
// primeras columnas, valores legibles (Afirmativo, no AFIRMATIVO), fuentes
// para trazabilidad metodológica, porcentajes 1-decimal calculados sobre el
// denominador apropiado (total de provincia, total de familia o presentes).
// Fallbacks editoriales: "No consignado" / "No corresponde" / "Sin dato en
// fuente" — nunca celdas institucionales vacías.

function csvLabelVote(vote){
  return VOTE_LABELS_CSV[vote] || formatMetaValue(vote, 'No consignado');
}
function csvPercent(n, d){
  // Porcentaje 1-decimal con punto. Header indica la unidad.
  if(!d) return '0.0';
  return (n / d * 100).toFixed(1);
}
function csvScenarioContext(scenario){
  return {
    case:    formatMetaValue(scenario.caseName, 'No consignado'),
    chamber: formatMetaValue(scenario.chamberShort || scenario.chamber, 'No consignado'),
    date:    formatMetaValue(scenario.date, 'No consignado'),
    law:     formatMetaValue(scenario.law, 'No consignado')
  };
}
function csvSource(scenario, kind){
  if(kind === 'vote'){
    return formatMetaValue(scenario.voteSource || scenario.source, 'Sin dato en fuente');
  }
  // distrito: para Diputados el distrito está en el acta nominal misma
  return formatMetaValue(
    scenario.districtSource,
    scenario.chamberShort === 'Senado' ? 'Sin dato en fuente' : 'No corresponde · distrito en acta nominal'
  );
}
function csvValidationStatus(scenario){
  const v = validateScenario(scenario);
  if(!v.territorialOk) return 'Bajo revisión territorial';
  if(scenario.voteSource && scenario.districtSource) return 'Validado · doble fuente';
  return 'Validado · acta nominal';
}

function exportLegislatorsCsv(){
  const s = activeScenario();
  const ctx = csvScenarioContext(s);
  const voteSrc = csvSource(s, 'vote');
  const distSrc = csvSource(s, 'district');
  // Misma fuente que la tabla en pantalla: respeta filtros activos.
  const legs = getFilteredLegislators(s);
  if(!legs.length){
    alert('No hay legisladores que coincidan con los filtros activos. Limpiá filtros antes de exportar.');

function renderValidationPanel(){
  const host = document.getElementById('validationPanel');
  if(!host) return;
  const s = activeScenario();
  const v = validateScenario(s);

  // Construir tabla territorial cuando haya desvíos
  const buildTerritorialTable = () => {
    const rows = v.territorial.rows.map(r => {
      const cls = r.status === 'OK' ? 'terr-ok'
        : r.status === 'FALTAN' ? 'terr-fal'
        : r.status === 'SOBRAN' ? 'terr-sob'
        : 'terr-nor';
      const label = r.status === 'OK' ? 'OK'
        : r.status === 'FALTAN' ? `Faltan ${-r.diff}`
        : r.status === 'SOBRAN' ? `Sobran ${r.diff}`
        : 'Revisar nombre';
      return `<tr class="${cls}">
        <td>${esc(r.province)}</td>
        <td class="col-num">${r.expected}</td>
        <td class="col-num">${r.loaded}</td>
        <td class="col-num">${r.diff > 0 ? '+'+r.diff : r.diff}</td>
        <td>${label}</td>
      </tr>`;
    }).join('');
    const aliasNote = v.territorial.aliasesUsed.length
      ? `<div class="terr-aliases">Aliases aplicados: ${v.territorial.aliasesUsed.map(a => `<code>${esc(a.raw)}</code> → <code>${esc(a.norm)}</code>`).join(', ')}.</div>`
      : '';
    return `
      <div class="terr-wrap">
        <table class="terr-table">
          <thead><tr>
            <th>Provincia / distrito</th>
            <th class="col-num">Bancas esperadas</th>
            <th class="col-num">Registros cargados</th>
            <th class="col-num">Diferencia</th>
            <th>Estado</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr>
            <td><strong>Total</strong></td>
            <td class="col-num"><strong>${v.territorial.totalExpected}</strong></td>
            <td class="col-num"><strong>${v.territorial.totalLoaded}</strong></td>
            <td class="col-num"><strong>${v.territorial.totalLoaded - v.territorial.totalExpected}</strong></td>
            <td></td>
          </tr></tfoot>
        </table>
        ${aliasNote}
      </div>
    `;
  };

  // Tres estados:
  //  - Crítico  → conteos de voto no cierran (votesOk === false)
  //  - Advertencia metodológica → votos OK pero territorio NO
  //  - Validado → ambos OK
  if(!v.votesOk){
    host.innerHTML = `
      <div class="validation is-crit">
        <h4>Inconsistencias críticas en conteos (${v.warnings.length})</h4>
        <ul>${v.warnings.map(w => `<li>${esc(w)}</li>`).join('')}</ul>
        ${!v.territorialOk ? `<div class="terr-extra"><strong>Además, la distribución territorial no cuadra:</strong> ${buildTerritorialTable()}</div>` : ''}
      </div>
    `;
  } else if(!v.territorialOk){
    // Contar provincias con desvío
    const desv = v.territorial.rows.filter(r => r.status !== 'OK').length;
    host.innerHTML = `
      <div class="validation is-warn">
        <h4>Dataset bajo revisión territorial</h4>
        <p>Los conteos de voto cierran exactamente con la metadata del acta (${v.summary.AFIRMATIVO} afirmativos, ${v.summary.NEGATIVO} negativos${v.summary.ABSTENCION ? ', '+v.summary.ABSTENCION+' abstenciones' : ''}, ${v.summary.AUSENTE} ausentes). Sin embargo, la asignación territorial de los ${s.legislators.length} registros no coincide con la composición institucional esperada (${v.territorial.totalExpected} bancas distribuidas según ${s.chamberShort === 'Senado' ? '3 senadores por jurisdicción' : 'cupo legal de diputados por distrito, L 22.847'}). <strong>${desv} jurisdiccion${desv === 1 ? '' : 'es'} con desvío</strong>. Las visualizaciones por provincia y los porcentajes territoriales deben leerse con cautela hasta reconstruir la asignación distrito-legislador desde fuente primaria.</p>
        ${buildTerritorialTable()}
      </div>
    `;
  } else {
    // Si el escenario declara voteSource + districtSource (reconstrucción con
    // doble fuente, típicamente Senado), el banner lo refleja explícitamente.
    const hasDoubleSource = !!(s.voteSource && s.districtSource);
    const lead = hasDoubleSource ? 'Datos validados con doble fuente' : 'Datos validados';
    const body = hasDoubleSource
      ? `Voto reconstruido desde <strong>${esc(s.voteSource)}</strong>; distrito/provincia reconstruido desde fuente canónica <strong>${esc(s.districtSource)}</strong>. Los conteos de voto cierran con la metadata del acta y la distribución territorial coincide con la composición institucional esperada (${v.territorial.totalExpected} bancas en ${Object.keys(v.territorial.rows.filter(r => r.expected > 0)).length} jurisdicciones). ${s.legislators.length} senadores; sin campos vacíos, votos inválidos, familias desconocidas, provincias sin normalizar ni duplicados.`
      : `Los conteos de voto cierran con la metadata del acta y la distribución territorial coincide con la composición institucional esperada (${v.territorial.totalExpected} bancas, ${Object.keys(v.territorial.rows.filter(r => r.expected > 0)).length} jurisdicciones). ${s.legislators.length} legisladores; sin campos vacíos, votos inválidos, familias desconocidas, provincias sin normalizar ni duplicados.`;
    // Estado OK → nota colapsable y secundaria: no compite con la figura, pero
    // conserva íntegro el detalle metodológico al expandir (y en impresión).
    host.innerHTML = `
      <details class="validation is-ok">
        <summary><span class="v-ok-icon">✓</span>${lead}</summary>
        <div class="validation-detail">${body}</div>
      </details>
    `;
  }
}

function renderSummaryStrip(){
  const host = document.getElementById('summaryStrip');
  if(!host) return;
  const s = activeScenario();
  const sum = computeVoteSummary(s);
  const denom = sum.present || 1;
  // Jerarquía de KPIs: el par A favor / En contra es el dato dominante (tier
  // primario, número grande); abstención, ausentes y margen lo acompañan en
  // tier secundario (más chicos). No se quita ningún dato: solo se jerarquiza.
  const cells = [
    { label: 'A favor', value: sum.AFIRMATIVO, klass: 'yes', tier: 'primary', sub: Math.round(sum.AFIRMATIVO / denom * 100) + '% de presentes' },
    { label: 'En contra', value: sum.NEGATIVO, klass: 'no', tier: 'primary', sub: Math.round(sum.NEGATIVO / denom * 100) + '% de presentes' }
  ];
  if(sum.ABSTENCION > 0){
    cells.push({ label: 'Abstención', value: sum.ABSTENCION, klass: '', tier: 'secondary', sub: Math.round(sum.ABSTENCION / denom * 100) + '% de presentes' });
  }
  cells.push({ label: 'Ausentes', value: sum.AUSENTE, klass: 'abs', tier: 'secondary', sub: Math.round(sum.AUSENTE / s.totalSeats * 100) + '% del cuerpo' });
  cells.push({ label: 'Margen', value: sum.AFIRMATIVO - sum.NEGATIVO, klass: '', tier: 'secondary', sub: 'votos a favor sobre en contra' });
  host.innerHTML = cells.map(c => `
    <div class="summary-cell is-${c.tier}">
      <div class="sc-label">${esc(c.label)}</div>
      <div class="sc-value ${c.klass}">${c.value}</div>
      <div class="sc-sub">${esc(c.sub)}</div>
    </div>
  `).join('');
}

            ${fichaItem('Quórum', s.quorum)}
            ${fichaItem('Presentes', voteSum.present)}
            ${fichaItem('Afirmativos', voteSum.AFIRMATIVO)}
            ${fichaItem('Negativos', voteSum.NEGATIVO)}
            ${fichaItem('Abstenciones', voteSum.ABSTENCION)}
            ${fichaItem('Ausentes', voteSum.AUSENTE)}
            ${fichaItem('Presidencia', voteSum.PRESIDENCIA)}
            ${fichaItem('Resultado', formatMetaValue(s.result, 'No consignado'), resultClass)}
          </div>
        </div>
        <div class="ficha-section">
          <h3 class="ficha-section-title">Fuentes documentales</h3>
          <div class="ficha-grid">
            ${fichaItem('Fuente del voto', csvSource(s, 'vote'))}
            ${fichaItem('Fuente territorial', csvSource(s, 'district'))}
          </div>
        </div>
        <div class="ficha-section">
          <h3 class="ficha-section-title">Validación</h3>
          <div class="ficha-grid">
            ${fichaItem('Estado', validationStatus, validationKlass)}
          </div>
        </div>
      </div>
    </div>
  `;

  // ---------- 2. Tabla nominal de legisladores ----------
  const colsLeg = [
    { k: 'name',     l: 'Legislador' },
    { k: 'province', l: 'Provincia' },
    { k: 'block',    l: 'Bloque político' },
    { k: 'family',   l: 'Familia política' },
    { k: 'vote',     l: 'Voto' }
  ];
  const headLeg = colsLeg.map(c => {
    const isSorted = state.sortCol === c.k;
    const arrow = isSorted ? (state.sortDir === 1 ? '▲' : '▼') : '▲';
    const num = c.k === 'vote' ? '' : '';
    return `<th class="${isSorted ? 'is-sorted' : ''} ${num}" data-sort="${c.k}">${esc(c.l)}<span class="sort-ar">${arrow}</span></th>`;
  }).join('');
  const bodyLeg = sorted.length ? sorted.map(l => `
    <tr>
      <td class="col-leg-name">${esc(l.name)}</td>
      <td>${esc(l.province)}</td>
      <td class="col-block" title="${esc(l.block)}">${esc(l.block)}</td>
      <td><span class="col-fam-name"><span class="family-dot" style="background:${getColorByFamily(l.family)}"></span>${esc(l.family)}</span></td>
      <td><span class="vote-badge ${VOTE_CLASS[l.vote]}">${esc(VOTE_LABELS[l.vote])}</span></td>
    </tr>
  `).join('')
  : `<tr><td colspan="${colsLeg.length}" class="dtable-empty">Ninguna banca coincide con la búsqueda o los filtros activos. Ajustá los criterios o limpiá los filtros.</td></tr>`;
  const filteredCount = sorted.length;
  const isFiltered = state.voteFilter !== 'TODOS' || state.provinceFilter || state.search || state.tableSearch;
  const legislatorsHtml = `
    <div class="tbl-card">
      <div class="tbl-card-head">
        <div class="tbl-card-headline">
          <h2 class="tbl-card-title">Tabla nominal de legisladores</h2>
          <p class="tbl-card-bajada">Representantes, distrito, bloque, familia política y voto nominal del escenario activo.</p>
          <div class="tbl-card-meta">${tblMetaHtml}</div>
        </div>
        <div class="tbl-card-actions">
          <button class="btn-exp" data-export="legislators-csv">↓ CSV</button>
          <button class="btn-exp btn-exp-primary" data-export="legislators-png">↓ PNG</button>
        </div>
      </div>
      <div class="tbl-card-body">
        <div class="tbl-card-toolbar">
          <input type="text" class="search-table" id="tableSearch" placeholder="Buscar legislador, bloque, provincia…" value="${esc(state.tableSearch)}">
          <span class="tbl-meta">${filteredCount} ${filteredCount === 1 ? 'legislador' : 'legisladores'}${isFiltered ? ' (filtrados)' : ''} de ${s.legislators.length} totales.</span>
        </div>
        <div class="dtable-wrap">
          <table class="dtable" id="legislatorsTable">
            <thead><tr>${headLeg}</tr></thead>
            <tbody>${bodyLeg}</tbody>
          </table>
        </div>
      </div>
      ${tblFootHtml('<strong>Nota</strong>El PNG exporta las filas actualmente visibles tras filtros y búsqueda. Para la nómina completa usá el CSV.')}
    </div>
  `;

  // ---------- 3. Tabla por provincia (con mini-bar de composición) ----------
  const provBody = provRows.map(p => {
    const presOnly = (p.AUSENTE || 0); // presidencia no es voto: no se cuenta como ausente
    const domVoteLabel = p.isMixed ? 'Composición mixta' : (VOTE_LABELS[p.dominantVote] || '—');
    const domVoteClass = p.isMixed ? 'abst' : (VOTE_CLASS[p.dominantVote] || 'abs');
    return `
    <tr>
      <td class="col-prov-name">${esc(p.province)}</td>
      <td class="col-num">${p.total}</td>
      <td>${minibar(p.AFIRMATIVO, p.NEGATIVO, p.ABSTENCION, presOnly, p.total)}</td>
      <td class="col-num">${p.AFIRMATIVO}</td>
      <td class="col-num">${p.NEGATIVO}</td>
      <td class="col-pct">${pct1(p.AFIRMATIVO, p.total)}</td>
      <td><span class="vote-badge ${domVoteClass}">${esc(domVoteLabel)}</span></td>
      <td>${p.dominantFamily ? `<span class="col-fam-name"><span class="family-dot" style="background:${getColorByFamily(p.dominantFamily)}"></span>${esc(p.dominantFamily)}</span>` : '<span class="meta-v-missing">No consignado</span>'}</td>
    </tr>
  `;}).join('');
  const provinceHtml = `
    <div class="tbl-card">
      <div class="tbl-card-head">
        <div class="tbl-card-headline">
          <h2 class="tbl-card-title">Resumen territorial por provincia</h2>
          <p class="tbl-card-bajada">Distribución de representantes, voto y predominio político por distrito.</p>
          <div class="tbl-card-meta">${tblMetaHtml}</div>
        </div>
        <div class="tbl-card-actions">
          <button class="btn-exp" data-export="provinces-csv">↓ CSV</button>
          <button class="btn-exp btn-exp-primary" data-export="provinces-png">↓ PNG</button>
        </div>
      </div>
      <div class="tbl-card-body">
        <div class="dtable-wrap">
          <table class="dtable">
            <thead><tr>
              <th>Provincia</th>
              <th class="col-num">Bancas</th>
              <th>Composición</th>
              <th class="col-num">Afirmativos</th>
              <th class="col-num">Negativos</th>
              <th class="col-num">% Afirmativo</th>
              <th>Voto predominante</th>
              <th>Familia predominante</th>
            </tr></thead>
            <tbody>${provBody}</tbody>
          </table>
        </div>
      </div>
      ${tblFootHtml('<strong>Nota</strong>Esta tabla representa el escenario completo: no se reduce por filtros activos en la nominal (voto, búsqueda, provincia). Los porcentajes se calculan sobre el total de representantes del distrito. La barra de composición incluye afirmativos, negativos, abstenciones y ausentes en ese orden.')}
    </div>
  `;

  // ---------- 4. Tabla por familia política (mini-bar + bloques como sub-línea) ----------
  const famBody = famRows.map(f => {
    const blocks = [...f.blocks].sort((a,b) => a.localeCompare(b, 'es')).join(' · ');
    return `
    <tr>
      <td>
        <span class="col-fam-name"><span class="family-dot" style="background:${getColorByFamily(f.family)}"></span>${esc(f.family)}</span>
        <span class="cell-sub" title="${esc(blocks)}">${esc(blocks)}</span>
      </td>
      <td class="col-num">${f.total}</td>
      <td>${minibar(f.AFIRMATIVO, f.NEGATIVO, f.ABSTENCION, f.AUSENTE, f.total)}</td>
      <td class="col-num">${f.AFIRMATIVO}</td>
      <td class="col-num">${f.NEGATIVO}</td>
      <td class="col-num">${f.ABSTENCION}</td>
      <td class="col-num">${f.AUSENTE}</td>
      <td class="col-pct">${pct1(f.AFIRMATIVO, f.total)}</td>
      <td class="col-num">${f.provinces.size}</td>
    </tr>
  `;}).join('');
  const familyHtml = `
    <div class="tbl-card">
      <div class="tbl-card-head">
        <div class="tbl-card-headline">
          <h2 class="tbl-card-title">Resumen por familia política</h2>
          <p class="tbl-card-bajada">Distribución agregada del voto según familias político-partidarias.</p>
          <div class="tbl-card-meta">${tblMetaHtml}</div>
        </div>
        <div class="tbl-card-actions">
          <button class="btn-exp" data-export="families-csv">↓ CSV</button>
          <button class="btn-exp btn-exp-primary" data-export="families-png">↓ PNG</button>
        </div>
      </div>
      <div class="tbl-card-body">
        <div class="dtable-wrap">
          <table class="dtable">
            <thead><tr>
              <th>Familia política</th>
              <th class="col-num">Total</th>
              <th>Composición</th>
              <th class="col-num">Afirmativos</th>
              <th class="col-num">Negativos</th>
              <th class="col-num">Abstenciones</th>
              <th class="col-num">Ausentes</th>
              <th class="col-num">% Afirmativo</th>
              <th class="col-num">Provincias</th>
            </tr></thead>
            <tbody>${famBody}</tbody>
          </table>
        </div>
      </div>
      ${tblFootHtml('<strong>Nota</strong>Esta tabla representa el escenario completo: no se reduce por filtros activos en la nominal. Los bloques incluidos aparecen como sub-línea bajo cada familia y los porcentajes se calculan sobre el total de la familia.')}
    </div>
  `;

  host.innerHTML = summaryHtml + legislatorsHtml + provinceHtml + familyHtml;

  // Eventos de tabla
  const ts = document.getElementById('tableSearch');
  if(ts){
    // Debounce del re-render: mientras se tipea no se reescribe #tablesPanel
    // (el input conserva foco y cursor de forma natural); recién tras la pausa
    // se filtra. Al re-renderizar se recrea el input, así que restauramos foco
    // y posición del cursor para poder seguir escribiendo de corrido.
    const debouncedTableRender = debounce(() => {
      renderTables();
      const again = document.getElementById('tableSearch');
      if(again){
        again.focus();
        const len = again.value.length;
        again.setSelectionRange(len, len);
      }
    }, 180);
    ts.addEventListener('input', (e) => {
      state.tableSearch = e.target.value;
      debouncedTableRender();
    });
  }
  host.querySelectorAll('#legislatorsTable th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.getAttribute('data-sort');
      if(state.sortCol === col) state.sortDir *= -1;
      else { state.sortCol = col; state.sortDir = 1; }
      renderTables();
    });
  });
}

function renderStatsTab(){
  // Reorganización en tres destinos: la lectura estadística del caso (División A)
  // va a "Análisis del caso", el comparador (División B) a "Análisis comparado",
  // y las notas metodológicas a "Metodología". Reusa las mismas funciones de
  // render; solo cambia el contenedor de destino. No altera datos ni cálculos.
  const s = activeScenario();
  const caseHost = document.getElementById('caseStatsPanel');
  const cmpHost = document.getElementById('comparePanel');
  const methodHost = document.getElementById('methodPanel');
  if(caseHost) caseHost.innerHTML = renderScenarioIndicators(s);
  if(cmpHost){ cmpHost.innerHTML = renderComparisonPanel(); mountCompareVisuals(); }
  if(methodHost) methodHost.innerHTML = renderMethodologyNotes();
  buildStatsIndex(caseHost, 'Lectura estadística del caso');
}

// Construye un índice compacto de saltos rápidos a partir de los marcadores de
// sección (.stats-section-marker) ya presentes en el contenedor. Asigna un id a
// cada sección y antepone una barra de navegación. No duplica ni borra
// contenido: solo agrega anclas y enlaces.
function buildStatsIndex(container, label){
  if(!container) return;
  const sections = Array.from(container.querySelectorAll('.stats-section'))
    .filter(sec => sec.querySelector('.stats-section-marker, .stats-aside-marker'));
  if(sections.length < 2) return;
  const links = sections.map((sec, i) => {
    const marker = sec.querySelector('.stats-section-marker, .stats-aside-marker');
    const titleEl = sec.querySelector('.stats-section-title, .stats-aside-label');
    const mk = (marker.textContent || '').trim();
    const id = 'sec-' + mk.toLowerCase().replace(/[^a-z0-9]+/g, '');
    sec.id = id;
    const title = titleEl ? (titleEl.textContent || '').replace(mk, '').replace(/^[·\s]+/, '').trim() : '';
    return `<a class="stats-index-link" href="#${id}" title="${esc(title)}">${esc(mk)}</a>`;
  }).join('<span class="stats-index-sep">·</span>');
  const nav = document.createElement('nav');
  nav.className = 'stats-index';
  nav.setAttribute('aria-label', label || 'Índice de secciones');
  nav.innerHTML = `<span class="stats-index-label">${esc(label || 'Secciones')}</span><span class="stats-index-links">${links}</span>`;
  container.insertBefore(nav, container.firstChild);
}

// Header de sección dentro de una división
function _sectionHead(marker, title, bajada, exportKind){
  // exportKind: clave del bloque exportable (e.g. 'aggregate', 'turnout', 'famcoh', etc.)
  //             Genera dos botones discretos (CSV / PNG) que despachan a handleExportClick.
  const actions = exportKind ? `
    <div class="stats-section-actions">
      <button class="btn-exp" data-export="stats-${exportKind}-csv" title="Descargar esta tabla en CSV">↓ CSV</button>
      <button class="btn-exp" data-export="stats-${exportKind}-png" title="Descargar esta tabla como figura PNG">↓ PNG</button>
    </div>` : '';
  return `
    <div class="stats-section-head">
      <div class="stats-section-marker">${esc(marker)}</div>
      <h3 class="stats-section-title">${esc(title)}</h3>
      ${actions}
    </div>
    ${bajada ? `<p class="stats-section-bajada">${esc(bajada)}</p>` : ''}
  `;
}

function renderScenarioIndicators(s){
  const ind = computeScenarioIndicators(s);
  const turn = computeTurnoutIndicators(s);
  const famCoh = computeFamilyCohesion(s);

  const provInd = computeProvinceIndicators(s);

  const fmt = (n) => Number.isFinite(n) ? n.toFixed(1) : '0.0';
  const resultClass = ind.result === 'AFIRMATIVO' ? 'is-yes' : (ind.result === 'NEGATIVO' ? 'is-no' : '');
  const marginSigned = ind.margin >= 0 ? '+' + ind.margin : ind.margin;

  // ---- A.1 Resultado agregado: 3 KPI hero + grid secundario ----
  const aggHtml = `
    <section class="stats-section">
      ${_sectionHead('A.1', 'Resultado agregado',
        'Cifras crudas, porcentajes sobre presentes y sobre el cuerpo completo, margen.',
