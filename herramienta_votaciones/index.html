// ---------------------------------------------------------------------
// TRAYECTORIA DE LEGISLADORES (B.10) — same-chamber
// Identifica legisladores que repiten banca entre los dos escenarios del par y
// analiza cómo cambia o se mantiene su voto. Match por nombre exacto normalizado
// (sin tildes, case-insensitive, formato APELLIDO, Nombre). Usa el voto efectivo
// ya normalizado (_sortedLegislators). NO toca datasets ni compute* existentes.
// ---------------------------------------------------------------------
function trajNormName(name){
  return String(name || '').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}
function computeTrajectory(pair){
  const idA = pair[0], idB = pair[1];
  const sA = SCENARIOS[idA], sB = SCENARIOS[idB];
  const legsA = getLegsForScenario(idA);
  const legsB = getLegsForScenario(idB);
  const sameChamber = !!(sA && sB && sA.chamber === sB.chamber);

  const mapB = new Map();
  legsB.forEach(l => { if(!mapB.has(trajNormName(l.name))) mapB.set(trajNormName(l.name), l); });

  const matched = [];
  // Trayectoria solo same-chamber por ahora (decisión metodológica). Para pares
  // de cámaras distintas no se cruza: se devuelve vacío y la UI muestra el estado.
  if(sameChamber){
    legsA.forEach(a => {
      const b = mapB.get(trajNormName(a.name));
      if(b){
        matched.push({
          name: a.name, province: a.province,
          voteA: a.vote, voteB: b.vote, sameVote: a.vote === b.vote,
          familyA: a.family, familyB: b.family, sameFamily: a.family === b.family,
          blockA: a.block, blockB: b.block
        });
      }
    });
  }

  const nMatched = matched.length;
  const nKeptVote = matched.filter(m => m.sameVote).length;
  const nKeptFamily = matched.filter(m => m.sameFamily).length;

  // Matriz de transición voto A × voto B
  const cats = ['AFIRMATIVO', 'NEGATIVO', 'ABSTENCION', 'AUSENTE', 'PRESIDENCIA'];
  const matrix = {};
  cats.forEach(a => { matrix[a] = {}; cats.forEach(b => matrix[a][b] = 0); });
  matched.forEach(m => { if(matrix[m.voteA] && matrix[m.voteA][m.voteB] != null) matrix[m.voteA][m.voteB]++; });

  return {
    idA, idB, scenA: sA, scenB: sB, sameChamber, matched, matrix, cats,
    metrics: {
      totalA: legsA.length, totalB: legsB.length, nMatched,
      pctPermanencia: legsA.length ? (nMatched / legsA.length * 100) : 0,
      nKeptVote, pctKeptVote: nMatched ? (nKeptVote / nMatched * 100) : 0,
      nChangedVote: nMatched - nKeptVote,
      nKeptFamily, nChangedFamily: nMatched - nKeptFamily
    }
  };
}

// HTML de la sección B.10 (aditivo dentro del comparado). Estado vacío para
// pares cross-cámara o sin repetidos.
function renderTrajectorySection(){
  const cp = (state.comparePair && state.comparePair.length === 2) ? state.comparePair : ['aerolineas_diputados', 'ypf_diputados'];
  const traj = computeTrajectory(cp);
  const sA = traj.scenA, sB = traj.scenB;
  const fmt1 = (n) => Number.isFinite(n) ? (Math.round(n * 10) / 10).toFixed(1) : '—';
  const head = _sectionHead('B.10', 'Trayectoria de legisladores',
    'Legisladores que repiten banca entre las dos votaciones del par y cómo cambia o se mantiene su voto. Match por nombre exacto (normalizado); se usa el voto efectivo (quien presidió y votó cuenta por su voto).', null);

  if(!traj.sameChamber || traj.metrics.nMatched === 0){
    return `<section class="stats-section">
      ${head}
      <div class="traj-empty">No hay legisladores repetidos entre estos dos escenarios. La trayectoria nominal se calcula solo cuando existe continuidad de banca entre ambas votaciones.</div>
    </section>`;
  }

  const m = traj.metrics;
  const dir = `${esc(sA.caseName)} · ${esc(sA.chamberShort)} (${esc(sA.date)}) &rarr; ${esc(sB.caseName)} · ${esc(sB.chamberShort)} (${esc(sB.date)})`;

  // --- Métricas resumen ---
  const metricsHtml = `
    <p class="traj-dir">${dir}</p>
    <div class="data-grid traj-metrics">
      <div class="data-grid-cell"><div class="data-grid-label">Repiten banca</div><div class="data-grid-value">${m.nMatched}</div><div class="data-grid-sub">${fmt1(m.pctPermanencia)}% de ${m.totalA}</div></div>
      <div class="data-grid-cell"><div class="data-grid-label">Mantienen el voto</div><div class="data-grid-value is-yes">${m.nKeptVote}</div><div class="data-grid-sub">${fmt1(m.pctKeptVote)}% de los repetidos</div></div>
      <div class="data-grid-cell"><div class="data-grid-label">Cambian el voto</div><div class="data-grid-value is-no">${m.nChangedVote}</div><div class="data-grid-sub">${fmt1(100 - m.pctKeptVote)}%</div></div>
      <div class="data-grid-cell"><div class="data-grid-label">Mantienen familia</div><div class="data-grid-value">${m.nKeptFamily}</div></div>
      <div class="data-grid-cell"><div class="data-grid-label">Cambian familia</div><div class="data-grid-value is-warn">${m.nChangedFamily}</div></div>
    </div>
  `;

  // --- Matriz de transición ---
  const rowTot = {}, colTot = {};
  traj.cats.forEach(a => { rowTot[a] = traj.cats.reduce((s, b) => s + traj.matrix[a][b], 0); });
  traj.cats.forEach(b => { colTot[b] = traj.cats.reduce((s, a) => s + traj.matrix[a][b], 0); });
  const rowsP = traj.cats.filter(a => rowTot[a] > 0);
  const colsP = traj.cats.filter(b => colTot[b] > 0);
  const sw = (v) => `<span class="traj-sw" style="background:${VOTE_COLORS[v]}"></span>`;
  const matrixHtml = `
    <div class="traj-block">
      <h4 class="traj-block-title">Matriz de transición del voto</h4>
      <p class="traj-block-sub">Filas: voto en ${esc(sA.caseName)}. Columnas: voto en ${esc(sB.caseName)}. La diagonal son quienes mantuvieron el sentido; fuera de la diagonal, los que cambiaron.</p>
      <div class="dtable-wrap">
        <table class="traj-matrix">
          <thead><tr><th class="traj-corner">${esc(sA.caseName)} ↓ / ${esc(sB.caseName)} →</th>${colsP.map(b => `<th>${sw(b)}${esc(VOTE_LABELS[b])}</th>`).join('')}<th class="traj-tot">Total</th></tr></thead>
          <tbody>
            ${rowsP.map(a => `<tr>
              <th>${sw(a)}${esc(VOTE_LABELS[a])}</th>
              ${colsP.map(b => { const v = traj.matrix[a][b]; const cls = v === 0 ? 'is-zero' : (a === b ? 'is-kept' : 'is-changed'); return `<td class="${cls}">${v || '·'}</td>`; }).join('')}
              <td class="traj-tot">${rowTot[a]}</td>
            </tr>`).join('')}
            <tr class="traj-tot-row"><th>Total</th>${colsP.map(b => `<td>${colTot[b]}</td>`).join('')}<td>${m.nMatched}</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  // --- Tabla nominal (con filtro) ---
  const filter = state.trajFilter || 'all';
  let rows = traj.matched.slice();
  if(filter === 'changed') rows = rows.filter(r => !r.sameVote);
  else if(filter === 'kept') rows = rows.filter(r => r.sameVote);
  // Orden: primero los que cambiaron el voto (lo más informativo), luego alfabético.
  rows.sort((a, b) => { if(a.sameVote !== b.sameVote) return a.sameVote ? 1 : -1; return a.name.localeCompare(b.name, 'es'); });
  const filterBtns = [['all', 'Todos'], ['changed', 'Cambiaron el voto'], ['kept', 'Mantuvieron el voto']]
    .map(([k, l]) => `<button type="button" data-traj-filter="${k}" aria-pressed="${filter === k ? 'true' : 'false'}">${esc(l)}</button>`).join('');
  const vb = (v) => `<span class="vote-badge ${VOTE_CLASS[v]}">${esc(VOTE_LABELS[v])}</span>`;
  const dot = (f) => `<span class="family-dot" style="background:${FAMILY_COLORS[f] || '#a09b8c'}"></span>`;
  const shortCase = (cn) => cn === 'Aerolíneas Argentinas' ? 'Aero' : cn;
  const cA = shortCase(sA.caseName), cB = shortCase(sB.caseName);
  const famCell = (r) => r.sameFamily
    ? `${dot(r.familyA)}${esc(r.familyA)}`
    : `${dot(r.familyA)}${esc(r.familyA)} <span class="traj-arrow">→</span> ${dot(r.familyB)}${esc(r.familyB)}`;
  const famTitle = (r) => r.sameFamily ? r.familyA : `${r.familyA} → ${r.familyB}`;
  const blkTitle = (r) => r.blockA === r.blockB ? r.blockA : `${r.blockA} → ${r.blockB}`;
  const blkCell = (r) => r.blockA === r.blockB ? esc(r.blockA) : `${esc(r.blockA)} <span class="traj-arrow">→</span> ${esc(r.blockB)}`;
  const tableHtml = `
    <div class="traj-block">
      <div class="traj-table-head">
        <h4 class="traj-block-title">Detalle nominal</h4>
        <div class="metric-toggle traj-filter" role="group" aria-label="Filtro de la tabla de trayectoria">${filterBtns}</div>
      </div>
      <div class="dtable-wrap">
        <table class="dtable traj-table">
          <colgroup><col class="c-leg"><col class="c-voto"><col class="c-tray"><col class="c-fam"><col class="c-bloq"></colgroup>
          <thead><tr>
            <th>Legislador</th>
            <th>Voto · ${esc(cA)} <span class="traj-arrow">→</span> ${esc(cB)}</th>
            <th>Trayectoria</th>
            <th>Familia · ${esc(cA)} <span class="traj-arrow">→</span> ${esc(cB)}</th>
            <th>Bloque</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td class="traj-leg-cell"><span class="traj-name" title="${esc(r.name)}">${esc(r.name)}</span><span class="traj-prov">${esc(r.province)}</span></td>
              <td class="traj-voto-cell">${vb(r.voteA)}<span class="traj-arrow">→</span>${vb(r.voteB)}</td>
              <td class="traj-tray-cell">${r.sameVote ? '<span class="traj-badge kept">Mantuvo</span>' : '<span class="traj-badge changed">Cambió</span>'}${r.sameFamily ? '' : '<span class="traj-badge fam">Cambió familia</span>'}</td>
              <td class="traj-fam-cell" title="${esc(famTitle(r))}">${famCell(r)}</td>
              <td class="traj-block-cell" title="${esc(blkTitle(r))}">${blkCell(r)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <p class="traj-table-note">${rows.length} de ${m.nMatched} legisladores repetidos${filter !== 'all' ? ' (filtrados)' : ''}.</p>
    </div>
  `;

  // --- Migración por familia política ---
  const famAgg = {};
  traj.matched.forEach(r => {
    const f = r.familyA;
    if(!famAgg[f]) famAgg[f] = { n: 0, kept: 0, changed: 0, yesA: 0, yesB: 0 };
    const g = famAgg[f]; g.n++;
    if(r.sameVote) g.kept++; else g.changed++;
    if(r.voteA === 'AFIRMATIVO') g.yesA++;
    if(r.voteB === 'AFIRMATIVO') g.yesB++;
  });
  const famRows = Object.keys(famAgg).map(f => ({ f, ...famAgg[f] })).filter(r => r.n >= 2).sort((a, b) => b.n - a.n);
  const migrationHtml = famRows.length ? `
    <div class="traj-block">
      <h4 class="traj-block-title">Migración por familia política</h4>
      <p class="traj-block-sub">Sobre los legisladores que repiten banca; familias con al menos 2 repetidos. % afirmativo calculado sobre los repetidos de cada familia.</p>
      <div class="dtable-wrap">
        <table class="dtable traj-fam-table">
          <colgroup><col class="c-fname"><col class="c-n"><col class="c-n"><col class="c-n"><col class="c-pct"><col class="c-pct"><col class="c-d"></colgroup>
          <thead><tr><th>Familia política</th><th class="col-num">Repiten</th><th class="col-num">Mantienen</th><th class="col-num">Cambian</th><th class="col-num">% Afirm. ${esc(cA)}</th><th class="col-num">% Afirm. ${esc(cB)}</th><th class="col-num">Δ pp</th></tr></thead>
          <tbody>
            ${famRows.map(r => { const pa = r.yesA / r.n * 100, pb = r.yesB / r.n * 100, d = pb - pa; const dcls = Math.abs(d) < 0.05 ? '' : (d > 0 ? 'is-up' : 'is-down'); return `<tr>
              <td class="traj-fam-name" title="${esc(r.f)}">${dot(r.f)}${esc(r.f)}</td>
              <td class="col-num">${r.n}</td>
              <td class="col-num">${r.kept}</td>
              <td class="col-num">${r.changed}</td>
              <td class="col-num">${fmt1(pa)}%</td>
              <td class="col-num">${fmt1(pb)}%</td>
              <td class="col-num ${dcls}">${d >= 0 ? '+' : ''}${fmt1(d)}</td>
            </tr>`; }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  ` : '';

  return `<section class="stats-section">
    ${head}
    ${metricsHtml}
    ${matrixHtml}
    ${tableHtml}
    ${migrationHtml}
  </section>`;
}

function renderProvincePanel(p){
  const total = p.total;
  const abs = p.ABSTENCION || 0;
  const yPct = total ? (p.AFIRMATIVO / total * 100) : 0;
  const nPct = total ? (p.NEGATIVO / total * 100) : 0;
  const absPct = total ? (abs / total * 100) : 0;
  const ausPct = total ? (p.AUSENTE / total * 100) : 0;
  const tendencyClass = p.isMixed ? 'mixed' : (p.dominantVote === 'AFIRMATIVO' ? 'yes' : (p.dominantVote === 'NEGATIVO' ? 'no' : 'mixed'));
  const tendencyText = p.isMixed ? `Composición mixta` : `Predomina ${VOTE_LABELS[p.dominantVote].toLowerCase()}`;

  const sortedMembers = [...p.members].sort((a, b) => {
    const order = { 'AFIRMATIVO': 0, 'NEGATIVO': 1, 'ABSTENCION': 2, 'AUSENTE': 3, 'PRESIDENCIA': 4 };
    if(order[a.vote] !== order[b.vote]) return order[a.vote] - order[b.vote];
    return a.name.localeCompare(b.name, 'es');
  });

  return `
    <div class="prov-title">
      <div class="prov-name">${esc(p.name)}</div>
      <div class="prov-count">${p.total} legislador${p.total !== 1 ? 'es' : ''}</div>
    </div>
    <div class="prov-tendency-row">
      <span class="prov-tendency ${tendencyClass}">${tendencyText}</span>
      ${p.dominantFamily ? `<span class="prov-family"><span class="family-dot" style="background:${FAMILY_COLORS[p.dominantFamily]}"></span>${esc(p.dominantFamily)}${p.isFamilyDiverse ? ' · diversa' : ''}</span>` : ''}
    </div>
    <div class="prov-bar" role="img" aria-label="Distribución del voto en la provincia">
      <span class="prov-bar-yes"  style="width:${yPct}%"  title="${p.AFIRMATIVO} a favor"></span>
      <span class="prov-bar-no"   style="width:${nPct}%"  title="${p.NEGATIVO} en contra"></span>
      <span class="prov-bar-abst" style="width:${absPct}%" title="${abs} abstenciones"></span>
      <span class="prov-bar-abs"  style="width:${ausPct}%" title="${p.AUSENTE} ausentes"></span>
    </div>
    <div class="prov-tally">
      <span><strong>${p.AFIRMATIVO}</strong> a favor</span>
      <span><strong>${p.NEGATIVO}</strong> en contra</span>
      ${abs > 0 ? `<span><strong>${abs}</strong> abstenciones</span>` : ''}
      <span><strong>${p.AUSENTE}</strong> ausentes</span>
    </div>
    <div class="member-list">
      ${sortedMembers.map(m => {
        const vc = VOTE_CLASS[m.vote];
        const isSel = state.selectedIndex === m._index;
        return `
          <div class="member-row ${isSel ? 'is-selected' : ''}" data-idx="${m._index}">
            <div class="mr-top">
              <div class="mr-name">${esc(m.name)}</div>
              <span class="mr-badge ${vc}">${esc(VOTE_LABELS[m.vote])}</span>
            </div>
            <div class="mr-block"><span class="family-dot" style="background:${FAMILY_COLORS[m.family]}"></span>${esc(m.block)}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderNationalPanel(s){
  // Conteos completos desde computeVoteSummary (incluye abstención y presidencia
  // que se omitían en la versión previa). Total = todas las bancas del cuerpo.
  const sum = computeVoteSummary(s);
  const total = s.totalSeats || (sum.AFIRMATIVO + sum.NEGATIVO + sum.ABSTENCION + sum.AUSENTE + sum.PRESIDENCIA) || 1;
  const yPct    = (sum.AFIRMATIVO  / total * 100);
  const nPct    = (sum.NEGATIVO    / total * 100);
  const abstPct = (sum.ABSTENCION  / total * 100);
  const ausPct  = (sum.AUSENTE     / total * 100);

  // Familias con todos los tipos de voto (incluye ABSTENCION y PRESIDENCIA)
  const famByVote = {};
  for(const leg of s._sortedLegislators){
    if(!famByVote[leg.family]) famByVote[leg.family] = { AFIRMATIVO: 0, NEGATIVO: 0, ABSTENCION: 0, AUSENTE: 0, PRESIDENCIA: 0 };
    famByVote[leg.family][leg.vote] = (famByVote[leg.family][leg.vote] || 0) + 1;
  }
  const families = Object.keys(famByVote).map(f => ({
    name: f,
    total: famByVote[f].AFIRMATIVO + famByVote[f].NEGATIVO + famByVote[f].ABSTENCION + famByVote[f].AUSENTE + famByVote[f].PRESIDENCIA,
    ...famByVote[f]
  })).sort((a, b) => b.total - a.total);

  return `
    <div class="prov-title">
      <div class="prov-name">Total cuerpo</div>
      <div class="prov-count">${s.totalSeats} bancas</div>
    </div>
    <div class="prov-bar">
      <span class="prov-bar-yes"  style="width:${yPct}%"></span>
      <span class="prov-bar-no"   style="width:${nPct}%"></span>
      ${sum.ABSTENCION > 0 ? `<span class="prov-bar-abst" style="width:${abstPct}%"></span>` : ''}
      <span class="prov-bar-abs"  style="width:${ausPct}%"></span>
    </div>
    <div class="prov-tally">
      <span><strong>${sum.AFIRMATIVO}</strong> a favor</span>
      <span><strong>${sum.NEGATIVO}</strong> en contra</span>
      ${sum.ABSTENCION > 0 ? `<span><strong>${sum.ABSTENCION}</strong> abstenciones</span>` : ''}
      <span><strong>${sum.AUSENTE}</strong> ausentes</span>
    </div>
    <p class="fam-eyebrow">Comportamiento por familia</p>
    <div class="fam-list">
      ${families.map(f => {
        const fTotal = f.total || 1;
        return `
          <div class="fam-card">
            <div class="fam-card-top">
              <span class="fam-name">
                <span class="family-dot" style="background:${FAMILY_COLORS[f.name]}"></span>${esc(f.name)}
              </span>
              <span class="fam-total">${f.total}</span>
            </div>
            <div class="fam-bar">
              <span class="fam-bar-yes"  style="width:${(f.AFIRMATIVO / fTotal * 100)}%"></span>
              <span class="fam-bar-no"   style="width:${(f.NEGATIVO / fTotal * 100)}%"></span>
              ${f.ABSTENCION > 0 ? `<span class="fam-bar-abst" style="width:${(f.ABSTENCION / fTotal * 100)}%"></span>` : ''}
              <span class="fam-bar-abs"  style="width:${(f.AUSENTE / fTotal * 100)}%"></span>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// =====================================================================
// COMPUTE — agregaciones desde el dataset (no hardcodear)
// =====================================================================
// Normalización de presentación (no estructural) del voto de quien preside.
// Regla: "Presidencia" es un rol, no un sentido de voto.
//  · Si quien preside emitió un voto computado en el resultado oficial
//    (afirmativos_dataset + presidencia == yes_metadata, con afirmativos != yes),
//    se reclasifica su voto de PRESIDENCIA a su voto efectivo (AFIRMATIVO) y se
//    marca leg.presided = true para conservar el rol en tooltip/ficha.
//  · Si presidió sin voto computado, queda como PRESIDENCIA ("Presidencia · no
//    votó"), no se suma a ningún voto y figura solo en el total de bancas.
// Idempotente. Caso real: Pampuro (Aerolíneas Senado) → Afirmativo.
function normalizeScenarioVotes(s){
  if(!s || s._votesNormalized) return;
  s._votesNormalized = true;
  if(!Array.isArray(s.legislators) || typeof s.yes !== 'number') return;
  const sum = computeVoteSummary(s);
  const presidencyVoted = sum.PRESIDENCIA > 0
    && sum.AFIRMATIVO !== s.yes
    && (sum.AFIRMATIVO + sum.PRESIDENCIA) === s.yes;
  if(!presidencyVoted) return;
  for(const leg of s.legislators){
    if(leg.vote === 'PRESIDENCIA'){
      leg.vote = 'AFIRMATIVO'; // voto efectivo según el acta oficial
      leg.presided = true;     // rol institucional preservado
    }
  }
}

function computeVoteSummary(scenario){
  const out = { AFIRMATIVO:0, NEGATIVO:0, AUSENTE:0, ABSTENCION:0, PRESIDENCIA:0, total:0 };
  for(const l of scenario.legislators){
    if(out[l.vote] !== undefined) out[l.vote]++;
    out.total++;
  }
  out.present = out.AFIRMATIVO + out.NEGATIVO + out.ABSTENCION + out.PRESIDENCIA;
  out.absent = out.AUSENTE;
  return out;
}

function computeProvinceSummary(scenario){
  // Reusa la pre-agregación si ya existe (computeProvinceData del módulo)
  if(!scenario._provinceData){
    scenario._provinceData = computeProvinceData(scenario._sortedLegislators || scenario.legislators);
  }
  const pd = scenario._provinceData;
  const rows = Object.keys(pd).sort((a,b) => a.localeCompare(b, 'es')).map(name => {
    const p = pd[name];
    return {
      province: name,
      total: p.total,
      AFIRMATIVO: p.AFIRMATIVO || 0,
      NEGATIVO: p.NEGATIVO || 0,
      ABSTENCION: p.ABSTENCION || 0,
      AUSENTE: p.AUSENTE || 0,
      PRESIDENCIA: p.PRESIDENCIA || 0,
      dominantVote: p.dominantVote,
      dominantFamily: p.dominantFamily,
      isMixed: !!p.isMixed
    };
  });
  return rows;
}

function computeFamilySummary(scenario){
  const map = {};
  for(const l of scenario.legislators){
    if(!map[l.family]){
      map[l.family] = {
        family: l.family,
        blocks: new Set(),
        provinces: new Set(),
        total: 0,
        AFIRMATIVO: 0, NEGATIVO: 0, ABSTENCION: 0, AUSENTE: 0, PRESIDENCIA: 0
      };
    }
    const f = map[l.family];
    f.blocks.add(l.block);
    f.provinces.add(l.province);
    f.total++;
    if(f[l.vote] !== undefined) f[l.vote]++;
  }
  return Object.values(map).sort((a,b) => b.total - a.total);
}

// =====================================================================
// VALIDATE — controles de consistencia del dataset por escenario
// =====================================================================
// =====================================================================
// INDICADORES ESTADÍSTICOS / POLITOLÓGICOS (sub-tab Estadísticas)
// =====================================================================
// Helpers puros que toman uno o varios scenarios y devuelven datos
// derivados listos para renderizar y exportar. Reusan los helpers
// existentes (computeVoteSummary/Province/Family) para no duplicar lógica.

// Umbral para definir "dividido" (cuando el voto dominante no supera).
const COHESION_DIVIDED_THRESHOLD = 0.70;
const COHESION_UNIFIED_THRESHOLD = 0.90;

function computeScenarioIndicators(scenario){
  const sum = computeVoteSummary(scenario);
  const total = scenario.totalSeats || sum.total || 1;
  const present = sum.present || 1;
  const margin = sum.AFIRMATIVO - sum.NEGATIVO;
  return {
    totalSeats: scenario.totalSeats,
    quorum: scenario.quorum,
    present: sum.present,
    AFIRMATIVO: sum.AFIRMATIVO,
    NEGATIVO: sum.NEGATIVO,
    ABSTENCION: sum.ABSTENCION,
    AUSENTE: sum.AUSENTE,
    PRESIDENCIA: sum.PRESIDENCIA,
    margin,
    pctYesPresent:    sum.AFIRMATIVO / present * 100,
    pctNoPresent:     sum.NEGATIVO    / present * 100,
    pctAbstPresent:   sum.ABSTENCION  / present * 100,
    pctAbsentOfTotal: sum.AUSENTE     / total * 100,
    pctYesOfTotal:    sum.AFIRMATIVO  / total * 100,
    pctNoOfTotal:     sum.NEGATIVO    / total * 100,
    presenceRate:     sum.present     / total * 100,
    absenceRate:      sum.AUSENTE     / total * 100,
    result: scenario.result
  };
}

function computeTurnoutIndicators(scenario){
  const provMap = {};
  const famMap  = {};
  for(const l of scenario.legislators){
    if(!provMap[l.province]) provMap[l.province] = { province: l.province, total: 0, AUSENTE: 0 };
    provMap[l.province].total++;
    if(l.vote === 'AUSENTE') provMap[l.province].AUSENTE++;
    if(!famMap[l.family]) famMap[l.family] = { family: l.family, total: 0, AUSENTE: 0 };
    famMap[l.family].total++;
    if(l.vote === 'AUSENTE') famMap[l.family].AUSENTE++;
  }
  const byProvince = Object.values(provMap).map(p => ({
    ...p, pctAbsent: p.total ? (p.AUSENTE / p.total * 100) : 0
  }));
  const byFamily = Object.values(famMap).map(f => ({
    ...f, pctAbsent: f.total ? (f.AUSENTE / f.total * 100) : 0
  }));
  return {
    byProvince:        byProvince.sort((a,b) => b.pctAbsent - a.pctAbsent || a.province.localeCompare(b.province, 'es')),
    byFamily:          byFamily.sort((a,b) => b.pctAbsent - a.pctAbsent),
    topAbsenceProvinces: byProvince.filter(p => p.AUSENTE > 0).slice(0, 5),
    topAbsenceFamilies:  byFamily.filter(f => f.AUSENTE > 0).slice(0, 5)
  };
}

function _cohesionFor(group){
  // Cohesión = peso del voto dominante (AFI/NEG/ABST) sobre presentes (excl AUSENTE).
  const presentes = (group.AFIRMATIVO||0) + (group.NEGATIVO||0) + (group.ABSTENCION||0) + (group.PRESIDENCIA||0);
  if(!presentes) return { cohesion: 0, dominantVote: null, dominantCount: 0, presentes: 0 };
  const cands = [
    ['AFIRMATIVO', group.AFIRMATIVO||0],
    ['NEGATIVO',   group.NEGATIVO||0],
    ['ABSTENCION', group.ABSTENCION||0]
  ];
  cands.sort((a,b) => b[1] - a[1]);
  return { cohesion: cands[0][1] / presentes, dominantVote: cands[0][0], dominantCount: cands[0][1], presentes };
}

function computeFamilyCohesion(scenario){
  const rows = computeFamilySummary(scenario).map(f => {
    const cohInfo = _cohesionFor(f);
    return {
      family: f.family,
      total: f.total,
      present: cohInfo.presentes,
      AFIRMATIVO: f.AFIRMATIVO, NEGATIVO: f.NEGATIVO,
      ABSTENCION: f.ABSTENCION, AUSENTE: f.AUSENTE, PRESIDENCIA: f.PRESIDENCIA,
      pctYesPresent: cohInfo.presentes ? (f.AFIRMATIVO / cohInfo.presentes * 100) : 0,
      pctNoPresent:  cohInfo.presentes ? (f.NEGATIVO    / cohInfo.presentes * 100) : 0,
      dominantVote: cohInfo.dominantVote,
      cohesion: cohInfo.cohesion * 100,
      isUnified: cohInfo.cohesion >= COHESION_UNIFIED_THRESHOLD,
      isDivided: cohInfo.cohesion <  COHESION_DIVIDED_THRESHOLD,
      provincesCount: f.provinces.size,
      blocksCount: f.blocks.size
    };
  });
  rows.sort((a,b) => b.cohesion - a.cohesion || b.total - a.total);
  const ranked = rows.slice();
  return {
    rows,
    mostCohesive: ranked.filter(r => r.present > 0)[0] || null,
    mostDivided:  ranked.filter(r => r.present > 0).slice().sort((a,b) => a.cohesion - b.cohesion)[0] || null,
    unifiedCount: rows.filter(r => r.isUnified).length,
    dividedCount: rows.filter(r => r.isDivided).length
  };
}

function computeBlockCohesion(scenario){
  const map = {};
  for(const l of scenario.legislators){
    const key = l.block || 'Sin bloque';
    if(!map[key]) map[key] = { block: key, family: l.family, total: 0,
      AFIRMATIVO: 0, NEGATIVO: 0, ABSTENCION: 0, AUSENTE: 0, PRESIDENCIA: 0,
      provinces: new Set() };
    map[key].total++;
    map[key][l.vote] = (map[key][l.vote] || 0) + 1;
    map[key].provinces.add(l.province);
  }
  const rows = Object.values(map).map(b => {
    const cohInfo = _cohesionFor(b);
    return {
      block: b.block,
      family: b.family,
      total: b.total,
      present: cohInfo.presentes,
      AFIRMATIVO: b.AFIRMATIVO, NEGATIVO: b.NEGATIVO,
      ABSTENCION: b.ABSTENCION, AUSENTE: b.AUSENTE, PRESIDENCIA: b.PRESIDENCIA,
      dominantVote: cohInfo.dominantVote,
      cohesion: cohInfo.cohesion * 100,
      isUnified: cohInfo.cohesion >= COHESION_UNIFIED_THRESHOLD,
      isDivided: cohInfo.cohesion <  COHESION_DIVIDED_THRESHOLD,
      provincesCount: b.provinces.size
    };
  });
  rows.sort((a,b) => b.total - a.total || b.cohesion - a.cohesion);
  return {
    rows,
    unifiedCount: rows.filter(r => r.isUnified && r.present > 0).length,
    dividedCount: rows.filter(r => r.isDivided && r.present > 0).length
  };
}

function computeProvinceIndicators(scenario){
  const rows = computeProvinceSummary(scenario).map(p => {
    const cohInfo = _cohesionFor(p);
    return {
      province: p.province,
      total: p.total,
      AFIRMATIVO: p.AFIRMATIVO,
      NEGATIVO: p.NEGATIVO,
      ABSTENCION: p.ABSTENCION,
      AUSENTE: p.AUSENTE,
      PRESIDENCIA: p.PRESIDENCIA,
      dominantVote:  p.isMixed ? null : p.dominantVote,
      dominantFamily: p.dominantFamily,
      isMixed: !!p.isMixed,
      pctYes:   p.total ? (p.AFIRMATIVO / p.total * 100) : 0,
      pctNo:    p.total ? (p.NEGATIVO    / p.total * 100) : 0,
      pctAbsent: p.total ? (p.AUSENTE   / p.total * 100) : 0,
      margin:    p.AFIRMATIVO - p.NEGATIVO,
      cohesion:  cohInfo.cohesion * 100,
      isDivided: cohInfo.cohesion < COHESION_DIVIDED_THRESHOLD,
      isUnanimousYes: p.AFIRMATIVO === p.total && p.total > 0,
      isUnanimousNo:  p.NEGATIVO    === p.total && p.total > 0
    };
  });
  return {
    rows,
    unanimousYes: rows.filter(r => r.isUnanimousYes),
    unanimousNo:  rows.filter(r => r.isUnanimousNo),
    divided:      rows.filter(r => r.isDivided),
    topYes:       [...rows].sort((a,b) => b.pctYes - a.pctYes).slice(0, 5),
    topNo:        [...rows].sort((a,b) => b.pctNo  - a.pctNo).slice(0, 5)
  };
}

// =====================================================================
// ÍNDICE DE RICE (cohesión dicotómica afi/neg, 0-1)
// Rice = |Afi − Neg| / (Afi + Neg)
// Excluye ausentes, presidencia y abstenciones. Si Afi+Neg = 0 → no calculable.
// =====================================================================
function _riceFor(group){
  const y = group.AFIRMATIVO || 0;
  const n = group.NEGATIVO   || 0;
  const denom = y + n;
  if(denom === 0) return { value: null, computable: false, denom: 0 };
  return { value: Math.abs(y - n) / denom, computable: true, denom };
}

function computeFamilyRice(scenario){
  const fs = computeFamilySummary(scenario);
  return fs.map(f => {
    const r = _riceFor(f);
    return {
      family: f.family, total: f.total,
      AFIRMATIVO: f.AFIRMATIVO, NEGATIVO: f.NEGATIVO,
      rice: r.value, riceComputable: r.computable, denom: r.denom
    };
  }).sort((a, b) => (b.rice ?? -1) - (a.rice ?? -1));
}

function computeBlockRice(scenario){
  const map = {};
  for(const l of scenario.legislators){
    const key = l.block || 'Sin bloque';
    if(!map[key]) map[key] = { block: key, family: l.family, total: 0,
      AFIRMATIVO: 0, NEGATIVO: 0, ABSTENCION: 0, AUSENTE: 0, PRESIDENCIA: 0 };
    map[key].total++;
    map[key][l.vote] = (map[key][l.vote] || 0) + 1;
  }
  return Object.values(map).map(b => {
    const r = _riceFor(b);
    return {
      block: b.block, family: b.family, total: b.total,
      AFIRMATIVO: b.AFIRMATIVO, NEGATIVO: b.NEGATIVO,
      rice: r.value, riceComputable: r.computable, denom: r.denom
    };
  }).sort((a, b) => (b.rice ?? -1) - (a.rice ?? -1) || b.total - a.total);
}

// =====================================================================
// ÍNDICE DE RAE (fragmentación del voto emitido, 0 → 1)
// Rae = 1 − Σ(p_i²) sobre Afirmativo, Negativo y Abstención (votos emitidos).
// Excluye ausentes y presidencia. Cerca de 0 = voto concentrado;
// más alto = más fragmentado entre las 3 categorías.
// =====================================================================
function computeScenarioRae(scenario){
  const sum = computeVoteSummary(scenario);
  const y = sum.AFIRMATIVO || 0;
  const n = sum.NEGATIVO   || 0;
  const a = sum.ABSTENCION || 0;
  const denom = y + n + a;
  if(denom === 0) return { value: null, computable: false, denom: 0 };
  const py = y / denom, pn = n / denom, pa = a / denom;
  const rae = 1 - (py*py + pn*pn + pa*pa);
  return { value: rae, computable: true, denom, parts: { yes: y, no: n, abst: a } };
}

// =====================================================================
// SÍNTESIS INTERPRETATIVA AUTOMÁTICA (escenario activo + comparador)
// =====================================================================
// Devuelve un array de oraciones descriptivas derivadas estrictamente de
// los indicadores ya calculados. NO formula causalidad ni juicio normativo:
// solo describe magnitudes y los compara con umbrales explícitos.

function buildScenarioInsights(scenario){
  const ind = computeScenarioIndicators(scenario);
  const fc  = computeFamilyCohesion(scenario);
  const bc  = computeBlockCohesion(scenario);
  const ti  = computeProvinceIndicators(scenario);
  const rae = computeScenarioRae(scenario);
  const fmt = (n) => Number.isFinite(n) ? n.toFixed(1) : '—';
  const out = [];

  // 1. Resultado y magnitud del apoyo
  if(ind.result){
    out.push(`La votación se resolvió de manera ${esc(ind.result.toLowerCase())} con un margen de ${Math.abs(ind.margin)} votos a favor sobre en contra (${fmt(ind.pctYesPresent)}% de los presentes, ${fmt(ind.pctYesOfTotal)}% sobre el cuerpo completo).`);
  }

  // 2. Tono de la participación
  if(ind.absenceRate > 15){
    out.push(`El ausentismo fue elevado: ${ind.AUSENTE} bancas sobre ${ind.totalSeats} (${fmt(ind.absenceRate)}% del cuerpo), lo que reduce la base efectiva de presentes a ${ind.present}.`);
  } else if(ind.absenceRate < 5){
    out.push(`La participación fue alta: solo ${ind.AUSENTE} bancas ausentes (${fmt(ind.absenceRate)}% del cuerpo).`);
  } else {
    out.push(`La participación fue intermedia: ${ind.AUSENTE} bancas ausentes (${fmt(ind.absenceRate)}% del cuerpo).`);
  }

  // 3. Cohesión por familia política
  if(fc.mostCohesive){
    const mc = fc.mostCohesive;
    const dom = (VOTE_LABELS_CSV[mc.dominantVote] || '').toLowerCase();
    out.push(`Entre las familias políticas, la mayor cohesión la registró ${esc(mc.family)} (${fmt(mc.cohesion)}% del voto dominante en sentido ${esc(dom)}, sobre ${mc.present} presentes de un total de ${mc.total}).`);
  }
  if(fc.mostDivided && fc.mostDivided.cohesion < (COHESION_DIVIDED_THRESHOLD * 100)){
    const md = fc.mostDivided;
    out.push(`La fractura interna más fuerte se registró en ${esc(md.family)}, con cohesión de ${fmt(md.cohesion)}% (por debajo del umbral de ${Math.round(COHESION_DIVIDED_THRESHOLD*100)}% que define a una familia dividida en esta herramienta).`);
  }

  // 4. Territorialización
  const unanY = ti.unanimousYes.length;
  const unanN = ti.unanimousNo.length;
  const divP  = ti.divided.length;
  if(unanY + unanN > 0){
    const lst = [];
    if(unanY) lst.push(`${unanY} jurisdicciones con apoyo unánime (${unanY === 1 ? ti.unanimousYes[0].province : 'distintas'})`);
    if(unanN) lst.push(`${unanN} con rechazo unánime (${unanN === 1 ? ti.unanimousNo[0].province : 'distintas'})`);
    out.push(`Distribución territorial: ${lst.join(' y ')}; ${divP} jurisdicciones quedaron divididas por debajo del ${Math.round(COHESION_DIVIDED_THRESHOLD*100)}% del voto dominante.`);
  }

  // 5. Fragmentación (Rae)
  if(rae.computable){
    const tag = rae.value < 0.20 ? 'altamente concentrada'
              : rae.value < 0.40 ? 'moderadamente concentrada'
              : rae.value < 0.55 ? 'fragmentada'
              : 'altamente fragmentada';
    out.push(`La fragmentación del voto emitido (Rae = ${rae.value.toFixed(3)}) ubica al escenario en la categoría ${tag} según el umbral interpretativo de la herramienta.`);
  }

  // 6. Disciplina de bloque
  if(bc.rows.length > 0){
    const unifiedRatio = bc.unifiedCount / bc.rows.length;
    if(unifiedRatio > 0.7){
      out.push(`La disciplina legislativa por bloque parlamentario fue alta: ${bc.unifiedCount} de ${bc.rows.length} bloques presentaron cohesión ≥${Math.round(COHESION_UNIFIED_THRESHOLD*100)}%.`);
    } else if(bc.dividedCount > bc.unifiedCount){
      out.push(`La disciplina legislativa por bloque parlamentario fue débil: ${bc.dividedCount} bloques quedaron con cohesión <${Math.round(COHESION_DIVIDED_THRESHOLD*100)}%, contra ${bc.unifiedCount} unificados.`);
    }
  }

  return out;
}

function buildComparisonInsights(){
  const comp = computeScenarioComparison();
  const scens = comp.rows;
  const r = comp.rankings;
  const fmt = (n) => Number.isFinite(n) ? n.toFixed(1) : '—';
  const out = [];
  const scenLabel = (s) => `${s.caseName} · ${s.chamberShort}`;

  // 1. Mayor apoyo
  out.push(`El mayor nivel de apoyo afirmativo sobre presentes se registró en ${esc(scenLabel(r.maxSupport))} (${fmt(r.maxSupport.pctYesPresent)}%).`);

  // 2. Mayor rechazo
  if(r.maxRejection && r.maxRejection.pctNoPresent > 10){
    out.push(`El mayor nivel de rechazo se registró en ${esc(scenLabel(r.maxRejection))} (${fmt(r.maxRejection.pctNoPresent)}% sobre presentes).`);
  }

  // 3. Ausentismo
  out.push(`El ausentismo más alto se observó en ${esc(scenLabel(r.maxAbsence))} (${fmt(r.maxAbsence.absenceRate)}% del cuerpo); el más bajo en el escenario opuesto.`);

  // 4. Margen
  const marginRange = r.maxMargin.margin - r.minMargin.margin;
  if(marginRange > 0){
    out.push(`En términos absolutos, el margen más amplio (${(r.maxMargin.margin >= 0 ? '+' : '') + r.maxMargin.margin} votos) fue en ${esc(scenLabel(r.maxMargin))}; el más estrecho (${(r.minMargin.margin >= 0 ? '+' : '') + r.minMargin.margin}) en ${esc(scenLabel(r.minMargin))}.`);
  }

  // 5. Fragmentación comparada (Rae)
  const raeRanked = scens.map(s => {
    const orig = Object.values(SCENARIOS).find(o => o.id === s.id);
    return { s, rae: computeScenarioRae(orig) };
  }).filter(r => r.rae.computable).sort((a, b) => b.rae.value - a.rae.value);
  if(raeRanked.length >= 2){
    const mostFrag = raeRanked[0];
    const leastFrag = raeRanked[raeRanked.length - 1];
    out.push(`La fragmentación relativa más alta correspondió a ${esc(scenLabel(mostFrag.s))} (Rae = ${mostFrag.rae.value.toFixed(3)}); la más concentrada a ${esc(scenLabel(leastFrag.s))} (Rae = ${leastFrag.rae.value.toFixed(3)}).`);
  }

  // 6. Diferencias caso vs caso (apoyo)
  const find = (caseName, chamber) => scens.find(x => x.caseName === caseName && x.chamberShort === chamber);
  const aD = find('Aerolíneas Argentinas', 'Diputados');
  const yD = find('YPF', 'Diputados');
  const aS = find('Aerolíneas Argentinas', 'Senado');
  const yS = find('YPF', 'Senado');
  if(aD && yD){
    const delta = yD.pctYesPresent - aD.pctYesPresent;
    if(Math.abs(delta) >= 1){
      const dir = delta > 0 ? 'mayor' : 'menor';
      out.push(`En Diputados, YPF registró ${dir} apoyo afirmativo que Aerolíneas (${fmt(Math.abs(delta))} puntos porcentuales de diferencia sobre presentes).`);
    }
  }
  if(aS && yS){
    const delta = yS.pctYesPresent - aS.pctYesPresent;
    if(Math.abs(delta) >= 1){
      const dir = delta > 0 ? 'mayor' : 'menor';
      out.push(`En Senado, YPF registró ${dir} apoyo afirmativo que Aerolíneas (${fmt(Math.abs(delta))} pp de diferencia sobre presentes).`);
    }
  }

  return out;
}

// Diferencias de cohesión promedio por familia entre dos escenarios — usado en
// el comparador caso vs caso y cámara vs cámara para sumar a las Δ existentes.
function computeAvgFamilyCohesionDelta(scenarioA, scenarioB){
  const avg = (s) => {
    const fc = computeFamilyCohesion(s);
    const valid = fc.rows.filter(r => r.present > 0);
    if(!valid.length) return null;
    return valid.reduce((acc, r) => acc + r.cohesion, 0) / valid.length;
  };
  const a = avg(scenarioA), b = avg(scenarioB);
  if(a == null || b == null) return null;
  return b - a;
}

function computeScenarioComparison(){
  // Compara los 4 escenarios del SCENARIOS global.
  const rows = Object.values(SCENARIOS).map(s => {
    const ind = computeScenarioIndicators(s);
    return {
      id: s.id,
      caseName: s.caseName,
      chamberShort: s.chamberShort,
      date: s.date,
      law: s.law,
      ...ind
    };
  });
  const byMetric = (key, desc) => [...rows].sort((a,b) => desc ? b[key] - a[key] : a[key] - b[key]);
  return {
    rows,
    rankings: {
      maxSupport:   byMetric('pctYesPresent', true)[0],
      maxRejection: byMetric('pctNoPresent',  true)[0],
      maxAbsence:   byMetric('absenceRate',   true)[0],
      maxMargin:    byMetric('margin',        true)[0],
      minMargin:    byMetric('margin',        false)[0]
    }
  };
}

function computeFamilyComparison(){
  // Matriz familia × escenario, valores: pctYesPresent, pctNoPresent, pctAbsent, cohesion.
  const scenarios = Object.values(SCENARIOS);
  const allFamilies = Object.keys(FAMILY_COLORS); // orden canónico
  const matrix = allFamilies.map(family => {
    const perScenario = {};
    scenarios.forEach(s => {
      const row = computeFamilyCohesion(s).rows.find(r => r.family === family);
      perScenario[s.id] = row || null;
    });
    const present = Object.values(perScenario).some(v => v && v.total > 0);
    return { family, color: FAMILY_COLORS[family], perScenario, present };
  });
  return matrix.filter(m => m.present);
}

function computeProvinceComparison(){
  // Matriz provincia × escenario. Solo dimensiones territoriales que el dataset
  // tiene en común; usamos como universo las provincias que aparecen en al menos un escenario.
  const scenarios = Object.values(SCENARIOS);
  const provSet = new Set();
  const perScenarioMap = {};
  scenarios.forEach(s => {
    const rows = computeProvinceIndicators(s).rows;
    perScenarioMap[s.id] = {};
    rows.forEach(r => {
      provSet.add(r.province);
      perScenarioMap[s.id][r.province] = r;
    });
  });
  const provinces = [...provSet].sort((a,b) => a.localeCompare(b, 'es'));
  const matrix = provinces.map(province => {
    const perScenario = {};
    scenarios.forEach(s => { perScenario[s.id] = perScenarioMap[s.id][province] || null; });
    // Diagnóstico: ¿es consistentemente afirmativa / opositora / cambia?
    const dominantVotes = scenarios.map(s => perScenario[s.id] && perScenario[s.id].dominantVote).filter(Boolean);
    const allYes = dominantVotes.length > 0 && dominantVotes.every(v => v === 'AFIRMATIVO');
    const allNo  = dominantVotes.length > 0 && dominantVotes.every(v => v === 'NEGATIVO');
    const changes = new Set(dominantVotes).size > 1;
    return { province, perScenario, allYes, allNo, changes };
  });
  return matrix;
}

function validateScenario(scenario){
  // Cache por escenario: los datasets son inmutables en runtime, así que el
  // resultado de validateScenario nunca cambia para un mismo `scenario`.
  // Se calculaba ~30 veces por sesión (renderTabs, renderValidationPanel,
  // renderTables, exports, ficha institucional). Cache estable.
  if(scenario._validation) return scenario._validation;
  const warnings = [];
  const summary = computeVoteSummary(scenario);
  const legs = scenario.legislators;

  // (1) Total cargado vs bancas declaradas
  if(legs.length !== scenario.totalSeats){
    warnings.push(`Total de legisladores cargados (${legs.length}) ≠ bancas declaradas (${scenario.totalSeats}).`);
  }
  // (2) Conteos de voto vs metadata
  // Convención: en algunas actas la presidencia del cuerpo se computa como AFIRMATIVO; la categoría
  // PRESIDENCIA del dataset etiqueta a quien preside la sesión. Se acepta cualquiera de las dos lecturas.
  const affMatches = summary.AFIRMATIVO === scenario.yes
    || (summary.AFIRMATIVO + summary.PRESIDENCIA) === scenario.yes;
  if(!affMatches){
    warnings.push(`Afirmativos calculados (${summary.AFIRMATIVO}) ≠ metadata (${scenario.yes}).`);
  }
  if(summary.NEGATIVO !== scenario.no){
    warnings.push(`Negativos calculados (${summary.NEGATIVO}) ≠ metadata (${scenario.no}).`);
  }
  if(summary.ABSTENCION !== (scenario.abstain || 0)){
    warnings.push(`Abstenciones calculadas (${summary.ABSTENCION}) ≠ metadata (${scenario.abstain || 0}).`);
  }
  if(summary.AUSENTE !== scenario.absent){
    warnings.push(`Ausentes calculados (${summary.AUSENTE}) ≠ metadata (${scenario.absent}).`);
  }
  // (3) Presentes calculados vs metadata — se acepta con o sin la presidencia (convención del acta).
  if(typeof scenario.present === 'number'){
    const presMatches = summary.present === scenario.present
      || (summary.present - summary.PRESIDENCIA) === scenario.present;
    if(!presMatches){
      warnings.push(`Presentes calculados (${summary.present}) ≠ metadata (${scenario.present}).`);
    }
  }
  // (4) Campos faltantes
  for(let i=0; i<legs.length; i++){
    const l = legs[i];
    for(const f of FIELDS_REQUIRED){
      if(!l[f]){
        warnings.push(`Registro ${i+1} (${l.name || '?'}): campo obligatorio "${f}" vacío.`);
      }
    }
  }
  // (5) Voto fuera del set válido
  for(const l of legs){
    if(l.vote && !VOTES_VALID.has(l.vote)){
      warnings.push(`Voto no permitido en ${l.name}: "${l.vote}".`);
    }
  }
  // (6) Familia no reconocida
  const famSeen = new Set();
  for(const l of legs){
    if(l.family && !FAMILIES_VALID.has(l.family)) famSeen.add(l.family);
  }
  for(const f of famSeen) warnings.push(`Familia política no reconocida en paleta: "${f}".`);
  // (7) Provincias no normalizadas
  const provSeen = new Set();
  for(const l of legs){
    if(l.province && !PROVINCES_VALID.has(l.province)) provSeen.add(l.province);
  }
  for(const p of provSeen) warnings.push(`Provincia no normalizada: "${p}".`);
  // (8) Nombres duplicados
  const seen = new Set();
  for(const l of legs){
    if(seen.has(l.name)) warnings.push(`Nombre duplicado: "${l.name}".`);
    seen.add(l.name);
  }

  // ===== Validación territorial =====
  // Conteo por provincia, normalizando aliases primero.
  const loaded = {};
  const aliasesUsed = [];
  for(const l of legs){
    const raw = l.province;
    const norm = normalizeProvince(raw);
    if(raw && norm !== raw && !aliasesUsed.find(a => a.raw === raw)){
      aliasesUsed.push({ raw, norm });
    }
    loaded[norm] = (loaded[norm] || 0) + 1;
  }
  const expected = expectedDistribution(scenario);
  // Filas: una por provincia esperada + extra si hay provincias no reconocidas
  const provSet = new Set([...Object.keys(expected), ...Object.keys(loaded)]);
  const territorialRows = [];
  let territorialOk = true;
  for(const prov of provSet){
    const exp = expected[prov] || 0;
    const cur = loaded[prov] || 0;
    const diff = cur - exp;
    let status;
    if(!(prov in expected)){
      status = 'NO_RECONOCIDA';
      territorialOk = false;
    } else if(diff === 0){
      status = 'OK';
    } else if(diff < 0){
      status = 'FALTAN';
      territorialOk = false;
    } else {
      status = 'SOBRAN';
      territorialOk = false;
    }
    territorialRows.push({ province: prov, expected: exp, loaded: cur, diff, status });
  }
  // Ordenar: no reconocidas al final; resto por bancas esperadas desc, luego alfa
  territorialRows.sort((a, b) => {
    if(a.status === 'NO_RECONOCIDA' && b.status !== 'NO_RECONOCIDA') return 1;
    if(b.status === 'NO_RECONOCIDA' && a.status !== 'NO_RECONOCIDA') return -1;
    if(b.expected !== a.expected) return b.expected - a.expected;
    return a.province.localeCompare(b.province, 'es');
  });

  const territorial = {
    ok: territorialOk,
    rows: territorialRows,
    aliasesUsed,
    totalExpected: Object.values(expected).reduce((s, n) => s + n, 0),
    totalLoaded: Object.values(loaded).reduce((s, n) => s + n, 0)
  };

  // votesOk: las verificaciones (1)-(2)-(3) son las que tocan votos y totales.
  // Lo que va a `warnings` arriba ya cubre todo eso. Si warnings tiene mensajes
  // de voto/total/campo, votesOk = false. Las inconsistencias territoriales NO
  // entran a `warnings` — se muestran aparte en el panel.
  const votesOk = warnings.length === 0;

  const result = {
    ok: votesOk && territorial.ok,
    votesOk,
    territorialOk: territorial.ok,
    warnings,
    summary,
    territorial
  };
  scenario._validation = result;
  return result;
}

function getFilteredLegislators(scenario){
  let ls = scenario._sortedLegislators || scenario.legislators;
  if(state.voteFilter !== 'TODOS') ls = ls.filter(l => l.vote === state.voteFilter);
  if(state.provinceFilter) ls = ls.filter(l => l.province === state.provinceFilter);
  const q = state.search.trim().toLowerCase();
  if(q) ls = ls.filter(l => (l.name + ' ' + l.block + ' ' + l.province + ' ' + l.family).toLowerCase().includes(q));
  const t = state.tableSearch.trim().toLowerCase();
  if(t) ls = ls.filter(l => (l.name + ' ' + l.block + ' ' + l.province + ' ' + l.family).toLowerCase().includes(t));
  return ls;
}

// =====================================================================
// FILE NAMING — slug consistente para exportaciones
// =====================================================================
function slugifyFilename(parts){
  return parts
    .map(p => String(p ?? '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, ''))
    .filter(Boolean)
    .join('_');
}
