<!doctype html>
<!--
  Herramienta de visualización legislativa · Reestatizaciones de YPF y Aerolíneas Argentinas
  Versión: v1.0 — versión estable para tesis (2026-05-19)
  Complemento metodológico de la tesis "El péndulo del poder" (Ciencia Política y RR.II., UBA).
  Datasets validados: 257 / 72 / 257 / 72 (Aerolíneas y YPF, Diputados y Senado).
  HTML autocontenido, sin dependencias externas.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="version" content="1.0">
<meta name="author" content="Valentín Domingo Campos">
<meta name="description" content="Visualización legislativa de las votaciones nominales de las leyes 26.466 (Aerolíneas Argentinas) y 26.741 (YPF) en ambas cámaras del Congreso de la Nación Argentina.">
<!-- Favicon SVG inline para evitar 404 sin agregar archivos externos. Tinta y dorado de la paleta editorial. -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23fffdf8'/><rect x='4' y='6' width='24' height='2' fill='%2314181f'/><rect x='4' y='12' width='6' height='2' fill='%239c7a2c'/><circle cx='10' cy='22' r='4' fill='%233f6e44'/><circle cx='22' cy='22' r='4' fill='%23a32a2a'/></svg>">
<title>Reestatizaciones · Análisis legislativo</title>
<style>
/* =====================================================================
   TOKENS DE DISEÑO
   ===================================================================== */
:root{
  /* Paleta editorial premium — off-white papel con tinte cálido marcado;
     tinta más profunda que negro plano para evocar publicación impresa
     (NYT, FT, Le Monde, Cuadernos del Plata). Cada color institucional,
     ninguno SaaS, ninguno chillón. */
  --bg: #f3f0e8;
  --bg-soft: #f8f5ec;
  --card: #fffdf8;
  --line: #d9d3c4;
  --line-strong: #b7af9d;
  --ink: #14181f;
  --ink-2: #2c3543;
  --muted: #6a6a64;
  --muted-soft: #9a9588;

  /* Acento dorado/ocre sobrio — uso parsimonioso: reglas, subrayados,
     activos secundarios, detalles jerárquicos. Reemplaza al ink solido
     como marca de jerarquía en estados activos. */
  --accent-gold: #9c7a2c;
  --accent-gold-soft: #e9deba;
  /* Dorado tipográfico — variante más oscura para texto chico (eyebrows,
     labels, rankings, notas). No usar en bordes, líneas, dots ni decoración
     —para eso queda --accent-gold. Garantiza contraste sobre --bg / --card. */
  --accent-gold-text: #7c6020;

  /* Atlas parlamentario académico — Etapa 1. Tres capas de papel para que las
     láminas se "monten" sobre un paspartú (en vez de flotar con sombra), y un
     sistema de filetes finos de archivo. El oro pasa a acento mínimo: numera,
     filetea y subraya; nunca rellena. */
  --paper-mount: #ece4d1;   /* fondo de la app — montaje/paspartú bajo las láminas */
  --paper-sunk:  #f1ece0;   /* hundidos — registros, metadatos, segmento activo */
  --gold-rule:   #b89243;   /* filete dorado fino (marca de archivo) */
  --rule-ink:    #1f2329;   /* filete corto fuerte de títulos */

  /* Votos: paleta institucional desaturada — verde hunter, burgundy,
     ocre mostaza, piedra cálida. Pensada para imprenta y proyección.
     Verde para afirmativo deja el azul libre para familias (FPV-PJ,
     Centroizquierda, Concertación) sin colisionar con el sentido del voto. */
  --vote-yes: #3f6e44;      /* verde hunter — voto afirmativo */
  --vote-yes-soft: #e0eadc;
  --accent: #2655b6;        /* azul UI (hover, focus) deliberadamente distinto del voto */
  --vote-no: #a32a2a;       /* rojo burgundy — voto negativo */
  --vote-no-soft: #f4dada;
  --vote-abst: #a87523;     /* ocre mostaza — abstención */
  --vote-abst-soft: #f3e8c9;
  --vote-abs: #a09b8c;      /* piedra cálida — ausente */
  --vote-abs-soft: #ede9dd;
  --vote-pres: #14181f;     /* presidencia — tinta profunda */

  /* Familias políticas — paleta categórica editorial: 10 tonos profundos,
     desaturados, discriminables entre sí y separados del rango de votos.
     Pensada para fondo claro, mapa y ojo-de-buey simultáneo. */
  --fam-fpv:    #0c4a6e;   /* azul petróleo profundo */
  --fam-ucr:    #9a3412;   /* terracota oscura */
  --fam-pro:    #b08227;   /* ocre dorado (sustituye al amarillo brillante) */
  --fam-cc:     #115e59;   /* teal profundo */
  --fam-soc:    #9f1239;   /* rosa burdeos */
  --fam-perdis: #7c2d12;   /* marrón oscuro */
  --fam-cizq:   #312e81;   /* indigo profundo */
  --fam-conc:   #155e75;   /* cyan profundo */
  --fam-prov:   #5b21b6;   /* violeta profundo */
  --fam-otros:  #57534e;   /* piedra neutra cálida */

  /* Sombras layered — más sutiles, multi-capa para profundidad editorial */
  --shadow-xs: 0 1px 0 rgba(15,23,42,.02), 0 0 0 1px rgba(15,23,42,.025);
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 0 0 1px rgba(15,23,42,.025);
  --shadow-md: 0 8px 24px -8px rgba(15,23,42,.08), 0 2px 6px -2px rgba(15,23,42,.04), 0 0 0 1px rgba(15,23,42,.02);
  --shadow-lg: 0 24px 48px -12px rgba(15,23,42,.16), 0 4px 12px -4px rgba(15,23,42,.06);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-xs: 4px;

  /* Movimiento — curvas y duraciones de la capa de pulido editorial.
     Definidas aquí (junto al resto de tokens) y no en un :root tardío:
     se usan desde la línea ~280 en adelante. */
  --ease-out: cubic-bezier(.16,1,.3,1);
  --ease-soft: cubic-bezier(.4,0,.2,1);
  --dur-1: .14s; --dur-2: .22s; --dur-3: .34s; --dur-4: .55s;

  /* Escala tipográfica (siete tamaños) */
  --t-xs:    11px;   /* metadatos, captions */
  --t-sm:    12px;   /* tipografía secundaria */
  --t-base:  13.5px; /* cuerpo y UI por defecto */
  --t-md:    15px;   /* énfasis cuerpo */
  --t-lg:    18px;   /* títulos de panel */
  --t-xl:    24px;   /* títulos de sección */
  --t-2xl:   32px;   /* H1 masthead */

  /* Pesos */
  --w-regular: 400;
  --w-medium:  500;
  --w-semi:    600;
  --w-bold:    700;

  /* Espaciado base */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;

  /* Tipografía con stack institucional (sin font-family Inter externa) */
  --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body{
  font-family: var(--font-sans);
  background: var(--paper-mount);
  color: var(--ink);
  font-size: var(--t-base);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern", "liga", "calt", "ss01";
  font-variant-numeric: lining-nums proportional-nums;
}
/* En tablas y métricas: numerales tabulares y de cifra fija para alineación */
table.dtable td, .sc-value, .meta-v, .center-tally, .center-sub, .prov-tally{
  font-variant-numeric: tabular-nums;
}

/* =====================================================================
   LAYOUT
   ===================================================================== */
.shell{
  max-width: 1380px;
  margin: 0 auto;
  padding: var(--space-10) var(--space-6) var(--space-10);
}

/* Header editorial — masthead con jerarquía tipográfica clásica */
.masthead{
  border-bottom: 1px solid var(--line);
  padding-bottom: var(--space-8);
  margin-bottom: var(--space-8);
  position: relative;
}
.masthead::before{
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 54px;
  height: 2px;
  background: var(--ink);
}
.masthead::after{
  content: '';
  position: absolute;
  bottom: -1px;
  left: 58px;
  width: 22px;
  height: 2px;
  background: var(--gold-rule);
}
.masthead .eyebrow{
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
  margin-bottom: var(--space-3);
  font-feature-settings: "smcp", "c2sc", "kern";
}
.masthead h1{
  margin: 0 0 var(--space-3);
  font-family: var(--font-serif);
  font-size: 31px;
  font-weight: var(--w-bold);
  letter-spacing: -0.018em;
  line-height: 1.12;
  color: var(--ink);
  font-feature-settings: "kern", "liga", "dlig";
}
.masthead .lede{
  margin: 0 0 var(--space-5);
  max-width: 720px;
  color: var(--ink-2);
  font-size: var(--t-md);
  line-height: 1.6;
  font-weight: var(--w-regular);
  letter-spacing: -0.003em;
}
.masthead .laws{
  display: flex;
  gap: var(--space-6);
  flex-wrap: wrap;
  font-size: var(--t-sm);
  color: var(--muted);
  border-top: 1px solid var(--line);
  padding-top: var(--space-4);
  letter-spacing: -0.005em;
}
.masthead .laws span{
  display: inline-flex;
  align-items: baseline;
  gap: var(--space-2);
}
.masthead .laws strong{
  color: var(--ink);
  font-weight: var(--w-semi);
  font-variant-numeric: tabular-nums;
}

/* Navegación por dos ejes — Caso × Cámara.
   Reemplaza las 4 tarjetas densas y repetitivas por dos controles segmentados
   compactos. La fecha, la ley y las bancas ya no se repiten por tab: viven en
   la meta-bar y en el ancla de contexto. El escenario activo se lee siempre en
   el segmento relleno en tinta de cada eje. */
.scenario-nav{
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: var(--space-6);
  margin-bottom: var(--space-6);
  padding-bottom: var(--space-5);
  border-bottom: 1px solid var(--line);
}
.nav-axis{
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}
.nav-axis-label{
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
  font-feature-settings: "smcp", "c2sc", "kern";
}
/* Control segmentado refinado: registro plano sobre papel, segmentos separados
   por hairline; el activo se marca con un filete dorado (no con relleno). */
.nav-seg-group{
  display: inline-flex;
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  padding: 0;
  gap: 0;
  overflow: hidden;
}
.nav-seg{
  appearance: none;
  border: 0;
  background: transparent;
  font-family: inherit;
  font-size: var(--t-sm);
  font-weight: var(--w-medium);
  color: var(--muted);
  padding: 7px var(--space-4) 6px;
  border-radius: 0;
  cursor: pointer;
  letter-spacing: -0.004em;
  white-space: nowrap;
  position: relative;
  transition: background var(--dur-2) var(--ease-soft), color var(--dur-2) var(--ease-soft);
}
.nav-seg + .nav-seg{ border-left: 1px solid var(--line); }
.nav-seg:hover{ color: var(--ink-2); background: var(--paper-sunk); }
.nav-seg[aria-pressed="true"]{
  background: var(--paper-sunk);
  color: var(--ink);
  font-weight: var(--w-semi);
}
.nav-seg[aria-pressed="true"]::after{
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 2px;
  background: var(--gold-rule);
}
/* Indicador discreto de dataset bajo revisión territorial. Preserva la señal
   que antes vivía marcada por-tab, sin volver a saturar la navegación. */
.nav-review{
  align-self: center;
  margin-left: auto;
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  letter-spacing: .01em;
  color: var(--accent-gold-text);
  background: var(--accent-gold-soft);
  border-radius: var(--radius-xs);
  padding: 3px var(--space-3);
}

/* Ancla de contexto — barra fina sticky que aparece sólo cuando el masthead y
   el selector salen del viewport (controlada por IntersectionObserver). Orienta
   sin molestar: caso · cámara · fecha · resultado. Oculta en impresión para no
   duplicar el masthead. */
.context-anchor{
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  background: var(--card);
  -webkit-backdrop-filter: saturate(1.3) blur(8px);
  backdrop-filter: saturate(1.3) blur(8px);
  border-bottom: 1px solid var(--line-strong);
  box-shadow: var(--shadow-xs);
  transform: translateY(-100%);
  transition: transform .26s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}
.context-anchor.is-visible{ transform: translateY(0); }
.context-anchor-inner{
  max-width: 1380px;
  margin: 0 auto;
  padding: var(--space-3) var(--space-10);
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  font-size: var(--t-sm);
  letter-spacing: -0.004em;
}
.ca-case{ font-weight: var(--w-bold); color: var(--ink); }
.ca-chamber{ color: var(--ink-2); font-weight: var(--w-medium); }
.ca-date{ color: var(--muted); font-variant-numeric: tabular-nums; }
.ca-sep{ color: var(--muted-soft); }
.ca-result{ font-weight: var(--w-semi); letter-spacing: .01em; }
.ca-result.result-yes{ color: var(--vote-yes); }
.ca-result.result-no{ color: var(--vote-no); }

/* =====================================================================
   METADATOS DEL ESCENARIO ACTIVO
   ===================================================================== */
/* Ficha institucional — por defecto colapsada en una línea resumen editorial,
   expandible para ver las tres bandas (header / trámite / fuentes). */
/* Card anexa: ficha institucional. Sombra suave (es anexa al viz-card,
   no debe competir con la visualización por peso visual). */
.meta-bar{
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-left: 2px solid var(--gold-rule);   /* filete de registro de archivo */
  border-radius: var(--radius-xs);
  overflow: hidden;
  margin-bottom: var(--space-6);
  box-shadow: none;
}

/* Línea resumen visible siempre: Ley · Cámara · Fecha · Resultado · Tally */
.meta-summary{
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: var(--space-3);
  padding: var(--space-4) var(--space-5);
  cursor: pointer;
  font-size: var(--t-base);
  color: var(--ink-2);
  letter-spacing: -0.005em;
  transition: background .12s;
}
.meta-summary::-webkit-details-marker{ display: none; }
.meta-summary:hover{ background: var(--bg-soft); }
.meta-summary-law{
  font-family: var(--font-serif);
  font-size: var(--t-lg);
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.015em;
}
.meta-summary-bo{
  font-size: var(--t-xs);
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-medium);
  margin-left: var(--space-1);
}
.meta-summary-sep{ color: var(--muted-soft); font-weight: var(--w-regular); }
.meta-summary-result{
  font-weight: var(--w-bold);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.005em;
}
.meta-summary-result.result-yes{ color: var(--vote-yes); }
.meta-summary-result.result-no{ color: var(--vote-no); }
.meta-summary-tally{
  font-variant-numeric: tabular-nums;
  font-weight: var(--w-semi);
  color: var(--ink);
}
.meta-summary-toggle{
  margin-left: auto;
  font-size: var(--t-xs);
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent-gold-text);
  font-weight: var(--w-semi);
  white-space: nowrap;
}
.meta-bar[open] .meta-summary-toggle::after{ content: ' ▴'; }
.meta-bar:not([open]) .meta-summary-toggle::after{ content: ' ▾'; }
.meta-bar[open] .meta-summary{ border-bottom: 1px solid var(--line); }

/* Banda 1: titular institucional (Ley + Resultado) */
.meta-row-header{
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: var(--space-5);
  padding: var(--space-4) var(--space-5);
  background: var(--bg-soft);
  border-bottom: 1px solid var(--line);
}
.meta-headline{
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  min-width: 0;
}
.meta-headline-law{
  font-family: var(--font-serif);
  font-size: var(--t-xl);
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.022em;
  line-height: 1.15;
  font-feature-settings: "kern", "liga";
}
.meta-headline-bo{
  font-family: var(--font-sans);
  font-size: var(--t-xs);
  font-weight: var(--w-medium);
  color: var(--muted);
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-left: var(--space-3);
  vertical-align: middle;
}
.meta-headline-context{
  font-size: var(--t-base);
  color: var(--ink-2);
  font-weight: var(--w-medium);
  letter-spacing: -0.005em;
  margin-top: var(--space-1);
}
.meta-headline-result{
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: var(--space-1);
  flex-shrink: 0;
  padding-left: var(--space-4);
  border-left: 1px solid var(--line);
}
.meta-headline-result .meta-k{ margin: 0; }
.meta-v-result{
  font-size: var(--t-lg);
  font-weight: var(--w-bold);
  letter-spacing: -0.01em;
}
.meta-v-result.result-yes{ color: var(--vote-yes); }
.meta-v-result.result-no{ color: var(--vote-no); }

/* Banda 2: grilla de trámite legislativo */
.meta-row-grid{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 0;
}
.meta-item{
  padding: var(--space-4) var(--space-5);
  border-right: 1px solid var(--line);
}
.meta-row-grid .meta-item{ border-bottom: 0; }
.meta-item:last-child{ border-right: none; }
.meta-k{
  font-size: var(--t-xs);
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
  margin-bottom: var(--space-1);
}
.meta-v{
  font-size: var(--t-base);
  font-weight: var(--w-semi);
  color: var(--ink);
  letter-spacing: -0.005em;
  line-height: 1.4;
}
.meta-v.result-yes{ color: var(--vote-yes); font-weight: var(--w-bold); }
.meta-v.result-no{ color: var(--vote-no); font-weight: var(--w-bold); }

/* Estados de fallback — no consignado / no corresponde / sin dato */
.meta-v-missing{
  color: var(--muted);
  font-weight: var(--w-medium);
  font-style: italic;
}
.meta-v-na{ font-style: italic; }
.meta-v-source{
  font-size: var(--t-sm);
  font-weight: var(--w-medium);
  color: var(--ink-2);
  font-style: normal;
  letter-spacing: 0;
}
.meta-v-source.meta-v-missing{ color: var(--muted); font-style: italic; }

/* Banda 3: fuentes (texto chico, dos columnas) */
.meta-row-sources{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 0;
  border-top: 1px solid var(--line);
  background: var(--bg-soft);
}
.meta-row-sources .meta-item{ padding: var(--space-3) var(--space-5); }
.meta-row-sources .meta-v{ font-weight: var(--w-medium); font-size: var(--t-sm); }

/* =====================================================================
   GRID PRINCIPAL: visualización + sidebar
   ===================================================================== */
.workspace{
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: var(--space-5);
  align-items: start;
}
@media (max-width: 1366px) and (min-width: 1101px){
  .workspace{ grid-template-columns: minmax(0, 1fr) 320px; gap: var(--space-4); }
}
@media (max-width: 1100px){
  .workspace{ grid-template-columns: 1fr; }
}

/* Lámina principal — la pieza central como figura de tesis: sin sombra, borde
   fino, filete dorado superior (firma de lámina). La elevación la da el montaje
   + el borde, no el box-shadow. */
.viz-card{
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  overflow: hidden;
  box-shadow: none;
  position: relative;
}
.viz-card::before{
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 56px; height: 2px;
  background: var(--gold-rule);
  z-index: 2;
}

/* Toolbar — barra de controles del escenario */
.toolbar{
  border-bottom: 1px solid var(--line);
  background: var(--bg-soft);
}
.toolbar-row{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-5);
  align-items: center;
  border-bottom: 1px solid var(--line);
}
.toolbar-row:last-child{ border-bottom: none; }
.toolbar-row.divided{
  justify-content: space-between;
}

.seg-group{
  display: inline-flex;
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  padding: 0;
  gap: 0;
  overflow: hidden;
}
.seg-btn{
  appearance: none;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: var(--t-sm);
  font-weight: var(--w-medium);
  color: var(--muted);
  padding: 7px var(--space-4) 6px;
  border-radius: 0;
  cursor: pointer;
  position: relative;
  transition: background var(--dur-1) var(--ease-soft), color var(--dur-1) var(--ease-soft);
  letter-spacing: -0.004em;
}
.seg-btn + .seg-btn{ border-left: 1px solid var(--line); }
.seg-btn:hover{ color: var(--ink-2); background: var(--paper-sunk); }
.seg-btn[aria-pressed="true"]{
  background: var(--paper-sunk);
  color: var(--ink);
  font-weight: var(--w-semi);
}
.seg-btn[aria-pressed="true"]::after{
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 2px;
  background: var(--gold-rule);
}

.toolbar label{
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: var(--space-2);
}

.search-input{
  appearance: none;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-4);
  font-family: inherit;
  font-size: var(--t-base);
  min-width: 220px;
  flex: 1;
  max-width: 320px;
  background: var(--card);
  color: var(--ink);
  transition: border-color var(--dur-1) var(--ease-soft), box-shadow var(--dur-1) var(--ease-soft);
}
.search-input:focus{
  outline: none;
  border-color: var(--accent-gold-text);
  box-shadow: 0 0 0 3px var(--accent-gold-soft);
}
.search-input::placeholder{ color: var(--muted-soft); }

.select-input{
  appearance: none;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: var(--space-2) 32px var(--space-2) var(--space-4);
  font-family: inherit;
  font-size: var(--t-base);
  background: var(--card) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round'/></svg>") no-repeat right 12px center;
  color: var(--ink);
  cursor: pointer;
  transition: border-color var(--dur-1) var(--ease-soft);
}
.select-input:focus{ outline: none; border-color: var(--accent-gold-text); box-shadow: 0 0 0 3px var(--accent-gold-soft); }

.btn-text{
  appearance: none;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: var(--t-base);
  font-weight: var(--w-medium);
  color: var(--ink-2);
  cursor: pointer;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-xs);
  transition: background var(--dur-1) var(--ease-soft), color var(--dur-1) var(--ease-soft);
}
.btn-text:hover{ background: var(--card); color: var(--ink); }

/* Vote filter pills */
.vote-pills{ display: inline-flex; gap: var(--space-2); flex-wrap: wrap; }
.vote-pill{
  appearance: none;
  border: 1px solid var(--line);
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: var(--space-1) var(--space-3);
  font-family: inherit;
  font-size: var(--t-sm);
  font-weight: var(--w-medium);
  color: var(--ink-2);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  transition: background .12s, color .12s, border-color .12s;
  letter-spacing: -0.005em;
}
.vote-pill:hover{ border-color: var(--line-strong); }
.vote-pill::before{
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.vote-pill[data-vote="TODOS"]::before{ background: var(--muted-soft); }
.vote-pill[data-vote="AFIRMATIVO"]::before{ background: var(--vote-yes); }
.vote-pill[data-vote="NEGATIVO"]::before{ background: var(--vote-no); }
.vote-pill[data-vote="ABSTENCION"]::before{ background: var(--vote-abst); }
.vote-pill[data-vote="AUSENTE"]::before{ background: var(--vote-abs); }
.vote-pill[aria-pressed="true"]{
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg-soft);
}
.vote-pill[aria-pressed="true"]::before{
  box-shadow: 0 0 0 2px rgba(255,253,248,.18);
}

/* Leyenda — chips livianos sobre la card */
.legend{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-4);
  padding: var(--space-3) var(--space-5);
  border-bottom: 1px solid var(--line);
  background: var(--card);
}
.legend-chip{
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--t-sm);
  color: var(--ink-2);
  font-weight: var(--w-medium);
  letter-spacing: -0.005em;
}
.legend-sw{
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

/* Aviso metodológico del modo de color (solo modo familia): el color no es el
   voto. Cinta dorada prominente arriba de la leyenda — imposible de pasar por
   alto, pero editorial. Se mantiene visible en impresión (contexto necesario). */
.color-notice{
  display: flex;
  gap: var(--space-3);
  align-items: flex-start;
  padding: var(--space-3) var(--space-5);
  background: var(--accent-gold-soft);
  border-bottom: 1px solid var(--line);
  border-left: 3px solid var(--accent-gold);
  font-size: var(--t-sm);
  line-height: 1.5;
  color: var(--ink-2);
}
.color-notice .cn-icon{
  color: var(--accent-gold-text);
  font-weight: var(--w-bold);
  font-size: var(--t-md);
  line-height: 1.2;
  flex-shrink: 0;
}
.color-notice strong{ color: var(--ink); font-weight: var(--w-semi); }

/* Controles de la figura (vista + modo de color) — fila liviana pegada a la
   leyenda. Reemplaza a la antigua primera fila de la toolbar global. */
.fig-controls{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
  align-items: center;
  padding: var(--space-3) var(--space-5);
  background: var(--card);
  border-bottom: 1px solid var(--line);
}
/* Línea meta de la figura: microcopy de lectura (izq) + contador en vivo (der). */
.viz-figmeta{
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: baseline;
  gap: var(--space-2) var(--space-4);
  padding: var(--space-2) var(--space-5);
  background: var(--card);
}
.viz-readhint{
  margin: 0;
  font-size: var(--t-xs);
  color: var(--muted);
  letter-spacing: -0.002em;
}
.viz-figmeta .seat-counter{ margin: 0; }

/* ===== Reorganización IA: filtros plegables, export contextual, índice ===== */
/* Filtros plegables — disclosure compacto en Análisis del caso. Arranca cerrado;
   el primer impacto es el gráfico, no la toolbar. */
.filter-disclosure{
  border: 1px solid var(--line);
  border-radius: var(--radius-xs);
  background: var(--paper-sunk);
  margin: var(--space-3) var(--space-5) 0;
}
.filter-summary{
  cursor: pointer;
  list-style: none;
  padding: var(--space-2) var(--space-4);
  font-size: var(--t-sm);
  font-weight: var(--w-semi);
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.filter-summary::-webkit-details-marker{ display: none; }
.filter-summary::before{ content: '⌕'; color: var(--muted); font-weight: var(--w-regular); }
.filter-summary::after{ content: '▾'; margin-left: auto; color: var(--muted); font-size: var(--t-xs); }
.filter-disclosure[open] .filter-summary::after{ content: '▴'; }
.filter-summary-active{ color: var(--accent-gold-text); font-weight: var(--w-semi); font-size: var(--t-xs); }
.filter-disclosure .toolbar-row{ border-top: 1px solid var(--line); border-bottom: none; }

/* Exportación contextual (figura activa). */
.ctx-export{
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-5);
  border-top: 1px solid var(--line);
  background: var(--paper-sunk);
}
.ctx-export-label{
  font-size: var(--t-xs);
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  font-weight: var(--w-semi);
  margin-right: var(--space-2);
}

/* Disclosure de exportaciones avanzadas (en Datos). */
.adv-export{
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  background: var(--card);
  margin-top: var(--space-6);
  overflow: hidden;
}
.adv-export-summary{
  cursor: pointer;
  list-style: none;
  padding: var(--space-4) var(--space-5);
  font-size: var(--t-sm);
  font-weight: var(--w-semi);
  color: var(--ink);
  letter-spacing: -0.005em;
  display: flex;
  align-items: center;
}
.adv-export-summary::-webkit-details-marker{ display: none; }
.adv-export-summary::after{
  content: 'mostrar ▾';
  margin-left: auto;
  font-size: var(--t-xs);
  font-weight: var(--w-regular);
  color: var(--muted);
}
.adv-export[open] .adv-export-summary::after{ content: 'ocultar ▴'; }
.adv-export-note{ margin: 0; padding: 0 var(--space-5) var(--space-3); font-size: var(--t-xs); color: var(--muted); line-height: 1.5; }
.adv-export .btn-exp-grid{ padding: 0 var(--space-5) var(--space-5); }

/* Índice compacto de secciones estadísticas — saltos rápidos (A.1…A.7). */
.stats-index{
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: var(--space-2) var(--space-3);
  padding: var(--space-3) var(--space-6);
  border-bottom: 1px solid var(--line);
  background: var(--paper-sunk);
}
.stats-index-label{
  font-size: var(--t-xs);
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  font-weight: var(--w-semi);
}
.stats-index-links{ display: flex; flex-wrap: wrap; align-items: baseline; gap: var(--space-2); }
.stats-index-link{
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  color: var(--accent-gold-text);
  text-decoration: none;
  font-variant-numeric: tabular-nums;
  letter-spacing: .02em;
}
.stats-index-link:hover{ color: var(--ink); text-decoration: underline; }
.stats-index-sep{ color: var(--muted-soft); font-size: var(--t-xs); }

/* Contador de resultados (región aria-live). Anuncia cuántas bancas quedan
   visibles según los filtros. Jerarquía baja: texto chico y muted para no
   competir con la leyenda ni con la figura. Su valor principal es semántico
   (lectores de pantalla), pero también informa visualmente. */
.seat-counter{
  margin: 0 0 var(--space-2);
  font-size: var(--t-xs);
  color: var(--ink-2);
  letter-spacing: -0.002em;
  font-variant-numeric: tabular-nums;
}
.seat-counter:empty{ display: none; }

/* =====================================================================
   HEMICICLO
   ===================================================================== */
.viz-stage{
  padding: var(--space-4) var(--space-3) var(--space-2);
  background: var(--card);
}
svg.hemicycle{ width: 100%; height: auto; display: block; }
.guide-arc{ fill: none; stroke: rgba(15,23,42,.05); stroke-width: 0.8; }
.center-panel-shadow{
  fill: rgba(15,23,42,0.04);
  filter: blur(6px);
}
.center-panel{
  fill: #ffffff;
  stroke: rgba(15,23,42,0.08);
  stroke-width: 1;
}
.center-title{
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  fill: var(--muted);
  text-anchor: middle;
}
.center-result{
  font-size: 44px;
  font-weight: 700;
  letter-spacing: -0.035em;
  text-anchor: middle;
  fill: var(--ink);
  font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
}
.center-result.result-yes{ fill: var(--vote-yes); }
.center-result.result-no{ fill: var(--vote-no); }
.center-sub{
  font-size: 13px;
  font-weight: 600;
  fill: var(--ink-2);
  text-anchor: middle;
  letter-spacing: -0.005em;
}
.center-tally{
  font-size: 10.5px;
  fill: var(--muted);
  text-anchor: middle;
  letter-spacing: .04em;
  font-weight: 500;
}

.seat{
  cursor: pointer;
  transition: opacity .15s, filter .15s;
}
/* Hover: subir el seat a primer plano con halo sutil + ligero realce de
   contraste por filtro. NO cambiar stroke-width (provoca salto geométrico
   al recalcular el radio efectivo). El halo y la opacidad llevan el peso
   de la indicación. */
.seat:hover{
  filter: drop-shadow(0 0 0 var(--ink));
}
.seat.is-dim{ opacity: 0.18; }
.seat-halo{
  fill: none;
  stroke: var(--ink);
  stroke-width: 2.5;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, cx .15s, cy .15s;
}
.seat-halo.is-visible{ opacity: 1; }

/* =====================================================================
   MAPA — pieza cartográfica institucional
   ===================================================================== */
svg.map-svg{
  width: 100%;
  height: auto;
  display: block;
  background: var(--card);
}
.map-bg{ fill: #fbfcfd; }
.province-path{
  cursor: pointer;
  transition: stroke-width .15s ease, fill-opacity .15s ease, filter .15s ease, stroke-opacity .15s;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.province-path:hover{
  stroke-width: 2.4;
  stroke-opacity: 1;
  filter: brightness(1.08) saturate(1.05);
}
.province-path.is-active{
  stroke-width: 2.4;
  stroke-opacity: 1;
  filter: drop-shadow(0 2px 4px rgba(15,23,42,.25)) saturate(1.15);
}
.province-path.is-dim{
  opacity: 0.3;
}

/* Labels con halo blanco fuerte para legibilidad sobre cualquier color */
.province-label{
  font-size: 9.5px;
  font-weight: 600;
  fill: #0f172a;
  text-anchor: middle;
  pointer-events: none;
  paint-order: stroke;
  stroke: rgba(255,255,255,0.95);
  stroke-width: 2.8;
  stroke-linejoin: round;
  letter-spacing: -0.005em;
}
.province-label.is-small{ font-size: 8.5px; stroke-width: 2.4; }

.map-note{
  padding: 0 var(--space-5) var(--space-4);
  font-size: var(--t-sm);
  color: var(--muted);
  line-height: 1.55;
}

/* Islas Malvinas — los paths se fusionan al de Tierra del Fuego, sólo queda
   el label para identificación cartográfica. */
.malvinas-layer{ opacity: 1; }
.malvinas-label{
  font-size: 8.5px;
  font-style: italic;
  fill: var(--ink-2);
  text-anchor: middle;
  letter-spacing: .02em;
  font-weight: 600;
  paint-order: stroke;
  stroke: rgba(255,255,255,0.95);
  stroke-width: 2.4;
  stroke-linejoin: round;
}

/* CABA callout — solución elegante para distrito de área chica y alta densidad */
.caba-callout-line{
  fill: none;
  stroke: var(--muted);
  stroke-width: 0.8;
  stroke-linecap: round;
}
.caba-callout-label{
  font-size: 10.5px;
  font-weight: 700;
  fill: var(--ink);
  text-anchor: start;
  letter-spacing: -0.005em;
  paint-order: stroke;
  stroke: rgba(255,255,255,0.95);
  stroke-width: 2.4;
}
.caba-callout-sub{
  font-size: 8.5px;
  font-weight: 500;
  fill: var(--muted);
  text-anchor: start;
  letter-spacing: 0;
  paint-order: stroke;
  stroke: rgba(255,255,255,0.95);
  stroke-width: 2;
}

/* Resumen ejecutivo — eyebrow editorial + strip cuantitativo.
   Separación visual reforzada: regla finita más una sutil sombra para dar
   aire entre la leyenda cromática y el bloque de cifras. */
.viz-summary{
  border-top: 1px solid var(--line);
  background: var(--paper-sunk);
  box-shadow: none;
  margin-top: 0;
}
.viz-eyebrow{
  margin: 0;
  padding: var(--space-3) var(--space-5) 0;
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
}
/* Stats agregados — síntesis cuantitativa */
.summary-strip{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0;
  background: transparent;
}
.summary-cell{
  padding: var(--space-4) var(--space-5);
  border-right: 1px solid var(--line);
}
.summary-cell:last-child{ border-right: none; }
/* Label de dato (KPI en summary-strip): el valor numérico es la pieza
   dominante; el label solo nombra. Sin uppercase, tracking ligero. */
.sc-label{
  font-size: var(--t-xs);
  letter-spacing: -0.002em;
  color: var(--muted);
  font-weight: var(--w-medium);
  margin-bottom: var(--space-2);
}
.sc-value{
  font-size: var(--t-xl);
  font-weight: var(--w-bold);
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--ink);
}
.sc-value.yes{ color: var(--vote-yes); }
.sc-value.no{ color: var(--vote-no); }
.sc-value.abs{ color: var(--ink-2); }
/* Jerarquía de KPIs en el resumen ejecutivo: el par A favor / En contra domina
   (número mayor); abstención, ausentes y margen quedan en tier secundario. */
.summary-cell.is-primary .sc-value{ font-size: var(--t-2xl); }
.summary-cell.is-secondary{ background: linear-gradient(180deg, transparent, rgba(20,24,31,.012)); }
.summary-cell.is-secondary .sc-value{ font-size: var(--t-lg); color: var(--ink-2); }
.summary-cell.is-secondary .sc-value.yes{ color: var(--vote-yes); }
.summary-cell.is-secondary .sc-value.no{ color: var(--vote-no); }
.sc-sub{
  font-size: var(--t-xs);
  color: var(--muted);
  margin-top: var(--space-1);
}

/* =====================================================================
   SIDEBAR
   ===================================================================== */
.sidebar{
  display: grid;
  gap: var(--space-5);
  position: sticky;
  top: 50px;                       /* despeja el ancla de contexto sticky al scrollear */
  max-height: calc(100vh - 66px);  /* alto disponible: top (50) + margen inferior (16) */
  overflow-y: auto;                /* scroll interno, independiente del de la columna izquierda */
  overscroll-behavior: contain;    /* no arrastra el scroll de la página al llegar al final */
  scrollbar-gutter: stable;        /* evita el salto de layout al aparecer la scrollbar */
  scrollbar-width: thin;
  scrollbar-color: var(--line-strong) transparent;
}
.sidebar::-webkit-scrollbar{ width: 8px; }
.sidebar::-webkit-scrollbar-track{ background: transparent; }
.sidebar::-webkit-scrollbar-thumb{
  background: var(--line-strong);
  border-radius: 999px;
  border: 2px solid transparent;   /* inset sutil: scrollbar discreto, editorial */
  background-clip: padding-box;
}
/* Debajo de 1100px: comportamiento normal (sidebar en flujo, sin scroll interno). */
@media (max-width: 1100px){
  .sidebar{ position: static; max-height: none; overflow: visible; }
}
/* En desktop el sidebar es el único contenedor con scroll: la lista de miembros
   se expande para no generar doble scroll incómodo dentro del sidebar. */
@media (min-width: 1101px){
  .sidebar .member-list{ max-height: none; overflow: visible; }
}

/* Card anexa: paneles del sidebar. Sombra suave para no competir con el
   viz-card central. */
/* Ficha lateral (Atlas): panel plano de archivo — filete dorado superior,
   borde firme, sin sombra. La elevación viene del montaje y el borde, no de
   la sombra (coherente con viz-card). */
.panel{
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  padding: var(--space-5) var(--space-5) var(--space-5);
  box-shadow: none;
  position: relative;
}
.panel::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 48px;
  height: 2px;
  background: var(--gold-rule);
  z-index: 2;
}
.panel-h{
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
  margin: 0 0 var(--space-4);
  padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--line);
  position: relative;
}
.panel-h::after{
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 32px;
  height: 1.5px;
  background: var(--accent-gold);
}

/* Detalle de legislador — jerarquía analítica de ficha de archivo */
/* Línea de catálogo (caso · cámara · fecha): versalitas sobrias. Se distingue
   de los eyebrows ALL-CAPS del masthead/tabs por ser small-caps, no mayúsculas
   plenas; funciona como encabezado de registro, no como rótulo institucional. */
.detail-context{
  font-variant: all-small-caps;
  font-size: var(--t-sm);
  letter-spacing: .06em;
  color: var(--muted);
  font-weight: var(--w-medium);
  margin-bottom: var(--space-2);
}
/* Nombre del legislador: serif, como pieza titular de la ficha (coherente con
   fig-title y masthead). */
.detail-name{
  font-family: var(--font-serif);
  font-size: var(--t-lg);
  font-weight: var(--w-bold);
  letter-spacing: -0.012em;
  color: var(--ink);
  margin: 0 0 var(--space-3);
  line-height: 1.25;
}
.detail-meta{
  font-size: var(--t-sm);
  color: var(--muted);
  margin-bottom: var(--space-3);
}
.detail-vote-row{
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
  padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--line);
}
/* Sello de voto: marca con borde en el color del voto sobre tinte tenue, no
   relleno pleno. Lee como sello de archivo, no como botón. La doctrina
   "Presidencia no es relleno" se cumple aquí (pres también es sello). */
.detail-vote-badge{
  display: inline-block;
  padding: 3px var(--space-3);
  border-radius: var(--radius-xs);
  font-size: var(--t-xs);
  font-weight: var(--w-bold);
  letter-spacing: .05em;
  text-transform: uppercase;
  border: 1px solid;
}
.detail-vote-badge.yes{  background: var(--vote-yes-soft);  border-color: var(--vote-yes);   color: var(--vote-yes); }
.detail-vote-badge.no{   background: var(--vote-no-soft);   border-color: var(--vote-no);    color: var(--vote-no); }
.detail-vote-badge.abs{  background: var(--vote-abs-soft);  border-color: var(--line-strong); color: var(--ink-2); }
.detail-vote-badge.abst{ background: var(--vote-abst-soft); border-color: var(--vote-abst);  color: var(--vote-abst); }
.detail-vote-badge.pres{ background: var(--paper-sunk);     border-color: var(--vote-pres);  color: var(--vote-pres); }
.detail-province{
  font-size: var(--t-base);
  color: var(--ink-2);
  font-weight: var(--w-medium);
}
.tag-row{
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.tag{
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: var(--space-1) var(--space-3);
  font-size: var(--t-sm);
  font-weight: var(--w-medium);
  color: var(--ink-2);
  letter-spacing: -0.005em;
}
.tag .dot{
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.tag.tag-vote.yes{ background: var(--vote-yes-soft); color: var(--vote-yes); border-color: transparent; }
.tag.tag-vote.no{ background: var(--vote-no-soft); color: var(--vote-no); border-color: transparent; }
.tag.tag-vote.abs{ background: var(--vote-abs-soft); color: var(--ink-2); border-color: transparent; }
.tag.tag-vote.pres{ background: var(--vote-pres); color: #fff; border-color: transparent; }

.kv-list{
  display: grid;
  gap: 0;
  margin: 0;
  border-top: 1px solid var(--line);
}
.kv-row{
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: var(--space-3);
  padding: var(--space-2) 0;
  border-bottom: 1px dashed var(--line);
  align-items: baseline;
}
.kv-row:last-child{ border-bottom: none; }
/* Rótulo de campo (key en key-value list): versalitas de ficha de archivo.
   Small-caps (no ALL-CAPS) para distinguirlo de los eyebrows institucionales;
   el valor (.kv-v) sigue siendo la pieza dominante. */
.kv-k{
  font-variant: all-small-caps;
  font-size: var(--t-sm);
  letter-spacing: .05em;
  color: var(--muted);
  font-weight: var(--w-medium);
}
.kv-v{
  font-size: var(--t-base);
  color: var(--ink);
  font-weight: var(--w-medium);
  line-height: 1.4;
  word-break: break-word;
  letter-spacing: -0.005em;
}

/* Estado vacío sobrio: nota de registro sin selección, en caja hundida con
   filete punteado (no itálica, que lee informal). */
.detail-empty{
  color: var(--muted);
  font-size: var(--t-sm);
  line-height: 1.6;
  padding: var(--space-4);
  background: var(--paper-sunk);
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius-xs);
}
/* Acciones de descarga de las fichas del sidebar (legislador / resumen). */
.panel-actions{
  display: flex;
  gap: var(--space-2);
  margin: 0 0 var(--space-3);
}

/* Panel de provincia */
.prov-title{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 4px;
}
.prov-name{
  font-family: var(--font-serif);
  font-size: var(--t-lg);
  font-weight: var(--w-bold);
  letter-spacing: -0.012em;
  color: var(--ink);
}
.prov-count{
  font-size: var(--t-xs);
  color: var(--muted);
  font-weight: var(--w-medium);
}
.prov-bar{
  display: flex;
  height: 7px;
  border-radius: 2px;
  overflow: hidden;
  background: var(--paper-sunk);
  box-shadow: inset 0 0 0 1px var(--line);
  margin: 12px 0 8px;
}
.prov-bar > span{ height: 100%; transition: width .2s; }
.prov-bar-yes{ background: var(--vote-yes); }
.prov-bar-no{ background: var(--vote-no); }
.prov-bar-abst{ background: var(--vote-abst); }
.prov-bar-abs{ background: var(--vote-abs); }

/* Tendencia + familia predominante en una fila */
.prov-tendency-row{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  align-items: center;
  margin-bottom: var(--space-3);
}
.prov-family{
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--t-sm);
  color: var(--ink-2);
  font-weight: var(--w-medium);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-xs);
  background: var(--paper-sunk);
  border: 1px solid var(--line-strong);
  letter-spacing: -0.005em;
}
.prov-tally{
  display: flex;
  gap: var(--space-4);
  font-size: var(--t-sm);
  color: var(--muted);
  margin-bottom: var(--space-4);
}
.prov-tally span strong{ color: var(--ink); font-weight: var(--w-semi); }

.prov-tendency{
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--t-sm);
  font-weight: var(--w-semi);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-xs);
  margin-bottom: var(--space-3);
  letter-spacing: -0.005em;
  border: 1px solid;
}
.prov-tendency.yes{ background: var(--vote-yes-soft); border-color: var(--vote-yes); color: var(--vote-yes); }
.prov-tendency.no{ background: var(--vote-no-soft); border-color: var(--vote-no); color: var(--vote-no); }
.prov-tendency.mixed{ background: var(--vote-abst-soft); border-color: var(--vote-abst); color: var(--vote-abst); }

.member-list{
  display: grid;
  gap: var(--space-2);
  max-height: 340px;
  overflow-y: auto;
  margin: 0 calc(var(--space-2) * -1);
  padding: 0 var(--space-2);
}
.member-row{
  background: var(--paper-sunk);
  border: 1px solid var(--line);
  border-radius: var(--radius-xs);
  padding: var(--space-3) var(--space-3);
  cursor: pointer;
  transition: border-color .12s, background .12s;
}
.member-row:hover{ border-color: var(--line-strong); background: var(--card); }
.member-row.is-selected{
  border-color: var(--line-strong);
  background: var(--card);
  box-shadow: inset 3px 0 0 var(--accent-gold);
}
.mr-top{
  display: flex;
  justify-content: space-between;
  gap: var(--space-2);
  align-items: flex-start;
}
.mr-name{
  font-size: var(--t-base);
  font-weight: var(--w-semi);
  color: var(--ink);
  line-height: 1.3;
  letter-spacing: -0.005em;
}
/* Sello compacto del miembro en la lista: tinte + hairline en el color del
   voto (sello-lite). Coherente con .detail-vote-badge; pres tampoco va relleno. */
.mr-badge{
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  padding: 1px var(--space-2);
  border-radius: var(--radius-xs);
  white-space: nowrap;
  letter-spacing: .02em;
  border: 1px solid transparent;
}
.mr-badge.yes{ background: var(--vote-yes-soft); border-color: var(--vote-yes); color: var(--vote-yes); }
.mr-badge.no{ background: var(--vote-no-soft); border-color: var(--vote-no); color: var(--vote-no); }
.mr-badge.abs{ background: var(--vote-abs-soft); border-color: var(--line-strong); color: var(--ink-2); }
.mr-badge.abst{ background: var(--vote-abst-soft); border-color: var(--vote-abst); color: var(--vote-abst); }
.mr-badge.pres{ background: var(--paper-sunk); border-color: var(--vote-pres); color: var(--vote-pres); }
.mr-block{
  font-size: var(--t-xs);
  color: var(--muted);
  margin-top: var(--space-1);
  line-height: 1.4;
}

/* Tooltip — denso pero legible, con jerarquía clara y rastro dorado sobrio */
.tt{
  position: fixed;
  background: var(--ink);
  color: var(--bg-soft);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-sm);
  font-size: var(--t-sm);
  line-height: 1.5;
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s;
  z-index: 100;
  max-width: 300px;
  box-shadow: 0 12px 32px rgba(0,0,0,.32), 0 0 0 1px rgba(156,122,44,.18);
  border-left: 2px solid var(--accent-gold);
}
.tt strong{
  display: block;
  font-size: var(--t-base);
  margin-bottom: var(--space-2);
  letter-spacing: -0.005em;
  font-weight: var(--w-semi);
}
.tt em{
  color: rgba(255,255,255,.55);
  font-style: normal;
  font-size: var(--t-xs);
  letter-spacing: .02em;
  display: block;
  margin-top: var(--space-2);
}
.tt-row{
  display: flex;
  align-items: center;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-bottom: var(--space-2);
}
.tt-badge{
  display: inline-block;
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  padding: 2px var(--space-2);
  border-radius: var(--radius-xs);
  letter-spacing: .02em;
}
/* Badges del tooltip — variantes claras de la paleta editorial de voto
   sobre fondo ink. Verde hunter, burgundy, ocre y piedra cálida quedan
   levantados ~30% para legibilidad sin perder identidad cromática. */
.tt-badge.yes  { background: rgba(63,110,68,.28);  color: #a4c4a8; }
.tt-badge.no   { background: rgba(163,42,42,.28); color: #e0a8a8; }
.tt-badge.abs  { background: rgba(160,155,140,.25); color: #d6d0c4; }
.tt-badge.abst { background: rgba(168,117,35,.28); color: #e6c585; }
.tt-badge.pres { background: rgba(156,122,44,.25); color: #d3b87f; }
.tt-prov{
  font-size: var(--t-sm);
  color: rgba(255,255,255,.85);
  letter-spacing: -0.005em;
}
.tt-block{
  font-size: var(--t-xs);
  color: rgba(255,255,255,.75);
  margin-top: var(--space-1);
  line-height: 1.5;
}

/* Footer — pie metodológico */
.footer{
  margin-top: var(--space-10);
  padding-top: var(--space-6);
  border-top: 1px solid var(--line);
  font-size: var(--t-sm);
  color: var(--muted);
  line-height: 1.7;
  position: relative;
  letter-spacing: -0.003em;
  max-width: 920px;
}
.footer::before{
  content: '';
  position: absolute;
  top: -1px;
  left: 0;
  width: 40px;
  height: 1.5px;
  background: var(--accent-gold);
}
.footer strong{ color: var(--ink); font-weight: var(--w-semi); }
.footer br{ margin-bottom: var(--space-1); }

/* =====================================================================
   PANELES NUEVOS: validación, tablas, exportaciones
   ===================================================================== */

/* Sub-tabs (Visualización / Tablas / Exportar) — pestañas limpias bajo línea */
.subtabs{
  display: flex;
  gap: var(--space-2);
  border-bottom: 1px solid var(--line);
  margin: var(--space-6) 0 var(--space-5);
  padding: 0;
}
.subtab{
  padding: var(--space-3) var(--space-5);
  font-size: var(--t-base);
  font-weight: var(--w-medium);
  color: var(--muted);
  cursor: pointer;
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  letter-spacing: -0.005em;
  transition: color var(--dur-2) var(--ease-soft), border-color var(--dur-2) var(--ease-soft);
  font-family: inherit;
  position: relative;
}
.subtab:hover{ color: var(--ink-2); }
.subtab.is-on{
  color: var(--ink);
  border-bottom-color: var(--accent-gold);
  font-weight: var(--w-semi);
}
.subpanel{ display: none; }
.subpanel.is-on{ display: block; }

/* Validación — nota académica sobria con cinta lateral coloreada */
.validation{
  border-radius: var(--radius-sm);
  padding: var(--space-4) var(--space-5);
  margin: 0 0 var(--space-5);
  font-size: var(--t-base);
  line-height: 1.6;
  border: 1px solid var(--line);
  border-left-width: 3px;
  background: var(--card);
  color: var(--ink-2);
}
.validation.is-ok{
  border-left-color: #3f6e44;
  background: linear-gradient(to right, var(--vote-yes-soft) 0%, var(--card) 8%);
}
.validation.is-warn{
  border-left-color: var(--vote-abst);
  background: linear-gradient(to right, var(--vote-abst-soft) 0%, var(--card) 8%);
}
.validation.is-crit{
  border-left-color: var(--vote-no);
  background: linear-gradient(to right, var(--vote-no-soft) 0%, var(--card) 8%);
}
.validation h4{
  font-size: var(--t-sm);
  font-weight: var(--w-semi);
  margin: 0 0 var(--space-2);
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--ink);
}
.validation.is-ok h4{ color: #3f6e44; }
.validation.is-warn h4{ color: var(--vote-abst); }
.validation.is-crit h4{ color: var(--vote-no); }
.validation p{ margin: 0 0 var(--space-3); }
.validation p:last-child{ margin-bottom: 0; }
.validation ul{ margin: 0; padding-left: var(--space-5); }
.validation li{ padding: var(--space-1) 0; }
.validation .v-ok-icon{ display: inline-block; margin-right: var(--space-2); }
.validation strong{ font-weight: var(--w-semi); color: var(--ink); }
/* Validación OK → colapsable y secundaria: no compite con la figura. Los
   estados de advertencia/crítico siguen como banners prominentes (sin cambios). */
details.validation.is-ok{ padding: 0; }
details.validation.is-ok > summary{
  list-style: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  letter-spacing: .04em;
  text-transform: uppercase;
  color: #3f6e44;
}
details.validation.is-ok > summary::-webkit-details-marker{ display: none; }
details.validation.is-ok > summary::after{
  content: 'ver detalle';
  margin-left: auto;
  font-size: var(--t-xs);
  font-weight: var(--w-regular);
  text-transform: none;
  letter-spacing: 0;
  color: var(--muted);
}
details.validation.is-ok[open] > summary::after{ content: 'ocultar'; }
.validation-detail{
  padding: 0 var(--space-4) var(--space-3);
  font-size: var(--t-sm);
  line-height: 1.6;
  color: var(--ink-2);
}
.validation code{
  background: rgba(20,24,31,.06);
  padding: 1px var(--space-2);
  border-radius: var(--radius-xs);
  font-size: var(--t-xs);
  font-family: var(--font-mono);
}

/* Tabla territorial dentro del panel de validación */
.terr-wrap{
  margin-top: var(--space-3);
  background: var(--card);
  border-radius: var(--radius-xs);
  padding: var(--space-3) var(--space-4);
}
table.terr-table{ width: 100%; border-collapse: collapse; font-size: var(--t-sm); }
table.terr-table th{
  text-align: left;
  padding: var(--space-2) var(--space-3);
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  text-transform: uppercase;
  letter-spacing: .1em;
  color: inherit;
  opacity: .75;
  border-bottom: 1px solid currentColor;
}
table.terr-table td{
  padding: var(--space-1) var(--space-3);
  border-bottom: 1px solid rgba(0,0,0,.05);
}
table.terr-table tfoot td{
  padding-top: var(--space-2);
  border-bottom: none;
  border-top: 1px solid currentColor;
  font-weight: var(--w-semi);
}
table.terr-table .col-num{ text-align: right; font-variant-numeric: tabular-nums; }
table.terr-table tr.terr-ok td{ color: inherit; opacity: .7; }
table.terr-table tr.terr-fal td{ background: rgba(163,42,42,.10); font-weight: var(--w-semi); }
table.terr-table tr.terr-sob td{ background: rgba(168,117,35,.14); font-weight: var(--w-semi); }
table.terr-table tr.terr-nor td{ background: rgba(20,24,31,.06); font-style: italic; font-weight: var(--w-semi); }
.terr-aliases{ margin-top: var(--space-2); font-size: var(--t-xs); opacity: .85; line-height: 1.5; }
.terr-extra{ margin-top: var(--space-3); padding-top: var(--space-3); border-top: 1px solid currentColor; }


/* Cards con header de export — agrupación analítica */
.exp-card{
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: var(--space-4);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
}
.exp-card-h{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--line);
  background: var(--bg-soft);
}
.exp-card-h h3{
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  margin: 0;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
}
.exp-card-b{ padding: var(--space-5); }

/* Botones de export — secundarios, no compiten con el contenido */
.btn-exp{
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-size: var(--t-sm);
  font-weight: var(--w-medium);
  color: var(--ink-2);
  cursor: pointer;
  font-family: inherit;
  transition: background .12s, color .12s, border-color .12s;
  letter-spacing: -0.005em;
}
.btn-exp:hover{
  background: var(--ink);
  color: var(--bg-soft);
  border-color: var(--ink);
}
.btn-exp-primary{
  background: var(--ink);
  color: var(--bg-soft);
  border-color: var(--ink);
  box-shadow: inset 0 -2px 0 var(--accent-gold);
}
.btn-exp-primary:hover{
  background: var(--ink-2);
  color: var(--bg-soft);
  border-color: var(--ink-2);
}
.btn-exp-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-2);
}
.exp-card-note{
  margin: 0 0 var(--space-4);
  font-size: var(--t-sm);
  color: var(--muted);
  line-height: 1.55;
  max-width: 640px;
}

/* =====================================================================
   FIGURA ACADÉMICA — encabezado, metadatos compactos y pie
   ===================================================================== */
/* Número de figura (catálogo) sobre el título de la lámina principal. */
.fig-num{
  padding: var(--space-4) var(--space-5) 0;
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent-gold-text);
  font-weight: var(--w-bold);
  font-variant-numeric: tabular-nums;
}
/* La figura principal (no el sidebar): título con más presencia, pegado al número. */
#figureHeader .fig-header{ padding-top: var(--space-2); }
#figureHeader .fig-title{ font-size: var(--t-xl); letter-spacing: -0.018em; }

.fig-header{
  padding: var(--space-5) var(--space-5) var(--space-4);
  border-bottom: 1px solid var(--line);
  background: var(--card);
}
.fig-title{
  margin: 0 0 var(--space-2);
  font-family: var(--font-serif);
  font-size: var(--t-lg);
  font-weight: var(--w-bold);
  letter-spacing: -0.015em;
  line-height: 1.25;
  color: var(--ink);
}
.fig-subtitle{
  margin: 0;
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.55;
  letter-spacing: -0.003em;
  max-width: 720px;
}
.fig-meta{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-4);
  margin-top: var(--space-4);
  padding-top: var(--space-3);
  border-top: 1px dashed var(--line);
}
.fig-meta-item{
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.fig-meta-k{
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
}
.fig-meta-v{
  font-size: var(--t-base);
  color: var(--ink);
  font-weight: var(--w-semi);
  font-variant-numeric: tabular-nums;
}
.fig-meta-v.fig-meta-yes{ color: var(--vote-yes); }
.fig-meta-v.fig-meta-no{ color: var(--vote-no); }

.fig-footer{
  padding: var(--space-4) var(--space-5);
  border-top: 1px solid var(--line);
  background: var(--paper-sunk);
  font-size: var(--t-xs);
  color: var(--muted);
  line-height: 1.65;
  display: grid;
  gap: var(--space-2);
}
.fig-foot-line{
  padding-left: 0;
}
.fig-foot-k{
  display: inline-block;
  font-weight: var(--w-semi);
  color: var(--ink-2);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-right: var(--space-2);
  font-size: 10px;
}

/* En el sidebar, los paneles legislador/provincia traen su propia
   versión compacta de header/footer para no saturar el panel. */
.panel .fig-header{
  padding: 0 0 var(--space-3);
  border-bottom: 1px solid var(--line);
  margin-bottom: var(--space-4);
  background: transparent;
}
.panel .fig-header .fig-title{ font-size: var(--t-md); }
.panel .fig-header .fig-subtitle{ font-size: var(--t-xs); }
.panel .fig-footer{
  margin: var(--space-4) calc(var(--space-5) * -1) calc(var(--space-5) * -1);
  border-radius: 0 0 var(--radius-xs) var(--radius-xs);
}

/* Tablas con encabezado y pie de figura */
.tbl-figure{ margin-bottom: var(--space-5); }
.tbl-figure .fig-header{ border-radius: var(--radius-xs) var(--radius-xs) 0 0; }
.tbl-figure .fig-footer{ border-radius: 0 0 var(--radius-xs) var(--radius-xs); }
.tbl-figure > .exp-card{ margin-bottom: 0; border-radius: 0; border-top: 0; border-bottom: 0; box-shadow: none; }

/* =====================================================================
   TABLAS PREMIUM EDITORIALES
   Estructura unificada: cada tabla es una "lámina" autosuficiente con
   título serif, bajada, chips de contexto institucional, acciones (CSV/PNG),
   tabla con tipografía afinada y nota metodológica al pie. Cada tabla
   comparte sistema pero tiene su lógica visual propia.
   ===================================================================== */
/* Card anexa: tablas. Sombra suave; el peso lo lleva la tipografía
   tabular y los headers, no la elevación. Respiración entre cards
   subida a --space-8 (32px) para más aire entre divisiones mayores. */
.tbl-card{
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  box-shadow: none;
  margin-bottom: var(--space-8);
  overflow: hidden;
}

.tbl-card-head{
  display: grid;
  grid-template-columns: 1fr auto;
  gap: var(--space-4);
  align-items: end;
  padding: var(--space-5) var(--space-5) var(--space-4);
  border-bottom: 1px solid var(--line-strong);
  background: var(--paper-sunk);
  position: relative;
}
.tbl-card-head::before{
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 54px;
  height: 2px;
  background: var(--ink);
}
.tbl-card-head::after{
  content: '';
  position: absolute;
  top: 0; left: 58px;
  width: 22px;
  height: 2px;
  background: var(--gold-rule);
}
.tbl-card-headline{ min-width: 0; }
.tbl-card-eyebrow{
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent-gold-text);
  font-weight: var(--w-semi);
  margin: var(--space-2) 0 var(--space-2);
}
.tbl-card-title{
  margin: 0 0 var(--space-2);
  font-family: var(--font-serif);
  font-size: var(--t-xl);
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.tbl-card-bajada{
  margin: 0 0 var(--space-3);
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.55;
  max-width: 640px;
  letter-spacing: -0.005em;
}
.tbl-card-meta{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3) var(--space-4);
  font-size: var(--t-xs);
  letter-spacing: .04em;
  color: var(--muted);
}
.tbl-card-meta span strong{
  color: var(--ink);
  font-weight: var(--w-semi);
  text-transform: uppercase;
  letter-spacing: .1em;
  font-size: 10px;
  display: inline-block;
  margin-right: var(--space-1);
}
.tbl-card-actions{
  display: flex;
  gap: var(--space-2);
  flex-shrink: 0;
  align-self: flex-end;
}

.tbl-card-body{
  padding: var(--space-4) var(--space-5) var(--space-3);
}
.tbl-card-toolbar{
  display: flex;
  gap: var(--space-3);
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: var(--space-3);
}
.tbl-card-foot{
  padding: var(--space-3) var(--space-5) var(--space-4);
  border-top: 1px solid var(--line);
  background: var(--paper-sunk);
  font-size: var(--t-xs);
  color: var(--muted);
  line-height: 1.55;
  letter-spacing: -0.003em;
}
.tbl-card-foot strong{
  color: var(--ink-2);
  font-weight: var(--w-semi);
  text-transform: uppercase;
  letter-spacing: .1em;
  font-size: 10px;
  margin-right: var(--space-1);
}

/* Dtable refinada para uso premium dentro de tbl-card */
.tbl-card .dtable-wrap{
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  max-height: 520px;
}
.tbl-card table.dtable{
  font-size: var(--t-sm);
}
.tbl-card table.dtable th{
  background: var(--paper-sunk);
  font-size: 10.5px;
  letter-spacing: .14em;
  padding: var(--space-3) var(--space-4);
  border-bottom: 2px solid var(--line-strong);
}
.tbl-card table.dtable td{
  padding: var(--space-3) var(--space-4);
  line-height: 1.4;
}
.tbl-card table.dtable tr:nth-child(odd) td{
  background: rgba(248,245,236,.45); /* zebra muy suave sobre cream */
}
.tbl-card table.dtable tr:hover td{
  background: var(--bg-soft);
}

/* Columnas con jerarquía visual */
.col-leg-name{
  font-weight: var(--w-semi);
  color: var(--ink);
  letter-spacing: -0.005em;
}
.col-prov-name{
  font-weight: var(--w-semi);
  color: var(--ink);
  font-family: var(--font-serif);
  font-size: var(--t-base);
  letter-spacing: -0.005em;
}
.col-fam-name{
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-weight: var(--w-semi);
  color: var(--ink);
  letter-spacing: -0.005em;
}
.col-fam-name .family-dot{
  width: 10px; height: 10px; border-radius: 50%; margin: 0;
}
.col-block.col-block-tight{
  max-width: 220px;
  font-size: var(--t-xs);
  color: var(--muted);
  font-style: italic;
}
.col-pct{
  font-variant-numeric: tabular-nums;
  text-align: right;
  font-size: var(--t-sm);
  color: var(--ink-2);
  font-weight: var(--w-semi);
}

/* Mini-bar de composición del voto — visual analítico inline */
.mini-bar{
  display: flex;
  height: 7px;
  width: 110px;
  border-radius: 2px;
  overflow: hidden;
  background: var(--paper-sunk);
  box-shadow: inset 0 0 0 1px var(--line);
  vertical-align: middle;
}
.mini-bar > span{ height: 100%; display: inline-block; }
.mini-bar-seg-yes{  background: var(--vote-yes); }
.mini-bar-seg-no{   background: var(--vote-no); }
.mini-bar-seg-abst{ background: var(--vote-abst); }
.mini-bar-seg-abs{  background: var(--vote-abs); }

/* Sub-línea pequeña dentro de una celda (e.g. bloques en familia) */
.cell-sub{
  display: block;
  font-size: var(--t-xs);
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: -0.003em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 360px;
}

/* =====================================================================
   PRINT — vista limpia para Cmd+P (Etapa B4)
   No intenta replicar el ideal editorial; sólo evita que la impresión salga
   rota. Oculta toolbars/filters/botones, deja contenido principal en color
   normal sobre blanco, evita cortes feos entre secciones.
   ===================================================================== */
@page{ margin: 1.5cm; }
@media print{
  body{ background: #fff; color: #14181f; }
  .toolbar, .scenario-nav, .context-anchor, .subtabs,
  .fig-controls, .viz-figmeta, .meta-summary-toggle,
  .ctx-export, .adv-export, .filter-disclosure, .stats-index, .panel-actions,
  .tbl-card-actions, .stats-section-actions, .stats-division-actions,
  .btn-exp, .btn-exp-grid, .exp-card,
  #tooltip {
    display: none !important;
  }
  /* Estructura del documento impreso: comparado, datos y metodología arrancan en
     página nueva, para una impresión ordenada estilo anexo de tesis. */
  #comparePanel, #tablesPanel, #methodPanel{ break-before: page; page-break-before: always; }
  /* Meta-bar: en impresión se muestra la ficha institucional completa (sesión,
     expediente, orden del día, fuentes), no solo el resumen. La apertura del
     <details> la fuerza beforeprint; acá se asegura que las filas se vean. */
  .meta-bar > .meta-row{ display: flex !important; }
  .meta-bar > .meta-row-grid{ display: grid !important; }
  .meta-bar > .meta-row-sources{ display: grid !important; }
  /* Contenedores con scroll: expandir en impresión para no cortar contenido
     (la tabla nominal de 257 filas, las tablas resumen y la lista de miembros
     de la provincia/bloque seleccionado salían clipeadas por max-height). */
  .dtable-wrap, .tbl-card .dtable-wrap, .member-list{
    max-height: none !important;
    overflow: visible !important;
  }
  /* Filas de tabla: permitir cortes de página limpios en tablas largas. */
  .dtable tr, .dtable thead{ break-inside: avoid; }
  .dtable thead th{ position: static !important; }
  /* Sidebar: en impresión nunca se recorta — sin sticky, sin max-height ni
     overflow, para que no clipee la ficha/resumen activos. */
  .sidebar{ position: static !important; max-height: none !important; overflow: visible !important; }
  /* Sidebar: NO ocultar en bloque. Imprimir paneles con contenido activo
     (detalle de legislador seleccionado, resumen provincial o nacional)
     y omitir solo el panel vacío "Seleccioná una banca…". */
  .panel:has(.detail-empty){ display: none !important; }
  /* Fallback para navegadores sin :has(): si el panel sólo contiene el
     mensaje vacío, queda visible pero discreto. Aceptable como degradación. */
  .panel{
    box-shadow: none !important;
    border: 1px solid var(--line);
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .shell{ max-width: 100%; padding: 0; }
  .masthead, .meta-bar, .viz-card, .ficha-card, .tbl-card, .stats-division,
  .footer, svg.hemicycle, svg.map-svg{
    break-inside: avoid;
    page-break-inside: avoid;
  }
  /* Workspace: si el sidebar queda activo, se imprime debajo del viz-card
     en una columna; si está oculto por :has, el viz-card ocupa todo. */
  .workspace{ grid-template-columns: 1fr; }
  .subpanel{ display: block !important; }
  /* Validación: en impresión el detalle metodológico se muestra completo
     aunque la nota esté colapsada en pantalla. */
  details.validation.is-ok > .validation-detail{ display: block !important; }
  details.validation.is-ok > summary::after{ display: none !important; }
  .stats-section{ break-inside: avoid; page-break-inside: avoid; }
  /* Print-color-adjust: exact en todos los elementos con color significativo
     (votos, familias, badges, barras, heatmaps, seats, dots). Asegura que la
     paleta editorial no se imprima en escala de grises. */
  .heatmap-cell, .vote-badge, .vote-pill, .family-dot,
  .h-bar-fill, .fam-bar > span, .mini-bar > span,
  .prov-bar > span, .prov-bar-yes, .prov-bar-no,
  .prov-bar-abst, .prov-bar-abs,
  .seat, .seat-halo, .heat-scale-bar, .heat-key-sw,
  .detail-vote-badge, .legend-sw, .legend-chip{
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}

/* =====================================================================
   ESTADÍSTICAS / INDICADORES POLITOLÓGICOS · estética editorial impresa
   Dos divisiones: A · escenario activo · B · comparador entre escenarios.
   El layout privilegia reglas horizontales finas, tipografía serif para
   KPIs y small-caps para labels. Reduce el peso visual de las "cards" a
   favor de la lectura tipográfica tipo informe académico.
   ===================================================================== */
.stats-panel{ display: grid; gap: 0; }

/* "División" — agrupa varias secciones (A o B). Card grande con padding fluido */
/* Bloque principal estadístico: mantiene --shadow-md como pieza de
   peso. Respiración vertical sube a --space-8 (32px) para separar
   las dos divisiones (A escenario · B comparador) con más aire. */
/* División analítica (Atlas): lámina/capítulo plano — sin sombra, borde firme,
   radio chico. La cabecera es una banda hundida con filete de archivo
   (tinta + oro), igual que el masthead. Elevación por montaje, no por sombra. */
.stats-division{
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  box-shadow: none;
  margin-bottom: var(--space-8);
  overflow: hidden;
}
.stats-division-head{
  padding: var(--space-5) var(--space-6) var(--space-4);
  border-bottom: 1px solid var(--line-strong);
  background: var(--paper-sunk);
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: var(--space-4);
  align-items: end;
}
.stats-division-head::before{
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 54px;
  height: 2px;
  background: var(--ink);
}
.stats-division-head::after{
  content: '';
  position: absolute;
  top: 0; left: 58px;
  width: 22px;
  height: 2px;
  background: var(--gold-rule);
}
.stats-division-eyebrow{
  margin: var(--space-2) 0 var(--space-2);
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent-gold-text);
  font-weight: var(--w-semi);
  font-feature-settings: "smcp", "kern";
}
.stats-division-title{
  margin: 0 0 var(--space-2);
  font-family: var(--font-serif);
  font-size: var(--t-xl);
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.stats-division-bajada{
  margin: 0;
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.55;
  max-width: 680px;
}
.stats-division-actions{
  display: flex;
  gap: var(--space-2);
  flex-shrink: 0;
  align-self: end;
}
.stats-division-body{ padding: 0; }

/* Sección dentro de una división — paper layout con regla fina arriba */
.stats-section{
  padding: var(--space-5) var(--space-6) var(--space-5);
  border-top: 1px solid var(--line);
}
.stats-section:first-child{ border-top: none; }
.stats-section-head{
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}
.stats-section-actions{
  margin-left: auto;
  display: flex;
  gap: var(--space-2);
  align-items: center;
  flex-shrink: 0;
}
.stats-section-actions .btn-exp{
  font-size: 10px;
  padding: 4px var(--space-2);
  letter-spacing: .04em;
}
.stats-section-marker{
  font-size: 11px;
  font-weight: var(--w-bold);
  color: var(--accent-gold-text);
  letter-spacing: .12em;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  padding-top: 2px;
}
.stats-section-title{
  margin: 0;
  font-family: var(--font-serif);
  font-size: var(--t-md);
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.015em;
  line-height: 1.25;
}
.stats-section-bajada{
  margin: 0 0 var(--space-4) 0;
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.55;
  max-width: 720px;
  font-style: italic;
}
/* Sección secundaria (5.1): indicador sin datos / no calculable. Peso visual
   reducido — etiqueta chica en vez de título de sección, para no competir con
   las secciones analíticas reales. */
.stats-section-aside{ padding-top: var(--space-4); padding-bottom: var(--space-4); }
.stats-aside-label{
  margin: 0 0 var(--space-2);
  font-size: var(--t-xs);
  color: var(--muted);
  font-weight: var(--w-semi);
  letter-spacing: .015em;
}
.stats-aside-marker{
  color: var(--accent-gold-text);
  font-weight: var(--w-bold);
  letter-spacing: .12em;
  margin-right: var(--space-2);
  font-variant-numeric: tabular-nums;
}

/* KPI hero — tres valores grandes para el resultado agregado.
   Layout tipo cuadro de página principal de revista. */
.kpi-hero{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  margin-bottom: var(--space-5);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.kpi-hero-cell{
  padding: var(--space-4) var(--space-5);
  border-right: 1px solid var(--line);
}
.kpi-hero-cell:last-child{ border-right: none; }
.kpi-hero-label{
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
  margin-bottom: var(--space-2);
}
.kpi-hero-value{
  font-family: var(--font-serif);
  font-size: 38px;
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.03em;
  line-height: 1;
  margin: 0 0 var(--space-2);
  font-variant-numeric: tabular-nums;
}
.kpi-hero-value.is-yes{ color: var(--vote-yes); }
.kpi-hero-value.is-no{  color: var(--vote-no); }
.kpi-hero-sub{
  font-size: var(--t-xs);
  color: var(--muted);
  letter-spacing: -0.003em;
  line-height: 1.5;
}

/* Grilla de datos secundarios — sin cards, sólo tipografía y reglas */
.data-grid{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0;
  border-top: 1px solid var(--line);
}
.data-grid-cell{
  padding: var(--space-3) var(--space-4);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.data-grid-cell:last-child{ border-right: none; }
.data-grid-label{
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
  margin-bottom: 4px;
}
.data-grid-value{
  font-size: var(--t-lg);
  font-weight: var(--w-bold);
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.015em;
  line-height: 1.15;
}
.data-grid-value.is-yes{ color: var(--vote-yes); }
.data-grid-value.is-no{  color: var(--vote-no); }
.data-grid-value.is-warn{ color: var(--vote-abst); }
.data-grid-sub{
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: -0.003em;
}

/* Columnas analíticas con regla vertical fina entre ambas */
.two-col-rule{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.two-col-rule > div{
  padding: 0 var(--space-5);
}
.two-col-rule > div:first-child{
  padding-left: 0;
  border-right: 1px solid var(--line);
  padding-right: var(--space-5);
}
.two-col-rule > div:last-child{ padding-right: 0; }
.two-col-rule-eyebrow{
  margin: 0 0 var(--space-3);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
}

/* H-bar refinada — track más delgado, tipografía editorial */
.h-bar-list{ display: grid; gap: var(--space-3); }
.h-bar{
  display: grid;
  grid-template-columns: minmax(140px, 1fr) minmax(120px, 220px) 56px;
  gap: var(--space-3);
  align-items: center;
  font-size: var(--t-sm);
  letter-spacing: -0.005em;
}
.h-bar-label{
  color: var(--ink);
  font-weight: var(--w-semi);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.h-bar-label .family-dot{ width: 8px; height: 8px; border-radius: 50%; margin: 0; flex-shrink: 0; }
.h-bar-label .h-bar-n{ color: var(--muted); font-weight: var(--w-regular); font-size: var(--t-xs); margin-left: 4px; }
.h-bar-track{
  height: 4px;
  background: var(--paper-sunk);
  box-shadow: inset 0 0 0 1px var(--line);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.h-bar-fill{
  height: 100%;
  background: var(--ink-2);
  border-radius: 2px;
  transition: width .25s ease;
}
.h-bar-fill.is-yes{  background: var(--vote-yes); }
.h-bar-fill.is-no{   background: var(--vote-no); }
.h-bar-fill.is-warn{ background: var(--vote-abst); }
.h-bar-fill.is-abs{  background: var(--vote-abs); }
.h-bar-value{
  font-variant-numeric: tabular-nums;
  font-family: var(--font-serif);
  font-weight: var(--w-bold);
  color: var(--ink);
  text-align: right;
  font-size: var(--t-md);
  letter-spacing: -0.015em;
}

/* Ranking — pares clave/valor editoriales sin cards, sólo tipografía */
.ranking-list{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.ranking-item{
  padding: var(--space-3) var(--space-4);
  border-right: 1px solid var(--line);
}
.ranking-item:last-child{ border-right: none; }
.ranking-label{
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent-gold-text);
  font-weight: var(--w-semi);
  margin-bottom: var(--space-2);
}
.ranking-winner{
  font-family: var(--font-serif);
  font-size: var(--t-md);
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.015em;
  line-height: 1.2;
  margin-bottom: 2px;
}
.ranking-value{
  font-size: var(--t-sm);
  color: var(--ink-2);
  font-variant-numeric: tabular-nums;
  font-weight: var(--w-medium);
  letter-spacing: -0.005em;
}

/* Heatmap con gradiente cromático real */
.heatmap{
  display: grid;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  overflow: hidden;
  font-size: var(--t-sm);
  background: var(--card);
}
.heatmap-row{ display: grid; }
.heatmap-row.is-head{
  background: var(--paper-sunk);
  border-bottom: 2px solid var(--line-strong);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
}
.heatmap-row:not(.is-head):not(:last-child){ border-bottom: 1px solid var(--line); }
.heatmap-cell{
  padding: var(--space-2) var(--space-3);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  border-right: 1px solid var(--line);
  min-height: 44px;
  position: relative;
}
