    cursorY += headerH;

    // Filas
    rowsToRender.forEach((row, ri) => {
      if(ri % 2 === 0) elements.push(addRect(PAD_X, cursorY, availW, rowH, '#fbf9f1'));
      cols.forEach((c, i) => {
        const align = c.align || 'left';
        const tx = align === 'right' ? colXs[i] + colWs[i] - 10 : colXs[i] + 12;
        const raw = String(row[c.key] != null ? row[c.key] : '—');
        const maxChars = Math.floor((colWs[i] - 24) / 5.8);
        const txt = raw.length > maxChars ? raw.slice(0, maxChars - 1) + '…' : raw;
        let fill = '#14181f';
        // tint cromática para valores Rice/Rae con "No calculable"
        if(/^No calc/i.test(raw)) fill = '#9a9588';
        elements.push(addText(tx, cursorY + 19, txt, {
          size: align === 'right' ? '12' : '11.5',
          weight: align === 'right' ? '700' : '500',
          fill,
          anchor: align === 'right' ? 'end' : undefined,
          font: align === 'right' ? TBL_PNG_FONTS.serifTitle : TBL_PNG_FONTS.sans,
          style: /^No calc/i.test(raw) ? 'italic' : undefined
        }));
      });
      if(ri < rowsToRender.length - 1){
        const sep = document.createElementNS(NS, 'line');
        sep.setAttribute('x1', PAD_X); sep.setAttribute('y1', cursorY + rowH);
        sep.setAttribute('x2', PAD_X + availW); sep.setAttribute('y2', cursorY + rowH);
        sep.setAttribute('stroke', '#ece6d5'); sep.setAttribute('stroke-width', '0.6');
        elements.push(sep);
      }
      cursorY += rowH;

        { size:'10', fill:'#9a9588', style:'italic' }));
      cursorY += 16;

  else if(spec.layout === 'two-pane-bars-rice'){

                    : spec.raeValue > 0.55 ? VOTE_HEX.warn

      { size:'11', fill:'#6a6a64' }));
    cursorY += heroH + 20;

    const paneW = (availW - 24) / 2;

    const drawRicePane = (title, items, isBlock, x) => {

        { size:'10', weight:'700', fill:'#9c7a2c', tracking:'1.6' }));

      if(!items.length){
        elements.push(addText(x, y, 'Sin grupos con afi/neg suficientes para calcular Rice.',

      } else {
        items.forEach(it => {

          elements.push(addText(x + 14, y + 12, isBlock ? it.block : it.family,
            { size:'11', weight:'600', fill:'#14181f', maxChars: Math.floor((paneW - 110) / 5.8) }));
          elements.push(addText(x + 14, y + 26, `n=${it.total}`,
            { size:'9.5', fill:'#9a9588' }));
          const barX = x + paneW - 100;
          const barW = 70;
          elements.push(addRect(barX, y + 16, barW, 5, '#ece6d5'));
          elements.push(addRect(barX, y + 16, barW * Math.min(1, it.rice), 5, VOTE_HEX.yes));

            { font: TBL_PNG_FONTS.serifTitle, size:'14', weight:'700', anchor:'end', tracking:'-0.3' }));
          y += 36;

  else if(spec.layout === 'rae-bars'){

    elements.push(addText(PAD_X + 14, cursorY + 30, isProvince ? 'PROVINCIA' : 'FAMILIA POLÍTICA',
      { size:'10', weight:'700', fill:'#6a6a64', tracking:'1.4' }));
    spec.scenarios.forEach((sc, i) => {
      const x = PAD_X + labelColW + i * scenColW;
      elements.push(addText(x + scenColW/2, cursorY + 20, sc.caseName.split(' ')[0] + ' · ' + sc.chamberShort,

      elements.push(addText(x + scenColW/2, cursorY + 36, sc.date,

          const intensity = dom === 'AFIRMATIVO' ? cell.pctYes : (dom === 'NEGATIVO' ? cell.pctNo : 50);
          const bg = heatBg(baseHex, intensity);
          elements.push(addRect(x, cursorY, scenColW, rowH, bg));

          elements.push(addText(x + scenColW/2, cursorY + 20, fmt(cell.pctYes) + '%',

      });
      // Tag de patrón (provincias)
      if(isProvince){
        const tagX = PAD_X + availW - tagColW + 10;
        const tagW = tagColW - 20;
        const tagY = cursorY + rowH/2 - 11;
        const tagBg = wr.patternTone === 'yes'  ? '#e0eadc'
                    : wr.patternTone === 'no'   ? '#f4dada'
                    : wr.patternTone === 'warn' ? '#f3e8c9' : '#ede9dd';
        const tagFg = wr.patternTone === 'yes'  ? VOTE_HEX.yes
                    : wr.patternTone === 'no'   ? VOTE_HEX.no
                    : wr.patternTone === 'warn' ? VOTE_HEX.warn : '#2c3543';
        const rect = addRect(tagX, tagY, tagW, 22, tagBg);
        rect.setAttribute('rx', '4');
        elements.push(rect);
        elements.push(addText(tagX + tagW/2, tagY + 15, wr.patternTag,
          { size:'10', weight:'700', fill: tagFg, anchor:'middle', tracking:'.06em' }));
      }
      cursorY += rowH;
    });
    cursorY += 8;
  }

  // -----------------------------------------------------------------
  // Footer y cierre del SVG
  // -----------------------------------------------------------------
  const footerStartY = cursorY + 12;
  const footerOut = buildTablePngFooter(NS, s, footerStartY, totalW, PAD_X, spec.note,
    { generalSource: spec.noScenarioInName ? PNG_COMPARISON_SOURCE : null });
  const totalH = footerOut.footerBottomY + 12;

  const bg = addRect(0, 0, totalW, totalH, '#fffdf8');
  wrapper.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  wrapper.setAttribute('width', totalW); wrapper.setAttribute('height', totalH);
  wrapper.appendChild(bg);
  headerOut.elements.forEach(el => wrapper.appendChild(el));
  elements.forEach(el => wrapper.appendChild(el));
  footerOut.elements.forEach(el => wrapper.appendChild(el));

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(wrapper);
  const filename = spec.noScenarioInName
    ? (spec.filenameOverride || spec.slug) + '.png'
    : slugifyFilename([s.id, spec.slug]) + '.png';
  rasterizeSvgToPng(svgStr, totalW, totalH, filename);
}

// =====================================================================
// EXPORT — Estadísticas (CSV + PNG, escenario activo y comparador)
// =====================================================================
function exportStatsCsv(){
  const s = activeScenario();
  if(!s) return;
  const ctx = csvScenarioContext(s);
  const ind = computeScenarioIndicators(s);
  const turn = computeTurnoutIndicators(s);
  const famCoh = computeFamilyCohesion(s);
  const blkCoh = computeBlockCohesion(s);
  const provInd = computeProvinceIndicators(s);

  const fmt = (n) => Number.isFinite(n) ? n.toFixed(1) : '0.0';
  const rows = [];
  const push = (sec, k, v, sub) => rows.push({ section: sec, indicator: k, value: v, detail: sub || '' });

  // A.1
  push('Resultado agregado', 'Bancas',            ind.totalSeats, 'cuerpo completo');
  push('Resultado agregado', 'Quórum',            ind.quorum, 'mitad + 1');
  push('Resultado agregado', 'Presentes',         ind.present, fmt(ind.presenceRate) + '% del cuerpo');
  push('Resultado agregado', 'Afirmativos',       ind.AFIRMATIVO, fmt(ind.pctYesPresent) + '% de presentes');
  push('Resultado agregado', 'Negativos',         ind.NEGATIVO, fmt(ind.pctNoPresent) + '% de presentes');
  push('Resultado agregado', 'Abstenciones',      ind.ABSTENCION, fmt(ind.pctAbstPresent) + '% de presentes');
  push('Resultado agregado', 'Ausentes',          ind.AUSENTE, fmt(ind.absenceRate) + '% del cuerpo');
  push('Resultado agregado', 'Presidencia',       ind.PRESIDENCIA, 'categoría institucional');
  push('Resultado agregado', 'Margen',            ind.margin, 'afirmativos − negativos');
  push('Resultado agregado', '% Apoyo sobre cuerpo', fmt(ind.pctYesOfTotal), 'afirmativos / bancas (%)');
  push('Resultado agregado', 'Resultado',         ind.result || 'No consignado', 'acta oficial');
  // A.2
  push('Participación', 'Tasa de presencia',  fmt(ind.presenceRate),  '% (presentes / bancas)');
  push('Participación', 'Tasa de ausencia',   fmt(ind.absenceRate),   '% (ausentes / bancas)');
  turn.topAbsenceProvinces.forEach(p => push('Ausentismo · provincias', p.province, fmt(p.pctAbsent), '% sobre ' + p.total));
  turn.topAbsenceFamilies.forEach(f => push('Ausentismo · familias', f.family, fmt(f.pctAbsent), '% sobre ' + f.total));
  // A.3 cohesión familia
  famCoh.rows.forEach(f => push('Cohesión · familia política', f.family + ' (' + f.total + ')',
    fmt(f.cohesion), 'voto dominante: ' + (VOTE_LABELS_CSV[f.dominantVote] || '—')));
  push('Cohesión · familia política', 'Familias unificadas', famCoh.unifiedCount, '≥' + Math.round(COHESION_UNIFIED_THRESHOLD*100) + '%');
  push('Cohesión · familia política', 'Familias divididas',  famCoh.dividedCount, '<' + Math.round(COHESION_DIVIDED_THRESHOLD*100) + '%');
  // A.4 cohesión bloque (top 15)
  blkCoh.rows.slice(0, 15).forEach(b => push('Cohesión · bloque político', b.block + ' (' + b.total + ')',
    fmt(b.cohesion), 'voto dominante: ' + (VOTE_LABELS_CSV[b.dominantVote] || '—')));
  // A.5 territorial
  push('Territorialización', 'Provincias afirmativas (100%)', provInd.unanimousYes.length, provInd.unanimousYes.map(p => p.province).join('; '));
  push('Territorialización', 'Provincias negativas (100%)',   provInd.unanimousNo.length,  provInd.unanimousNo.map(p => p.province).join('; '));
  push('Territorialización', 'Provincias divididas',          provInd.divided.length,      provInd.divided.map(p => p.province).join('; '));
  // A.6 Rice y Rae (cohesión dicotómica y fragmentación)
  const rae = computeScenarioRae(s);
  push('Rice y Rae', 'Rae del escenario', rae.computable ? rae.value.toFixed(3) : 'No calculable',
    rae.computable ? `${rae.denom} votos emitidos (afi+neg+abst)` : 'sin votos emitidos');
  computeFamilyRice(s).forEach(f => push('Rice por familia', f.family + ' (' + f.total + ')',
    f.riceComputable ? (f.rice * 100).toFixed(1) + '%' : 'No calculable',
    f.riceComputable ? `denominador afi+neg = ${f.denom}` : 'sin afirmativos ni negativos'));
  computeBlockRice(s).slice(0, 15).forEach(b => push('Rice por bloque', b.block + ' (' + b.total + ')',
    b.riceComputable ? (b.rice * 100).toFixed(1) + '%' : 'No calculable',
    b.riceComputable ? `denominador afi+neg = ${b.denom}` : 'sin afirmativos ni negativos'));

  // Header con contexto
  const rowsWithCtx = rows.map(r => ({
    case: ctx.case, chamber: ctx.chamber, date: ctx.date, law: ctx.law, ...r
  }));
  const cols = [
    { key: 'case',       label: 'Caso' },
    { key: 'chamber',    label: 'Cámara' },
    { key: 'date',       label: 'Fecha' },
    { key: 'law',        label: 'Ley' },
    { key: 'section',    label: 'Sección' },
    { key: 'indicator',  label: 'Indicador' },
    { key: 'value',      label: 'Valor' },
    { key: 'detail',     label: 'Detalle' }
  ];
  exportCsv(rowsWithCtx, cols, slugifyFilename([s.id, 'indicadores_estadisticos']) + '.csv');
}

    'Porcentajes sobre presentes salvo indicación contraria. Tasa de ausencia sobre el total de bancas. Cohesión = voto dominante / presentes. No se calcula alineamiento oficialismo/oposición.');
  const totalH = footerOut.footerBottomY + 12;

  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('x', 0); bg.setAttribute('y', 0);
  bg.setAttribute('width', totalW); bg.setAttribute('height', totalH);

// =====================================================================
// CRITERIO DE FILTROS POR TIPO DE EXPORT (v1.0.1)
// =====================================================================
// - Tabla nominal de legisladores → respeta filtros (voto, provincia,
//   búsqueda global, búsqueda interna de tabla). Una única fuente de
//   verdad: getFilteredLegislators(scenario). Usada por:
//     · render visible (#legislatorsTable)
//     · exportLegislatorsCsv
//     · exportTableAsPng(s, 'legislators')
//
// - Tabla por provincia / por familia / resumen institucional → NO
//   respetan filtros. Siempre escenario completo. Sus exportaciones
//   usan computeProvinceSummary / computeFamilySummary / computeVoteSummary
//   sobre scenario.legislators (no la lista filtrada).
//
//   Razón: las agregaciones territoriales y partidarias son lecturas del
//   universo completo del escenario; si el usuario quiere mirar una sola
//   provincia, el panel provincial del sidebar lo cubre.
//
// =====================================================================
// EVENT DELEGATION (fix v1.0.1)
// =====================================================================
// renderTables() reescribe innerHTML del #tablesPanel cuando se aplica un
// filtro de voto, búsqueda interna, provincia o sort. Los botones CSV/PNG
// dentro de cada .tbl-card-actions son nodos nuevos sin handler. Antes se
// bindeaban con btn.onclick = ... (una vez al init), por lo que se
// rompían después del primer filtro. Ahora se usa delegation: un único
// listener en document captura cualquier [data-export], presente o futuro.

function bindExportEvents(){
  if(window.__exportDelegationBound) return;
  window.__exportDelegationBound = true;

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-export]');
    if(!btn) return;
    handleExportClick(btn.dataset.export);
  });
  // Selector de métrica del heatmap familias × escenarios (sub-tab Estadísticas).
  // Toggle delegado: cambia state.famHeatMetric y re-renderiza solo el panel.
  document.addEventListener('click', (e) => {
    const m = e.target.closest('[data-fam-metric]');
    if(!m) return;
    state.famHeatMetric = m.dataset.famMetric;
    renderStatsTab();
  });
  // Controles de las visualizaciones comparadas (B.7–B.9): par, color y vista de
  // la grilla. Cambian el state y re-renderizan el panel (que re-monta los SVG).
  document.addEventListener('click', (e) => {
    const p = e.target.closest('[data-compare-pair]');
    if(p){ state.comparePair = p.dataset.comparePair.split(','); renderStatsTab(); return; }
    const cm = e.target.closest('[data-compare-colormode]');
    if(cm){ state.compareColorMode = cm.dataset.compareColormode; renderStatsTab(); return; }
    const qv = e.target.closest('[data-quad-view]');
    if(qv){ state.quadView = qv.dataset.quadView; renderStatsTab(); return; }
    const tf = e.target.closest('[data-traj-filter]');
    if(tf){ state.trajFilter = tf.dataset.trajFilter; renderStatsTab(); return; }
  });
}

function handleExportClick(kind){
  try {
    // Imprimir / PDF: reutiliza el diálogo de impresión del navegador (que ya
    // expande ficha y validación vía beforeprint y conserva el contexto).
    if(kind === 'print'){ window.print(); return; }
    const s = activeScenario();
    if(!s){ console.error('handleExportClick: no hay escenario activo'); return; }
    const mode = state.colorMode;
    const modeES = mode === 'vote' ? 'voto' : (mode === 'family' ? 'familia' : mode);

    const exportHemicycle = (withContext) => {
      const svgEl = document.querySelector('svg.hemicycle');
      if(!svgEl){ console.error('handleExportClick: SVG hemiciclo no encontrado'); return; }
      const ctx = withContext ? buildFigureContext(s, 'hemicycle') : null;
      const parts = withContext
        ? [s.id, 'hemiciclo', 'contexto', modeES]
        : [s.id, 'hemiciclo', modeES];
      exportSvgAsPng(svgEl, slugifyFilename(parts) + '.png', ctx);
    };
    const exportMap = (withContext) => {
      const svgEl = document.querySelector('svg.map-svg');
      if(!svgEl){ console.error('handleExportClick: SVG mapa no encontrado'); return; }
      const ctx = withContext ? buildFigureContext(s, 'map') : null;
      const parts = withContext
        ? [s.id, 'mapa', 'contexto', modeES]
        : [s.id, 'mapa', modeES];
      exportSvgAsPng(svgEl, slugifyFilename(parts) + '.png', ctx);
    };

    if(kind === 'hemicycle-png' || kind === 'hemicycle-png-ctx'){
      const ctx = kind === 'hemicycle-png-ctx';
      if(state.view !== 'hemicycle'){
        state.view = 'hemicycle';
        renderVizCard();
        afterRender(() => exportHemicycle(ctx));
      } else {
        exportHemicycle(ctx);
      }
    } else if(kind === 'map-png' || kind === 'map-png-ctx'){
      const ctx = kind === 'map-png-ctx';
      if(state.view !== 'map'){
        state.view = 'map';
        renderVizCard();
        afterRender(() => exportMap(ctx));
      } else {
        exportMap(ctx);
      }
    } else if(kind === 'legislators-csv') exportLegislatorsCsv();
    else if(kind === 'provinces-csv') exportProvincesCsv();
    else if(kind === 'families-csv') exportFamiliesCsv();
    else if(kind === 'summary-csv') exportSummaryCsv();
    else if(kind === 'summary-all-csv') exportSummaryAllCsv();
    // PNG de tablas (Etapa 4) — la nominal respeta filtros; las demás son escenario completo
    else if(kind === 'legislators-png') exportTableAsPng(s, 'legislators');
    else if(kind === 'provinces-png')   exportTableAsPng(s, 'provinces');
    else if(kind === 'families-png')    exportTableAsPng(s, 'families');
    else if(kind === 'summary-png')     exportTableAsPng(s, 'summary');
    // Fichas del sidebar — legislador seleccionado y resumen provincial/nacional
    else if(kind === 'legislator-csv')  exportLegislatorCsv();
    else if(kind === 'legislator-png')  exportLegislatorPng();
    else if(kind === 'provsum-csv')     exportProvSummaryCsv();
    else if(kind === 'provsum-png')     exportProvSummaryPng();
    // Estadísticas (Etapa Indicadores) — escenario completo + comparador
    else if(kind === 'stats-csv')       exportStatsCsv();
    else if(kind === 'stats-png')       exportStatsPng();
    else if(kind === 'comparator-csv')  exportComparatorCsv();
    else if(kind === 'comparator-png')  exportComparatorPng();
    // Exports granulares por bloque tabular dentro de Estadísticas (Etapa B3
    // — parseo robusto con regex en vez de slice contando caracteres, soporta
    // kinds con guiones internos como 'stats-comp-table-csv' sin trampearse).
    else if(/^stats-.+-csv$/.test(kind)){
      const sub = kind.replace(/^stats-/, '').replace(/-csv$/, '');
      exportStatsSectionCsv(sub);
    }
    else if(/^stats-.+-png$/.test(kind)){
      const sub = kind.replace(/^stats-/, '').replace(/-png$/, '');
      exportStatsSectionPng(sub);
    }
    else {
      console.error('handleExportClick: kind desconocido →', kind);
    }
  } catch(err) {
    console.error('Error al exportar (' + kind + '):', err);
    alert('No se pudo exportar. Revisá la consola del navegador para más detalle.');
  }
}

function bindToolbarEvents(){
  document.querySelectorAll('[data-view]').forEach(b => {
    b.onclick = () => { state.view = b.dataset.view; renderVizCard(); };
  });
  document.querySelectorAll('[data-color]').forEach(b => {
    b.onclick = () => setColorMode(b.dataset.color);
  });
  document.querySelectorAll('[data-vote]').forEach(b => {
    b.onclick = () => {
      state.voteFilter = b.dataset.vote;
      document.querySelectorAll('[data-vote]').forEach(x => x.setAttribute('aria-pressed', x === b ? 'true' : 'false'));
      applyFilters();
      renderTables();
    };
  });
  const search = document.getElementById('searchInput');
  if(search){
    // El atenuado de bancas (applyFilters) y el contador aria-live van en vivo
    // por cada tecla — son baratos (toggles de clase) y dan feedback inmediato.
    // El re-render de tablas (reescritura de #tablesPanel) es lo costoso, así
    // que se agrupa con debounce para evitar thrashing al tipear.
    const debouncedTables = debounce(renderTables, 180);
    search.oninput = (e) => {
      state.search = e.target.value;
      applyFilters();
      debouncedTables();
    };
  }
  const sel = document.getElementById('provinceSelect');
  if(sel){
    sel.onchange = (e) => {
      state.provinceFilter = e.target.value;
      renderStage();
      renderSidebar();
      renderTables();
      updateSeatCounter(); // cubre la vista mapa, donde renderStage no llama applyFilters
    };
  }
  const clear = document.getElementById('clearBtn');
  if(clear){ clear.onclick = () => resetFilters(); }
}

// Predicado único de filtrado de un legislador. Lo comparten applyFilters
// (atenuado de bancas en el hemiciclo) y updateSeatCounter (conteo de la
// región aria-live), para no duplicar la lógica. `q` es la búsqueda ya
// normalizada (trim + lowercase).
function legMatchesFilters(leg, q){
  const okVote = state.voteFilter === 'TODOS' || leg.vote === state.voteFilter;
  const okProv = !state.provinceFilter || leg.province === state.provinceFilter;
  const okSearch = !q || (leg.name + ' ' + leg.block + ' ' + leg.province + ' ' + leg.family).toLowerCase().includes(q);
  return okVote && okProv && okSearch;
}

function applyFilters(svgArg){
  const s = activeScenario();
  if(s.status !== 'loaded') return;
  const sorted = s._sortedLegislators;
  const q = state.search.trim().toLowerCase();
  // El contador se actualiza siempre, incluso en vista mapa (donde no hay
  // bancas SVG que atenuar) — por eso va antes del early-return por !svg.
  updateSeatCounter();
  const svg = svgArg || document.querySelector('svg.hemicycle');
  if(!svg) return;
  svg.querySelectorAll('.seat').forEach(node => {
    const idx = +node.getAttribute('data-idx');
    const leg = sorted[idx];
    node.classList.toggle('is-dim', !legMatchesFilters(leg, q));
  });
  // Reconciliar el roving tabindex: si la banca tabbable quedó atenuada por
  // los filtros, pasar el tab-stop a la primera banca visible. No se roba el
  // foco (solo se mueve el atributo) para no sorprender al usuario.
  const tabbable = svg.querySelector('.seat[tabindex="0"]');
  if(tabbable && tabbable.classList.contains('is-dim')){
    const firstVisible = svg.querySelector('.seat:not(.is-dim)');
    if(firstVisible){
      tabbable.setAttribute('tabindex', '-1');
      firstVisible.setAttribute('tabindex', '0');
    }
  }
}

// ---------------------------------------------------------------------
// NAVEGACIÓN DEL HEMICICLO POR TECLADO (roving tabindex)
// ---------------------------------------------------------------------
// Las bancas son <circle class="seat"> en orden DOM = orden del hemiciclo
// (ya ordenado por ángulo y fila en assignSeats). Patrón roving tabindex:
// una sola banca es tabbable (tabindex 0); las flechas mueven el foco entre
// bancas NO atenuadas por filtros; Enter/Espacio seleccionan; Home/End van a
// los extremos. Sin librerías, todo delegado en el <svg>.
function getSeatNodes(svg){
  return Array.from(svg.querySelectorAll('.seat'));
}
function navigableSeats(svg){
  return getSeatNodes(svg).filter(n => !n.classList.contains('is-dim'));
}
function focusSeat(svg, node){
  if(!node) return;
  getSeatNodes(svg).forEach(n => n.setAttribute('tabindex', n === node ? '0' : '-1'));
  node.focus();
}
// Tooltip al enfocar por teclado: paridad con el hover del mouse. Posiciona
// el tooltip sobre la banca usando su bounding box (showTooltip sólo lee
// clientX/clientY, así que un objeto sintético alcanza).
function showSeatTooltipForNode(svg, node){
  const s = activeScenario();
  const leg = s._sortedLegislators[+node.getAttribute('data-idx')];
  if(!leg) return;
  const r = node.getBoundingClientRect();
  showTooltip({ clientX: r.left + r.width / 2, clientY: r.top }, buildSeatTooltip(leg, s));
}
function initSeatNavigation(svg){
  const nodes = getSeatNodes(svg);
  if(!nodes.length) return;
  // Banca tabbable inicial: la seleccionada si está visible, si no la primera
  // banca visible (o la primera de todas si los filtros no dejan ninguna).
  const visible = navigableSeats(svg);
  let initial = null;
  if(state.selectedIndex !== null){
    const sel = nodes.find(n => +n.getAttribute('data-idx') === state.selectedIndex);
    if(sel && !sel.classList.contains('is-dim')) initial = sel;
  }
  if(!initial) initial = visible[0] || nodes[0];
  nodes.forEach(n => n.setAttribute('tabindex', n === initial ? '0' : '-1'));

  svg.addEventListener('keydown', (e) => {
    const t = e.target;
    if(!t.classList || !t.classList.contains('seat')) return;
    const idx = +t.getAttribute('data-idx');

    if(e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar'){
      e.preventDefault();
      selectLegislator(idx);
      // selectLegislator re-aplica filtros (y puede re-atenuar); devolver el
      // foco a la misma banca para no perder la posición de teclado.
      const again = getSeatNodes(svg).find(n => +n.getAttribute('data-idx') === idx);
      if(again) focusSeat(svg, again);
      return;
    }

    const fwd = e.key === 'ArrowRight' || e.key === 'ArrowDown';
    const back = e.key === 'ArrowLeft' || e.key === 'ArrowUp';
    const home = e.key === 'Home';
    const end = e.key === 'End';
    if(!fwd && !back && !home && !end) return;
    e.preventDefault();

    const list = navigableSeats(svg);
    if(!list.length) return;
    const pos = list.indexOf(t);
    let next;
    if(home) next = list[0];
    else if(end) next = list[list.length - 1];
    else if(pos === -1) next = list[0]; // banca actual atenuada → primera visible
    else next = list[(pos + (fwd ? 1 : -1) + list.length) % list.length]; // wrap-around
    focusSeat(svg, next);
    showSeatTooltipForNode(svg, next);
  });

  // Ocultar el tooltip al salir del hemiciclo con Tab.
  svg.addEventListener('focusout', (e) => {
    if(!svg.contains(e.relatedTarget)) hideTooltip();
  });
}

// ---------------------------------------------------------------------
// CONTADOR DE RESULTADOS (región aria-live)
// ---------------------------------------------------------------------
// Anuncia cuántas bancas/legisladores quedan visibles según los filtros
// activos. El nodo #seatCounter tiene role="status" + aria-live="polite", así
// que cada cambio de texto se anuncia a lectores de pantalla sin robar el foco.
function updateSeatCounter(){
  const node = document.getElementById('seatCounter');
  if(!node) return;
  const s = activeScenario();
  if(s.status !== 'loaded' || !s._sortedLegislators){ node.textContent = ''; return; }
  const q = state.search.trim().toLowerCase();
  const all = s._sortedLegislators;
  const total = all.length;
  const visible = all.filter(l => legMatchesFilters(l, q)).length;
  const filtered = state.voteFilter !== 'TODOS' || !!state.provinceFilter || !!state.search.trim();
  const unit = total === 1 ? 'banca' : 'bancas';
  node.textContent = filtered
    ? `Mostrando ${visible} de ${total} ${unit} según los filtros activos.`
    : `${total} ${unit} en total · sin filtros activos.`;
}

function selectLegislator(idx){
  // Toggle: volver a activar la banca ya seleccionada la deselecciona y regresa
  // a la vista completa (sin filtro de provincia). Aplica por igual al clic en
  // banca, Enter/Espacio por teclado y clic en fila de la tabla nominal.
  if(state.selectedIndex === idx){
    deselectLegislator();
    return;
  }
  state.selectedIndex = idx;
  const s = activeScenario();
  const leg = s._sortedLegislators[idx];
  state.provinceFilter = leg.province;
  const sel = document.getElementById('provinceSelect');
  if(sel) sel.value = leg.province;
  // mover el halo
  const svg = document.querySelector('svg.hemicycle');
  if(svg){
    const halo = svg.querySelector('#seatHalo');
    if(halo){
      halo.setAttribute('cx', leg._seat.x);
      halo.setAttribute('cy', leg._seat.y);
      halo.classList.add('is-visible');
      halo.classList.add('is-selected'); // #13 — latido del halo en la banca seleccionada
    }
  }
  applyFilters();
  renderSidebar();
}

// Deselecciona la banca activa: limpia la selección y el filtro de provincia
// que la selección había fijado, oculta el halo y vuelve a la vista completa.
function deselectLegislator(){
  state.selectedIndex = null;
  state.provinceFilter = '';
  const sel = document.getElementById('provinceSelect');
  if(sel) sel.value = '';
  const svg = document.querySelector('svg.hemicycle');
  if(svg){
    const halo = svg.querySelector('#seatHalo');
    if(halo){ halo.classList.remove('is-visible'); halo.classList.remove('is-selected'); }
  }
  applyFilters();
  renderSidebar();
}

// Tooltip
const tooltipEl = document.getElementById('tooltip');
function showTooltip(e, html){
  tooltipEl.innerHTML = html;
  tooltipEl.style.opacity = '1';
  tooltipEl.style.transform = 'translateY(0)'; // #12 — micro rise al aparecer
  const r = tooltipEl.getBoundingClientRect();
  let x = e.clientX + 12;
  let y = e.clientY + 12;
  if(x + r.width > window.innerWidth - 8) x = e.clientX - r.width - 12;
  if(y + r.height > window.innerHeight - 8) y = e.clientY - r.height - 12;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
}
function hideTooltip(){
  tooltipEl.style.opacity = '0';
  tooltipEl.style.transform = 'translateY(4px)';
}

// Bind del selector por dos ejes (Caso × Cámara). Cada segmento fija su eje y
// conserva el valor del otro; la combinación reconstituye el scenarioId. El
// reseteo de estado al cambiar de escenario es idéntico al de las tabs previas.
document.querySelectorAll('.nav-seg').forEach(b => {
  b.addEventListener('click', () => {
    const [curCase, curChamber] = state.scenarioId.split('_');
    const newCase    = b.dataset.axis === 'case'    ? b.dataset.value : curCase;
    const newChamber = b.dataset.axis === 'chamber' ? b.dataset.value : curChamber;
    const newId = `${newCase}_${newChamber}`;
    if(!SCENARIOS[newId]) return;            // combinación inexistente (no debería ocurrir)
    if(newId === state.scenarioId) return;   // re-clic en el segmento ya activo: sin cambios
    state.scenarioId = newId;
    state.selectedIndex = null;
    state.provinceFilter = '';
    state.voteFilter = 'TODOS';
    state.search = '';
    state.tableSearch = '';
    state.sortCol = null;
    state.sortDir = 1;
    state.subtab = 'case';
    render();
  });
});

// Ancla de contexto: se muestra al hacer scroll cuando el selector de escenario
// sale del viewport. IntersectionObserver es aditivo y barato; si no está
// disponible, el ancla simplemente no aparece (degradación limpia, sin error).
(function initContextAnchor(){
  const sentinel = document.querySelector('.scenario-nav');
  const anchor = document.getElementById('contextAnchor');
  if(!sentinel || !anchor || !('IntersectionObserver' in window)) return;
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => anchor.classList.toggle('is-visible', !e.isIntersecting));
  }, { threshold: 0 });
  io.observe(sentinel);
})();

// Impresión: expandir la ficha institucional (meta-bar) y las notas de
// validación colapsadas, para que el contexto metodológico completo (sesión,
// expediente, orden del día, fuentes, validación) salga en el PDF/impreso.
// Se restaura el estado de cada <details> al terminar de imprimir.
window.addEventListener('beforeprint', () => {
  document.querySelectorAll('details.meta-bar, details.validation').forEach(d => {
    d.dataset.printPrevOpen = d.open ? '1' : '0';
    d.open = true;
  });
});
window.addEventListener('afterprint', () => {
  document.querySelectorAll('details.meta-bar, details.validation').forEach(d => {
    if(d.dataset.printPrevOpen !== undefined){
      d.open = d.dataset.printPrevOpen === '1';
      delete d.dataset.printPrevOpen;
    }
  });
});

// Normalizar el voto de quien preside según el acta oficial (ver
// normalizeScenarioVotes) antes del primer render: garantiza que hemiciclo,
// leyenda, KPIs, barras, tablas, comparado y exports lean el voto efectivo.
Object.values(SCENARIOS).forEach(normalizeScenarioVotes);

// Inicialización
render();
</script>

<script>
/* Count-up de KPIs al mostrarse cada sección. No usa IntersectionObserver
   (poco fiable en algunos contextos); se dispara al activar el tab. Bajo
   movimiento reducido los números ya están en su valor final y no se tocan. */
(function(){
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce) return;
  function countUp(el){
    if(el.dataset.omCounted) return;
    el.dataset.omCounted = '1';
    const m = el.textContent.trim().match(/^([+\-−]?)(\d[\d.]*)(\s*%?)$/);
    if(!m) return;
    const sign = m[1] || '', suffix = m[3] || '';
    const decimals = (m[2].split('.')[1] || '').length;
    const target = parseFloat(m[2]);
    if(!isFinite(target)) return;
    const dur = 760, t0 = performance.now();
    (function frame(t){
      const p = Math.min(1, (t - t0) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      el.textContent = sign + (target * e).toFixed(decimals) + suffix;
      if(p < 1) requestAnimationFrame(frame);
      else el.textContent = sign + target.toFixed(decimals) + suffix;
    })(performance.now());
  }
  function runCounts(name){
    const panel = document.querySelector('.subpanel[data-subtab="' + name + '"]');
    if(panel) panel.querySelectorAll('.kpi-hero-value').forEach(countUp);
  }
  const active = document.querySelector('.subtab.is-on');
  if(active) requestAnimationFrame(() => runCounts(active.dataset.subtab));
  // Delegación en document: sobrevive a los re-render de renderVizCard (que
  // reconstruye los subtabs). El flag dataset.omCounted evita re-contar; los
  // KPIs recién renderizados arrancan de su valor final correcto.
  document.addEventListener('click', (e) => {
    const b = e.target.closest && e.target.closest('.subtab');
    if(b && b.dataset.subtab) requestAnimationFrame(() => runCounts(b.dataset.subtab));
  });
})();
</script>
