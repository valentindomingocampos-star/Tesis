          <div class="kpi-hero-value ${resultClass}">${esc(ind.result || '—')}</div>
          <div class="kpi-hero-sub">${ind.AFIRMATIVO} a favor · ${ind.NEGATIVO} en contra${ind.ABSTENCION ? ` · ${ind.ABSTENCION} abstenciones` : ''}</div>
        </div>
        <div class="kpi-hero-cell">
          <div class="kpi-hero-label">Margen</div>
          <div class="kpi-hero-value">${marginSigned}</div>
          <div class="kpi-hero-sub">afirmativos − negativos en valor absoluto</div>
        </div>
        <div class="kpi-hero-cell">
          <div class="kpi-hero-label">Apoyo</div>
          <div class="kpi-hero-value is-yes">${fmt(ind.pctYesPresent)}%</div>
          <div class="kpi-hero-sub">de presentes · ${fmt(ind.pctYesOfTotal)}% sobre el cuerpo completo</div>
        </div>
      </div>
      <div class="data-grid">
        <div class="data-grid-cell"><div class="data-grid-label">Bancas</div><div class="data-grid-value">${ind.totalSeats}</div><div class="data-grid-sub">cuerpo completo</div></div>
        <div class="data-grid-cell"><div class="data-grid-label">Quórum</div><div class="data-grid-value">${ind.quorum}</div><div class="data-grid-sub">mitad + 1</div></div>
        <div class="data-grid-cell"><div class="data-grid-label">Presentes</div><div class="data-grid-value">${ind.present}</div><div class="data-grid-sub">${fmt(ind.presenceRate)}% del cuerpo</div></div>
        <div class="data-grid-cell"><div class="data-grid-label">Ausentes</div><div class="data-grid-value is-warn">${ind.AUSENTE}</div><div class="data-grid-sub">${fmt(ind.absenceRate)}% del cuerpo</div></div>
        ${ind.ABSTENCION ? `<div class="data-grid-cell"><div class="data-grid-label">Abstenciones</div><div class="data-grid-value is-warn">${ind.ABSTENCION}</div><div class="data-grid-sub">${fmt(ind.pctAbstPresent)}% de presentes</div></div>` : ''}
        ${ind.PRESIDENCIA ? `<div class="data-grid-cell"><div class="data-grid-label">Presidencia</div><div class="data-grid-value">${ind.PRESIDENCIA}</div><div class="data-grid-sub">categoría institucional</div></div>` : ''}
        <div class="data-grid-cell"><div class="data-grid-label">% Negativo</div><div class="data-grid-value is-no">${fmt(ind.pctNoPresent)}%</div><div class="data-grid-sub">sobre presentes</div></div>
      </div>
    </section>
  `;

  // ---- A.2 Participación / Ausentismo (dos columnas con regla central) ----
  const renderProvAbsBars = (rows) => rows.length ? rows.slice(0, 6).map(p => `
    <div class="h-bar">
      <div class="h-bar-label">${esc(p.province)}<span class="h-bar-n">${p.total}</span></div>
      <div class="h-bar-track"><div class="h-bar-fill is-warn" style="width:${Math.min(100, p.pctAbsent)}%"></div></div>
      <div class="h-bar-value">${fmt(p.pctAbsent)}%</div>
    </div>`).join('') : '<p class="data-grid-sub">Sin ausentes registrados en este escenario.</p>';
  const renderFamAbsBars = (rows) => rows.length ? rows.slice(0, 6).map(f => `
    <div class="h-bar">
      <div class="h-bar-label"><span class="family-dot" style="background:${getColorByFamily(f.family)}"></span>${esc(f.family)}<span class="h-bar-n">${f.total}</span></div>
      <div class="h-bar-track"><div class="h-bar-fill is-warn" style="width:${Math.min(100, f.pctAbsent)}%"></div></div>
      <div class="h-bar-value">${fmt(f.pctAbsent)}%</div>
    </div>`).join('') : '<p class="data-grid-sub">Sin ausentes registrados en este escenario.</p>';
  const turnoutHtml = `
    <section class="stats-section">
      ${_sectionHead('A.2', 'Participación y ausentismo',
        'Tasa de presencia y dónde se concentra el ausentismo en este escenario.',
        'turnout')}
      <div class="data-grid" style="margin-bottom:var(--space-5)">
        <div class="data-grid-cell"><div class="data-grid-label">Presencia</div><div class="data-grid-value">${fmt(ind.presenceRate)}%</div><div class="data-grid-sub">presentes / bancas</div></div>
        <div class="data-grid-cell"><div class="data-grid-label">Ausentismo</div><div class="data-grid-value is-warn">${fmt(ind.absenceRate)}%</div><div class="data-grid-sub">ausentes / bancas</div></div>
      </div>
      <div class="two-col-rule">
        <div>
          <p class="two-col-rule-eyebrow">Provincias con mayor ausentismo</p>
          <div class="h-bar-list">${renderProvAbsBars(turn.topAbsenceProvinces)}</div>
        </div>
        <div>
          <p class="two-col-rule-eyebrow">Familias con mayor ausentismo</p>
          <div class="h-bar-list">${renderFamAbsBars(turn.topAbsenceFamilies)}</div>
        </div>
      </div>
    </section>
  `;

  // ---- A.3 Cohesión por familia ----
  const famHighlights = `
    <div class="ranking-list">
      ${famCoh.mostCohesive ? `<div class="ranking-item">
        <div class="ranking-label">Más cohesionada</div>
        <div class="ranking-winner">${esc(famCoh.mostCohesive.family)}</div>
        <div class="ranking-value">${fmt(famCoh.mostCohesive.cohesion)}% · ${esc((VOTE_LABELS_CSV[famCoh.mostCohesive.dominantVote] || '—').toLowerCase())}</div>
      </div>` : ''}
      ${famCoh.mostDivided ? `<div class="ranking-item">
        <div class="ranking-label">Más dividida</div>
        <div class="ranking-winner">${esc(famCoh.mostDivided.family)}</div>
        <div class="ranking-value">${fmt(famCoh.mostDivided.cohesion)}% · ${esc((VOTE_LABELS_CSV[famCoh.mostDivided.dominantVote] || '—').toLowerCase())}</div>

        <div class="ranking-label">Unificadas (≥${Math.round(COHESION_UNIFIED_THRESHOLD*100)}%)</div>

      </div>
      <div class="ranking-item">
        <div class="ranking-label">Divididas (&lt;${Math.round(COHESION_DIVIDED_THRESHOLD*100)}%)</div>
        <div class="ranking-winner">${famCoh.dividedCount} <span style="font-size:14px;color:var(--muted);font-weight:var(--w-regular)">de ${famCoh.rows.length}</span></div>
        <div class="ranking-value">voto fracturado</div>
      </div>
    </div>
  `;
  const famHbars = famCoh.rows.filter(r => r.present > 0).map(r => {
    const klass = r.dominantVote === 'AFIRMATIVO' ? 'is-yes' : (r.dominantVote === 'NEGATIVO' ? 'is-no' : 'is-warn');
    return `
      <div class="h-bar">
        <div class="h-bar-label"><span class="family-dot" style="background:${getColorByFamily(r.family)}"></span>${esc(r.family)}<span class="h-bar-n">${r.total}</span></div>
        <div class="h-bar-track"><div class="h-bar-fill ${klass}" style="width:${Math.min(100, r.cohesion)}%"></div></div>
        <div class="h-bar-value">${fmt(r.cohesion)}%</div>
      </div>`;
  }).join('');
  const famHtml = `
    <section class="stats-section">
      ${_sectionHead('A.3', 'Cohesión por familia política',
        'Peso del voto dominante sobre presentes (excluye ausentes). Familia es la identidad político-partidaria agregada, no el alineamiento coyuntural.',
        'famcoh')}
      ${famHighlights}
      <div class="h-bar-list" style="margin-top:var(--space-5)">${famHbars || '<p class="data-grid-sub">Sin datos.</p>'}</div>
    </section>
  `;

  // ---- A.4 Cohesión por bloque ----
  const blkRows = blkCoh.rows.filter(b => b.present > 0).slice(0, 12).map(b => {
    const klass = b.dominantVote === 'AFIRMATIVO' ? 'is-yes' : (b.dominantVote === 'NEGATIVO' ? 'is-no' : 'is-warn');
    return `

        </div>
        <div>

        <strong>Rae</strong> = 1 − Σpᵢ² sobre las 3 categorías de voto emitido. Cercano a 0 = voto concentrado en una categoría; cercano a 0.67 (límite teórico con 3 categorías) = voto repartido entre las 3.

  // ---- A.7 Alineamiento — nota metodológica secundaria ----

  const alignHtml = `

    </section>

  // ---- A.0 Síntesis interpretativa (frases descriptivas derivadas) ----

      <ul class="insights-list">

  return `
    <div class="stats-division">

      </div>
    </div>
  `;
}

// Devuelve un rgba con intensidad proporcional al pct (0-100) sobre el hex base
function _heatBg(hex, pct){
  // pct entre 0 y 100 → alpha entre 0.06 y 0.55
  const a = Math.max(0, Math.min(100, pct)) / 100;
  const alpha = 0.06 + a * 0.49;
  // hex → r,g,b
  const m = /^#?([0-9a-f]{6})$/i.exec(hex);
  if(!m) return 'transparent';
  const n = parseInt(m[1], 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
}

// #11 — ¿la celda quedó lo bastante oscura como para necesitar texto claro?
// Mezcla el color de la celta sobre el fondo papel (--card ≈ 255,253,248) con
// el mismo alpha que _heatBg y calcula la luminancia relativa. No cambia datos
// ni la escala de intensidad: solo decide el color del texto por legibilidad.
function _heatTextDark(hex, pct){
  const m = /^#?([0-9a-f]{6})$/i.exec(hex);
  if(!m) return false;
  const n = parseInt(m[1], 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  const alpha = 0.06 + Math.max(0, Math.min(100, pct)) / 100 * 0.49;
  const br = r * alpha + 255 * (1 - alpha);
  const bg = g * alpha + 253 * (1 - alpha);
  const bb = b * alpha + 248 * (1 - alpha);
  const lum = (0.2126 * br + 0.7152 * bg + 0.0722 * bb) / 255;
  return lum < 0.5;
}

  // Δ cohesión promedio por familia entre pares de escenarios. Permite leer

  // interna en las familias políticas (señal de disciplina partidaria).

        const aria = `${fm.family} · ${scLabel} · ${activeMeta.label}: ${ariaVal} · ${r.total} legisladores · cohesión ${fmt(r.cohesion)}%`;
        return `<div class="heatmap-cell${dark ? ' is-dark' : ''}" role="cell" aria-label="${esc(aria)}" style="background:${bg}">
          <span class="heatmap-cell-value">${activeMeta.formatter(val)}</span>
          <span class="heatmap-cell-sub">${r.total} legs · cohesión ${fmt(r.cohesion)}%</span>
        </div>`;
      }).join('')}
    </div>
  `).join('');
  const famCompHtml = `
    <div class="metric-toggle" role="group" aria-label="Métrica del heatmap">
      <span style="padding:0 var(--space-2);align-self:center;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-weight:var(--w-semi)">Métrica</span>
      ${metricButtons}
    </div>
    <div class="heatmap" role="table" aria-label="Familias políticas en los cuatro escenarios — ${esc(activeMeta.label)}">${famHeatHead}${famHeatBody}</div>
    <div class="heat-scale" aria-hidden="true">
      <span class="heat-scale-label">Intensidad ∝ ${esc(activeMeta.label.toLowerCase())}</span>
      <span class="heat-scale-bar" style="background:linear-gradient(90deg, ${_heatBg(activeMeta.base, 4)}, ${_heatBg(activeMeta.base, 100)})"></span>
      <span class="heat-scale-ends"><span>menor</span><span>mayor</span></span>
    </div>
  `;

  // ---- B.6 Comparador territorial (heatmap con gradiente por voto dominante) ----
  const provMatrix = computeProvinceComparison();
  const provHeatHead = `<div class="heatmap-row is-head" role="row" style="grid-template-columns: minmax(160px, 1.2fr) repeat(${scen.length}, 1fr) minmax(140px, 0.9fr)">
    <div class="heatmap-cell" role="columnheader">Provincia</div>
    ${scen.map(s => `<div class="heatmap-cell" role="columnheader">${esc(s.caseName.split(' ')[0])} · ${esc(s.chamberShort)}</div>`).join('')}
    <div class="heatmap-cell" role="columnheader">Patrón cross-escenario</div>
  </div>`;
  const provHeatBody = provMatrix.map(pm => {
    const cells = scen.map(s => {
      const r = pm.perScenario[s.id];
      const scLabel = `${s.caseName} · ${s.chamberShort}`;
      if(!r || !r.total) return `<div class="heatmap-cell is-empty" role="cell" aria-label="${esc(pm.province)} sin datos en ${esc(scLabel)}"><span class="heatmap-cell-value">—</span></div>`;
      const dom = r.dominantVote;
      const baseHex = dom === 'AFIRMATIVO' ? '#3f6e44'
                    : dom === 'NEGATIVO'   ? '#a32a2a'
                    : '#a87523';
      const intensity = dom === 'AFIRMATIVO' ? r.pctYes : (dom === 'NEGATIVO' ? r.pctNo : 60);
      const bg = _heatBg(baseHex, intensity);
      const dark = _heatTextDark(baseHex, intensity);
      const subDom = r.isMixed ? 'mixta' : (VOTE_LABELS_CSV[dom] || '—').toLowerCase();
      const aria = `${pm.province} · ${scLabel} · ${fmt(r.pctYes)}% afirmativo · voto ${subDom} · ${r.total} representantes`;
      return `<div class="heatmap-cell${dark ? ' is-dark' : ''}" role="cell" aria-label="${esc(aria)}" style="background:${bg}">
        <span class="heatmap-cell-value">${fmt(r.pctYes)}%</span>
        <span class="heatmap-cell-sub">${esc(subDom)} · ${r.total} legs</span>
      </div>`;
    }).join('');
    const patternLabel = pm.allYes ? 'siempre afirmativa' : (pm.allNo ? 'siempre negativa' : (pm.changes ? 'cambia entre escenarios' : 'consistente'));
    const tag = pm.allYes ? '<span class="heatmap-tag is-always-yes">Siempre afirm.</span>'
              : pm.allNo  ? '<span class="heatmap-tag is-always-no">Siempre neg.</span>'
              : pm.changes ? '<span class="heatmap-tag is-changes">Cambia</span>'
              : '<span class="heatmap-tag is-consistent">Consistente</span>';
    return `
      <div class="heatmap-row" role="row" style="grid-template-columns: minmax(160px, 1.2fr) repeat(${scen.length}, 1fr) minmax(140px, 0.9fr)">
        <div class="heatmap-cell" role="rowheader"><span class="heatmap-cell-label">${esc(pm.province)}</span></div>
        ${cells}
        <div class="heatmap-cell" role="cell" aria-label="${esc(pm.province + ' · patrón cross-escenario: ' + patternLabel)}">${tag}</div>
      </div>
    `;
  }).join('');
  const provCompHtml = `
    <div class="heatmap" role="table" aria-label="Provincias en los cuatro escenarios — voto predominante y porcentaje afirmativo">${provHeatHead}${provHeatBody}</div>
    <div class="heat-scale heat-scale-keys" aria-hidden="true">
      <span class="heat-scale-label">Color = voto predominante · intensidad ∝ magnitud:</span>
      <span class="heat-key"><span class="heat-key-sw" style="background:${_heatBg('#3f6e44', 85)}"></span>afirmativo</span>
      <span class="heat-key"><span class="heat-key-sw" style="background:${_heatBg('#a32a2a', 85)}"></span>negativo</span>
      <span class="heat-key"><span class="heat-key-sw" style="background:${_heatBg('#a87523', 60)}"></span>mixta</span>
    </div>
  `;

  // --- Visualizaciones comparadas (B.7–B.9): selector de par + color, hemiciclos
  // y mapas lado a lado, grilla 2×2. Los SVG se montan tras inyectar el HTML
  // (mountCompareVisuals); aquí van los placeholders + controles + leyendas. ---
  const compareVisualsHtml = (() => {
    const cmpMode = state.compareColorMode === 'family' ? 'family' : 'vote';
    const cp = (state.comparePair && state.comparePair.length === 2) ? state.comparePair : ['aerolineas_diputados', 'ypf_diputados'];
    const pairScens = [ensureScenarioPrepared(SCENARIOS[cp[0]]), ensureScenarioPrepared(SCENARIOS[cp[1]])];
    const pairLegend = buildCompareLegendHtml(pairScens, cmpMode);
    const quadLegend = buildCompareLegendHtml(QUAD_ORDER.map(id => ensureScenarioPrepared(SCENARIOS[id])), cmpMode);
    const presetBtns = COMPARE_PRESETS.map(p => {
      const on = cp[0] === p.ids[0] && cp[1] === p.ids[1];
      return `<button type="button" data-compare-pair="${p.ids.join(',')}" aria-pressed="${on ? 'true' : 'false'}">${esc(p.label)}</button>`;
    }).join('');
    return `
      <div class="compare-controls-bar">
        <div class="compare-ctrl">
          <span class="compare-ctrl-label">Par de escenarios</span>
          <div class="metric-toggle compare-pair-toggle" role="group" aria-label="Par de escenarios a comparar">${presetBtns}</div>
        </div>
        <div class="compare-ctrl">
          <span class="compare-ctrl-label">Color</span>
          <div class="metric-toggle" role="group" aria-label="Modo de color del comparado">
            <button type="button" data-compare-colormode="vote" aria-pressed="${cmpMode === 'vote' ? 'true' : 'false'}">Voto</button>
            <button type="button" data-compare-colormode="family" aria-pressed="${cmpMode === 'family' ? 'true' : 'false'}">Familia</button>
          </div>
        </div>
      </div>
      <section class="stats-section">
        ${_sectionHead('B.7', 'Hemiciclos lado a lado',
          'Los dos escenarios del par, banca por banca, con el mismo criterio cromático. El cruce voto/familia se consulta en el tooltip.', null)}
        <div class="dual-viz" id="cmpDualHemi"></div>
        <div class="legend cmp-legend" aria-hidden="true">${pairLegend}</div>
      </section>
      <section class="stats-section">
        ${_sectionHead('B.8', 'Mapas lado a lado',
          'Voto predominante por provincia. En el segundo mapa, las provincias con borde dorado cambiaron de voto dominante respecto del primero.', null)}
        <div class="dual-viz" id="cmpDualMap"></div>
        <div class="legend cmp-legend" aria-hidden="true">${pairLegend}</div>
      </section>
      <section class="stats-section">
        ${_sectionHead('B.9', 'Grilla panorámica · los cuatro escenarios',
          'Vista de conjunto del corpus completo, en hemiciclos o mapas.', null)}
        <div class="compare-controls-bar compare-controls-inset">
          <div class="compare-ctrl">
            <span class="compare-ctrl-label">Vista</span>
            <div class="metric-toggle" role="group" aria-label="Tipo de visualización de la grilla">
              <button type="button" data-quad-view="hemicycle" aria-pressed="${state.quadView !== 'map' ? 'true' : 'false'}">Hemiciclos</button>
              <button type="button" data-quad-view="map" aria-pressed="${state.quadView === 'map' ? 'true' : 'false'}">Mapas</button>
            </div>
          </div>
        </div>
        <div class="quad-viz" id="cmpQuad"></div>
        <div class="legend cmp-legend" aria-hidden="true">${quadLegend}</div>
      </section>
      ${renderTrajectorySection()}
    `;
  })();

  return `
    <div class="stats-division">
      <div class="stats-division-head">
        <div>
          <div class="stats-division-eyebrow">B · Comparador entre escenarios · análisis legislativo comparado</div>
          <h2 class="stats-division-title">Los cuatro tratamientos en perspectiva</h2>
          <p class="stats-division-bajada">Comparación sistemática de las cuatro votaciones nominales — Aerolíneas Argentinas y YPF, en Diputados y en Senado — sobre indicadores de cohesión partidaria, fragmentación legislativa, ausentismo y territorialización del voto.</p>
        </div>
        <div class="stats-division-actions">
          <button class="btn-exp" data-export="comparator-csv">↓ CSV comparador</button>
          <button class="btn-exp btn-exp-primary" data-export="comparator-png">↓ PNG comparador</button>
          <button class="btn-exp" data-export="summary-all-csv">↓ Comparativo general (4 escenarios) · CSV</button>
        </div>
      </div>
      ${(() => {
        const ins = buildComparisonInsights();
        return ins.length ? `
          <div class="insights-block">
            <p class="insights-eyebrow">Síntesis comparativa</p>
            <ul class="insights-list">
              ${ins.map(line => `<li>${line}</li>`).join('')}
            </ul>
          </div>
        ` : '';
      })()}
      <div class="stats-division-body">
        ${compareVisualsHtml}
        <section class="stats-section">
          ${_sectionHead('B.1', 'Tabla comparativa agregada',
            'Indicadores cuantitativos agrupados en bloques temáticos: composición, resultado, participación, veredicto.',
            'comp-table')}
          ${aggTableHtml}
        </section>
        <section class="stats-section">
          ${_sectionHead('B.2', 'Diferencias entre casos y entre cámaras',
            'Comparaciones pareadas YPF vs Aerolíneas y Senado vs Diputados; valores en puntos porcentuales (pp) o votos absolutos.',
            'comp-diff')}
          ${caseDiffHtml}
        </section>
        <section class="stats-section">
          ${_sectionHead('B.3', 'Rankings cualitativos',
            'Qué escenario lidera cada métrica de interés.',
            'comp-rank')}
          ${rankingsHtml}
        </section>
        <section class="stats-section">
          ${_sectionHead('B.4', 'Familias políticas · % afirmativo por escenario',
            'Heatmap con intensidad proporcional al apoyo afirmativo de cada familia en cada escenario.',
            'comp-fam')}
          ${famCompHtml}
        </section>
        <section class="stats-section">
          ${_sectionHead('B.5', 'Provincias · voto predominante por escenario',
            'Heatmap con intensidad proporcional al voto dominante (verde si afirmativo, burdeos si negativo). La columna final identifica el patrón cross-escenario.',
            'comp-prov')}
          ${provCompHtml}
        </section>
        ${(() => {
          // B.6 — Índice de Rae comparado (fragmentación del voto emitido por escenario)
          const raeByScen = scen.map(sx => {
            const orig = Object.values(SCENARIOS).find(o => o.id === sx.id);
            return { sx, rae: computeScenarioRae(orig) };
          });
          const rankRows = [...raeByScen]
            .filter(r => r.rae.computable)
            .sort((a, b) => b.rae.value - a.rae.value);
          const fm2 = (n) => Number.isFinite(n) ? n.toFixed(3) : '—';
          return `
          <section class="stats-section">
            ${_sectionHead('B.6', 'Fragmentación del voto · índice de Rae comparado',
              'Rae = 1 − Σpᵢ² sobre afirmativo, negativo y abstención. Cercano a 0 = voto concentrado; valores más altos = voto repartido entre las 3 categorías.',
              'comp-rae')}
            <div class="ranking-list">
              ${rankRows.map((rk, idx) => `
                <div class="ranking-item">
                  <div class="ranking-label">${idx === 0 ? 'Más fragmentado' : (idx === rankRows.length - 1 ? 'Más concentrado' : '#' + (idx + 1))}</div>
                  <div class="ranking-winner">${esc(rk.sx.caseName)} · ${esc(rk.sx.chamberShort)}</div>
                  <div class="ranking-value">Rae = ${fm2(rk.rae.value)} · ${rk.rae.denom} votos emitidos</div>
                </div>
              `).join('')}
            </div>
          </section>`;
        })()}
      </div>
    </div>
  `;
}

function renderMethodologyNotes(){
  return `
    <div class="stats-division">
      <div class="stats-division-head">
        <div>
          <div class="stats-division-eyebrow">Apéndice metodológico</div>
          <h2 class="stats-division-title">Criterios de cálculo</h2>
          <p class="stats-division-bajada">Convenciones que aplican a toda la sub-tab de Estadísticas.</p>
        </div>
      </div>
      <div class="methodology-note">
        <strong>Criterios</strong>
        <ul>
          <li>Los porcentajes de voto se calculan sobre <strong>presentes</strong>, salvo que se indique lo contrario.</li>
          <li>La <strong>tasa de ausencia</strong> se calcula sobre el total de bancas del escenario.</li>
          <li>La <strong>cohesión</strong> es el peso del voto dominante dentro de una familia o bloque sobre presentes (excluye ausentes).</li>
          <li>Las comparaciones <strong>Diputados / Senado</strong> deben leerse considerando que el principio de representación es distinto: población vs. 3 senadores por jurisdicción.</li>
          <li>No se calcula <strong>alineamiento oficialismo/oposición</strong>: requiere una variable analítica adicional que no está en el dataset actual.</li>
          <li>Umbrales editoriales: <em>unificada</em> ≥ ${Math.round(COHESION_UNIFIED_THRESHOLD*100)}%; <em>dividida</em> &lt; ${Math.round(COHESION_DIVIDED_THRESHOLD*100)}%.</li>
        </ul>
      </div>
    </div>
  `;
}

// =====================================================================
// EXPORT — Estadísticas granulares (1 par CSV+PNG por bloque tabular)
// =====================================================================
// 10 bloques: 5 en División A (resultado, ausentismo, cohesión familia,
// cohesión bloque, territorialización) + 5 en División B (tabla comparativa,
// diferencias, rankings, heatmap familias, heatmap provincias).
// Cada uno produce un CSV con contexto institucional + columnas formales y
// un PNG editorial vía exportSimpleTablePng.

function buildStatsSpec(kind, scenario){
  const fmt = (n) => Number.isFinite(n) ? n.toFixed(1) : '0.0';
  const sgn = (n) => (n >= 0 ? '+' : '') + (Number.isFinite(n) ? n.toFixed(1) : '0.0');
  const ctx = csvScenarioContext(scenario);
  const CTX_COLS = [
    { key: 'case',    label: 'Caso' },
    { key: 'chamber', label: 'Cámara' },
    { key: 'date',    label: 'Fecha' },
    { key: 'law',     label: 'Ley' }
  ];
  const withCtx = (rows) => rows.map(r => ({ ...ctx, ...r }));
  const scens = Object.values(SCENARIOS);
  const scenShortLabel = (s) => `${s.caseName.split(' ')[0]} · ${s.chamberShort}`;

  // ---------- DIVISIÓN A · escenario activo ----------
  if(kind === 'aggregate'){
    const ind = computeScenarioIndicators(scenario);
    const rows = [
      { indicator:'Bancas',          value: ind.totalSeats,    detail:'cuerpo completo' },
      { indicator:'Quórum',          value: ind.quorum,        detail:'mitad + 1' },
      { indicator:'Presentes',       value: ind.present,       detail: fmt(ind.presenceRate) + '% del cuerpo' },
      { indicator:'Afirmativos',     value: ind.AFIRMATIVO,    detail: fmt(ind.pctYesPresent) + '% de presentes' },
      { indicator:'Negativos',       value: ind.NEGATIVO,      detail: fmt(ind.pctNoPresent) + '% de presentes' },
      { indicator:'Abstenciones',    value: ind.ABSTENCION,    detail: fmt(ind.pctAbstPresent) + '% de presentes' },
      { indicator:'Ausentes',        value: ind.AUSENTE,       detail: fmt(ind.absenceRate) + '% del cuerpo' },
      { indicator:'Presidencia',     value: ind.PRESIDENCIA,   detail:'categoría institucional' },
      { indicator:'Margen',          value: (ind.margin>=0?'+':'')+ind.margin, detail:'afirmativos − negativos' },
      { indicator:'% Apoyo cuerpo',  value: fmt(ind.pctYesOfTotal) + '%', detail:'afirmativos / bancas' },
      { indicator:'Resultado',       value: ind.result || '—', detail:'acta oficial' }
    ];
    return {
      layout:   'ficha-hero',
      title:    'Resultado de la votación',
      bajada:   'Lectura rápida: tres KPI principales arriba (resultado, margen, apoyo) y composición del cuerpo abajo.',
      hero: [
        { label:'Resultado',  value: ind.result || '—',
          sub: `${ind.AFIRMATIVO} a favor · ${ind.NEGATIVO} en contra${ind.ABSTENCION ? ` · ${ind.ABSTENCION} abstenciones` : ''}`,
          tone: ind.result === 'AFIRMATIVO' ? 'yes' : (ind.result === 'NEGATIVO' ? 'no' : '') },
        { label:'Margen',     value: (ind.margin>=0?'+':'') + ind.margin,
          sub:'afirmativos menos negativos',
          tone: '' },
        { label:'Apoyo',      value: fmt(ind.pctYesPresent) + '%',
          sub:`de presentes · ${fmt(ind.pctYesOfTotal)}% sobre el cuerpo completo`,
          tone: 'yes' }
      ],
      kvGroups: [
        { title:'Composición del cuerpo', items: [
          { k:'Bancas',     v: ind.totalSeats,   sub:'cuerpo completo' },
          { k:'Quórum',     v: ind.quorum,       sub:'mitad + 1' },
          { k:'Presentes',  v: ind.present,      sub: fmt(ind.presenceRate) + '% del cuerpo' },
          { k:'Ausentes',   v: ind.AUSENTE,      sub: fmt(ind.absenceRate) + '% del cuerpo', tone:'warn' }
        ]},
        { title:'Votos emitidos', items: [
          { k:'Afirmativos',  v: ind.AFIRMATIVO,  sub: fmt(ind.pctYesPresent) + '% de presentes', tone:'yes' },
          { k:'Negativos',    v: ind.NEGATIVO,    sub: fmt(ind.pctNoPresent) + '% de presentes',  tone:'no' },
          { k:'Abstenciones', v: ind.ABSTENCION,  sub: ind.ABSTENCION ? fmt(ind.pctAbstPresent) + '% de presentes' : 'sin abstenciones', tone:'warn' },
          { k:'Presidencia',  v: ind.PRESIDENCIA, sub: ind.PRESIDENCIA ? 'categoría institucional' : 'no aplica', tone:'' }
        ]}
      ],
      // CSV (formato largo, una fila por indicador)
      columns:  [...CTX_COLS, {key:'indicator',label:'Indicador'}, {key:'value',label:'Valor'}, {key:'detail',label:'Detalle'}],
      rows:     withCtx(rows),
      slug:     'indicadores_resultado_agregado',
      note:     'Porcentajes sobre presentes salvo la tasa de ausencia y el apoyo sobre cuerpo, calculados sobre el total de bancas.'
    };
  }

  if(kind === 'turnout'){
    const ind  = computeScenarioIndicators(scenario);
    const turn = computeTurnoutIndicators(scenario);
    const provAbs = turn.byProvince.filter(p => p.AUSENTE > 0);
    const famAbs  = turn.byFamily.filter(f => f.AUSENTE > 0);
    const rows = [
      { tipo:'Resumen', dimension:'Tasa de presencia', valor: fmt(ind.presenceRate)+'%', cobertura:'presentes / bancas' },
      { tipo:'Resumen', dimension:'Tasa de ausencia',  valor: fmt(ind.absenceRate)+'%',  cobertura:'ausentes / bancas' }
    ];
    provAbs.forEach(p => rows.push({ tipo:'Provincia', dimension: p.province, valor: fmt(p.pctAbsent)+'%', cobertura: `${p.AUSENTE} de ${p.total}` }));
    famAbs.forEach(f => rows.push({ tipo:'Familia', dimension: f.family, valor: fmt(f.pctAbsent)+'%', cobertura: `${f.AUSENTE} de ${f.total}` }));
    return {
      layout:   'two-pane-bars',
      title:    'Participación y ausentismo',
      bajada:   'Cuánto del cuerpo estuvo presente y dónde se concentraron los ausentes.',
      heroPair: [
        { label:'Presencia',  value: fmt(ind.presenceRate)+'%', sub: ind.present + ' de ' + ind.totalSeats + ' bancas' },
        { label:'Ausentismo', value: fmt(ind.absenceRate)+'%',  sub: ind.AUSENTE + ' de ' + ind.totalSeats + ' bancas', tone:'warn' }
      ],
      panes: [
        { title:'Provincias con mayor ausentismo', items: provAbs.slice(0, 8).map(p => ({
            label: p.province, sub: `${p.AUSENTE} de ${p.total}`, pct: p.pctAbsent
          })) },
        { title:'Familias con mayor ausentismo', items: famAbs.slice(0, 8).map(f => ({
            label: f.family, sub: `${f.AUSENTE} de ${f.total}`, color: getColorByFamily(f.family), pct: f.pctAbsent
          })) }
      ],
      // CSV
      columns:  [...CTX_COLS, {key:'tipo',label:'Dimensión'}, {key:'dimension',label:'Detalle'}, {key:'valor',label:'Valor'}, {key:'cobertura',label:'Cobertura'}],
      rows:     withCtx(rows),
      slug:     'indicadores_participacion_ausentismo',
      note:     'Tasa de presencia y ausencia sobre el total de bancas. Sólo se listan provincias y familias con al menos un ausente, ordenadas por % descendente.'
    };
  }

  if(kind === 'famcoh'){
    const fc = computeFamilyCohesion(scenario);
    const rowsBar = fc.rows.filter(r => r.present > 0).map(f => ({
      label: f.family,
      color: getColorByFamily(f.family),
      total: f.total,
      cohesion: f.cohesion,
      dominantVote: f.dominantVote,
      voteDist: { yes: f.AFIRMATIVO, no: f.NEGATIVO, abst: f.ABSTENCION, aus: f.AUSENTE }
    }));
    const rowsCsv = fc.rows.map(f => ({
      familia: f.family, total: f.total, presentes: f.present,
      afirmativos: f.AFIRMATIVO, negativos: f.NEGATIVO,
      abstenciones: f.ABSTENCION, ausentes: f.AUSENTE,
      pctYes: fmt(f.pctYesPresent), pctNo: fmt(f.pctNoPresent),
      cohesion: fmt(f.cohesion), dominante: VOTE_LABELS_CSV[f.dominantVote] || '—'
    }));
    return {
      layout:   'cohesion-bars',
      title:    'Cohesión por familia política',
      bajada:   `Mostrar cuánto se mantienen unidas las familias políticas. Cohesión = % del voto dominante sobre presentes; unificada ≥${Math.round(COHESION_UNIFIED_THRESHOLD*100)}%, dividida <${Math.round(COHESION_DIVIDED_THRESHOLD*100)}%.`,
      heroPair: [
        { label:'Unificadas', value: `${fc.unifiedCount} / ${fc.rows.length}`, sub:`≥${Math.round(COHESION_UNIFIED_THRESHOLD*100)}%`, tone:'yes' },
        { label:'Divididas',  value: `${fc.dividedCount} / ${fc.rows.length}`, sub:`<${Math.round(COHESION_DIVIDED_THRESHOLD*100)}%`, tone:'warn' }
      ],
      bars: rowsBar,
      // CSV
      columns: [...CTX_COLS,
        {key:'familia',label:'Familia política'}, {key:'total',label:'Total'},
        {key:'presentes',label:'Presentes'}, {key:'afirmativos',label:'Afirmativos'},
        {key:'negativos',label:'Negativos'}, {key:'abstenciones',label:'Abstenciones'},
        {key:'ausentes',label:'Ausentes'}, {key:'pctYes',label:'% Afirmativo (presentes)'},
        {key:'pctNo',label:'% Negativo (presentes)'}, {key:'cohesion',label:'Cohesión (%)'},
        {key:'dominante',label:'Voto dominante'}
      ],
      rows: withCtx(rowsCsv),
      slug:     'indicadores_cohesion_familias',
      note:     `La barra interna muestra la composición real del voto (verde afi, burdeos neg, ocre abst, piedra aus). El % a la derecha es la cohesión. Una familia unificada concentra ≥${Math.round(COHESION_UNIFIED_THRESHOLD*100)}% en un solo sentido.`
    };
  }

  if(kind === 'blkcoh'){
    const bc = computeBlockCohesion(scenario);
    const rowsBar = bc.rows.filter(b => b.present > 0).slice(0, 15).map(b => ({
      label: b.block,
      color: getColorByFamily(b.family),
      total: b.total,
      cohesion: b.cohesion,
      dominantVote: b.dominantVote,
      voteDist: { yes: b.AFIRMATIVO, no: b.NEGATIVO, abst: b.ABSTENCION, aus: b.AUSENTE }
    }));
    const rowsCsv = bc.rows.map(b => ({
      bloque: b.block, familia: b.family, total: b.total, presentes: b.present,
      afirmativos: b.AFIRMATIVO, negativos: b.NEGATIVO,
      abstenciones: b.ABSTENCION, ausentes: b.AUSENTE,
      cohesion: fmt(b.cohesion), dominante: VOTE_LABELS_CSV[b.dominantVote] || '—',
      provincias: b.provincesCount
    }));
    return {
      layout:   'cohesion-bars',
      title:    'Cohesión por bloque político',
      bajada:   'Disciplina legislativa a nivel de bloque parlamentario operativo. El PNG muestra los 15 bloques más numerosos; el CSV trae todos.',
      heroPair: [
        { label:'Bloques unificados', value: `${bc.unifiedCount} / ${bc.rows.length}`, sub:`≥${Math.round(COHESION_UNIFIED_THRESHOLD*100)}%`, tone:'yes' },
        { label:'Bloques divididos',  value: `${bc.dividedCount} / ${bc.rows.length}`, sub:`<${Math.round(COHESION_DIVIDED_THRESHOLD*100)}%`, tone:'warn' }
      ],
      bars: rowsBar,
      // CSV
      columns: [...CTX_COLS,
        {key:'bloque',label:'Bloque político'}, {key:'familia',label:'Familia política'},
        {key:'total',label:'Total'}, {key:'presentes',label:'Presentes'},
        {key:'afirmativos',label:'Afirmativos'}, {key:'negativos',label:'Negativos'},
        {key:'abstenciones',label:'Abstenciones'}, {key:'ausentes',label:'Ausentes'},
        {key:'cohesion',label:'Cohesión (%)'}, {key:'dominante',label:'Voto dominante'},
        {key:'provincias',label:'Provincias donde aparece'}
      ],
      rows: withCtx(rowsCsv),
      slug:     'indicadores_cohesion_bloques',
      note:     `La barra muestra composición del voto dentro del bloque; el dot izquierdo indica la familia política. Cohesión = % del voto dominante sobre presentes.`
    };
  }

  if(kind === 'territ'){
    const ti = computeProvinceIndicators(scenario);
    const rowsBar = ti.rows.slice().sort((a,b) => b.pctYes - a.pctYes).map(p => ({
      label: p.province,
      total: p.total,
      dominantVote: p.isMixed ? null : p.dominantVote,
      cohesion: p.cohesion,
      dominantFamily: p.dominantFamily,
      dominantFamilyColor: p.dominantFamily ? getColorByFamily(p.dominantFamily) : '#a09b8c',
      voteDist: { yes: p.AFIRMATIVO, no: p.NEGATIVO, abst: p.ABSTENCION, aus: p.AUSENTE }
    }));
    const rowsCsv = ti.rows.map(p => ({
      provincia: p.province, total: p.total,
      afirmativos: p.AFIRMATIVO, negativos: p.NEGATIVO,
      abstenciones: p.ABSTENCION, ausentes: p.AUSENTE,
      pctYes: fmt(p.pctYes), pctNo: fmt(p.pctNo), cohesion: fmt(p.cohesion),
      dominante: p.isMixed ? 'Composición mixta' : (VOTE_LABELS_CSV[p.dominantVote] || '—'),
      familia: formatMetaValue(p.dominantFamily, 'No consignado')
    }));
    return {
      layout:   'territory-bars',
      title:    'Territorialización del voto',
      bajada:   `Cómo se distribuyó el voto provincia por provincia. ${ti.unanimousYes.length} provincias unánimes a favor · ${ti.unanimousNo.length} en contra · ${ti.divided.length} divididas.`,
      heroTriple: [
        { label:'Apoyo total',    value: ti.unanimousYes.length, sub:'provincias 100% afirmativas', tone:'yes' },
        { label:'Rechazo total',  value: ti.unanimousNo.length,  sub:'provincias 100% negativas',   tone:'no' },
        { label:'Divididas',      value: ti.divided.length,      sub:`<${Math.round(COHESION_DIVIDED_THRESHOLD*100)}% en un sentido`, tone:'warn' }
      ],
      bars: rowsBar,
      columns: [...CTX_COLS,
        {key:'provincia',label:'Provincia'}, {key:'total',label:'Bancas'},
        {key:'afirmativos',label:'Afirmativos'}, {key:'negativos',label:'Negativos'},
        {key:'abstenciones',label:'Abstenciones'}, {key:'ausentes',label:'Ausentes'},
        {key:'pctYes',label:'% Afirmativo'}, {key:'pctNo',label:'% Negativo'},
        {key:'cohesion',label:'Cohesión (%)'}, {key:'dominante',label:'Voto dominante'},
        {key:'familia',label:'Familia política predominante'}
      ],
      rows: withCtx(rowsCsv),
      slug:     'indicadores_territorializacion',
      note:     'Cada barra muestra la composición del voto en esa provincia (verde afi, burdeos neg, ocre abst, piedra aus). El chip de familia política indica la fuerza dominante en el distrito.'
    };
  }

  if(kind === 'rice-fam'){
    // CSV/PNG dedicado al índice de Rice por familia política
    const fr = computeFamilyRice(scenario);
    const rows = fr.map(f => ({
      familia: f.family, total: f.total,
      afirmativos: f.AFIRMATIVO, negativos: f.NEGATIVO,
      rice: f.riceComputable ? (f.rice * 100).toFixed(1) + '%' : 'No calculable',
      base: f.denom
    }));
    return {
      layout: 'simple-table',
      title:  'Rice por familia política',
      bajada: 'Cohesión dicotómica entre afirmativo y negativo, calculada para cada familia política agregada del escenario activo.',
      columns: [...CTX_COLS,
        {key:'familia',label:'Familia política'}, {key:'total',label:'Total legisladores'},
        {key:'afirmativos',label:'Afirmativos'}, {key:'negativos',label:'Negativos'},
        {key:'rice',label:'Índice de Rice'}, {key:'base',label:'Base (Afi+Neg)'}
      ],
      rows: withCtx(rows),
      pngColumns: [
        {key:'familia',label:'Familia política',width:0.36,align:'left'},
        {key:'total',label:'Legs',width:0.10,align:'right'},
        {key:'afirmativos',label:'Afi',width:0.12,align:'right'},
        {key:'negativos',label:'Neg',width:0.12,align:'right'},
        {key:'rice',label:'Rice',width:0.18,align:'right'},
        {key:'base',label:'Base',width:0.12,align:'right'}
      ],
      slug: 'indicadores_rice_familias',
      note: 'Rice = |Afi − Neg| / (Afi + Neg). Excluye ausentes, presidencia y abstenciones. "No calculable" cuando Afi + Neg = 0. Valores cercanos a 100% indican cohesión dicotómica plena.'
    };
  }

  if(kind === 'rice-blk'){
    const br = computeBlockRice(scenario);
    const rows = br.map(b => ({
      bloque: b.block, familia: b.family, total: b.total,
      afirmativos: b.AFIRMATIVO, negativos: b.NEGATIVO,
      rice: b.riceComputable ? (b.rice * 100).toFixed(1) + '%' : 'No calculable',
      base: b.denom
    }));
    return {
      layout: 'simple-table',
      title:  'Rice por bloque político',
      bajada: 'Cohesión dicotómica a nivel de bloque parlamentario operativo, más fino que la agregación por familia.',
      columns: [...CTX_COLS,
        {key:'bloque',label:'Bloque'}, {key:'familia',label:'Familia política'},
        {key:'total',label:'Total'}, {key:'afirmativos',label:'Afirmativos'},
        {key:'negativos',label:'Negativos'}, {key:'rice',label:'Índice de Rice'},
        {key:'base',label:'Base (Afi+Neg)'}
      ],
      rows: withCtx(rows),
      pngColumns: [
        {key:'bloque',label:'Bloque',width:0.36,align:'left'},
        {key:'familia',label:'Familia',width:0.18,align:'left'},
        {key:'total',label:'Total',width:0.08,align:'right'},
        {key:'afirmativos',label:'Afi',width:0.08,align:'right'},
        {key:'negativos',label:'Neg',width:0.08,align:'right'},
        {key:'rice',label:'Rice',width:0.14,align:'right'},
        {key:'base',label:'Base',width:0.08,align:'right'}
      ],
      slug: 'indicadores_rice_bloques',
      note: 'Rice por bloque mide disciplina legislativa a nivel de la unidad operativa parlamentaria. Si Afi + Neg = 0 → No calculable.',
      pngLimit: 20
    };
  }

  if(kind === 'rae-scen'){
    // Detalle del Rae del escenario activo
    const rae = computeScenarioRae(scenario);
    const interpret = !rae.computable ? 'No calculable'
                     : rae.value < 0.20 ? 'Voto altamente concentrado'
                     : rae.value < 0.40 ? 'Voto moderadamente concentrado'
                     : rae.value < 0.55 ? 'Voto fragmentado'
                     : 'Voto altamente fragmentado';
    const rows = rae.computable ? [
      { indicador:'Índice de Rae',           valor: rae.value.toFixed(3), detalle: interpret },
      { indicador:'Base · votos emitidos',   valor: rae.denom,            detalle:'afirmativos + negativos + abstenciones' },
      { indicador:'Afirmativos',             valor: rae.parts.yes,        detalle:'p_yes en la fórmula' },
      { indicador:'Negativos',               valor: rae.parts.no,         detalle:'p_no en la fórmula' },
      { indicador:'Abstenciones',            valor: rae.parts.abst,       detalle:'p_abst en la fórmula' },
      { indicador:'Máximo teórico',          valor: '0.667',               detalle:'3 categorías equiprobables' }
    ] : [
      { indicador:'Índice de Rae', valor: 'No calculable', detalle:'sin votos emitidos en este escenario' }
    ];
    return {
      layout: 'simple-table',
      title:  'Rae · fragmentación del voto emitido',
      bajada: 'Detalle del cálculo del índice de Rae para el escenario activo: base, categorías consideradas, valor e interpretación textual.',
      columns: [...CTX_COLS, {key:'indicador',label:'Componente'}, {key:'valor',label:'Valor'}, {key:'detalle',label:'Detalle'}],
      rows: withCtx(rows),
      pngColumns: [
        {key:'indicador',label:'Componente',width:0.34,align:'left'},
        {key:'valor',label:'Valor',width:0.18,align:'right'},
        {key:'detalle',label:'Detalle',width:0.48,align:'left'}
      ],
      slug: 'indicadores_rae_escenario',
      note: 'Rae = 1 − Σ pᵢ² sobre afirmativo, negativo y abstención. Excluye ausentes y presidencia. Cercano a 0 = voto concentrado; cercano al máximo teórico (0.667) = voto repartido entre las tres categorías.'
    };
  }

  if(kind === 'fam-comp-wide'){
    // Comparador wide: familia × escenario con todas las métricas
    const mat = computeFamilyComparison();
    const rows = [];
    mat.forEach(fm => {
      scens.forEach(sc => {
        const r = fm.perScenario[sc.id];
        if(!r || !r.total) return;
        const y = r.AFIRMATIVO || 0, n = r.NEGATIVO || 0;
        const denom = y + n;
        const rice = denom > 0 ? (Math.abs(y - n) / denom * 100).toFixed(1) + '%' : 'No calculable';
        rows.push({
          familia: fm.family, caso: sc.caseName, camara: sc.chamberShort,
          legisladores: r.total, afi: r.AFIRMATIVO, neg: r.NEGATIVO, aus: r.AUSENTE,
          pctYes: fmt(r.pctYesPresent), pctNo: fmt(r.pctNoPresent),
          cohesion: fmt(r.cohesion), rice,
          dominante: VOTE_LABELS_CSV[r.dominantVote] || '—'
        });
      });
    });
    return {
      layout: 'simple-table',
      title:  'Comparador de familias políticas — 4 escenarios',
      bajada: 'Comportamiento de cada familia en cada uno de los 4 escenarios: legisladores, voto, cohesión simple y Rice.',
      columns: [
        {key:'familia',label:'Familia política'}, {key:'caso',label:'Caso'}, {key:'camara',label:'Cámara'},
        {key:'legisladores',label:'Legisladores'}, {key:'afi',label:'Afirmativos'}, {key:'neg',label:'Negativos'}, {key:'aus',label:'Ausentes'},
        {key:'pctYes',label:'% Afirmativo (presentes)'}, {key:'pctNo',label:'% Negativo (presentes)'},
        {key:'cohesion',label:'Cohesión simple (%)'}, {key:'rice',label:'Índice de Rice'},
        {key:'dominante',label:'Voto dominante'}
      ],
      rows,
      pngColumns: [
        {key:'familia',label:'Familia',width:0.22,align:'left'},
        {key:'caso',label:'Caso',width:0.14,align:'left'},
        {key:'camara',label:'Cámara',width:0.10,align:'left'},
        {key:'legisladores',label:'Legs',width:0.06,align:'right'},
        {key:'pctYes',label:'% Afi',width:0.10,align:'right'},
        {key:'pctNo',label:'% Neg',width:0.10,align:'right'},
        {key:'cohesion',label:'Cohesión',width:0.10,align:'right'},
        {key:'rice',label:'Rice',width:0.10,align:'right'},
        {key:'dominante',label:'Voto dom.',width:0.08,align:'left'}
      ],
      slug: 'comparador_familias_completo',
      note: 'Una fila por familia × escenario. La cohesión simple usa el voto dominante sobre presentes (excluye ausentes); Rice es la cohesión dicotómica clásica afi/neg.',
      noScenarioInName: true,
      filenameOverride: 'comparador_familias_completo'
    };
  }

  if(kind === 'prov-comp-wide'){
    const mat = computeProvinceComparison();
    const rows = [];
    mat.forEach(pm => {
      scens.forEach(sc => {
        const r = pm.perScenario[sc.id];
        if(!r || !r.total) return;
        rows.push({
          provincia: pm.province, caso: sc.caseName, camara: sc.chamberShort,
          representantes: r.total, afi: r.AFIRMATIVO, neg: r.NEGATIVO,
          abst: r.ABSTENCION, aus: r.AUSENTE,
          pctYes: fmt(r.pctYes), pctNo: fmt(r.pctNo), cohesion: fmt(r.cohesion),
          dominante: r.isMixed ? 'Composición mixta' : (VOTE_LABELS_CSV[r.dominantVote] || '—'),
          patron: pm.allYes ? 'Siempre afirmativa' : (pm.allNo ? 'Siempre negativa' : (pm.changes ? 'Cambia entre escenarios' : 'Consistente'))
        });
      });
    });
    return {
      layout: 'simple-table',
      title:  'Comparador territorial — 4 escenarios',
      bajada: 'Comportamiento de cada provincia en cada uno de los 4 escenarios: representantes, voto, cohesión territorial y patrón cross-escenario.',
      columns: [
        {key:'provincia',label:'Provincia'}, {key:'caso',label:'Caso'}, {key:'camara',label:'Cámara'},
        {key:'representantes',label:'Representantes'}, {key:'afi',label:'Afirmativos'}, {key:'neg',label:'Negativos'},
        {key:'abst',label:'Abstenciones'}, {key:'aus',label:'Ausentes'},
        {key:'pctYes',label:'% Afirmativo'}, {key:'pctNo',label:'% Negativo'},
        {key:'cohesion',label:'Cohesión territorial (%)'},
        {key:'dominante',label:'Voto dominante'}, {key:'patron',label:'Patrón cross-escenario'}
      ],
      rows,
      pngColumns: [
        {key:'provincia',label:'Provincia',width:0.16,align:'left'},
        {key:'caso',label:'Caso',width:0.12,align:'left'},
        {key:'camara',label:'Cámara',width:0.09,align:'left'},
        {key:'representantes',label:'Reps',width:0.06,align:'right'},
        {key:'afi',label:'Afi',width:0.06,align:'right'},
        {key:'neg',label:'Neg',width:0.06,align:'right'},
        {key:'pctYes',label:'% Afi',width:0.08,align:'right'},
        {key:'cohesion',label:'Coh.',width:0.08,align:'right'},
        {key:'dominante',label:'Voto dom.',width:0.12,align:'left'},
        {key:'patron',label:'Patrón',width:0.17,align:'left'}
      ],
      slug: 'comparador_territorial_completo',
      note: 'Una fila por provincia × escenario. El patrón "cross-escenario" clasifica la trayectoria de la provincia: siempre afirmativa, siempre negativa, cambiante o consistente. Comparar Diputados/Senado considerando que el principio de representación es distinto.',
      noScenarioInName: true,
      filenameOverride: 'comparador_territorial_completo'
    };
  }

  if(kind === 'rice-rae'){
    const famRice = computeFamilyRice(scenario);
    const blkRice = computeBlockRice(scenario);
    const rae     = computeScenarioRae(scenario);
    const rows = [];
    rows.push({ tipo:'Rae · escenario', dimension:'Fragmentación del voto emitido',
      valor: rae.computable ? rae.value.toFixed(3) : 'No calculable',
      detalle: rae.computable ? `Base: ${rae.denom} votos (afi+neg+abst); excluye ausentes y presidencia` : 'Sin votos emitidos en este escenario' });
    famRice.forEach(f => rows.push({
      tipo:'Rice · familia', dimension: f.family + ' (' + f.total + ')',
      valor: f.riceComputable ? (f.rice * 100).toFixed(1) + '%' : 'No calculable',
      detalle: f.riceComputable ? `Afi=${f.AFIRMATIVO} · Neg=${f.NEGATIVO} · base=${f.denom}` : 'Sin afi/neg en esta familia'
    }));
    blkRice.slice(0, 20).forEach(b => rows.push({
      tipo:'Rice · bloque', dimension: b.block + ' (' + b.total + ')',
      valor: b.riceComputable ? (b.rice * 100).toFixed(1) + '%' : 'No calculable',
      detalle: b.riceComputable ? `Afi=${b.AFIRMATIVO} · Neg=${b.NEGATIVO} · base=${b.denom}` : 'Sin afi/neg en este bloque'
    }));
    return {
      layout: 'two-pane-bars-rice',
      title:  'Cohesión dicotómica (Rice) y fragmentación (Rae)',
      bajada: 'Rice = |Afi − Neg| / (Afi + Neg) por familia y bloque; excluye ausentes, presidencia y abstenciones. Rae = 1 − Σpᵢ² sobre los votos emitidos del escenario.',
      raeValue:     rae.computable ? rae.value : null,
      raeDenom:     rae.computable ? rae.denom : 0,
      raeComputable: rae.computable,
      famRice:      famRice.filter(f => f.riceComputable).slice(0, 8).map(f => ({ family: f.family, total: f.total, rice: f.rice })),
      blkRice:      blkRice.filter(b => b.riceComputable).slice(0, 8).map(b => ({ block: b.block, family: b.family, total: b.total, rice: b.rice })),
      // CSV
      columns: [...CTX_COLS, {key:'tipo',label:'Dimensión'}, {key:'dimension',label:'Detalle'}, {key:'valor',label:'Valor'}, {key:'detalle',label:'Base de cálculo'}],
      rows: withCtx(rows),
      slug: 'indicadores_rice_rae',
      note: 'Rice cercano a 100% = cohesión dicotómica plena entre afi y neg. Rae cercano a 0 = voto concentrado en una categoría; valores más altos = voto repartido entre afi/neg/abst. Si Afi+Neg=0 en un grupo, Rice queda como No calculable.'
    };
  }

  // ---------- DIVISIÓN B · comparador ----------
  if(kind === 'comp-rae'){
    const scens = Object.values(SCENARIOS);
    const fmtRae = (n) => Number.isFinite(n) ? n.toFixed(3) : '—';
    const rowsRae = scens.map(sc => {
      const rae = computeScenarioRae(sc);
      return {
        caso: sc.caseName, camara: sc.chamberShort, fecha: sc.date, ley: sc.law,
        rae: rae.computable ? fmtRae(rae.value) : 'No calculable',
        votosEmitidos: rae.denom,
        afirmativos: rae.computable ? rae.parts.yes : 0,
        negativos:   rae.computable ? rae.parts.no  : 0,
        abstenciones:rae.computable ? rae.parts.abst : 0,
        interpretacion: !rae.computable ? 'Sin votos emitidos'
                       : rae.value < 0.20 ? 'Voto altamente concentrado'
                       : rae.value < 0.40 ? 'Voto moderadamente concentrado'
                       : rae.value < 0.55 ? 'Voto fragmentado'
                       : 'Voto altamente fragmentado'
      };
    });
    const bars = scens.map(sc => {
      const rae = computeScenarioRae(sc);
      return { label: scenShortLabel(sc), value: rae.computable ? rae.value : 0,
        sub: rae.computable ? `${rae.denom} votos emitidos` : 'no calculable',
        computable: rae.computable };
    });
    return {
      layout: 'rae-bars',
      title:  'Fragmentación comparada · índice de Rae',
      bajada: 'Rae = 1 − Σpᵢ² sobre afirmativos, negativos y abstenciones (excluye ausentes y presidencia). Más alto = más fragmentado.',
      raeBars: bars,
      columns: [
        {key:'caso',label:'Caso'}, {key:'camara',label:'Cámara'}, {key:'fecha',label:'Fecha'}, {key:'ley',label:'Ley'},
        {key:'rae',label:'Índice de Rae'}, {key:'votosEmitidos',label:'Base · votos emitidos'},
        {key:'afirmativos',label:'Afirmativos'}, {key:'negativos',label:'Negativos'}, {key:'abstenciones',label:'Abstenciones'},
        {key:'interpretacion',label:'Interpretación'}
      ],
      rows: rowsRae,
      slug: 'comparador_rae_fragmentacion',
      note: 'El máximo teórico de Rae con 3 categorías es 0.667 (voto perfectamente repartido en tercios). Cercano a 0 indica concentración casi total en una categoría.',
      noScenarioInName: true,
      filenameOverride: 'comparador_rae_fragmentacion'
    };
  }

  if(kind === 'comp-table'){
    const comp = computeScenarioComparison();
    const rows = comp.rows.map(s => ({
      caso: s.caseName, camara: s.chamberShort, fecha: s.date, ley: s.law,
      bancas: s.totalSeats, quorum: s.quorum, presentes: s.present,
      afirmativos: s.AFIRMATIVO, negativos: s.NEGATIVO, abstenciones: s.ABSTENCION, ausentes: s.AUSENTE,
      margen: s.margin, pctYes: fmt(s.pctYesPresent), pctNo: fmt(s.pctNoPresent),
      tasaAus: fmt(s.absenceRate), pctApoyo: fmt(s.pctYesOfTotal), resultado: s.result
    }));
    return {
      layout:   'comparator-grouped',
      title:    'Tabla comparativa — los 4 escenarios',
      bajada:   'Indicadores agrupados en bloques temáticos: composición del cuerpo · resultado de la votación · participación · veredicto.',
      scenarios: comp.rows,
      groups: [
        { title:'Composición del cuerpo', metrics: [
          { label:'Bancas',    get: s => s.totalSeats },
          { label:'Quórum',    get: s => s.quorum },
          { label:'Presentes', get: s => s.present }
        ]},
        { title:'Resultado de la votación', metrics: [
          { label:'Afirmativos',  get: s => s.AFIRMATIVO, tone:'yes' },
          { label:'Negativos',    get: s => s.NEGATIVO,   tone:'no' },
          { label:'Abstenciones', get: s => s.ABSTENCION },
          { label:'Margen',       get: s => (s.margin>=0?'+':'')+s.margin, sub:'afi − neg' },
          { label:'% Afirmativo', get: s => fmt(s.pctYesPresent)+'%', tone:'yes', sub:'sobre presentes' },
          { label:'% Negativo',   get: s => fmt(s.pctNoPresent)+'%',  tone:'no',  sub:'sobre presentes' }
        ]},
        { title:'Participación', metrics: [
          { label:'Ausentes',         get: s => s.AUSENTE },
          { label:'Tasa de ausencia', get: s => fmt(s.absenceRate)+'%', sub:'sobre cuerpo' }
        ]},
        { title:'Veredicto', metrics: [
          { label:'Resultado', get: s => s.result || '—', tone:'result' }
        ]}
      ],
      columns: [
        {key:'caso',label:'Caso'}, {key:'camara',label:'Cámara'}, {key:'fecha',label:'Fecha'}, {key:'ley',label:'Ley'},
        {key:'bancas',label:'Bancas'}, {key:'quorum',label:'Quórum'}, {key:'presentes',label:'Presentes'},
        {key:'afirmativos',label:'Afirmativos'}, {key:'negativos',label:'Negativos'},
        {key:'abstenciones',label:'Abstenciones'}, {key:'ausentes',label:'Ausentes'},
        {key:'margen',label:'Margen'}, {key:'pctYes',label:'% Afirmativo (presentes)'},
        {key:'pctNo',label:'% Negativo (presentes)'}, {key:'tasaAus',label:'Tasa de ausencia'},
        {key:'pctApoyo',label:'% Apoyo (cuerpo)'}, {key:'resultado',label:'Resultado'}
      ],
      rows,
      slug:     'comparador_tabla_agregada',
      note:     'Diputados: actas nominales HCDN. Senado: actas HSN + SEN AMPLIADOS XLSX. Diputados y Senado tienen principios de representación distintos.',
      noScenarioInName: true,
      filenameOverride: 'comparador_tabla_agregada'
    };
  }

  if(kind === 'comp-diff'){
    const comp = computeScenarioComparison();
    const find = (caseName, chamber) => comp.rows.find(s => s.caseName === caseName && s.chamberShort === chamber);
    const aD = find('Aerolíneas Argentinas', 'Diputados');
    const yD = find('YPF', 'Diputados');
    const aS = find('Aerolíneas Argentinas', 'Senado');
    const yS = find('YPF', 'Senado');
    const pair = (label, A, B) => {
      if(!A || !B) return null;
      return {
        title: label,
        deltas: [
          { label:'Δ % Afirmativo', value: B.pctYesPresent - A.pctYesPresent, unit:'pp' },
          { label:'Δ % Negativo',   value: B.pctNoPresent  - A.pctNoPresent,  unit:'pp' },
          { label:'Δ ausentismo',   value: B.absenceRate   - A.absenceRate,   unit:'pp' },
          { label:'Δ margen',       value: B.margin        - A.margin,        unit:'votos' }
        ]
      };
    };
    const blocks = [
      pair('YPF − Aerolíneas · Diputados', aD, yD),
      pair('YPF − Aerolíneas · Senado',    aS, yS),
      pair('Senado − Diputados · Aerolíneas', aD, aS),
      pair('Senado − Diputados · YPF',        yD, yS)
    ].filter(Boolean);
    const csvRows = [];
    blocks.forEach(blk => blk.deltas.forEach(d => csvRows.push({
      comparacion: blk.title, indicador: d.label, delta: sgn(d.value), unidad: d.unit
    })));
    return {
      layout:   'diff-grid',
      title:    'Diferencias entre casos y entre cámaras',
      bajada:   'Para cada par comparable: cuánto más (o menos) tuvo la segunda votación respecto de la primera. Verde = aumentó · burdeos = bajó.',
      blocks,
      columns: [
        {key:'comparacion',label:'Comparación'},
        {key:'indicador',label:'Indicador'},
        {key:'delta',label:'Δ'},
        {key:'unidad',label:'Unidad'}
      ],
      rows: csvRows,
      slug:     'comparador_diferencias',
      note:     'Convención: Δ X − Y es X menos Y. Comparar Diputados y Senado considerando que el principio de representación es distinto (población vs. 3 por distrito).',
      noScenarioInName: true,
      filenameOverride: 'comparador_diferencias'
    };
  }

  if(kind === 'comp-rank'){
    const comp = computeScenarioComparison();
    const r = comp.rankings;
    const scenLabel = (s) => `${s.caseName} · ${s.chamberShort}`;
    const ranks = [
      { label:'Mayor apoyo afirmativo', winner: scenLabel(r.maxSupport),   value: fmt(r.maxSupport.pctYesPresent) + '%', base:'sobre presentes', tone:'yes' },
      { label:'Mayor rechazo',          winner: scenLabel(r.maxRejection), value: fmt(r.maxRejection.pctNoPresent) + '%', base:'sobre presentes', tone:'no' },
      { label:'Mayor ausentismo',       winner: scenLabel(r.maxAbsence),   value: fmt(r.maxAbsence.absenceRate) + '%',    base:'sobre cuerpo',    tone:'warn' },
      { label:'Mayor margen',           winner: scenLabel(r.maxMargin),    value: (r.maxMargin.margin>=0?'+':'')+r.maxMargin.margin+' votos', base:'afi − neg' },
      { label:'Menor margen',           winner: scenLabel(r.minMargin),    value: (r.minMargin.margin>=0?'+':'')+r.minMargin.margin+' votos', base:'afi − neg' }
    ];
    const rows = ranks.map(rk => ({ ranking: rk.label, escenario: rk.winner, valor: rk.value, base: rk.base }));
    return {
      layout:   'ranking-cards',
      title:    'Rankings cualitativos',
      bajada:   'Qué escenario lidera cada métrica clave de la votación.',
      ranks,
      columns: [
        {key:'ranking',label:'Ranking'}, {key:'escenario',label:'Escenario líder'},
        {key:'valor',label:'Valor'}, {key:'base',label:'Base de cálculo'}
      ],
      rows,
      slug:     'comparador_rankings',
      note:     'Los rankings reportan el escenario que maximiza cada métrica, sin valor normativo sobre el resultado.',
      noScenarioInName: true,
      filenameOverride: 'comparador_rankings'
    };
  }

  if(kind === 'comp-fam'){
    // WIDE: una fila por familia, cuatro columnas (una por escenario)
    const mat = computeFamilyComparison();
    const wideRows = mat.map(fm => {
      const cells = {};
      scens.forEach(sc => {
        const r = fm.perScenario[sc.id];
        cells[sc.id] = r && r.total ? r : null;
      });
      return { family: fm.family, color: fm.color, cells };
    });
    const csvRows = [];
    mat.forEach(fm => {
      scens.forEach(sc => {
        const r = fm.perScenario[sc.id];
        if(!r || !r.total) return;
        csvRows.push({
          familia: fm.family, caso: sc.caseName, camara: sc.chamberShort,
          legisladores: r.total, afirmativos: r.AFIRMATIVO, negativos: r.NEGATIVO, ausentes: r.AUSENTE,
          pctYes: fmt(r.pctYesPresent), pctNo: fmt(r.pctNoPresent),
          cohesion: fmt(r.cohesion), dominante: VOTE_LABELS_CSV[r.dominantVote] || '—'
        });
      });
    });
    return {
      layout:   'wide-matrix',
      title:    'Familias políticas en los 4 escenarios',
      bajada:   'Una fila por familia política. Cada celda muestra cuántos legisladores aportó al escenario y qué porcentaje votó afirmativo (intensidad cromática proporcional).',
      scenarios: scens,
      wideRows,
      rowKind: 'family',
      cellMode: 'family',
      columns: [
        {key:'familia',label:'Familia política'}, {key:'caso',label:'Caso'}, {key:'camara',label:'Cámara'},
        {key:'legisladores',label:'Legisladores'}, {key:'afirmativos',label:'Afirmativos'},
        {key:'negativos',label:'Negativos'}, {key:'ausentes',label:'Ausentes'},
        {key:'pctYes',label:'% Afirmativo (presentes)'}, {key:'pctNo',label:'% Negativo (presentes)'},
        {key:'cohesion',label:'Cohesión (%)'}, {key:'dominante',label:'Voto dominante'}
      ],
      rows: csvRows,
      slug:     'comparador_familias_heatmap',
      note:     'Verde más intenso = mayor proporción de voto afirmativo. La cifra grande es el % afi; debajo, "n legs · cohesión %".',
      noScenarioInName: true,
      filenameOverride: 'comparador_familias_heatmap'
    };
  }

  if(kind === 'comp-prov'){
    // WIDE: una fila por provincia, cuatro columnas (una por escenario) + patrón
    const mat = computeProvinceComparison();
    const wideRows = mat.map(pm => {
      const cells = {};
      scens.forEach(sc => {
        const r = pm.perScenario[sc.id];
        cells[sc.id] = r && r.total ? r : null;
      });
      return {
        province: pm.province, cells,
        patternTag: pm.allYes ? 'Siempre afirm.' : (pm.allNo ? 'Siempre neg.' : (pm.changes ? 'Cambia' : 'Consistente')),
        patternTone: pm.allYes ? 'yes' : (pm.allNo ? 'no' : (pm.changes ? 'warn' : 'neutral'))
      };
    });
    const csvRows = [];
    mat.forEach(pm => scens.forEach(sc => {
      const r = pm.perScenario[sc.id];
      if(!r || !r.total) return;
      csvRows.push({
        provincia: pm.province, caso: sc.caseName, camara: sc.chamberShort,
        representantes: r.total, afirmativos: r.AFIRMATIVO, negativos: r.NEGATIVO, ausentes: r.AUSENTE,
        pctYes: fmt(r.pctYes), pctNo: fmt(r.pctNo),
        dominante: r.isMixed ? 'Composición mixta' : (VOTE_LABELS_CSV[r.dominantVote] || '—'),
        patron: pm.allYes ? 'Siempre afirmativa' : (pm.allNo ? 'Siempre negativa' : (pm.changes ? 'Cambia entre escenarios' : 'Consistente'))
      });
    }));
    return {
      layout:   'wide-matrix',
      title:    'Provincias en los 4 escenarios',
      bajada:   'Una fila por provincia. La intensidad cromática es proporcional al voto dominante (verde = afirmativo, burdeos = negativo). La última columna identifica el patrón cross-escenario.',
      scenarios: scens,
      wideRows,
      rowKind: 'province',
      cellMode: 'province',
      columns: [
        {key:'provincia',label:'Provincia'}, {key:'caso',label:'Caso'}, {key:'camara',label:'Cámara'},
        {key:'representantes',label:'Representantes'}, {key:'afirmativos',label:'Afirmativos'},
        {key:'negativos',label:'Negativos'}, {key:'ausentes',label:'Ausentes'},
        {key:'pctYes',label:'% Afirmativo'}, {key:'pctNo',label:'% Negativo'},
        {key:'dominante',label:'Voto dominante'}, {key:'patron',label:'Patrón cross-escenario'}
      ],
      rows: csvRows,
      slug:     'comparador_provincias_heatmap',
      note:     'Comparar Diputados/Senado considerando que el principio de representación es distinto: población vs. 3 por jurisdicción.',
      noScenarioInName: true,
      filenameOverride: 'comparador_provincias_heatmap'
    };
  }

  return null;
}

// CSV granular por bloque
function exportStatsSectionCsv(kind){
  const s = activeScenario();
  if(!s) return;
  const spec = buildStatsSpec(kind, s);
  if(!spec){ console.error('exportStatsSectionCsv: kind desconocido', kind); return; }
  if(!spec.rows.length){ alert('No hay filas para exportar en este bloque.'); return; }
  const filename = spec.noScenarioInName
    ? (spec.filenameOverride || spec.slug) + '.csv'
    : slugifyFilename([s.id, spec.slug]) + '.csv';
  exportCsv(spec.rows, spec.columns, filename);
}

// PNG por bloque estadístico — soporta varios layouts editoriales:
//   ficha-hero, two-pane-bars, cohesion-bars, territory-bars,
//   comparator-grouped, diff-grid, ranking-cards, wide-matrix
function exportStatsSectionPng(kind){
  const s = activeScenario();
  if(!s) return;
  const spec = buildStatsSpec(kind, s);
  if(!spec){ console.error('exportStatsSectionPng: kind desconocido', kind); return; }

  // Helpers locales — `fmt` y `sgn` viven en buildStatsSpec; los necesitamos
  // también acá para los layouts que formatean valores en runtime (wide-matrix,
  // diff-grid, etc.).
  const fmt = (n) => Number.isFinite(n) ? n.toFixed(1) : '0.0';
  const sgn = (n) => (n >= 0 ? '+' : '') + (Number.isFinite(n) ? n.toFixed(1) : '0.0');

  const NS = 'http://www.w3.org/2000/svg';
  const PAD_X = 50;
  let totalW = kind.startsWith('comp-') ? 1300 : 1100;
  // Tablas simples (Rice, Rae, comparadores wide): columnas dimensionadas al
  // encabezado medido; el lienzo se ensancha lo necesario para que ningún
  // encabezado se encime. Se calcula antes del header para fijar el ancho.
  let _simpleColWs = null;
  if(spec.layout === 'simple-table' && spec.pngColumns){
    const def = totalW - 2 * PAD_X;
    let ws = spec.pngColumns.map(c => Math.max(
      Math.round(def * c.width),
      Math.ceil(_measureTextW((c.label || c.key).toUpperCase(), 10, '700', TBL_PNG_FONTS.sans, 1.4)) + 26
    ));
    const sum = ws.reduce((a, b) => a + b, 0);
    if(sum > def){ totalW = sum + 2 * PAD_X; }            // ensanchar el lienzo
    else { const k = def / sum; ws = ws.map(w => Math.round(w * k)); } // o escalar para llenar
    _simpleColWs = ws;
  }
  const availW = totalW - 2 * PAD_X;
  const headerOut = buildTablePngHeader(NS, s, spec.title, spec.bajada, totalW, PAD_X, { noMetaChips: !!spec.noScenarioInName });
  let cursorY = headerOut.headerBottomY + 28;

  const wrapper = document.createElementNS(NS, 'svg');
  wrapper.setAttribute('xmlns', NS);
  const elements = [];

  // Helpers de dibujo SVG
  const addRect = (x, y, w, h, fill, stroke) => {
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', x); r.setAttribute('y', y);
    r.setAttribute('width', w); r.setAttribute('height', h);
    r.setAttribute('fill', fill || 'none');
    if(stroke){ r.setAttribute('stroke', stroke); r.setAttribute('stroke-width', '1'); }
    return r;
  };
  const addText = (x, y, text, opts={}) => {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('font-family', opts.font || TBL_PNG_FONTS.sans);
    t.setAttribute('font-size', opts.size || '11');
    t.setAttribute('font-weight', opts.weight || '500');
    t.setAttribute('fill', opts.fill || '#14181f');
    if(opts.anchor) t.setAttribute('text-anchor', opts.anchor);
    if(opts.tracking) t.setAttribute('letter-spacing', opts.tracking);
    if(opts.style) t.setAttribute('font-style', opts.style);
    const raw = String(text != null ? text : '');
    if(opts.maxChars && raw.length > opts.maxChars){
      t.textContent = raw.slice(0, opts.maxChars - 1) + '…';
    } else {
      t.textContent = raw;
    }
    return t;
  };
  const addCircle = (cx, cy, r, fill) => {
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
    c.setAttribute('fill', fill);
    return c;
  };
  const VOTE_HEX = { yes:'#3f6e44', no:'#a32a2a', warn:'#a87523', abs:'#a09b8c' };

  // Mini-barra de composición (yes/no/abst/aus) con width fija
  const drawVoteComposition = (x, y, w, h, dist, total) => {
    const acc = [];
    acc.push(addRect(x, y, w, h, '#ece6d5'));
    if(!total) return acc;
    let cx = x;
    const segs = [
      { val: dist.yes||0,  color: VOTE_HEX.yes },
      { val: dist.no||0,   color: VOTE_HEX.no },
      { val: dist.abst||0, color: VOTE_HEX.warn },
      { val: dist.aus||0,  color: VOTE_HEX.abs }
    ];
    segs.forEach(seg => {
      if(seg.val <= 0) return;
      const sw = w * seg.val / total;
      acc.push(addRect(cx, y, sw, h, seg.color));
      cx += sw;
    });
    return acc;
  };

  // Bg interpolado para heatmap (alpha proporcional)
  const heatBg = (hex, pct) => _heatBg(hex, pct);

  // -----------------------------------------------------------------
  // LAYOUTS
  // -----------------------------------------------------------------

  if(spec.layout === 'ficha-hero'){
    // KPI hero (3 columnas) + 2 grupos de pares K/V
    const heroH = 92;
    const heroBox = addRect(PAD_X, cursorY, availW, heroH, '#fffdf8', '#14181f');
    heroBox.setAttribute('stroke-width', '0.6');
    elements.push(heroBox);
    const colW = availW / spec.hero.length;
    spec.hero.forEach((h, i) => {
      const x = PAD_X + i * colW;
      if(i > 0){
        const sep = document.createElementNS(NS, 'line');
        sep.setAttribute('x1', x); sep.setAttribute('y1', cursorY + 12);
        sep.setAttribute('x2', x); sep.setAttribute('y2', cursorY + heroH - 12);
        sep.setAttribute('stroke', '#d9d3c4'); sep.setAttribute('stroke-width', '1');
        elements.push(sep);
      }
      elements.push(addText(x + 16, cursorY + 22, h.label.toUpperCase(),
        { size:'9.5', weight:'700', fill:'#6a6a64', tracking:'1.8' }));
      const tone = h.tone === 'yes' ? VOTE_HEX.yes : (h.tone === 'no' ? VOTE_HEX.no : '#14181f');
      elements.push(addText(x + 16, cursorY + 60, String(h.value),
        { font: TBL_PNG_FONTS.serifTitle, size:'30', weight:'700', fill: tone, tracking:'-1' }));
      elements.push(addText(x + 16, cursorY + 80, h.sub,
        { size:'10', fill:'#6a6a64' }));
    });
    cursorY += heroH + 24;

    // 2 grupos K/V lado a lado
    spec.kvGroups.forEach((grp, gi) => {
      const groupW = (availW - 16) / spec.kvGroups.length;
      const gx = PAD_X + gi * (groupW + 16);
      elements.push(addText(gx, cursorY, grp.title.toUpperCase(),
        { size:'10', weight:'700', fill:'#9c7a2c', tracking:'1.8' }));
      const goldRule = document.createElementNS(NS, 'line');
      goldRule.setAttribute('x1', gx); goldRule.setAttribute('y1', cursorY + 6);
      goldRule.setAttribute('x2', gx + 24); goldRule.setAttribute('y2', cursorY + 6);
      goldRule.setAttribute('stroke', '#9c7a2c'); goldRule.setAttribute('stroke-width', '2');
      elements.push(goldRule);
      let itemY = cursorY + 26;
      grp.items.forEach((it, idx) => {
        const tone = it.tone === 'yes' ? VOTE_HEX.yes
                   : it.tone === 'no'  ? VOTE_HEX.no
                   : it.tone === 'warn'? VOTE_HEX.warn : '#14181f';
        elements.push(addText(gx, itemY, it.k.toUpperCase(),
          { size:'9.5', weight:'700', fill:'#6a6a64', tracking:'1.4' }));
        elements.push(addText(gx + groupW - 4, itemY, String(it.v),
          { font: TBL_PNG_FONTS.serifTitle, size:'15', weight:'700', fill: tone, anchor:'end', tracking:'-0.3' }));
        elements.push(addText(gx, itemY + 14, it.sub,
          { size:'10', fill:'#9a9588' }));
        if(idx < grp.items.length - 1){
          const sep = document.createElementNS(NS, 'line');
          sep.setAttribute('x1', gx); sep.setAttribute('y1', itemY + 22);
          sep.setAttribute('x2', gx + groupW - 4); sep.setAttribute('y2', itemY + 22);
          sep.setAttribute('stroke', '#d9d3c4'); sep.setAttribute('stroke-width', '0.5');
          sep.setAttribute('stroke-dasharray', '2,3');
          elements.push(sep);
        }
        itemY += 38;
      });
    });
    const maxRows = Math.max(...spec.kvGroups.map(g => g.items.length));
    cursorY += 26 + maxRows * 38 + 8;
  }

  else if(spec.layout === 'two-pane-bars' || spec.layout === 'cohesion-bars' || spec.layout === 'territory-bars'){
    // Hero pair o triple (2-3 cards arriba)
    const heroItems = spec.heroPair || spec.heroTriple || [];
    if(heroItems.length){
      const colW = availW / heroItems.length;
      const heroH = 76;
      elements.push(addRect(PAD_X, cursorY, availW, heroH, '#fbf9f1', '#d9d3c4'));
      heroItems.forEach((h, i) => {
        const x = PAD_X + i * colW;
        if(i > 0){
          const sep = document.createElementNS(NS, 'line');
          sep.setAttribute('x1', x); sep.setAttribute('y1', cursorY + 12);
          sep.setAttribute('x2', x); sep.setAttribute('y2', cursorY + heroH - 12);
          sep.setAttribute('stroke', '#d9d3c4'); sep.setAttribute('stroke-width', '1');
          elements.push(sep);
        }
        elements.push(addText(x + 16, cursorY + 22, h.label.toUpperCase(),
          { size:'9.5', weight:'700', fill:'#6a6a64', tracking:'1.6' }));
        const tone = h.tone === 'yes' ? VOTE_HEX.yes
                   : h.tone === 'no'  ? VOTE_HEX.no
                   : h.tone === 'warn'? VOTE_HEX.warn : '#14181f';
        elements.push(addText(x + 16, cursorY + 52, String(h.value),
          { font: TBL_PNG_FONTS.serifTitle, size:'22', weight:'700', fill: tone, tracking:'-0.5' }));
        elements.push(addText(x + 16, cursorY + 68, h.sub,
          { size:'10', fill:'#6a6a64' }));
      });
      cursorY += heroH + 20;
    }

    if(spec.layout === 'two-pane-bars'){
      // Dos paneles con h-bars de %ausentismo
      const paneW = (availW - 24) / 2;
      let maxBottom = cursorY;
      spec.panes.forEach((pane, pi) => {
        const x = PAD_X + pi * (paneW + 24);
        let y = cursorY;
        elements.push(addText(x, y, pane.title.toUpperCase(),
          { size:'10', weight:'700', fill:'#9c7a2c', tracking:'1.6' }));
        y += 18;
        if(!pane.items.length){
          elements.push(addText(x, y, 'Sin datos en este escenario.',
            { size:'11', fill:'#9a9588', style:'italic' }));
          y += 22;
        } else {
          pane.items.forEach(it => {
            // dot opcional (familia)
            let labelX = x;
            if(it.color){
              elements.push(addCircle(x + 4, y + 8, 4, it.color));
              labelX = x + 14;
            }
            elements.push(addText(labelX, y + 12, it.label,
              { size:'11', weight:'600', fill:'#14181f', maxChars: Math.floor((paneW - 110) / 5.8) }));
            elements.push(addText(labelX, y + 26, it.sub,
              { size:'9.5', fill:'#9a9588' }));
            // Mini-barra
            const barX = x + paneW - 100;
            const barW = 70;
            elements.push(addRect(barX, y + 16, barW, 5, '#ece6d5'));
            elements.push(addRect(barX, y + 16, barW * Math.min(100, it.pct) / 100, 5, VOTE_HEX.warn));
            elements.push(addText(x + paneW, y + 14, (it.pct).toFixed(1) + '%',
              { font: TBL_PNG_FONTS.serifTitle, size:'14', weight:'700', anchor:'end', tracking:'-0.3' }));
            y += 36;
          });
        }
        if(y > maxBottom) maxBottom = y;
      });
      cursorY = maxBottom + 8;
    } else {
      // cohesion-bars / territory-bars: una sola lista de barras
      let y = cursorY;
      const useFamilyDot = spec.layout === 'cohesion-bars';
      const useTerritoryFamilyChip = spec.layout === 'territory-bars';

      // Header de columna
      const headY = y + 12;
      elements.push(addRect(PAD_X, y, availW, 26, '#f8f5ec', '#d9d3c4'));
      elements.push(addText(PAD_X + 12, headY + 4, useFamilyDot ? 'BLOQUE / FAMILIA' : 'PROVINCIA',

      elements.push(addText(PAD_X + availW - 12, headY + 4, useTerritoryFamilyChip ? '% AFIRMATIVO' : '%',
        { size:'10', weight:'700', fill:'#6a6a64', tracking:'1.4', anchor:'end' }));
      y += 26;

      const labelColW = Math.round(availW * 0.40);

      spec.bars.forEach((b, bi) => {

        const auxX = PAD_X + labelColW + barColW + 12;

          elements.push(addText(auxX, y + 18, (b.cohesion).toFixed(1) + '%',

          elements.push(addText(auxX, y + 30, dominantLabel,

        // Última columna: cifra grande a la derecha
        const finalVal = useTerritoryFamilyChip
          ? (b.voteDist.yes && b.total ? (b.voteDist.yes / b.total * 100).toFixed(1) : '0.0') + '%'
          : (b.cohesion).toFixed(1) + '%';
        const finalTone = useTerritoryFamilyChip ? VOTE_HEX.yes :
          (b.dominantVote === 'AFIRMATIVO' ? VOTE_HEX.yes : (b.dominantVote === 'NEGATIVO' ? VOTE_HEX.no : VOTE_HEX.warn));
        elements.push(addText(PAD_X + availW - 12, y + 22, finalVal,

        if(bi < spec.bars.length - 1){

  else if(spec.layout === 'comparator-grouped'){

    spec.scenarios.forEach((sc, i) => {
      const x = PAD_X + labelColW + i * scenColW;

        spec.scenarios.forEach((sc, i) => {
          const x = PAD_X + labelColW + i * scenColW;
          let raw = m.get(sc);
          let tone = '#14181f';
          if(m.tone === 'yes') tone = VOTE_HEX.yes;
          else if(m.tone === 'no') tone = VOTE_HEX.no;
          else if(m.tone === 'result'){
            tone = sc.result === 'AFIRMATIVO' ? VOTE_HEX.yes : (sc.result === 'NEGATIVO' ? VOTE_HEX.no : '#14181f');
          }
          elements.push(addText(x + scenColW/2, cursorY + 20, String(raw),

  else if(spec.layout === 'diff-grid'){

    spec.blocks.forEach((blk, bi) => {

      elements.push(addText(PAD_X + availW - 20, y + 46, rk.value,
        { font: TBL_PNG_FONTS.serifTitle, size:'26', weight:'700', fill: tone, anchor:'end', tracking:'-0.8' }));

    cursorY += spec.ranks.length * (rowH + 10);

  else if(spec.layout === 'simple-table'){
    // Layout genérico: tabla rectangular con header sobre cream + zebra muy

    const headerH = 28;
    const rowH = 28;
    const cols = spec.pngColumns;
    const colWs = _simpleColWs || cols.map(c => Math.round(availW * c.width));
    const colXs = []; let cx = PAD_X;
    colWs.forEach(w => { colXs.push(cx); cx += w; });
    let rowsToRender = spec.rows;
    if(spec.pngLimit && rowsToRender.length > spec.pngLimit) rowsToRender = rowsToRender.slice(0, spec.pngLimit);

    // Header de la tabla
    elements.push(addRect(PAD_X, cursorY, availW, headerH, '#f8f5ec', '#d9d3c4'));
    cols.forEach((c, i) => {
      const align = c.align || 'left';
      const tx = align === 'right' ? colXs[i] + colWs[i] - 10 : colXs[i] + 12;
      const t = addText(tx, cursorY + 18, (c.label || c.key).toUpperCase(),
        { size:'10', weight:'700', fill:'#6a6a64', tracking:'1.4', anchor: align === 'right' ? 'end' : undefined });
      elements.push(t);
