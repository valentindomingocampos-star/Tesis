.heatmap-cell:last-child{ border-right: none; }
.heatmap-cell-label{
  font-weight: var(--w-semi);
  color: var(--ink);
  letter-spacing: -0.005em;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.heatmap-cell-label .family-dot{ width: 8px; height: 8px; border-radius: 50%; margin: 0; flex-shrink: 0; }
.heatmap-cell-value{
  font-family: var(--font-serif);
  font-size: var(--t-md);
  font-variant-numeric: tabular-nums;
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.015em;
}
.heatmap-cell-sub{
  font-size: 9.5px;
  color: var(--muted);
  letter-spacing: -0.003em;
  font-weight: var(--w-medium);
}
.heatmap-cell.is-empty .heatmap-cell-value{ color: var(--muted-soft); font-style: italic; font-weight: var(--w-medium); font-variant-numeric: normal; font-size: var(--t-sm); }
.heatmap-cell.is-empty .heatmap-cell-sub{ font-style: italic; }
.heatmap-row:not(.is-head) .heatmap-cell:first-child{ background: var(--paper-sunk); }
/* Tags de patrón territorial como sellos: tinte + hairline en el color
   (coherente con los sellos de voto de la ficha lateral). */
.heatmap-tag{
  font-size: 9.5px;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: var(--w-semi);
  padding: 2px var(--space-2);
  border-radius: var(--radius-xs);
  display: inline-block;
  white-space: nowrap;
  border: 1px solid;
}
.heatmap-tag.is-always-yes{ background: var(--vote-yes-soft); border-color: var(--vote-yes); color: var(--vote-yes); }
.heatmap-tag.is-always-no{  background: var(--vote-no-soft);  border-color: var(--vote-no);  color: var(--vote-no); }
.heatmap-tag.is-changes{    background: var(--vote-abst-soft); border-color: var(--vote-abst); color: var(--vote-abst); }
.heatmap-tag.is-consistent{ background: var(--vote-abs-soft);  border-color: var(--line-strong); color: var(--ink-2); }

/* Tabla comparativa con filas agrupadas en bloques temáticos */
.comp-table{
  width: 100%;
  border-collapse: collapse;
  font-size: var(--t-sm);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  overflow: hidden;
}
.comp-table thead th{
  background: var(--paper-sunk);
  padding: var(--space-3) var(--space-3);
  text-align: left;
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
  border-bottom: 2px solid var(--line-strong);
  vertical-align: bottom;
}
.comp-table thead th + th{ text-align: right; }
.comp-table thead th .scen-name{
  display: block;
  font-family: var(--font-serif);
  font-size: 13px;
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.015em;
  text-transform: none;
  margin-bottom: 2px;
}
.comp-table thead th .scen-sub{
  display: block;
  font-size: 9.5px;
  color: var(--muted);
  letter-spacing: 0;
  text-transform: none;
  font-weight: var(--w-medium);
}
.comp-table .grp-row td{
  background: var(--paper-sunk);
  padding: var(--space-2) var(--space-3);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent-gold-text);
  font-weight: var(--w-bold);
  border-bottom: 1px solid var(--line);
}
.comp-table td{
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--line);
  vertical-align: baseline;
}
.comp-table td + td{ text-align: right; font-variant-numeric: tabular-nums; }
.comp-table tr:last-child td{ border-bottom: none; }
.comp-table tr.body-row:hover td{ background: var(--paper-sunk); }
.comp-table .metric-label{
  font-weight: var(--w-semi);
  color: var(--ink);
  letter-spacing: -0.005em;
}
.comp-table .metric-sub{
  display: block;
  font-size: 10px;
  color: var(--muted);
  font-weight: var(--w-regular);
  letter-spacing: 0;
  text-transform: none;
  margin-top: 1px;
}
.comp-table .num-cell{ font-family: var(--font-serif); font-size: var(--t-md); font-weight: var(--w-bold); letter-spacing: -0.01em; color: var(--ink); }
.comp-table .num-cell.is-yes{ color: var(--vote-yes); }
.comp-table .num-cell.is-no{  color: var(--vote-no); }

/* Diferencias entre cámaras / casos — bloques tipográficos sobrios */
.diff-grid{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.diff-block{
  padding: var(--space-4) var(--space-4) var(--space-3);
  border-right: 1px solid var(--line);
}
.diff-block:last-child{ border-right: none; }
.diff-block-title{
  margin: 0 0 var(--space-3);
  font-family: var(--font-serif);
  font-size: var(--t-sm);
  letter-spacing: -0.005em;
  text-transform: none;
  color: var(--ink);
  font-weight: var(--w-bold);
}
.diff-row{
  display: grid;
  grid-template-columns: 1fr auto;
  gap: var(--space-2);
  font-size: var(--t-sm);
  align-items: baseline;
  padding: 4px 0;
  border-bottom: 1px dashed var(--line);
}
.diff-row:last-child{ border-bottom: none; }
.diff-row-label{
  color: var(--ink-2);
  letter-spacing: -0.005em;
}
.diff-delta{
  font-family: var(--font-serif);
  font-weight: var(--w-bold);
  font-variant-numeric: tabular-nums;
  color: var(--ink-2);
  letter-spacing: -0.015em;
  font-size: var(--t-md);
}
.diff-delta.up{   color: var(--vote-yes); }
.diff-delta.down{ color: var(--vote-no); }
.diff-delta.zero{ color: var(--muted); }

/* Síntesis interpretativa — bloque tipográfico al inicio de cada división,
   con frases descriptivas automáticas derivadas de los indicadores. No usa
   cards: es lectura de informe académico. */
.insights-block{
  padding: var(--space-5) var(--space-6) var(--space-3);
  background: var(--paper-sunk);
  border-bottom: 1px solid var(--line-strong);
}
.insights-eyebrow{
  margin: 0 0 var(--space-2);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent-gold-text);
  font-weight: var(--w-bold);
}
.insights-list{
  margin: 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: var(--space-2);
  max-width: 920px;
}
.insights-list li{
  padding: var(--space-2) 0 var(--space-2) var(--space-5);
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.65;
  letter-spacing: -0.003em;
  position: relative;
  border-bottom: 1px dashed var(--line);
}
.insights-list li:last-child{ border-bottom: none; }
.insights-list li::before{
  content: '§';
  position: absolute;
  left: 0;
  top: var(--space-2);
  color: var(--accent-gold-text);
  font-weight: var(--w-bold);
  font-size: var(--t-md);
  font-family: var(--font-serif);
}
.insights-list em{
  font-style: normal;
  font-weight: var(--w-semi);
  color: var(--ink);
}

/* Mini-leyenda de intensidad de los heatmaps (5.2): explica qué significa la
   saturación del color. Sobria, debajo de cada heatmap. */
.heat-scale{
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-2) var(--space-3);
  margin-top: var(--space-3);
  font-size: var(--t-xs);
  color: var(--muted);
  letter-spacing: -0.002em;
}
.heat-scale-label{ font-weight: var(--w-medium); }
.heat-scale-bar{
  width: 120px;
  height: 8px;
  border-radius: 2px;
  border: 1px solid var(--line);
}
.heat-scale-ends{
  display: inline-flex;
  justify-content: space-between;
  width: 120px;
  margin-left: calc(-1 * var(--space-3) + 2px);
  font-size: 10px;
  color: var(--muted-soft);
}
.heat-key{ display: inline-flex; align-items: center; gap: var(--space-2); }
.heat-key-sw{
  width: 14px;
  height: 14px;
  border-radius: 3px;
  border: 1px solid var(--line);
  display: inline-block;
}

/* Selector de métrica del heatmap familias × escenarios — control plano del
   sistema (mismo lenguaje que el selector Caso×Cámara y Hemiciclo/Mapa):
   registro plano, segmentos separados por hairline, activo con filete dorado. */
.metric-toggle{
  display: inline-flex;
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  padding: 0;
  gap: 0;
  overflow: hidden;
  margin-bottom: var(--space-3);
}
.metric-toggle button{
  appearance: none;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: var(--t-xs);
  font-weight: var(--w-semi);
  color: var(--muted);
  padding: 6px var(--space-3) 5px;
  border-radius: 0;
  cursor: pointer;
  letter-spacing: .04em;
  text-transform: uppercase;
  position: relative;
  transition: background var(--dur-1) var(--ease-soft), color var(--dur-1) var(--ease-soft);
}
.metric-toggle button + button{ border-left: 1px solid var(--line); }
.metric-toggle button:hover{ color: var(--ink-2); }
.metric-toggle button[aria-pressed="true"]{
  background: var(--paper-sunk);
  color: var(--ink);
}
.metric-toggle button[aria-pressed="true"]::after{
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 2px;
  background: var(--gold-rule);
}

/* =====================================================================
   VISUALIZACIONES COMPARADAS (B.7–B.9) — hemiciclos/mapas lado a lado + grilla
   ===================================================================== */
/* Barra de controles del comparado: par + color (+ vista de grilla). */
.compare-controls-bar{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-4) var(--space-6);
  align-items: flex-end;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--line);
  background: var(--paper-sunk);
}
.compare-controls-inset{
  border: 1px solid var(--line);
  border-radius: var(--radius-xs);
  background: var(--paper-sunk);
  margin-bottom: var(--space-4);
}
.compare-ctrl{ display: flex; flex-direction: column; gap: var(--space-2); }
.compare-ctrl-label{
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
}
.compare-pair-toggle{ flex-wrap: wrap; }

/* Par lado a lado y grilla 2×2 */
.dual-viz{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-4);
  align-items: start;
}
.quad-viz{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-4);
  align-items: start;
}
@media (max-width: 1100px){
  .dual-viz, .quad-viz{ grid-template-columns: 1fr; }
}

/* Celda: header editorial + SVG */
.cmp-cell{
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  background: var(--card);
  overflow: hidden;
  position: relative;
}
.cmp-cell::before{
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 40px; height: 2px;
  background: var(--gold-rule);
  z-index: 2;
}
.cmp-cell-label{
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--line);
  background: var(--paper-sunk);
}
.cmp-cell-scen{
  font-family: var(--font-serif);
  font-size: var(--t-md);
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.012em;
}
.cmp-cell-meta{
  font-size: var(--t-xs);
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.cmp-cell-meta .is-yes{ color: var(--vote-yes); font-weight: var(--w-semi); }
.cmp-cell-meta .is-no{  color: var(--vote-no);  font-weight: var(--w-semi); }
.cmp-cell.is-compact .cmp-cell-scen{ font-size: var(--t-base); }

/* SVG comparados — escalan al ancho de la celda */
.cmp-hemicycle{ display: block; width: 100%; height: auto; padding: var(--space-3) var(--space-3) var(--space-2); }
.cmp-map{ display: block; width: 100%; height: auto; max-height: 520px; padding: var(--space-2); }
.cmp-cell.is-compact .cmp-map{ max-height: 380px; }
/* Read-only: las bancas del comparado no se seleccionan (sin cursor de acción). */
.cmp-hemicycle .cmp-seat{ cursor: default; }
/* Provincias que cambiaron de voto dominante (segundo mapa del par): borde
   dorado. La clase CSS gana sobre el atributo stroke inline (menor especificidad). */
.cmp-map .province-path.is-changed{
  stroke: var(--accent-gold);
  stroke-width: 3;
  stroke-opacity: 1;
}

/* Leyenda compartida del comparado */
.cmp-legend{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2) var(--space-4);
  justify-content: center;
  margin-top: var(--space-3);
  padding-top: var(--space-3);
  border-top: 1px solid var(--line);
}

/* --- B.10 Trayectoria de legisladores --- */
.traj-empty{
  padding: var(--space-5);
  background: var(--paper-sunk);
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius-xs);
  color: var(--ink-2);
  font-size: var(--t-sm);
  line-height: 1.6;
  max-width: 760px;
}
.traj-dir{
  margin: 0 0 var(--space-3);
  font-size: var(--t-sm);
  color: var(--accent-gold-text);
  font-weight: var(--w-semi);
  letter-spacing: .01em;
}
.traj-metrics{ margin-bottom: var(--space-2); }
.traj-block{ margin-top: var(--space-5); }
.traj-block-title{
  margin: 0 0 var(--space-1);
  font-family: var(--font-serif);
  font-size: var(--t-md);
  font-weight: var(--w-bold);
  color: var(--ink);
  letter-spacing: -0.012em;
}
.traj-block-sub{
  margin: 0 0 var(--space-3);
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.55;
  max-width: 760px;
}
.traj-table-head{
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-3);
}
.traj-filter{ flex-wrap: wrap; }

/* Matriz de transición voto A × voto B */
.traj-matrix{
  width: 100%;
  border-collapse: collapse;
  font-size: var(--t-sm);
  border: none;
}
.traj-matrix th{
  background: var(--paper-sunk);
  padding: var(--space-2) var(--space-3);
  text-align: center;
  font-size: 10px;
  letter-spacing: .06em;
  color: var(--ink-2);
  font-weight: var(--w-semi);
  border-bottom: 2px solid var(--line-strong);
  white-space: nowrap;
}
.traj-matrix thead th:first-child, .traj-matrix tbody th{ text-align: left; }
.traj-matrix .traj-corner{ font-size: 9.5px; color: var(--muted); letter-spacing: 0; font-weight: var(--w-medium); }
.traj-matrix tbody th{
  background: var(--paper-sunk);
  font-weight: var(--w-semi);
  color: var(--ink);
  border-right: 1px solid var(--line);
  white-space: nowrap;
}
.traj-matrix td{
  padding: var(--space-2) var(--space-3);
  text-align: center;
  font-variant-numeric: tabular-nums;
  font-family: var(--font-serif);
  font-weight: var(--w-bold);
  color: var(--ink);
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
}
.traj-matrix td.is-zero{ color: var(--muted-soft); font-family: var(--font-sans); font-weight: var(--w-regular); }
.traj-matrix td.is-kept{ background: var(--vote-yes-soft); }
.traj-matrix td.is-changed{ background: var(--accent-gold-soft); }
.traj-matrix .traj-tot{ background: var(--paper-sunk); color: var(--ink-2); }
.traj-matrix .traj-tot-row th, .traj-matrix .traj-tot-row td{ background: var(--paper-sunk); font-weight: var(--w-semi); border-top: 2px solid var(--line-strong); }
.traj-sw{ display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }

/* Tablas de trayectoria — densas y con anchos fijos para usar bien el espacio
   (antes desperdiciaban alto y las últimas columnas se cortaban por overflow). */
.traj-table, .traj-fam-table{ table-layout: fixed; width: 100%; }
.traj-table th, .traj-fam-table th{
  cursor: default;
  white-space: normal;       /* permite que el header envuelva en vez de forzar ancho */
  vertical-align: bottom;
  line-height: 1.25;
  padding: var(--space-2) var(--space-3);
}
.traj-table td, .traj-fam-table td{
  padding: 5px var(--space-3);
  vertical-align: middle;
}
/* Reparto de columnas — nominal */
.traj-table col.c-leg{ width: 23%; }
.traj-table col.c-voto{ width: 22%; }
.traj-table col.c-tray{ width: 15%; }
.traj-table col.c-fam{ width: 24%; }
.traj-table col.c-bloq{ width: 16%; }
.traj-leg-cell, .traj-fam-cell, .traj-block-cell{ overflow: hidden; }
.traj-table .traj-name{ display: block; font-weight: var(--w-semi); color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.traj-table .traj-prov{ display: block; font-size: var(--t-xs); color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.traj-voto-cell{ white-space: nowrap; }
.traj-voto-cell .vote-badge{ font-size: 10.5px; padding: 1px 7px; }
.traj-voto-cell .traj-arrow{ margin: 0 5px; }
.traj-tray-cell .traj-badge{ display: inline-block; margin: 1px 4px 1px 0; }
.traj-fam-cell{ font-size: var(--t-xs); color: var(--ink-2); white-space: nowrap; text-overflow: ellipsis; }
.traj-block-cell{ font-size: var(--t-xs); color: var(--muted); white-space: nowrap; text-overflow: ellipsis; }
.traj-arrow{ color: var(--muted-soft); margin: 0 2px; }
.traj-table-note{ margin: var(--space-2) 0 0; font-size: var(--t-xs); color: var(--muted); }
/* Reparto de columnas — migración por familia */
.traj-fam-table col.c-fname{ width: 24%; }
.traj-fam-table col.c-n{ width: 11%; }
.traj-fam-table col.c-pct{ width: 16%; }
.traj-fam-table col.c-d{ width: 11%; }
.traj-fam-name{ white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Sellos de estado (mantuvo/cambió) — status, no voto */
.traj-badge{
  display: inline-block;
  padding: 1px var(--space-2);
  border-radius: var(--radius-xs);
  font-size: 10px;
  font-weight: var(--w-semi);
  letter-spacing: .02em;
  border: 1px solid;
  white-space: nowrap;
}
.traj-badge.kept{ background: var(--vote-yes-soft); border-color: var(--vote-yes); color: var(--vote-yes); }
.traj-badge.changed{ background: var(--vote-no-soft); border-color: var(--vote-no); color: var(--vote-no); }
.traj-badge.fam{ background: var(--vote-abst-soft); border-color: var(--vote-abst); color: var(--accent-gold-text); margin-left: 4px; }

.traj-fam-table .col-num.is-up{ color: var(--vote-yes); font-weight: var(--w-semi); }
.traj-fam-table .col-num.is-down{ color: var(--vote-no); font-weight: var(--w-semi); }

/* Nota metodológica editorial — bloque tipográfico, no card */
.methodology-note{
  padding: var(--space-4) var(--space-6);
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.65;
  letter-spacing: -0.003em;
  background: var(--paper-sunk);
  border-top: 1px solid var(--line);
}
/* Encabezado "Criterios" — sólo el strong directo de .methodology-note recibe
   el tratamiento de eyebrow (block, dorado, small-caps). Los <strong> dentro
   de los <li> mantienen el flow inline normal. */
.methodology-note > strong{
  display: block;
  color: var(--accent-gold-text);
  font-weight: var(--w-semi);
  text-transform: uppercase;
  letter-spacing: .14em;
  font-size: 10px;
  margin: 0 0 var(--space-3);
}
.methodology-note li strong{
  color: var(--ink);
  font-weight: var(--w-semi);
  /* sin display:block, sin uppercase: queda inline dentro de la oración */
}
.methodology-note ul{ margin: 0; padding-left: var(--space-5); columns: 1; }
.methodology-note li{ padding: 4px 0; }
@media (min-width: 900px){
  .methodology-note ul{ columns: 2; column-gap: var(--space-8); }
  .methodology-note li{ break-inside: avoid; }
}

/* Alineamiento — bloque de nota larga (no calculado) */
.align-note{
  padding: var(--space-4) var(--space-6);
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.65;
  letter-spacing: -0.005em;
  background: var(--paper-sunk);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  font-style: italic;
}
.align-note::before{
  content: '⊘  ';
  color: var(--accent-gold-text);
  font-style: normal;
  font-weight: var(--w-bold);
}

/* =====================================================================
   FICHA INSTITUCIONAL — el resumen ya no es una tabla
   ===================================================================== */
.ficha-card{
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
  box-shadow: none;
  margin-bottom: var(--space-6);
  overflow: hidden;
}
.ficha-body{
  display: grid;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-5) var(--space-5);
}
.ficha-section{
  padding: var(--space-4) 0 var(--space-3);
  border-top: 1px solid var(--line);
}
.ficha-section:first-child{ border-top: none; }
.ficha-section-title{
  margin: 0 0 var(--space-3);
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
  display: flex;
  align-items: center;
  gap: var(--space-3);
}
.ficha-section-title::before{
  content: '';
  display: inline-block;
  width: 18px;
  height: 2px;
  background: var(--gold-rule);
}
.ficha-grid{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: var(--space-2) var(--space-5);
}
.ficha-item{
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: var(--space-2) 0;
  border-bottom: 1px dashed var(--line);
}
.ficha-item:last-child{ border-bottom: none; }
.ficha-item-k{
  font-size: var(--t-xs);
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
}
.ficha-item-v{
  font-size: var(--t-base);
  color: var(--ink);
  font-weight: var(--w-medium);
  letter-spacing: -0.005em;
  line-height: 1.4;
  font-variant-numeric: tabular-nums;
}
.ficha-item-v.is-missing{
  color: var(--muted);
  font-style: italic;
  font-variant-numeric: normal;
}
.ficha-item-v.is-result-yes{ color: var(--vote-yes); font-weight: var(--w-bold); }
.ficha-item-v.is-result-no{ color: var(--vote-no); font-weight: var(--w-bold); }
.ficha-item-v.is-validation-ok{ color: #3f6e44; font-weight: var(--w-semi); }
.ficha-item-v.is-validation-warn{ color: var(--vote-abst); font-weight: var(--w-semi); font-style: normal; }

/* Tablas — densidad legible, tipografía consistente */
.dtable-wrap{
  overflow-x: auto;
  max-height: 560px;
  overflow-y: auto;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xs);
}
table.dtable{
  width: 100%;
  border-collapse: collapse;
  font-size: var(--t-base);
}
table.dtable th{
  background: var(--paper-sunk);
  padding: var(--space-3) var(--space-4);
  text-align: left;
  font-weight: var(--w-semi);
  font-size: var(--t-xs);
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  z-index: 1;
  transition: color .15s, background .15s;
}
table.dtable th:hover{ background: var(--paper-mount); color: var(--ink-2); }
table.dtable th .sort-ar{ font-size: 9px; margin-left: var(--space-1); opacity: .35; }
table.dtable th.is-sorted{ color: var(--ink); }
table.dtable th.is-sorted .sort-ar{ opacity: 1; color: var(--ink); }
table.dtable td{
  padding: var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
table.dtable tr:last-child td{ border-bottom: none; }
table.dtable tr:hover td{ background: var(--bg-soft); }
table.dtable .col-num{ text-align: right; font-variant-numeric: tabular-nums; }
.search-table{
  width: 100%;
  max-width: 360px;
  padding: var(--space-2) var(--space-4);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: var(--t-base);
  font-family: inherit;
  margin-bottom: var(--space-3);
  background: var(--card);
  color: var(--ink);
  transition: border-color var(--dur-1) var(--ease-soft), box-shadow var(--dur-1) var(--ease-soft);
}
.search-table:focus{
  outline: none;
  border-color: var(--accent-gold-text);
  box-shadow: 0 0 0 3px var(--accent-gold-soft);
}
.search-table::placeholder{ color: var(--muted-soft); }
.tbl-meta{
  font-size: var(--t-xs);
  color: var(--muted);
  margin-top: var(--space-2);
}

/* Vote badge dentro de tablas — tamaño bumped (Etapa A5) para mejor lectura
   en laptop. Más padding horizontal, font 11.5px en vez de 11. */
/* Sello de voto en tablas: tinte + hairline en el color del voto (mismo
   lenguaje que los sellos de la ficha lateral). Presidencia también es sello
   cálido, no el gris frío anterior. */
.vote-badge{
  display: inline-block;
  padding: 2px var(--space-3);
  border-radius: var(--radius-xs);
  font-size: 11.5px;
  font-weight: var(--w-semi);
  letter-spacing: .02em;
  white-space: nowrap;
  border: 1px solid;
}
.vote-badge.yes{ background: var(--vote-yes-soft); border-color: var(--vote-yes); color: var(--vote-yes); }
.vote-badge.no{ background: var(--vote-no-soft); border-color: var(--vote-no); color: var(--vote-no); }
.vote-badge.abs{ background: var(--vote-abs-soft); border-color: var(--line-strong); color: var(--ink-2); }
/* Texto del badge de abstención en ocre tipográfico oscuro (--accent-gold-text)
   para pasar AA sobre el fondo soft (el ocre --vote-abst daba ~3.95:1). No
   cambia el color de voto en hemiciclo/mapa, solo el texto del badge. */
.vote-badge.abst{ background: var(--vote-abst-soft); border-color: var(--vote-abst); color: var(--accent-gold-text); }
.vote-badge.pres{ background: var(--paper-sunk); border-color: var(--vote-pres); color: var(--vote-pres); }

/* Family dot — indicador estructural (forma/tamaño en CSS; el background
   dinámico viene inline desde JS porque depende del dato de cada familia). */
.family-dot{
  display: inline-block;
  width: 9px;
  height: 9px;
  border-radius: 2px;
  margin-right: var(--space-2);
  vertical-align: middle;
  flex-shrink: 0;
}

/* Panel nacional — comportamiento por familia (extracción de estilos inline) */
.fam-eyebrow{
  margin: var(--space-4) 0 var(--space-2);
  font-size: var(--t-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: var(--w-semi);
}
.fam-list{ display: grid; gap: var(--space-2); }
.fam-card{
  background: var(--paper-sunk);
  border: 1px solid var(--line);
  border-radius: var(--radius-xs);
  padding: var(--space-2) var(--space-3);
}
.fam-card-top{
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: 5px;
}
.fam-name{
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--t-sm);
  font-weight: var(--w-semi);
  color: var(--ink);
  letter-spacing: -0.005em;
}
.fam-name .family-dot{
  /* Override estructural: en el panel nacional el dot es circular y un poco menor */
  width: 8px; height: 8px; border-radius: 50%; margin-right: 0;
}
.fam-total{
  font-size: var(--t-xs);
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  font-weight: var(--w-medium);
}
.fam-bar{
  display: flex;
  height: 5px;
  border-radius: 2px;
  overflow: hidden;
  background: var(--card);
  box-shadow: inset 0 0 0 1px var(--line);
}
.fam-bar > span{ height: 100%; }
.fam-bar-yes{ background: var(--vote-yes); }
.fam-bar-no{ background: var(--vote-no); }
.fam-bar-abst{ background: var(--vote-abst); }
.fam-bar-abs{ background: var(--vote-abs); }

/* Columna Bloque en la tabla de legisladores: ellipsis con tooltip nativo */
table.dtable td.col-block{
  max-width: 240px;
  font-size: var(--t-sm);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--ink-2);
}

/* Acceso directo a la sub-tab Exportar desde la vista de visualización.
   Discreto, alineado a la derecha, sin sombra ni jerarquía propia: el hub
   real de exportes vive en la sub-tab Exportar. */
.viz-export-bar{
  display: flex;
  justify-content: flex-end;
  padding: var(--space-3) var(--space-5) 0;
}
.btn-exp-jumpto{
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: var(--t-sm);
  font-weight: var(--w-semi);
  letter-spacing: -0.005em;
  padding: var(--space-1) var(--space-2);
  cursor: pointer;
  border-radius: var(--radius-xs);
  transition: color .12s, background .12s;
}
.btn-exp-jumpto:hover{
  color: var(--ink);
  background: var(--bg-soft);
}

/* Responsive */
@media (max-width: 720px){
  .shell{ padding: 16px 12px 40px; }
  .masthead h1{ font-size: 22px; }
  .scenario-nav{ gap: var(--space-4); }
  .nav-seg-group{ flex-wrap: wrap; }
  .nav-review{ margin-left: 0; }
  .toolbar-row{ gap: 8px; padding: 10px 12px; }
  .summary-strip{ grid-template-columns: repeat(2, 1fr); }
  .summary-cell:nth-child(2n){ border-right: none; }
  .summary-cell:nth-child(-n+2){ border-bottom: 1px solid var(--line); }
  .meta-row-header{ flex-direction: column; align-items: flex-start; gap: var(--space-3); }
  .meta-headline-result{ padding-left: 0; border-left: 0; align-items: flex-start; }
  .meta-headline-law{ font-size: var(--t-lg); }
  .meta-row-grid{ grid-template-columns: 1fr 1fr; }
  .meta-row-grid .meta-item{ border-bottom: 1px solid var(--line); }
  .meta-row-sources{ grid-template-columns: 1fr; }
  .subtabs{ overflow-x:auto; }
  .btn-exp-grid{ grid-template-columns:1fr; }
}

/* =====================================================================
   FOCUS VISIBLE — accesibilidad con teclado
   ===================================================================== */
/* Anillo sobrio: azul UI institucional (--accent, deliberadamente distinto
   del verde de voto afirmativo). Visible solo en navegación con teclado.
   Reemplaza al outline default del navegador, garantizando contraste y
   coherencia editorial.
   Se acota con :not(:focus-visible) para NO suprimir el indicador en
   navegadores sin soporte de :focus-visible: ahí el selector entero se
   invalida y el outline por defecto del navegador sigue visible para quien
   navega con teclado (accesibilidad preservada). Sólo oculta el outline en
   foco por puntero, donde :focus-visible no aplica. */
:focus:not(:focus-visible) { outline: none; }

button:focus-visible,
a:focus-visible,
[role="tab"]:focus-visible,
[role="button"]:focus-visible,
[tabindex]:focus-visible{
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}

.nav-seg:focus-visible{
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}

.seg-btn:focus-visible,
.subtab:focus-visible,
.vote-pill:focus-visible,
.btn-text:focus-visible,
.btn-exp:focus-visible{
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.search-input:focus-visible,
.search-table:focus-visible,
.select-input:focus-visible{
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Asientos del hemiciclo (SVG <circle>): outline no aplica a SVG.
   Refuerzo con stroke azul UI ancho y filter halo para teclado. */
.seat:focus-visible{
  stroke: var(--accent);
  stroke-width: 2.5;
  outline: none;
}
.seat:focus{
  outline: none;
}

/* Tablas navegables por teclado: focus en filas e inputs internos. */
.dtable tbody tr:focus-visible{
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}

/* =====================================================================
   PREFERS-REDUCED-MOTION — accesibilidad vestibular
   =====================================================================
   Desactiva transiciones, animaciones y transforms para usuarios que
   declararon preferencia de movimiento reducido. No afecta interactividad. */
@media (prefers-reduced-motion: reduce){
  *,
  *::before,
  *::after{
    transition-duration: 0.001ms !important;
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
  }
  /* El ancla de contexto aparece/desaparece sin deslizamiento bajo
     preferencia de movimiento reducido. */
  .context-anchor{ transition: none !important; }
  .seat:hover,
  .seat-halo{
    transition: none !important;
  }
  .hemicycle .seat:hover{ transform: none !important; }
}

/* =====================================================================
   CAPA DE MOVIMIENTO Y PULIDO — "chiches" editoriales
   (los tokens --ease-* / --dur-* viven en el :root principal, arriba)
   ===================================================================== */

/* Entrada de página: rise + fade escalonado al cargar */
@keyframes omRise{ from{ opacity:0; transform: translateY(16px); } to{ opacity:1; transform: translateY(0); } }
@keyframes omFade{ from{ opacity:0; } to{ opacity:1; } }
.masthead .eyebrow{ animation: omRise var(--dur-4) var(--ease-out) backwards; }
.masthead h1{      animation: omRise var(--dur-4) var(--ease-out) .06s backwards; }
.masthead .lede{   animation: omRise var(--dur-4) var(--ease-out) .12s backwards; }
.masthead .laws{   animation: omRise var(--dur-4) var(--ease-out) .18s backwards; }
.scenario-nav{     animation: omRise var(--dur-4) var(--ease-out) .24s backwards; }
.workspace{        animation: omRise var(--dur-4) var(--ease-out) .30s backwards; }

/* Entrada de secciones al activarse su panel (animación, NO estado persistente:
   el final siempre es visible; se reinicia al re-activar el tab). */
.subpanel.is-on .stats-section,
.subpanel.is-on .tbl-card,
.subpanel.is-on .ficha-card{ animation: omRise var(--dur-4) var(--ease-out) backwards; }
.subpanel.is-on .stats-section:nth-of-type(2){ animation-delay: .05s; }
.subpanel.is-on .stats-section:nth-of-type(3){ animation-delay: .10s; }
.subpanel.is-on .stats-section:nth-of-type(n+4){ animation-delay: .15s; }

/* Hemiciclo: floración escalonada de las bancas al cambiar de escenario */
.hemicycle .seat{ transform-box: fill-box; transform-origin: center; }
@keyframes omSeatBloom{ from{ opacity:0; transform: scale(.12); } 65%{ opacity:1; } to{ opacity:1; transform: scale(1); } }
@keyframes omArcDraw{ from{ opacity:0; } to{ opacity:1; } }
.hemicycle.is-blooming .seat{
  animation: omSeatBloom .46s var(--ease-out) backwards;
  animation-delay: calc(var(--seat-i, 0) * 1.5ms);
}
.hemicycle.is-blooming .guide-arc{ animation: omArcDraw .5s ease backwards; }
.hemicycle.is-blooming .center-panel-group{ animation: omFade .55s ease .34s backwards; }

/* Subtabs: navegación de informe — subrayado dorado estático y sobrio, inset
   bajo la etiqueta (no de borde a borde, no deslizante). */
.subtab::after{
  content: ''; position: absolute; left: var(--space-4); right: var(--space-4); bottom: -1px;
  height: 2px; background: var(--gold-rule);
  opacity: 0;
  transition: opacity var(--dur-1) var(--ease-soft);
}
.subtab.is-on{ border-bottom-color: transparent; }
.subtab.is-on::after{ opacity: 1; }

/* Micro-interacciones de hover (consistencia) */
.vote-pill, .btn-exp, .stats-index-link, .btn-text{
  transition: background var(--dur-1) var(--ease-soft), color var(--dur-1) var(--ease-soft),
              border-color var(--dur-1) var(--ease-soft), transform var(--dur-1) var(--ease-soft),
              box-shadow var(--dur-1) var(--ease-soft);
}
.vote-pill:hover, .stats-index-link:hover{ transform: translateY(-1px); }
.btn-exp:hover{ transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.vote-pill:active, .btn-exp:active, .stats-index-link:active{ transform: translateY(0); }
.member-row{ transition: border-color var(--dur-1) var(--ease-soft), background var(--dur-1) var(--ease-soft), transform var(--dur-1) var(--ease-soft); }
.member-row:hover{ transform: translateX(3px); }
.heatmap-cell{ transition: box-shadow var(--dur-1) var(--ease-soft), filter var(--dur-1) var(--ease-soft); }
.heatmap-cell:hover{ box-shadow: inset 0 0 0 2px var(--ink); filter: saturate(1.12); position: relative; z-index: 2; }

/* Banca seleccionada: latido suave del halo (ver Parte 2 para conectarlo) */
@keyframes omHaloPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.45; } }
.seat-halo.is-selected{ opacity: 1; animation: omHaloPulse 1.8s var(--ease-soft) infinite; }

/* #10 — hover de banca con realce sutil (escala) además del halo. */
.hemicycle .seat{ transition: fill var(--dur-3) var(--ease-soft), transform var(--dur-1) var(--ease-out); }
.hemicycle .seat:hover{ transform: scale(1.25); }

/* #12 — tooltip: aparición con micro fade+rise. El recorte contra el viewport
   ya lo maneja showTooltip (flip en bordes). */
#tooltip{ transition: opacity var(--dur-1) var(--ease-out), transform var(--dur-1) var(--ease-out); }

/* #8 — barras que crecen desde 0. scaleX con transform-origin izquierda y fill
   `backwards`: el estado final/base es scaleX(1) = barra COMPLETA. Si la
   animación no corre (o reduced-motion la neutraliza), la barra queda completa.
   Sin JS, sin riesgo de barra en 0. */
@keyframes omBarGrow{ from{ transform: scaleX(0); } to{ transform: scaleX(1); } }
.subpanel.is-on .h-bar-fill,
.subpanel.is-on .mini-bar,
#sidebar .prov-bar,
#sidebar .fam-bar{
  transform-origin: left center;
  animation: omBarGrow var(--dur-4) var(--ease-out) .12s backwards;
}

/* #11 — texto adaptativo en celdas de heatmap oscuras (lo decide _heatTextDark
   por luminancia). Con la escala actual (alpha ≤ .55) las celdas no llegan a
   oscuras, así que la tinta se mantiene; queda como red de seguridad. */
.heatmap-cell.is-dark .heatmap-cell-value{ color: #fff; }
.heatmap-cell.is-dark .heatmap-cell-sub{ color: rgba(255,255,255,.82); }

/* #15 — crossfade sutil del subpanel entrante al cambiar de tab. omFade termina
   en opacity:1 y la base es opacity:1: nunca queda invisible. */
.subpanel.is-on{ animation: omFade var(--dur-2) var(--ease-out); }

/* #16 — estado vacío sobrio (sin huecos raros). */
.dtable-empty{
  text-align: center;
  padding: var(--space-8) var(--space-5);
  color: var(--muted);

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function el(tag, attrs, children){
  const node = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if(attrs) for(const k in attrs){
    if(attrs[k] !== null && attrs[k] !== undefined) node.setAttribute(k, attrs[k]);
  }
  if(children){
    if(Array.isArray(children)) children.forEach(c => c && node.appendChild(c));
    else if(typeof children === 'string') node.textContent = children;
    else node.appendChild(children);
  }
  return node;
}

// Debounce: agrupa ráfagas de llamadas (p.ej. tecleo en los buscadores) en una
// sola ejecución tras `ms` de inactividad. Evita el thrashing de re-render por
// keystroke con 257 legisladores. Declaración hoisteada → disponible global.
function debounce(fn, ms){
  let t;
  return function(...args){
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

// =====================================================================
// CÁLCULO DE GEOMETRÍA DEL HEMICICLO
// Distribuye N bancas en un arco semicircular en múltiples filas.
// =====================================================================
function buildHemicycleLayout(n, opts){
  const cfg = Object.assign({
    cx: 600, cy: 480,
    rInner: 180, rOuter: 410,
    startDeg: 170, endDeg: 10,    // de izq (170°) a der (10°)
    rows: null
  }, opts || {});

  // Número de filas heurístico: ~ sqrt(n/π) ajustado
  const rows = cfg.rows || Math.max(4, Math.round(Math.sqrt(n / 1.8)));
  const radiusStep = (cfg.rOuter - cfg.rInner) / (rows - 1);

  // Distribuir N bancas proporcionalmente al perímetro de cada arco (radio)
  const radii = [];
  const counts = [];
  let weightSum = 0;
  for(let i=0; i<rows; i++){
    const r = cfg.rInner + i * radiusStep;
    radii.push(r);
    weightSum += r;
  }
  let assigned = 0;
  for(let i=0; i<rows; i++){
    let c = Math.round(n * radii[i] / weightSum);
    counts.push(c);
    assigned += c;
  }
  // Ajustar para que sumen exactamente n
  let diff = n - assigned;
  let i = 0;
  while(diff !== 0){
    const idx = rows - 1 - (i % rows);
    counts[idx] += Math.sign(diff);
    diff -= Math.sign(diff);
    i++;
  }

  // Generar posiciones: para cada banca, calcular (x, y, deg, row, slot)
  const seats = [];
  const startRad = cfg.startDeg * Math.PI / 180;
  const endRad = cfg.endDeg * Math.PI / 180;
  const totalRad = startRad - endRad;

  for(let row = 0; row < rows; row++){
    const r = radii[row];
    const c = counts[row];
    for(let slot = 0; slot < c; slot++){
      // Distribuir uniformemente en el arco, con un pequeño margen
      const t = (slot + 0.5) / c;
      const rad = startRad - t * totalRad;
      const x = cfg.cx + r * Math.cos(rad);
      const y = cfg.cy - r * Math.sin(rad);
      seats.push({ x, y, rad, deg: rad * 180 / Math.PI, row, slot });
    }
  }
  // Ordenar de izquierda (mayor deg) a derecha (menor deg), luego por fila
  seats.sort((a, b) => b.deg - a.deg || a.row - b.row);
  return { seats, cfg, rows, counts, radii };
}

// =====================================================================
// ORDENAR LEGISLADORES POLÍTICAMENTE (izq -> der) Y ASIGNAR A BANCAS
// =====================================================================
// Prepara un escenario para render (idempotente): orden de bancas, layout del
// hemiciclo con posiciones (_seat) y agregados por provincia. El preproceso es
// lazy — antes sólo corría para el escenario activo; el comparado necesita
// preparar cualquier escenario para renderizar varios a la vez.
function ensureScenarioPrepared(s){
  if(!s || s._assigned) return s;
  const { sorted, layout } = assignSeats(s.legislators);
  s._sortedLegislators = sorted;
  s._layout = layout;
  s._provinceData = computeProvinceData(sorted);
  s._assigned = true;
  return s;
}
// Acceso centralizado a los legisladores (ya ordenados y normalizados) de un
// escenario por id. Garantiza el preproceso.
function getLegsForScenario(id){
  const s = ensureScenarioPrepared(SCENARIOS[id]);
  return s ? s._sortedLegislators : [];
}

function assignSeats(legislators){
  // Ordenar legisladores: primero por orden político de familia, luego por bloque, luego por nombre.
  // Ausentes y presidencia van al extremo derecho (convención: sin posición política activa).
  const sorted = [...legislators].sort((a, b) => {
    const ax = a.vote === 'PRESIDENCIA' ? 999 : (a.vote === 'AUSENTE' ? 900 : FAMILY_POLITICAL_ORDER.indexOf(a.family));
    const bx = b.vote === 'PRESIDENCIA' ? 999 : (b.vote === 'AUSENTE' ? 900 : FAMILY_POLITICAL_ORDER.indexOf(b.family));
    if(ax !== bx) return ax - bx;
    if(a.block !== b.block) return a.block.localeCompare(b.block, 'es');
    return a.name.localeCompare(b.name, 'es');
  });

  const layout = buildHemicycleLayout(sorted.length);
  // Asignar posición por orden
  sorted.forEach((leg, i) => {
    leg._seat = layout.seats[i];
    leg._index = i;
  });
  return { sorted, layout };
}

// =====================================================================
// AGREGADOS POR PROVINCIA
// =====================================================================
function computeProvinceData(legislators){
  const data = {};
  for(const m of legislators){
    if(!data[m.province]){
      data[m.province] = {
        name: m.province,
        members: [],
        AFIRMATIVO: 0, NEGATIVO: 0, AUSENTE: 0, PRESIDENCIA: 0,
        families: {},
        total: 0
      };
    }
    const d = data[m.province];
    d.members.push(m);
    d[m.vote] = (d[m.vote] || 0) + 1;
    d.families[m.family] = (d.families[m.family] || 0) + 1;
    d.total++;
  }
  // Calcular dominantes y mezcla
  for(const p in data){
    const d = data[p];
    let domV = 'AFIRMATIVO', maxV = -1;
    for(const v of ['AFIRMATIVO','NEGATIVO','AUSENTE','PRESIDENCIA']){
      if(d[v] > maxV){ maxV = d[v]; domV = v; }
    }
    d.dominantVote = domV;
    // ¿Es mixta? El segundo más votado tiene >= 35% del total
    const sortedVotes = ['AFIRMATIVO','NEGATIVO','AUSENTE'].map(v => d[v]).sort((a,b) => b - a);
    d.isMixed = d.total > 1 && sortedVotes[1] / d.total >= 0.35;

    // Familia dominante
    let domF = '', maxF = -1;
    for(const f in d.families){
      if(d.families[f] > maxF){ maxF = d.families[f]; domF = f; }
    }
    d.dominantFamily = domF;
    const fCounts = Object.values(d.families).sort((a,b) => b - a);
    d.isFamilyDiverse = fCounts.length > 1 && fCounts[1] / d.total >= 0.35;

    // Segundo voto dominante (para tramas mixtas)
    const voteEntries = ['AFIRMATIVO','NEGATIVO','AUSENTE']
      .map(v => ({ v, c: d[v] }))
      .sort((a,b) => b.c - a.c);
    d.secondVote = voteEntries[1]?.c > 0 ? voteEntries[1].v : null;

    // Segunda familia dominante
    const fEntries = Object.entries(d.families).sort((a,b) => b[1] - a[1]);
    d.secondFamily = fEntries[1]?.[1] > 0 ? fEntries[1][0] : null;
  }
  return data;
}

function getFigureTitle(scenario, figureType){
  const caseName = scenario.caseName || 'Caso';
  const chamber  = scenario.chamberShort || 'Cámara';
  switch(figureType){
    case 'hemicycle':         return `Hemiciclo legislativo — ${caseName} · ${chamber}`;
    case 'map':               return `Mapa provincial del voto — ${caseName} · ${chamber}`;
    case 'panel-province':    return 'Resumen provincial';
    case 'panel-legislator':  return 'Ficha individual del legislador';
    case 'table-legislators': return 'Tabla nominal de legisladores';
    case 'table-provinces':   return 'Resumen territorial por provincia';
    case 'table-families':    return 'Resumen por familia política';
    case 'table-summary':     return 'Resumen institucional de la votación';
    default:                  return '';
  }
}

function getFigureSubtitle(scenario, figureType){
  switch(figureType){
    case 'hemicycle':
      return 'Distribución nominal del voto por legislador. Cada banca representa un legislador; el color responde al modo visual activo.';
    case 'map':
      return 'Distribución territorial de apoyos, rechazos, abstenciones y ausencias según provincia representada.';
    case 'panel-province':
      return 'Seleccioná una provincia en el mapa para consultar su composición legislativa y el sentido del voto.';

    case 'table-legislators':
      return 'Representantes, distrito, bloque, familia política y voto nominal.';
    case 'table-provinces':
      return 'Conteo de votos y familia política predominante por distrito.';
    case 'table-families':
      return 'Distribución del voto según agregación político-partidaria.';
    case 'table-summary':
      return 'Metadatos, conteos agregados y fuentes documentales del escenario.';
    default:
      return '';
  }
}

function getFigureReadingNote(scenario, figureType, colorMode){
  if(figureType === 'hemicycle'){
    if(colorMode === 'family'){
      return 'En modo familia política, el color de cada banca identifica la familia político-partidaria. El sentido del voto se consulta en tooltip, panel individual, filtros y tablas.';
    }
    return 'Lectura: el color de cada banca indica el sentido del voto nominal.';
  }
  if(figureType === 'map'){
    if(colorMode === 'family'){
      return 'Lectura como heatmap territorial: el color identifica la familia política predominante entre los representantes del distrito, y la intensidad cromática es proporcional al peso de esa familia (más saturado = más concentrada, más pálido = más dividida). Las Islas Malvinas forman parte de Tierra del Fuego, Antártida e Islas del Atlántico Sur.';
    }
    return 'Lectura como heatmap territorial: el color identifica el voto predominante en el distrito, y la intensidad cromática es proporcional al peso de ese voto (más saturado = más unánime, más pálido = más dividida). Las Islas Malvinas forman parte de Tierra del Fuego, Antártida e Islas del Atlántico Sur.';
  }
  if(figureType === 'panel-province'){
    return 'El resumen provincial se calcula sobre los representantes del distrito en la votación seleccionada.';
  }
  if(figureType === 'panel-legislator'){
    return 'La categoría de voto reproduce la codificación institucional del acta nominal.';
  }
  return '';
}

function getFigureSource(scenario){
  const law  = formatMetaValue(scenario.law, 'Ley no consignada');
  const lawBO = scenario.lawBO ? ` · ${scenario.lawBO}` : '';
  const sourceVote = formatMetaValue(scenario.voteSource || scenario.source, 'Sin dato en fuente');
  if(scenario.districtSource){
    return `${law}${lawBO}. Voto: ${sourceVote}. Distrito: ${scenario.districtSource}.`;
  }
  return `${law}${lawBO}. ${sourceVote}.`;
}

function getExportLegendItems(scenario, colorMode){

  // en orden canónico. Modo voto: orden de votación (afirmativo→presidencia).
  // Modo familia: orden de FAMILY_COLORS.
  if(colorMode === 'family'){
    const legs = scenario._sortedLegislators || scenario.legislators || [];

function renderTabs(){
  // Navegación por dos ejes: el escenario activo se descompone en caso y cámara
  // (los IDs son siempre `${caso}_${camara}`) y se marca el segmento pulsado de
  // cada eje. No altera la lógica de selección: el scenarioId sigue siendo la
  // única fuente de verdad.
  const [curCase, curChamber] = state.scenarioId.split('_');
  document.querySelectorAll('.nav-seg').forEach(btn => {
    const active = (btn.dataset.axis === 'case'    && btn.dataset.value === curCase)
                || (btn.dataset.axis === 'chamber' && btn.dataset.value === curChamber);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
  // Indicador discreto si el dataset activo está bajo revisión territorial.
  // Misma señal que antes marcaba la tarjeta; ahora vive junto al selector.
  const rev = document.querySelector('.nav-review');
  if(rev){
    const v = validateScenario(activeScenario());
    if(v && !v.territorialOk){
      rev.hidden = false;
      rev.textContent = 'Dataset bajo revisión territorial';
      rev.title = 'La distribución de provincias no coincide con la composición institucional esperada.';
    } else {
      rev.hidden = true;
      rev.textContent = '';
      rev.removeAttribute('title');
    }
  }
}

// Rellena el ancla de contexto persistente con el escenario activo. Usa las
// mismas etiquetas analíticas que el resto de la herramienta (resultado
// AFIRMATIVO/NEGATIVO), sólo que coloreadas. No introduce vocabulario nuevo.
function updateContextAnchor(){
  const a = document.getElementById('contextAnchor');
  if(!a) return;
  const s = activeScenario();
  const set = (sel, txt) => { const el = a.querySelector(sel); if(el) el.textContent = txt; };
  set('.ca-case', s.caseName || '');
  set('.ca-chamber', s.chamberShort || s.chamber || '');
  set('.ca-date', s.date || '');
  const resultEl = a.querySelector('.ca-result');
  if(resultEl){
    const rc = s.result === 'AFIRMATIVO' ? 'yes' : (s.result === 'NEGATIVO' ? 'no' : '');
    resultEl.className = 'ca-result' + (rc ? ' result-' + rc : '');
    resultEl.textContent = formatMetaValue(s.result, 'Sin dato');
  }
}

// =====================================================================
// HELPERS DE METADATA — ningún campo de la ficha institucional queda vacío.
// Si el dato existe se muestra; si está ausente, fallback explícito según el
// tipo de ausencia. No inventar.
// =====================================================================
function formatMetaValue(value, fallback){
  if(value === null || value === undefined) return fallback || 'No consignado';
  const s = String(value).trim();
  if(s === '' || s === '—') return fallback || 'No consignado';
  return s;
}

// Render de un item de la ficha institucional. `kind` controla el tono visual
// del fallback: 'missing' (gris), 'na' (gris-italic), 'source' (small).
function metaItem(label, value, fallback, kind){
  const isMissing = value === null || value === undefined || String(value).trim() === '' || String(value).trim() === '—';
  const shown = isMissing ? (fallback || 'No consignado') : value;
  const klass = isMissing ? ` meta-v-missing meta-v-${kind || 'missing'}` : '';
  return `<div class="meta-item"><div class="meta-k">${esc(label)}</div><div class="meta-v${klass}">${esc(shown)}</div></div>`;
}

  const s = activeScenario();

  const footer = document.getElementById('figureFooter');
  if(header) header.innerHTML = renderFigureHeader(s, figType, { showMetaCompact: true });

  // de color (complementa, sin repetir, la nota de lectura del pie de figura).

  if(hint){
    hint.textContent = figType === 'map'
      ? 'Cada provincia agrupa sus bancas · clic para filtrar por jurisdicción · el color responde al modo seleccionado.'
      : 'Cada banca es un legislador · clic o Enter para ver su ficha · el color responde al modo seleccionado.';

function populateProvinceSelect(){
  const s = activeScenario();
  const sel = document.getElementById('provinceSelect');
  if(!sel) return;
  const provs = Object.keys(s._provinceData).sort((a,b) => a.localeCompare(b, 'es'));
  provs.forEach(p => {
    const o = document.createElement('option');
    o.value = p;
    o.textContent = `${p} (${s._provinceData[p].total})`;
    if(p === state.provinceFilter) o.selected = true;
    sel.appendChild(o);
  });
}

function renderLegend(){
  const lg = document.getElementById('legend');
  if(!lg) return;
  const s = activeScenario();
  if(state.colorMode === 'vote'){
    // Conteos calculados desde el dataset, no hardcodeados
    const summary = computeVoteSummary(s);
    // Orden fijo de votos en la leyenda; sólo mostrar los que aparecen
    const order = ['AFIRMATIVO','NEGATIVO','ABSTENCION','AUSENTE','PRESIDENCIA'];
    lg.innerHTML = order
      .filter(v => (summary[v] || 0) > 0)
      .map(v => `<span class="legend-chip"><span class="legend-sw" style="background:${VOTE_COLORS[v]}"></span>${esc(VOTE_LABELS[v])} (${summary[v]})</span>`)
      .join('');
  } else {
    // Modo familia: el color es la familia; el voto se queda en tooltip/panel/tabla.
    // La aclaración metodológica prominente vive ahora en .color-notice (arriba de
    // la leyenda), así que la leyenda muestra solo los chips de familia.
    const counts = {};
    for(const m of s._sortedLegislators) counts[m.family] = (counts[m.family] || 0) + 1;
    const fams = Object.keys(FAMILY_COLORS).filter(f => counts[f] > 0).sort((a,b) => counts[b] - counts[a]);
    const chips = fams.map(f => `
      <span class="legend-chip"><span class="legend-sw" style="background:${FAMILY_COLORS[f]}"></span>${esc(f)} (${counts[f]})</span>
    `).join('');
    lg.innerHTML = chips;
  }
}

function renderStage(){
  const stage = document.getElementById('vizStage');
  if(!stage) return;
  stage.innerHTML = '';
  if(state.view === 'hemicycle') stage.appendChild(renderHemicycle());
  else stage.appendChild(renderMap());
  // Re-pintar la cabecera y el pie de figura según la vista activa
  renderFigureBlocks();
}

// HEMICICLO
// ---------------------------------------------------------------------
function renderHemicycle(){
  const s = activeScenario();
  const { sorted, layout } = { sorted: s._sortedLegislators, layout: s._layout };
  const sum = computeVoteSummary(s);

  const svg = el('svg', {
    class: 'hemicycle',
    viewBox: '0 0 1200 690',
    xmlns: 'http://www.w3.org/2000/svg',
    role: 'img',
    'aria-labelledby': 'hemiTitle hemiDesc'
  });
  // Texto alternativo accesible nativo de SVG (title = nombre, desc =
  // resumen). Complementa los aria-label por banca: un lector de pantalla
  // anuncia la figura como conjunto y puede entrar a explorarla banca a banca.
  const presNote = sum.PRESIDENCIA ? `, ${sum.PRESIDENCIA} en presidencia (no votó)` : '';
  svg.appendChild(el('title', { id: 'hemiTitle' }, `Hemiciclo legislativo · ${s.caseName} · ${s.chamber}`));
  svg.appendChild(el('desc', { id: 'hemiDesc' },
    `Distribución nominal del voto: ${sum.AFIRMATIVO} a favor, ${sum.NEGATIVO} en contra, ${sum.ABSTENCION} abstenciones, ${sum.AUSENTE} ausentes${presNote}, sobre ${s.totalSeats} bancas. Resultado: ${s.result}.`));

  // Arcos guía sutiles
  const guides = el('g', { 'class': 'guides' });
  layout.radii.forEach(r => {
    const startRad = layout.cfg.startDeg * Math.PI / 180;
    const endRad = layout.cfg.endDeg * Math.PI / 180;
    const x1 = layout.cfg.cx + r * Math.cos(startRad);
    const y1 = layout.cfg.cy - r * Math.sin(startRad);
    const x2 = layout.cfg.cx + r * Math.cos(endRad);
    const y2 = layout.cfg.cy - r * Math.sin(endRad);
    guides.appendChild(el('path', {
      class: 'guide-arc',
      d: `M ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 0 1 ${x2.toFixed(1)} ${y2.toFixed(1)}`
    }));
  });
  svg.appendChild(guides);

  // Bancas — un único plano por modo. Voto: relleno por voto. Familia: relleno
  // por familia política. Nunca se codifican dos variables en la misma marca
  // (regla metodológica: voto y partido no compiten visualmente). El cruce se
  // consulta vía tooltip, panel individual, filtro por voto y tabla nominal.
  const seatLayer = el('g', { 'class': 'seat-layer' });
  const halo = el('circle', {
    class: 'seat-halo',
    cx: 0, cy: 0, r: 12
  });
  halo.setAttribute('id', 'seatHalo');

  sorted.forEach((leg, i) => {
    const seat = leg._seat;
    const isPres = leg.vote === 'PRESIDENCIA';
    const rOuter = isPres ? 8.4 : 6.4;
    const fillColor = state.colorMode === 'vote'
      ? VOTE_COLORS[leg.vote]
      : (FAMILY_COLORS[leg.family] || '#a09b8c');

    const c = el('circle', {
      class: 'seat',
      cx: seat.x.toFixed(2),
      cy: seat.y.toFixed(2),
      r: rOuter,
      fill: fillColor,
      stroke: 'rgba(255,255,255,0.9)',
      'stroke-width': 1.2,
      'data-idx': i,
      // Accesibilidad: cada banca es un control individual. tabindex arranca en
      // -1 (roving tabindex: una sola banca tabbable a la vez, gestionado por
      // initSeatNavigation). aria-label describe la banca para lectores de
      // pantalla; el voto va como dato textual junto al bloque/familia, igual
      // que el tooltip — no rompe la separación visual voto/partido.
      role: 'button',
      tabindex: '-1',
      'aria-label': buildSeatAriaLabel(leg, s)
    });
    c.style.setProperty('--seat-i', i);
    seatLayer.appendChild(c);
  });
  svg.appendChild(seatLayer);
  svg.appendChild(halo);

  // Floración escalonada: solo al cambiar de escenario (no en cada toggle de
  // color/vista) y solo si el usuario no pidió movimiento reducido.
  try{
    if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches && state._bloomScenario !== s.id){
      svg.classList.add('is-blooming');
    }
    state._bloomScenario = s.id;
  }catch(e){}

  // Panel del resultado — colocado en la franja inferior del SVG, FUERA del semicírculo.
  // Las bancas más bajas (primer arco con ángulos cercanos a la horizontal)
  // llegan a y ≈ 449 (cy=480 − rInner·sin(170°)); por eso el panel arranca en y=500.
  // Panel central simplificado: cámara · fecha + RESULTADO (firma visual del
  // hemiciclo). Las cifras detalladas (a favor / en contra / ausentes /
  // presentes / quórum) viven exclusivamente en el summary-strip que actúa
  // como resumen ejecutivo, para no duplicar información.
  const cp = el('g', { 'class': 'center-panel-group' });
  cp.appendChild(el('rect', {
    class: 'center-panel-shadow',
    x: 388, y: 502, width: 424, height: 100, rx: 12
  }));
  cp.appendChild(el('rect', {
    class: 'center-panel',
    x: 386, y: 500, width: 428, height: 100, rx: 10
  }));
  cp.appendChild(el('text', {
    class: 'center-title', x: 600, y: 530
  }, `${s.chamberShort} · ${s.date}`));
  cp.appendChild(el('text', {
    class: `center-result result-${s.result === 'AFIRMATIVO' ? 'yes' : 'no'}`, x: 600, y: 585
  }, s.result));
  svg.appendChild(cp);

  // Eventos delegados
  svg.addEventListener('mousemove', (e) => {
    const t = e.target;
    if(t.classList.contains('seat')){
      const idx = +t.getAttribute('data-idx');
      const leg = sorted[idx];
      showTooltip(e, buildSeatTooltip(leg, s));
    } else hideTooltip();
  });
  svg.addEventListener('mouseleave', hideTooltip);
  svg.addEventListener('click', (e) => {
    const t = e.target;
    if(t.classList.contains('seat')){
      const idx = +t.getAttribute('data-idx');
      selectLegislator(idx);
    }
  });

  applyFilters(svg);
  initSeatNavigation(svg);
  return svg;
}

// aria-label de una banca para lectores de pantalla. Reúne nombre, voto,
// bloque, familia y provincia como datos textuales (equivalente al tooltip).
// No codifica nada por color, así que respeta la separación voto/partido.
function buildSeatAriaLabel(leg, scenario){
  if(leg.vote === 'PRESIDENCIA'){
    return `${leg.name}. Presidencia: presidió la sesión sin emitir voto computado. Bloque: ${leg.block}. Provincia: ${leg.province}.`;
  }
  const role = leg.presided ? ' Presidió la sesión.' : '';
  return `${leg.name}. Voto: ${VOTE_LABELS[leg.vote]}.${role} Bloque: ${leg.block}. Familia política: ${leg.family}. Provincia: ${leg.province}.`;
}

// Tooltip estructurado para una banca
function buildSeatTooltip(leg, scenario){
  const voteClass = VOTE_CLASS[leg.vote];
  return `
    <strong>${esc(leg.name)}</strong>
    <div class="tt-row"><span class="tt-badge ${voteClass}">${esc(VOTE_LABELS[leg.vote])}</span><span class="tt-prov">${esc(leg.province)}</span></div>
    ${leg.presided ? '<div class="tt-block">Rol: presidió la sesión</div>' : ''}
    <div class="tt-block">${esc(leg.block)}</div>
    <em>${esc(leg.family)} · ${esc(scenario.caseName)} · ${esc(scenario.chamberShort)}</em>
  `;
}

// Heatmap del mapa: rango de alpha amplio (0.30 → 0.95) para que
// las provincias siempre sean visibles pero el gradiente sea claro.
// Una provincia 50/50 queda muy pálida, una 100% queda saturada.
function mapHeatFill(hex, pct){
  const m = /^#?([0-9a-f]{6})$/i.exec(hex);
  if(!m) return hex;
  const n = parseInt(m[1], 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  const a = Math.max(0, Math.min(100, pct)) / 100;
  // Curva ligeramente exagerada: empuja el rango bajo para que el ojo
  // distinga mejor entre, p.ej., 55% y 75%.
  const alpha = 0.28 + Math.pow(a, 0.85) * 0.65;
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}
function mapHeatStroke(hex, pct){
  // El borde queda más opaco que el fill para que la silueta de cada
  // provincia se vea nítida aunque el interior sea pálido.
  const m = /^#?([0-9a-f]{6})$/i.exec(hex);
  if(!m) return hex;
  const n = parseInt(m[1], 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  const a = Math.max(0, Math.min(100, pct)) / 100;
  const alpha = 0.55 + Math.pow(a, 0.7) * 0.40;
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}

function renderMap(){
  const s = activeScenario();
  const pData = s._provinceData;

  const svg = el('svg', {
    class: 'map-svg',
    viewBox: '0 0 500 800',
    xmlns: 'http://www.w3.org/2000/svg',
    role: 'img',
    'aria-labelledby': 'mapTitle mapDesc'
  });
  // Texto alternativo accesible nativo de SVG. El detalle provincia por
  // provincia está disponible en la tabla "Resumen territorial" (pestaña Datos).
  svg.appendChild(el('title', { id: 'mapTitle' }, `Mapa provincial del voto · ${s.caseName} · ${s.chamberShort}`));
  svg.appendChild(el('desc', { id: 'mapDesc' },
    `Provincias argentinas coloreadas según ${state.colorMode === 'family' ? 'la familia política' : 'el voto'} predominante de su delegación; la intensidad del color es proporcional al peso del valor dominante. El detalle numérico por provincia está en la tabla de resumen territorial.`));

  // Fondo institucional con marco sutil
  svg.appendChild(el('rect', {
    class: 'map-bg',
    x: 0, y: 0, width: 500, height: 800
  }));

  // Heatmap territorial: la intensidad de cada provincia es proporcional
  // al peso del voto dominante (modo voto) o de la familia política
  // dominante (modo familia). Se elimina el patrón diagonal "mixta" — el
  // gradiente cromático ya comunica la fractura: una provincia muy mixta
  // queda pálida, una unánime queda saturada.
  const provLayer = el('g', { 'class': 'province-layer' });
  Object.keys(PROVINCE_PATHS).forEach(pName => {
    const info = pData[pName];
    let fill, stroke;

    if(!info){
      fill = '#f1f5f9';
      stroke = '#cbd5e1';
    } else if(state.colorMode === 'vote'){
      const baseColor = VOTE_COLORS[info.dominantVote] || '#a09b8c';
      const domCount = info[info.dominantVote] || 0;
      const pctDom = info.total ? (domCount / info.total * 100) : 0;
      fill   = mapHeatFill(baseColor, pctDom);
      stroke = mapHeatStroke(baseColor, pctDom);
    } else {
      const baseColor = FAMILY_COLORS[info.dominantFamily] || '#a09b8c';
      const domCount = (info.families && info.families[info.dominantFamily]) || 0;
      const pctDom = info.total ? (domCount / info.total * 100) : 0;
      fill   = mapHeatFill(baseColor, pctDom);
      stroke = mapHeatStroke(baseColor, pctDom);
    }

    // Tierra del Fuego: fusiono el path provincial con los paths de las
    // Islas Malvinas para que constituyan una sola jurisdicción interactiva.
    // Constitucionalmente las Malvinas son parte de "Tierra del Fuego,
    // Antártida e Islas del Atlántico Sur", por lo que se colorean junto.
    let pathD = PROVINCE_PATHS[pName];
    if(pName === 'Tierra del Fuego'){
      const malvinasD = Object.values(MALVINAS_PATHS).join(' ');
      pathD = pathD + ' ' + malvinasD;
    }

    const path = el('path', {
      class: 'province-path',
      d: pathD,
      fill,
      stroke,
      'stroke-width': 1.0,
      'stroke-opacity': 0.92,
      'data-province': pName
    });

    if(state.provinceFilter === pName){
      path.classList.add('is-active');
      path.setAttribute('fill-opacity', '0.98');
      path.setAttribute('stroke-width', '2.4');
    } else if(state.provinceFilter){
      path.classList.add('is-dim');
    }

    provLayer.appendChild(path);
  });
  svg.appendChild(provLayer);

  // Labels de provincias
  const labelLayer = el('g', { 'class': 'label-layer' });
  Object.keys(PROVINCE_LABEL_POS).forEach(pName => {
    const info = pData[pName];
    const [x, y] = PROVINCE_LABEL_POS[pName];
    const isSmall = PROVINCE_LABEL_SMALL.has(pName);
    const txt = el('text', {
      class: 'province-label' + (isSmall ? ' is-small' : ''),
      x, y,
      'pointer-events': 'none'
    });
    txt.textContent = PROVINCE_LABEL_SHORT[pName] || pName;
    labelLayer.appendChild(txt);
    // El antiguo badge "mixta (X-Y-Z)" ya no es necesario: la intensidad
    // cromática del heatmap comunica directamente cuán dividida quedó
    // la provincia (saturada = unánime, pálida = fracturada).
  });
  svg.appendChild(labelLayer);

  // Islas Malvinas — visualmente integradas como parte de "Tierra del Fuego,
  // Antártida e Islas del Atlántico Sur" (constitucionalmente lo son). Los paths
  // se fusionan al path provincial arriba; aquí sólo agregamos el label para
  // identificarlas en el mapa, sin línea de referencia (ya no es necesaria).
  const malvinasLayer = el('g', { 'class': 'malvinas-layer', 'pointer-events': 'none' });
  malvinasLayer.appendChild(el('text', {
    class: 'malvinas-label',
    x: 385, y: 712
  }, 'Islas Malvinas'));
  svg.appendChild(malvinasLayer);

  // CABA — callout: línea sutil desde el círculo hacia un label fuera del mapa
  // (a la derecha del Río de la Plata), para evitar el "cuadradito" anterior.
  if(pData['CABA']){
    const calloutLayer = el('g', { 'class': 'caba-callout', 'pointer-events': 'none' });
    // Línea desde el centro de CABA (≈358,296) hacia el label (≈420,275)
    calloutLayer.appendChild(el('path', {
      class: 'caba-callout-line',
      d: 'M 340.2 316.2 L 370.2 304.2 L 396.2 304.2'
    }));
    calloutLayer.appendChild(el('text', {
      class: 'caba-callout-label',
      x: 400.2, y: 296.2
    }, 'CABA'));
    const info = pData['CABA'];
    calloutLayer.appendChild(el('text', {
      class: 'caba-callout-sub',
      x: 400.2, y: 309.2
    }, `${info.total} bancas`));
    svg.appendChild(calloutLayer);
  }

  // Eventos
  svg.addEventListener('mousemove', (e) => {
    const t = e.target;
    if(t.classList.contains('province-path')){
      const pName = t.getAttribute('data-province');
      const info = pData[pName];
      if(!info){
        showTooltip(e, `<strong>${esc(pName)}</strong><em>Sin legisladores en este escenario</em>`);
        return;
      }
      showTooltip(e, buildProvinceTooltip(pName, info));
    } else hideTooltip();
  });
  svg.addEventListener('mouseleave', hideTooltip);
  svg.addEventListener('click', (e) => {
    const t = e.target;
    if(t.classList.contains('province-path')){
      const pName = t.getAttribute('data-province');
      if(pData[pName]){
        state.provinceFilter = state.provinceFilter === pName ? '' : pName;
        const sel = document.getElementById('provinceSelect');
        if(sel) sel.value = state.provinceFilter;
        renderStage();
        renderSidebar();
      }
    }
  });

  return svg;
}

// Tooltip estructurado para una provincia
function buildProvinceTooltip(pName, info){
  const tendency = info.isMixed
    ? `Composición mixta`
    : `Predomina ${VOTE_LABELS[info.dominantVote].toLowerCase()}`;
  const famLine = info.dominantFamily
    ? `<em>Familia predominante: ${esc(info.dominantFamily)}${info.isFamilyDiverse ? ' (provincia diversa)' : ''}</em>`
    : '';
  const absLine = (info.ABSTENCION || 0) > 0
    ? `<div class="tt-block">${info.AFIRMATIVO} a favor · ${info.NEGATIVO} en contra · ${info.ABSTENCION} abstenciones · ${info.AUSENTE} ausentes</div>`
    : `<div class="tt-block">${info.AFIRMATIVO} a favor · ${info.NEGATIVO} en contra · ${info.AUSENTE} ausentes</div>`;
  return `
    <strong>${esc(pName)}</strong>
    <div class="tt-row"><span class="tt-prov">${info.total} legislador${info.total !== 1 ? 'es' : ''} · ${esc(tendency)}</span></div>
    ${absLine}
    ${famLine}
  `;
}

// Hemiciclos y mapas lado a lado + grilla panorámica 2×2. Read-only: tooltips

// Hemiciclo comparado (compacto, sin panel central ni selección).
function buildCompareHemicycleSvg(s, colorMode){
  ensureScenarioPrepared(s);
  const sorted = s._sortedLegislators;
  const layout = s._layout;
  const mode = colorMode === 'family' ? 'family' : 'vote';
  const sum = computeVoteSummary(s);

  const svg = el('svg', {
    class: 'cmp-hemicycle',
    viewBox: '0 0 1200 500',
    xmlns: 'http://www.w3.org/2000/svg',
    role: 'img',
    'aria-label': `Hemiciclo · ${s.caseName} · ${s.chamberShort}: ${sum.AFIRMATIVO} a favor, ${sum.NEGATIVO} en contra, ${sum.AUSENTE} ausentes. Resultado ${s.result}.`
  });

  const guides = el('g', { 'class': 'guides' });
  layout.radii.forEach(r => {
    const startRad = layout.cfg.startDeg * Math.PI / 180;
    const endRad = layout.cfg.endDeg * Math.PI / 180;
    const x1 = layout.cfg.cx + r * Math.cos(startRad);
    const y1 = layout.cfg.cy - r * Math.sin(startRad);
    const x2 = layout.cfg.cx + r * Math.cos(endRad);
    const y2 = layout.cfg.cy - r * Math.sin(endRad);
    guides.appendChild(el('path', { class: 'guide-arc',
      d: `M ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 0 1 ${x2.toFixed(1)} ${y2.toFixed(1)}` }));
  });
  svg.appendChild(guides);

  const seatLayer = el('g', { 'class': 'seat-layer' });
  sorted.forEach((leg, i) => {
    const seat = leg._seat;
    const isPres = leg.vote === 'PRESIDENCIA';
    const rOuter = isPres ? 8.4 : 6.4;
    const fillColor = mode === 'vote'
      ? VOTE_COLORS[leg.vote]
      : (FAMILY_COLORS[leg.family] || '#a09b8c');
    seatLayer.appendChild(el('circle', {
      class: 'seat cmp-seat',
      cx: seat.x.toFixed(2), cy: seat.y.toFixed(2), r: rOuter,
      fill: fillColor, stroke: 'rgba(255,255,255,0.9)', 'stroke-width': 1.2,
      'data-idx': i
    }));
  });
  svg.appendChild(seatLayer);

  // Tooltip read-only (sin click-to-select)
  svg.addEventListener('mousemove', (e) => {
    const t = e.target;
    if(t.classList && t.classList.contains('seat')){
      const leg = sorted[+t.getAttribute('data-idx')];
      if(leg) showTooltip(e, buildSeatTooltip(leg, s));
    } else hideTooltip();
  });
  svg.addEventListener('mouseleave', hideTooltip);
  return svg;
}

// Mapa comparado. opts.highlightVs = _provinceData del otro escenario: marca con
// borde dorado las provincias cuyo voto dominante cambió. opts.showLabels=false
// para la grilla (mapas chicos). Read-only.
function buildCompareMapSvg(s, colorMode, opts){
  opts = opts || {};

    viewBox: '0 0 500 800',
    xmlns: 'http://www.w3.org/2000/svg',
    role: 'img',
    'aria-label': `Mapa provincial · ${s.caseName} · ${s.chamberShort}. Voto predominante por provincia.`
  });
  svg.appendChild(el('rect', { class: 'map-bg', x: 0, y: 0, width: 500, height: 800 }));

  const provLayer = el('g', { 'class': 'province-layer' });
  Object.keys(PROVINCE_PATHS).forEach(pName => {
    const info = pData[pName];
    let fill, stroke;
    if(!info){
      fill = '#f1f5f9'; stroke = '#cbd5e1';
    } else if(mode === 'vote'){
      const baseColor = VOTE_COLORS[info.dominantVote] || '#a09b8c';
      const pctDom = info.total ? ((info[info.dominantVote] || 0) / info.total * 100) : 0;
      fill = mapHeatFill(baseColor, pctDom); stroke = mapHeatStroke(baseColor, pctDom);
    } else {
      const baseColor = FAMILY_COLORS[info.dominantFamily] || '#a09b8c';
      const pctDom = info.total ? (((info.families && info.families[info.dominantFamily]) || 0) / info.total * 100) : 0;
      fill = mapHeatFill(baseColor, pctDom); stroke = mapHeatStroke(baseColor, pctDom);
    }
    let pathD = PROVINCE_PATHS[pName];
    if(pName === 'Tierra del Fuego'){
      pathD = pathD + ' ' + Object.values(MALVINAS_PATHS).join(' ');
    }
    // ¿Cambió el voto dominante respecto del otro escenario del par?
    let changed = false;
    if(compareData && info){
      const other = compareData[pName];
      if(other && other.dominantVote && info.dominantVote && other.dominantVote !== info.dominantVote) changed = true;
    }
    provLayer.appendChild(el('path', {
      class: 'province-path' + (changed ? ' is-changed' : ''),
      d: pathD, fill, stroke, 'stroke-width': 1.0, 'stroke-opacity': 0.92,
      'data-province': pName
    }));
  });
  svg.appendChild(provLayer);

  if(showLabels){

    const malvinasLayer = el('g', { 'class': 'malvinas-layer', 'pointer-events': 'none' });
    malvinasLayer.appendChild(el('text', { class: 'malvinas-label', x: 385, y: 712 }, 'Islas Malvinas'));
    svg.appendChild(malvinasLayer);
    if(pData['CABA']){
      const calloutLayer = el('g', { 'class': 'caba-callout', 'pointer-events': 'none' });
      calloutLayer.appendChild(el('path', { class: 'caba-callout-line', d: 'M 340.2 316.2 L 370.2 304.2 L 396.2 304.2' }));
      calloutLayer.appendChild(el('text', { class: 'caba-callout-label', x: 400.2, y: 296.2 }, 'CABA'));
      calloutLayer.appendChild(el('text', { class: 'caba-callout-sub', x: 400.2, y: 309.2 }, `${pData['CABA'].total} bancas`));
      svg.appendChild(calloutLayer);
    }
  }

  // Tooltip read-only (sin mutar provinceFilter)
  svg.addEventListener('mousemove', (e) => {
    const t = e.target;
    if(t.classList && t.classList.contains('province-path')){
      const pName = t.getAttribute('data-province');
      const info = pData[pName];
      if(!info){ showTooltip(e, `<strong>${esc(pName)}</strong><em>Sin legisladores en este escenario</em>`); return; }
      showTooltip(e, buildProvinceTooltip(pName, info));
    } else hideTooltip();
  });
  svg.addEventListener('mouseleave', hideTooltip);
  return svg;
}

// Leyenda compartida del comparado (sin conteos: son dos/cuatro escenarios).
function buildCompareLegendHtml(scens, colorMode){
  const mode = colorMode === 'family' ? 'family' : 'vote';
  const present = new Set();
  scens.forEach(s => { if(s && s._sortedLegislators) s._sortedLegislators.forEach(l => present.add(mode === 'vote' ? l.vote : l.family)); });
  if(mode === 'vote'){
    const order = ['AFIRMATIVO','NEGATIVO','ABSTENCION','AUSENTE','PRESIDENCIA'];
    return order.filter(v => present.has(v))
      .map(v => `<span class="legend-chip"><span class="legend-sw" style="background:${VOTE_COLORS[v]}"></span>${esc(VOTE_LABELS[v])}</span>`).join('');
  }
  return Object.keys(FAMILY_COLORS).filter(f => present.has(f))
    .map(f => `<span class="legend-chip"><span class="legend-sw" style="background:${FAMILY_COLORS[f]}"></span>${esc(f)}</span>`).join('');
}
